            <table class="data-table" id="data-table">

                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <!-- Forecast Table Panel -->

        <div class="table-container">

</div>

//線性插值計算副指數
function calcSubIdx(val, bpList){
    const v=Number(val);
    if(isNaN(v)) return 0;
    let low=bpList[0],high=bpList[bpList.length-1];
    for(let p of bpList){
        if(v<=p.c){ high=p; break; }
        low=p;
    }
    const I=low.i + ((high.i-low.i)/(high.c-low.c))*(v-low.c);
    return I;
}

function updateLegendPanel(tabType) {
  const box = document.getElementById('legend-content');

  if(!arr){box.innerHTML=`<div class="legend-item" style="color:#777;">無圖例</div>`;return;}
  box.innerHTML = arr.map(x=>`<div class="legend-item"><div class="legend-color" style="background:${x.c}"></div>${x.t}</div>`).join('');
}

  const n = parseFloat(val);
  if (isNaN(n)) return "#95a5a6";
  const list = legendMap.aqi;
  if(n<=50) return list[0].c;
  if(n<=100)return list[1].c;
  if(n<=150)return list[2].c;
  if(n<=200)return list[3].c;
  if(n<=300)return list[4].c;
  return list[5].c;
}

function formatVal(v,unit){
    if(v===null||v===undefined||isNaN(Number(v))) return "--";
    return Number(v).toFixed(1)+(unit?" "+unit:"");
}
function getAqiLevel(aqiVal){
    const v=Number(aqiVal);
    if(v<=50) return {cls:"level-good",text:"良好"};
    if(v<=100)return {cls:"level-moderate",text:"普通"};
    if(v<=150)return {cls:"level-unhealthy-sensitive",text:"不良"};

    if(v<=300)return {cls:"level-very-unhealthy",text:"嚴重"};

}

function renderSingleCard(data) {
    const {name, code, pubTime, aqi, pm10, pm25, no2, so2, o3, co, mainPoll} = data;
    const levelInfo = getAqiLevel(aqi);
    let pollTip = aqi>100 ? `<div class="main-pollutant">首要污染物：${mainPoll}</div>`:"";
    const card = `<div class="station-card"><div class="station-name">${name} (${code})</div><div style="font-size:0.8rem;color:#666;margin:8px 0;">更新時間：${pubTime}</div>${pollTip}<div class="aqi-row"><div class="current-aqi">${formatVal(aqi, '')}</div><div class="aqi-level ${levelInfo.cls}">${levelInfo.text}</div></div><div class="metrics-grid"><div class="metric col-half"><span>PM10</span><strong>${formatVal(pm10, 'μg/m³')}</strong></div><div class="metric col-half"><span>PM2.5</span><strong>${formatVal(pm25, 'μg/m³')}</strong></div><div class="metric col-half"><span>二氧化氮 NO₂</span><strong>${formatVal(no2, 'μg/m³')}</strong></div><div class="metric col-half"><span>二氧化硫 SO₂</span><strong>${formatVal(so2, 'μg/m³')}</strong></div><div class="metric col-half"><span>臭氧 O₃</span><strong>${formatVal(o3, 'μg/m³')}</strong></div><div class="metric col-half"><span>一氧化碳 CO</span><strong>${formatVal(co, 'mg/m³')}</strong></div></div></div>`;
    singleCardBox.innerHTML = card;
}

function updateMapMarkers() {
    clearMarkers();
    document.getElementById('current-indicator').textContent = fieldMap[currentTab].label;
    airDataList.forEach(point=>{
        const name = point.name;
        const pos = airStations[name];
        if(!pos) return;
        let val = point[fieldMap[currentTab].field];
        let color="#95a5a6";
        switch(currentTab){
            case"aqi":color=getAqiColor(val);break;
            case"pm25":color=getPm25Color(val);break;
            case"pm10":color=getPm10Color(val);break;
            case"no2":color=getNo2Color(val);break;
            case"so2":color=getSo2Color(val);break;
            case"o3":color=getO3Color(val);break;
            case"co":color=getCoColor(val);break;
        }
        const iconHtml=`<div style="background:${color};color:#fff;border-radius:50%;width:50px;height:50px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:bold;">${Number(val).toFixed(1)}</div>`;
        const icon=L.divIcon({html:iconHtml,className:"",iconSize:[50,50],iconAnchor:[25,25]});
        const marker=L.marker([pos.lat,pos.lng],{icon}).addTo(map);
        marker.bindPopup(`<strong>${name}</strong>`);
        marker.on('click',()=>renderSingleCard({...point,code:pos.code}));
        allMarkers.push(marker);
    })
}

function renderDataTable(type,sortType=lastSort){
    const cfg=fieldMap[type];
    const field=cfg.field,label=cfg.label,unit=cfg.unit;
    document.getElementById('table-title').textContent=`${label} 數據表格`;
    const tbody=document.getElementById('table-body');tbody.innerHTML="";
    let validList=airDataList.filter(i=>!isNaN(Number(i[field])));
    if(sortType==='desc')validList.sort((a,b)=>parseFloat(b[field])-parseFloat(a[field]));
    else if(sortType==='asc')validList.sort((a,b)=>parseFloat(a[field])-parseFloat(b[field]));
    lastSort=sortType;
    validList.forEach(item=>{
        const name=item.name,code=airStations[name]?.code||"";
        const dVal=Number(item[field]).toFixed(1)+(unit?" "+unit:"");
        const tr=document.createElement('tr');tr.innerHTML=`<td>${name}</td><td>${code}</td><td>${dVal}</td>`;tbody.appendChild(tr);
    })
}

// Fix CORS via public CORS proxy
async function loadForecastData(){
    const tbody = document.getElementById("forecast-body");
    tbody.innerHTML = "<tr><td colspan='5'>載入預報數據...</td></tr>";
    try{
        const proxy = "https://corsproxy.io/?";
        const xmlUrl = proxy + encodeURIComponent("https://xml.smg.gov.mo/c_foreiqa.xml");
        const res = await fetch(xmlUrl);
        const xmlTxt = await res.text();
        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(xmlTxt,"text/xml");
        const reports = xmlDoc.querySelectorAll("AQIForecastReport");
        tbody.innerHTML = "";

        reports.forEach(rep=>{
            const zoneName = rep.querySelector("Stationname")?.textContent||"";
            const fDate = rep.querySelector("ValidFor")?.textContent||"";
            const aqiRange = rep.querySelector("Value")?.textContent||"";
            const descText = rep.querySelector("AQIForecastDescription")?.textContent||"";
            const iconName = rep.querySelector("IconName")?.textContent||"";

            const grade = iconGradeMap[iconName] || iconGradeMap["c_moderate.png"];
            const tr = document.createElement("tr");
            tr.style.backgroundColor = grade.color;
            tr.style.color="#ffffff";
            tr.innerHTML = `<td>${zoneName}</td><td>${fDate}</td><td>${aqiRange}</td><td>${grade.name}</td><td>${descText}</td>`;
            tbody.appendChild(tr);
        })
    }catch(err){
        tbody.innerHTML = "<tr><td colspan='5'>預報載入失敗</td></tr>";
        console.error(err);
    }
}

btnForecast.onclick=()=>{

document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.onclick=()=>{
        document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');currentTab=btn.dataset.type;

    }
})
document.querySelectorAll('.sort-btn').forEach(b=>b.onclick=()=>renderDataTable(currentTab,b.dataset.sort));

async function fetchAirData() {
    const url = `https://cdn.jsdelivr.net/gh/macaosso/MSSOweb@main/data.json?_t=${Date.now()}`;
    try {
        const res = await fetch(url, { cache: "no-store" });
        if (!res.ok) throw new Error(res.status);
        const json = await res.json();
        const pubTime = json.datetime || "未知時間";
        document.getElementById("pub-date").textContent = pubTime;
        document.getElementById("time-stamp").textContent = pubTime;

        airDataList = [];
        singleCardBox.innerHTML = '<div class="empty-tip">請點擊地圖上圓圈查看監測站數據</div>';

        const stationKeys = Object.keys(json).filter(k => k !== 'datetime');
        stationKeys.forEach(key => {
            const rec = json[key];
            const sName = rec.Chinese;

            const pm10=Number(rec.HE_PM10);
            const pm25=Number(rec.HE_PM2_5);
            const no2=Number(rec.HE_NO2);
            const so2=Number(rec.HE_SO2);
            const o3=Number(rec.HE_O3);
            const co=Number(rec.HE_CO);

            const idx={
                pm10:calcSubIdx(pm10,aqiBreak.pm10),
                pm25:calcSubIdx(pm25,aqiBreak.pm25),
                no2:calcSubIdx(no2,aqiBreak.no2),
                so2:calcSubIdx(so2,aqiBreak.so2),
                o3:calcSubIdx(o3,aqiBreak.o3),
                co:calcSubIdx(co,aqiBreak.co)
            };
            let maxIdx=-1,mainPollutant="";
            for(let p in idx){
                if(idx[p]>maxIdx){
                    maxIdx=idx[p];
                    mainPollutant=pollNameCN[p];
                }
            }
            const finalAQI=Math.round(maxIdx);

            airDataList.push({
                name: sName,
                pubTime: pubTime,
                aqi: finalAQI,
                pm10: pm10,
                pm25: pm25,
                no2: no2,
                so2: so2,
                o3: o3,
                co: co,
                mainPoll:mainPollutant
            })
        })

        updateMapMarkers();
        updateLegendPanel(currentTab);
        renderDataTable(currentTab);
    } catch (err) {
        console.error('Load error:', err);
        document.getElementById("pub-date").textContent = "數據載入失敗";
    }
}
window.addEventListener('DOMContentLoaded',()=>{
    fetchAirData();
});
setInterval(fetchAirData,300000);
