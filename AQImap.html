<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>澳門空氣質素實況地圖</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f3f7;
            color: #2c3e50;
            padding: 20px;
            font-size: 14px;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        header {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            padding: 20px 30px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        header h1 {
            font-size: 1.6rem;
            font-weight: 600;
        }
        .meta-info {
            text-align: right;
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .view-switch {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }
        .view-switch button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            background: #e8edf2;
            cursor: pointer;
            font-size: 0.95rem;
        }
        .view-switch button.active {
            background: #2a5298;
            color: #fff;
        }

        .tab-wrapper {
            background: #fff;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }
        .tab-group {
            margin-bottom: 10px;
        }
        .group-title {
            font-size: 1rem;
            font-weight: 600;
            color: #2c3e50;
            margin: 0 0 8px 0;
            padding: 4px 0;
        }
        .group-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding-left: 10px;
        }

        .tab-btn {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            background: #e8edf2;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: #2a5298;
            color: #fff;
        }
        .tab-btn:hover:not(.active) {
            background: #d0d9e2;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 1024px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
        }
        .map-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            padding: 15px;
            position: relative;
        }
        #macau-map {
            width: 100%;
            height: 650px;
            border-radius: 8px;
        }

        .map-legend {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background: rgba(255,255,255,0.95);
            padding: 8px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            z-index: 1000;
            min-width: 120px;
        }
        .map-legend h4 {
            margin: 0 0 5px 0;
            font-size: 0.8rem;
            text-align: center;
            border-bottom: 1px solid #eee;
            padding-bottom: 3px;
        }
        .legend-items {
            max-height: 180px;
            overflow-y: auto;
        }
        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 3px;
        }
        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 5px;
        }

        .time-stamp {
            position: absolute;
            top: 25px;
            right: 25px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.9rem;
            z-index: 1000;
        }

        .time-stamp-indicator {
            position: absolute;
            top: 60px;
            right: 25px;
            background: rgba(42, 82, 152, 0.9);
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.9rem;
            z-index: 1000;
        }

        .station-single {
            height: 650px;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 20px;
        }
        .empty-tip {
            color: #999;
            font-size: 1rem;
        }

        .station-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            padding: 18px;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            border-top: 4px solid #3498db;
            width: 100%;
            max-width: 420px;
            font-size: 13px;
        }
        .station-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        .station-name {
            font-size: 1.1rem;
            font-weight: bold;
            color: #2c3e50;
            border-bottom: 1px solid #ecf0f1;
            padding-bottom: 8px;
        }
        .aqi-row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin: 15px 0;
        }
        .current-aqi {
            font-size: 2rem;
            font-weight: 700;
            color: #1a1a1a;
        }
        .aqi-level {
            font-size: 0.9rem;
            padding: 4px 8px;
            border-radius: 4px;
            color: #fff;
        }
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            font-size: 0.8rem;
        }
        .metric {
            background: #f8f9fa;
            padding: 8px 10px;
            border-radius: 6px;
        }
        .col-half {
            grid-column: span 3;
        }
        .col-full {
            grid-column: span 6;
        }
        .metric span {
            display: block;
            color: #7f8c8d;
            font-size: 0.7rem;
            text-transform: uppercase;
            margin-bottom: 2px;
        }
        .metric strong {
            color: #2c3e50;
            font-size: 0.9rem;
        }

        .level-good { background: #2ecc71; }
        .level-moderate { background: #f1c40f; }
        .level-unhealthy-sensitive { background: #f39c12; }
        .level-unhealthy { background: #e74c3c; }
        .level-very-unhealthy { background: #9b59b6; }
        .level-hazardous { background: #7b241c; }

        .table-container {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 0.85rem;
        }
        .data-table th, .data-table td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }
        .data-table th {
            background: #f1f5f9;
            font-weight: 600;
        }
        .data-table tr:hover {
            background: #f8fafc;
        }
        .sort-buttons button {
            padding: 4px 10px;
            margin-left: 6px;
            border: none;
            border-radius: 4px;
            background: #e8edf2;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .sort-buttons button:hover {
            background: #d0d9e2;
        }
        .hide {
            display: none !important;
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div>
            <h1>澳門空氣質素實況地圖</h1>
            <small style="color: #2ecc71;">● 點擊地圖圓圈查看數據 | 切換分類查看不同污染物指標</small>
        </div>
        <div class="meta-info">
            <div>資料更新時間：<span id="pub-date">載入中...</span></div>
            <div>每5分鐘自動刷新</div>
        </div>
    </header>

    <div class="view-switch">
        <button id="btn-map" class="active">地圖</button>
        <button id="btn-table">表格</button>
    </div>

    <div class="tab-wrapper" id="main-tab">
        <div class="tab-group">
            <h3 class="group-title">空氣污染物指標</h3>
            <div class="group-buttons show">
                <button class="tab-btn active" data-type="aqi">空氣質素指數 AQI</button>
                <button class="tab-btn" data-type="pm10">可吸入懸浮粒子 PM10 (μg/m³)</button>
                <button class="tab-btn" data-type="pm25">細懸浮粒子 PM2.5 (μg/m³)</button>
                <button class="tab-btn" data-type="no2">二氧化氮 NO₂ (μg/m³)</button>
                <button class="tab-btn" data-type="so2">二氧化硫 SO₂ (μg/m³)</button>
                <button class="tab-btn" data-type="o3">臭氧 O₃ (μg/m³)</button>
                <button class="tab-btn" data-type="co">一氧化碳 CO (mg/m³)</button>
            </div>
        </div>
    </div>

    <div class="main-layout" id="map-view">
        <div class="map-card">
            <div id="macau-map"></div>
            <div id="time-stamp" class="time-stamp"></div>
            <div id="current-indicator" class="time-stamp-indicator"></div>
            <div id="map-legend" class="map-legend">
                <h4>圖例</h4>
                <div id="legend-content" class="legend-items"></div>
            </div>
        </div>
        <div id="single-card-box" class="station-single">
            <div class="empty-tip">請點擊地圖上圓圈查看監測站數據</div>
        </div>
    </div>

    <div id="table-view" class="hide">
        <div class="table-container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom:10px;">
                <div id="table-title" style="font-size:1.1rem;font-weight:bold;">數據表格</div>
                <div class="sort-buttons">
                    <button class="sort-btn" data-sort="default">預設</button>
                    <button class="sort-btn" data-sort="desc">高至低</button>
                    <button class="sort-btn" data-sort="asc">低至高</button>
                </div>
            </div>
            <table class="data-table" id="data-table">
                <thead><tr><th>監測站名稱</th><th>站代碼</th><th>數值</th></tr></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
//========= 圖例配置（只需在此修改顏色、分級、文字）=========
const legendMap = {
  aqi: [
    {c:"#2a9958",t:"良好"},
    {c:"#957d1d",t:"普通"},
    {c:"#c36e25",t:"不良"},
    {c:"#b02525",t:"非常不良"},
    {c:"#ae2693",t:"嚴重"},
    {c:"#280c0c",t:"有害"},
  ],
  pm25: [
    {c:"#2a9958",t:"0 - 49"},
    {c:"#957d1d",t:"50 - 114"},
    {c:"#c36e25",t:"115 - 149"},
    {c:"#b02525",t:"150 - 249"},
    {c:"#ae2693",t:"250 - 349"},
    {c:"#280c0c",t:">= 350"},
  ],
  pm10: [
    {c:"#2a9958",t:"0 - 99"},
    {c:"#957d1d",t:"100 - 249"},
    {c:"#c36e25",t:"250 - 349"},
    {c:"#b02525",t:"350 - 419"},
    {c:"#ae2693",t:"420 - 499"},
    {c:"#280c0c",t:">= 500"},
  ],
  no2: [
    {c:"#2a9958",t:"0 - 199"},
    {c:"#957d1d",t:"200 - 699"},
    {c:"#c36e25",t:"700 - 1199"},
    {c:"#b02525",t:"1200 - 1999"},
    {c:"#ae2693",t:"2000 - 2499"},
    {c:"#280c0c",t:">= 2500"},
  ],
  so2: [
    {c:"#2a9958",t:"0 - 49"},
    {c:"#957d1d",t:"50 - 149"},
    {c:"#c36e25",t:"150 - 474"},
    {c:"#b02525",t:"475 - 799"},
    {c:"#ae2693",t:"800 - 1599"},
    {c:"#280c0c",t:">= 1600"},
  ],
  o3: [
    {c:"#2a9958",t:"0 - 159"},
    {c:"#957d1d",t:"160 - 239"},
    {c:"#c36e25",t:"240 - 339"},
    {c:"#b02525",t:"400 - 599"},
    {c:"#ae2693",t:"600 - 799"},
    {c:"#280c0c",t:">= 800"},
  ],
  co: [
    {c:"#2a9958",t:"0 - 9"},
    {c:"#957d1d",t:"10 - 16"},
    {c:"#c36e25",t:"17 - 33"},
    {c:"#b02525",t:"34 - 45"},
    {c:"#ae2693",t:"46 - 56"},
    {c:"#280c0c",t:">= 57"},
  ]
};

//自動生成圖例
function updateLegendPanel(tabType) {
  const box = document.getElementById('legend-content');
  const arr = legendMap[tabType];
  if(!arr){box.innerHTML=`<div class="legend-item" style="color:#777;">無圖例</div>`;return;}
  box.innerHTML = arr.map(x=>`<div class="legend-item"><div class="legend-color" style="background:${x.c}"></div>${x.t}</div>`).join('');
}

//顏色自動綁定legendMap
function getAqiColor(val) {
  const n = parseFloat(val);
  if (isNaN(n)) return "#95a5a6";
  const list = legendMap.aqi;
  if(n<=50) return list[0].c;
  if(n<=100)return list[1].c;
  if(n<=150)return list[2].c;
  if(n<=200)return list[3].c;
  if(n<=300)return list[4].c;
  return list[5].c;
}
function getPm25Color(val) {
  const n = parseFloat(val);
  if (isNaN(n)) return "#95a5a6";
  const list = legendMap.pm25;
  if(n<=49) return list[0].c;
  if(n<=114)return list[1].c;
  if(n<=149)return list[2].c;
  if(n<=249)return list[3].c;
  if(n<=349)return list[4].c;
  return list[5].c;
}
function getPm10Color(val) {
  const n = parseFloat(val);
  if (isNaN(n)) return "#95a5a6";
  const list = legendMap.pm10;
  if(n<=99) return list[0].c;
  if(n<=249)return list[1].c;
  if(n<=349)return list[2].c;
  if(n<=419)return list[3].c;
  if(n<=499)return list[4].c;
  return list[5].c;
}
function getNo2Color(val) {
  const n = parseFloat(val);
  if (isNaN(n)) return "#95a5a6";
  const list = legendMap.no2;
  if(n<=199) return list[0].c;
  if(n<=699)return list[1].c;
  if(n<=1199)return list[2].c;
  if(n<=1999)return list[3].c;
  if(n<=2499)return list[4].c;
  return list[5].c;
}
function getSo2Color(val) {
  const n = parseFloat(val);
  if (isNaN(n)) return "#95a5a6";
  const list = legendMap.so2;
  if(n<=49) return list[0].c;
  if(n<=149)return list[1].c;
  if(n<=474)return list[2].c;
  if(n<=799)return list[3].c;
  if(n<=1599)return list[4].c;
  return list[5].c;
}
function getO3Color(val) {
  const n = parseFloat(val);
  if (isNaN(n)) return "#95a5a6";
  const list = legendMap.o3;
  if(n<=159) return list[0].c;
  if(n<=239)return list[1].c;
  if(n<=339)return list[2].c;
  if(n<=599)return list[3].c;
  if(n<=799)return list[4].c;
  return list[5].c;
}
function getCoColor(val) {
  const n = parseFloat(val);
  if (isNaN(n)) return "#95a5a6";
  const list = legendMap.co;
  if(n<=9) return list[0].c;
  if(n<=16)return list[1].c;
  if(n<=33)return list[2].c;
  if(n<=45)return list[3].c;
  if(n<=56)return list[4].c;
  return list[5].c;
}

//站點經緯度(與JSON中文站名完全對應)
const airStations = {
    "荷蘭園（路邊）": { code: "PO", lat: 22.1957226, lng: 113.5447928 },
    "九澳（路邊）": { code: "KH", lat: 22.1330617, lng: 113.5835098 },
    "台山（高密度住宅區）": { code: "EN", lat: 22.2143048, lng: 113.5430605 },
    "氹仔中心區（高密度住宅區）": { code: "TC", lat: 22.1585991, lng: 113.5555425 },
    "大潭山（一般性）": { code: "TG", lat: 22.1594111, lng: 113.5684563 },
    "石排灣（一般性）": { code: "CD", lat: 22.1250727, lng: 113.5544267 }
};

// ========= FIX 1: Repair fieldMap missing label/field/unit =========
const fieldMap = {
    aqi:{field:"aqi",label:"空氣質素AQI",unit:"",fn:getAqiColor},
    pm10:{field:"pm10",label:"PM10",unit:"μg/m³",fn:getPm10Color},
    pm25:{field:"pm25",label:"PM2.5",unit:"μg/m³",fn:getPm25Color},
    no2:{field:"no2",label:"NO₂",unit:"μg/m³",fn:getNo2Color},
    so2:{field:"so2",label:"SO₂",unit:"μg/m³",fn:getSo2Color},
    o3:{field:"o3",label:"O₃",unit:"μg/m³",fn:getO3Color},
    co:{field:"co",label:"CO",unit:"mg/m³",fn:getCoColor}
};

let map = L.map('macau-map').setView([22.17, 113.55], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {attribution: '&copy; OpenStreetMap contributors'}).addTo(map);

let allMarkers = [];
let currentTab = "aqi";
let airDataList = [];
const singleCardBox = document.getElementById("single-card-box");
let lastSort = "default";

function clearMarkers(){allMarkers.forEach(m=>map.removeLayer(m));allMarkers=[];}

// ========= FIX 2: add missing helper functions formatVal & getAqiLevel =========
function formatVal(v,unit){
    if(v===null||v===undefined||isNaN(Number(v))) return "--";
    return Number(v).toFixed(1)+(unit?" "+unit:"");
}
function getAqiLevel(aqiVal){
    const v=Number(aqiVal);
    if(v<=50) return {cls:"level-good",text:"良好"};
    if(v<=100)return {cls:"level-moderate",text:"普通"};
    if(v<=150)return {cls:"level-unhealthy-sensitive",text:"不良"};
    if(v<=200)return {cls:"level-unhealthy",text:"非常不良"};
    if(v<=300)return {cls:"level-very-unhealthy",text:"嚴重"};
    return {cls:"level-hazardous",text:"有害"};
}

function renderSingleCard(data) {
    const {name, code, pubTime, aqi, pm10, pm25, no2, so2, o3, co} = data;
    const levelInfo = getAqiLevel(aqi);
    const card = `<div class="station-card"><div class="station-name">${name} (${code})</div><div style="font-size:0.8rem;color:#666;margin:8px 0;">更新時間：${pubTime}</div><div class="aqi-row"><div class="current-aqi">${formatVal(aqi, '')}</div><div class="aqi-level ${levelInfo.cls}">${levelInfo.text}</div></div><div class="metrics-grid"><div class="metric col-half"><span>PM10</span><strong>${formatVal(pm10, 'μg/m³')}</strong></div><div class="metric col-half"><span>PM2.5</span><strong>${formatVal(pm25, 'μg/m³')}</strong></div><div class="metric col-half"><span>二氧化氮 NO₂</span><strong>${formatVal(no2, 'μg/m³')}</strong></div><div class="metric col-half"><span>二氧化硫 SO₂</span><strong>${formatVal(so2, 'μg/m³')}</strong></div><div class="metric col-half"><span>臭氧 O₃</span><strong>${formatVal(o3, 'μg/m³')}</strong></div><div class="metric col-half"><span>一氧化碳 CO</span><strong>${formatVal(co, 'mg/m³')}</strong></div></div></div>`;
    singleCardBox.innerHTML = card;
}

function updateMapMarkers() {
    clearMarkers();
    document.getElementById('current-indicator').textContent = fieldMap[currentTab].label;
    airDataList.forEach(point=>{
        const name = point.name;
        const pos = airStations[name];
        if(!pos) return;
        let val = point[fieldMap[currentTab].field];
        let color="#95a5a6";
        switch(currentTab){
            case"aqi":color=getAqiColor(val);break;
            case"pm25":color=getPm25Color(val);break;
            case"pm10":color=getPm10Color(val);break;
            case"no2":color=getNo2Color(val);break;
            case"so2":color=getSo2Color(val);break;
            case"o3":color=getO3Color(val);break;
            case"co":color=getCoColor(val);break;
        }
        const iconHtml=`<div style="background:${color};color:#fff;border-radius:50%;width:50px;height:50px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:bold;">${Number(val).toFixed(1)}</div>`;
        const icon=L.divIcon({html:iconHtml,className:"",iconSize:[50,50],iconAnchor:[25,25]});
        const marker=L.marker([pos.lat,pos.lng],{icon}).addTo(map);
        marker.bindPopup(`<strong>${name}</strong>`);
        marker.on('click',()=>renderSingleCard({...point,code:pos.code}));
        allMarkers.push(marker);
    })
}

function renderDataTable(type,sortType=lastSort){
    const cfg=fieldMap[type];
    const field=cfg.field,label=cfg.label,unit=cfg.unit;
    document.getElementById('table-title').textContent=`${label} 數據表格`;
    const tbody=document.getElementById('table-body');tbody.innerHTML="";
    let validList=airDataList.filter(i=>!isNaN(Number(i[field])));
    if(sortType==='desc')validList.sort((a,b)=>parseFloat(b[field])-parseFloat(a[field]));
    else if(sortType==='asc')validList.sort((a,b)=>parseFloat(a[field])-parseFloat(b[field]));
    lastSort=sortType;
    validList.forEach(item=>{
        const name=item.name,code=airStations[name]?.code||"";
        const dVal=Number(item[field]).toFixed(1)+(unit?" "+unit:"");
        const tr=document.createElement('tr');tr.innerHTML=`<td>${name}</td><td>${code}</td><td>${dVal}</td>`;tbody.appendChild(tr);
    })
}

document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.onclick=()=>{
        document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');currentTab=btn.dataset.type;
        updateMapMarkers();updateLegendPanel(currentTab);renderDataTable(currentTab);
    }
})
document.getElementById('btn-map').onclick=function(){
    this.classList.add('active');document.getElementById('btn-table').classList.remove('active');
    document.getElementById('map-view').classList.remove('hide');document.getElementById('table-view').classList.add('hide');
}
document.getElementById('btn-table').onclick=function(){
    this.classList.add('active');document.getElementById('btn-map').classList.remove('active');
    document.getElementById('map-view').classList.add('hide');document.getElementById('table-view').classList.remove('hide');
    renderDataTable(currentTab);
}
document.querySelectorAll('.sort-btn').forEach(b=>b.onclick=()=>renderDataTable(currentTab,b.dataset.sort));

// 固定讀取你倉庫已存在的data.json
async function fetchAirData() {
    const url = `https://cdn.jsdelivr.net/gh/macaosso/MSSOweb@main/data.json?_t=${Date.now()}`;
    try {
        const res = await fetch(url, { cache: "no-store" });
        if (!res.ok) throw new Error(res.status);
        const json = await res.json();
        const pubTime = json.datetime || "未知時間";
        document.getElementById("pub-date").textContent = pubTime;
        document.getElementById("time-stamp").textContent = pubTime;

        airDataList = [];
        singleCardBox.innerHTML = '<div class="empty-tip">請點擊地圖上圓圈查看監測站數據</div>';

        const stationKeys = Object.keys(json).filter(k => k !== 'datetime');
        stationKeys.forEach(key => {
            const rec = json[key];
            const sName = rec.Chinese;

            // Keep original logic: temporary AQI = PM2.5 (NO official AQI calc now)
            const pm25 = Number(rec.HE_PM2_5);
            let calcAQI = pm25;

            airDataList.push({
                name: sName,
                pubTime: pubTime,
                aqi: calcAQI,
                pm10: Number(rec.HE_PM10),
                pm25: pm25,
                no2: Number(rec.HE_NO2),
                so2: Number(rec.HE_SO2),
                o3: Number(rec.HE_O3),
                co: Number(rec.HE_CO)
            })
        })

        updateMapMarkers();
        updateLegendPanel(currentTab);
        renderDataTable(currentTab);
    } catch (err) {
        console.error('Load error:', err);
        document.getElementById("pub-date").textContent = "數據載入失敗";
    }
}
window.addEventListener('DOMContentLoaded',fetchAirData);
setInterval(fetchAirData,300000);
</script>
