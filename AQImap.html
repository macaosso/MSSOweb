<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>澳門空氣質素實況地圖</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f3f7;
            color: #2c3e50;
            padding: 20px;
            font-size: 14px;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        header {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            padding: 20px 30px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        header h1 {
            font-size: 1.6rem;
            font-weight: 600;
        }
        .meta-info {
            text-align: right;
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .view-switch {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }
        .view-switch button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            background: #e8edf2;
            cursor: pointer;
            font-size: 0.95rem;
        }
        .view-switch button.active {
            background: #2a5298;
            color: #fff;
        }

        .tab-wrapper {
            background: #fff;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }
        .tab-group {
            margin-bottom: 10px;
        }
        .group-title {
            font-size: 1rem;
            font-weight: 600;
            color: #2c3e50;
            margin: 0 0 8px 0;
            padding: 4px 0;
        }
        .group-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding-left: 10px;
        }

        .tab-btn {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            background: #e8edf2;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: #2a5298;
            color: #fff;
        }
        .tab-btn:hover:not(.active) {
            background: #d0d9e2;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 1024px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
        }
        .map-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            padding: 15px;
            position: relative;
        }
        #macau-map {
            width: 100%;
            height: 650px;
            border-radius: 8px;
        }

        .map-legend {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background: rgba(255,255,255,0.95);
            padding: 8px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            z-index: 1000;
            min-width: 120px;
        }
        .map-legend h4 {
            margin: 0 0 5px 0;
            font-size: 0.8rem;
            text-align: center;
            border-bottom: 1px solid #eee;
            padding-bottom: 3px;
        }
        .legend-items {
            max-height: 180px;
            overflow-y: auto;
        }
        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 3px;
        }
        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 5px;
        }

        .time-stamp {
            position: absolute;
            top: 25px;
            right: 25px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.9rem;
            z-index: 1000;
        }

        .time-stamp-indicator {
            position: absolute;
            top: 60px;
            right: 25px;
            background: rgba(42, 82, 152, 0.9);
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.9rem;
            z-index: 1000;
        }

        .station-single {
            height: 650px;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 20px;
        }
        .empty-tip {
            color: #999;
            font-size: 1rem;
        }

        .station-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            padding: 18px;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            border-top: 4px solid #3498db;
            width: 100%;
            max-width: 420px;
            font-size: 13px;
        }
        .station-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        .station-name {
            font-size: 1.1rem;
            font-weight: bold;
            color: #2c3e50;
            border-bottom: 1px solid #ecf0f1;
            padding-bottom: 8px;
        }
        .aqi-row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin: 15px 0;
        }
        .current-aqi {
            font-size: 2rem;
            font-weight: 700;
            color: #1a1a1a;
        }
        .aqi-level {
            font-size: 0.9rem;
            padding: 4px 8px;
            border-radius: 4px;
            color: #fff;
        }
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            font-size: 0.8rem;
        }
        .metric {
            background: #f8f9fa;
            padding: 8px 10px;
            border-radius: 6px;
        }
        .col-half {
            grid-column: span 3;
        }
        .col-full {
            grid-column: span 6;
        }
        .metric span {
            display: block;
            color: #7f8c8d;
            font-size: 0.7rem;
            text-transform: uppercase;
            margin-bottom: 2px;
        }
        .metric strong {
            color: #2c3e50;
            font-size: 0.9rem;
        }

        .level-good { background: #2ecc71; }
        .level-moderate { background: #f1c40f; }
        .level-unhealthy-sensitive { background: #f39c12; }
        .level-unhealthy { background: #e74c3c; }
        .level-very-unhealthy { background: #9b59b6; }
        .level-hazardous { background: #7b241c; }

        .table-container {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 0.85rem;
        }
        .data-table th, .data-table td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }
        .data-table th {
            background: #f1f5f9;
            font-weight: 600;
        }
        .data-table tr:hover {
            background: #f8fafc;
        }
        .sort-buttons button {
            padding: 4px 10px;
            margin-left: 6px;
            border: none;
            border-radius: 4px;
            background: #e8edf2;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .sort-buttons button:hover {
            background: #d0d9e2;
        }
        .hide {
            display: none !important;
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div>
            <h1>澳門空氣質素實況地圖</h1>
            <small style="color: #2ecc71;">● 點擊地圖圓圈查看數據 | 切換分類查看不同污染物指標</small>
        </div>
        <div class="meta-info">
            <div>資料更新時間：<span id="pub-date">載入中...</span></div>
            <div>每5分鐘自動刷新</div>
        </div>
    </header>

    <div class="view-switch">
        <button id="btn-map" class="active">地圖</button>
        <button id="btn-table">表格</button>
    </div>

    <div class="tab-wrapper" id="main-tab">
        <div class="tab-group">
            <h3 class="group-title">空氣污染物指標</h3>
            <div class="group-buttons show">
                <button class="tab-btn active" data-type="aqi">空氣質素指數 AQI</button>
                <button class="tab-btn" data-type="pm10">可吸入懸浮粒子 PM10 (μg/m³)</button>
                <button class="tab-btn" data-type="pm25">細懸浮粒子 PM2.5 (μg/m³)</button>
                <button class="tab-btn" data-type="no2">二氧化氮 NO₂ (μg/m³)</button>
                <button class="tab-btn" data-type="so2">二氧化硫 SO₂ (μg/m³)</button>
                <button class="tab-btn" data-type="o3">臭氧 O₃ (μg/m³)</button>
                <button class="tab-btn" data-type="co">一氧化碳 CO (mg/m³)</button>
            </div>
        </div>
    </div>

    <div class="main-layout" id="map-view">
        <div class="map-card">
            <div id="macau-map"></div>
            <div id="time-stamp" class="time-stamp"></div>
            <div id="current-indicator" class="time-stamp-indicator"></div>
            <div id="map-legend" class="map-legend">
                <h4>圖例</h4>
                <div id="legend-content" class="legend-items"></div>
            </div>
        </div>
        <div id="single-card-box" class="station-single">
            <div class="empty-tip">請點擊地圖上圓圈查看監測站數據</div>
        </div>
    </div>

    <div id="table-view" class="hide">
        <div class="table-container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom:10px;">
                <div id="table-title" style="font-size:1.1rem;font-weight:bold;">數據表格</div>
                <div class="sort-buttons">
                    <button class="sort-btn" data-sort="default">預設</button>
                    <button class="sort-btn" data-sort="desc">高至低</button>
                    <button class="sort-btn" data-sort="asc">低至高</button>
                </div>
            </div>
            <table class="data-table" id="data-table">
                <thead><tr><th>監測站名稱</th><th>站代碼</th><th>數值</th></tr></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
const airStations = {
    "台山": { code: "TS", lat: 22.2143048, lng: 113.5430605 },
    "荷蘭園": { code: "HL", lat: 22.1957226, lng: 113.5447928 },
    "氹仔中心區": { code: "TZ", lat: 22.1585991, lng: 113.5555425 },
    "大潭山": { code: "DT", lat: 22.1594111, lng: 113.5684563 },
    "石排灣": { code: "SP", lat: 22.1250727, lng: 113.5544267 },
    "九澳": { code: "JA", lat: 22.1330617, lng: 113.5835098 }
};

const fieldMap = {
    aqi: { field: "aqi", label: "空氣質素指數 AQI", unit: "" },
    pm10: { field: "pm10", label: "PM10", unit: "μg/m³" },
    pm25: { field: "pm25", label: "PM2.5", unit: "μg/m³" },
    no2: { field: "no2", label: "二氧化氮 NO₂", unit: "μg/m³" },
    so2: { field: "so2", label: "二氧化硫 SO₂", unit: "μg/m³" },
    o3: { field: "o3", label: "臭氧 O₃", unit: "μg/m³" },
    co: { field: "co", label: "一氧化碳 CO", unit: "mg/m³" }
};

function formatVal(val, unit) {
    return val === '--' ? val : `${val} ${unit}`;
}

function getAqiLevel(aqi) {
    let num = parseFloat(aqi);
    if (isNaN(num)) return { text: "無數據", cls: "" };
    if (num <= 50) return { text: "優良", cls: "level-good" };
    if (num <= 100) return { text: "普通", cls: "level-moderate" };
    if (num <= 150) return { text: "對敏感族群不健康", cls: "level-unhealthy-sensitive" };
    if (num <= 200) return { text: "不健康", cls: "level-unhealthy" };
    if (num <= 300) return { text: "非常不健康", cls: "level-very-unhealthy" };
    return { text: "有害", cls: "level-hazardous" };
}

function getAqiColor(val) {
    let n = parseFloat(val);
    if (isNaN(n)) return "#95a5a6";
    if (n <= 50) return "#2ecc71";
    if (n <= 100) return "#f1c40f";
    if (n <= 150) return "#f39c12";
    if (n <= 200) return "#e74c3c";
    if (n <= 300) return "#9b59b6";
    return "#7b241c";
}
function getPm25Color(val){let n=parseFloat(val);if(isNaN(n))return"#95a5a6";if(n<=12)return"#2ecc71";if(n<=35)return"#f1c40f";if(n<=55)return"#f39c12";if(n<=150)return"#e74c3c";return"#9b59b6";}
function getPm10Color(val){let n=parseFloat(val);if(isNaN(n))return"#95a5a6";if(n<=54)return"#2ecc71";if(n<=154)return"#f1c40f";if(n<=254)return"#f39c12";if(n<=354)return"#e74c3c";return"#9b59b6";}
function getNo2Color(val){let n=parseFloat(val);if(isNaN(n))return"#95a5a6";if(n<=40)return"#2ecc71";if(n<=80)return"#f1c40f";if(n<=180)return"#f39c12";return"#e74c3c";}
function getSo2Color(val){let n=parseFloat(val);if(isNaN(n))return"#95a5a6";if(n<=20)return"#2ecc71";if(n<=80)return"#f1c40f";if(n<=250)return"#f39c12";return"#e74c3c";}
function getO3Color(val){let n=parseFloat(val);if(isNaN(n))return"#95a5a6";if(n<=54)return"#2ecc71";if(n<=70)return"#f1c40f";if(n<=85)return"#f39c12";return"#e74c3c";}
function getCoColor(val){let n=parseFloat(val);if(isNaN(n))return"#95a5a6";if(n<=4)return"#2ecc71";if(n<=10)return"#f1c40f";if(n<=15)return"#f39c12";return"#e74c3c";}

function updateLegendPanel(tabType) {
    const legendContent = document.getElementById('legend-content');
    let html = '';
    switch(tabType) {
        case "aqi": html = `<div class="legend-item"><div class="legend-color" style="background:#2ecc71"></div>0-50 優良</div><div class="legend-item"><div class="legend-color" style="background:#f1c40f"></div>51-100 普通</div><div class="legend-item"><div class="legend-color" style="background:#f39c12"></div>101-150 敏感族群不宜</div><div class="legend-item"><div class="legend-color" style="background:#e74c3c"></div>151-200 不健康</div><div class="legend-item"><div class="legend-color" style="background:#9b59b6"></div>201-300 非常不健康</div><div class="legend-item"><div class="legend-color" style="background:#7b241c"></div>>300 有害</div>`;break;
        case "pm25":html=`<div class="legend-item"><div class="legend-color" style="background:#2ecc71"></div>0-12 良好</div><div class="legend-item"><div class="legend-color" style="background:#f1c40f"></div>13-35 普通</div><div class="legend-item"><div class="legend-color" style="background:#f39c12"></div>36-55 偏高</div><div class="legend-item"><div class="legend-color" style="background:#e74c3c"></div>56-150 高</div><div class="legend-item"><div class="legend-color" style="background:#9b59b6"></div>>150 極高</div>`;break;
        case "pm10":html=`<div class="legend-item"><div class="legend-color" style="background:#2ecc71"></div>0-54 良好</div><div class="legend-item"><div class="legend-color" style="background:#f1c40f"></div>55-154 普通</div><div class="legend-item"><div class="legend-color" style="background:#f39c12"></div>155-254 偏高</div><div class="legend-item"><div class="legend-color" style="background:#e74c3c"></div>255-354 高</div><div class="legend-item"><div class="legend-color" style="background:#9b59b6"></div>>354 極高</div>`;break;
        case "no2":html=`<div class="legend-item"><div class="legend-color" style="background:#2ecc71"></div>0-40 正常</div><div class="legend-item"><div class="legend-color" style="background:#f1c40f"></div>41-80 略高</div><div class="legend-item"><div class="legend-color" style="background:#f39c12"></div>81-180 偏高</div><div class="legend-item"><div class="legend-color" style="background:#e74c3c"></div>>180 高</div>`;break;
        case "so2":html=`<div class="legend-item"><div class="legend-color" style="background:#2ecc71"></div>0-20 正常</div><div class="legend-item"><div class="legend-color" style="background:#f1c40f"></div>21-80 略高</div><div class="legend-item"><div class="legend-color" style="background:#f39c12"></div>81-250 偏高</div><div class="legend-item"><div class="legend-color" style="background:#e74c3c"></div>>250 高</div>`;break;
        case "o3":html=`<div class="legend-item"><div class="legend-color" style="background:#2ecc71"></div>0-54 正常</div><div class="legend-item"><div class="legend-color" style="background:#f1c40f"></div>55-70 略高</div><div class="legend-item"><div class="legend-color" style="background:#f39c12"></div>71-85 偏高</div><div class="legend-item"><div class="legend-color" style="background:#e74c3c"></div>>85 高</div>`;break;
        case "co":html=`<div class="legend-item"><div class="legend-color" style="background:#2ecc71"></div>0-4 正常</div><div class="legend-item"><div class="legend-color" style="background:#f1c40f"></div>5-10 略高</div><div class="legend-item"><div class="legend-color" style="background:#f39c12"></div>11-15 偏高</div><div class="legend-item"><div class="legend-color" style="background:#e74c3c"></div>>15 高</div>`;break;
        default:html=`<div class="legend-item" style="color:#777;">無圖例</div>`;
    }
    legendContent.innerHTML = html;
}

let map = L.map('macau-map').setView([22.17, 113.55], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {attribution: '&copy; OpenStreetMap contributors'}).addTo(map);

let allMarkers = [];
let currentTab = "aqi";
let airDataList = [];
const singleCardBox = document.getElementById("single-card-box");
let lastSort = "default";

function clearMarkers(){allMarkers.forEach(m=>map.removeLayer(m));allMarkers=[];}

function renderSingleCard(data) {
    const {name, code, pubTime, aqi, pm10, pm25, no2, so2, o3, co} = data;
    const levelInfo = getAqiLevel(aqi);
    const card = `<div class="station-card"><div class="station-name">${name} (${code})</div><div style="font-size:0.8rem;color:#666;margin:8px 0;">更新時間：${pubTime}</div><div class="aqi-row"><div class="current-aqi">${formatVal(aqi, '')}</div><div class="aqi-level ${levelInfo.cls}">${levelInfo.text}</div></div><div class="metrics-grid"><div class="metric col-half"><span>PM10</span><strong>${formatVal(pm10, 'μg/m³')}</strong></div><div class="metric col-half"><span>PM2.5</span><strong>${formatVal(pm25, 'μg/m³')}</strong></div><div class="metric col-half"><span>二氧化氮 NO₂</span><strong>${formatVal(no2, 'μg/m³')}</strong></div><div class="metric col-half"><span>二氧化硫 SO₂</span><strong>${formatVal(so2, 'μg/m³')}</strong></div><div class="metric col-half"><span>臭氧 O₃</span><strong>${formatVal(o3, 'μg/m³')}</strong></div><div class="metric col-half"><span>一氧化碳 CO</span><strong>${formatVal(co, 'mg/m³')}</strong></div></div></div>`;
    singleCardBox.innerHTML = card;
}

function updateMapMarkers() {
    clearMarkers();
    document.getElementById('current-indicator').textContent = fieldMap[currentTab].label;
    airDataList.forEach(point=>{
        const name = point.name;
        const pos = airStations[name];
        if(!pos) return;
        let val = point[fieldMap[currentTab].field];
        if(val === '--'||val==='') return;
        let color="#95a5a6";
        switch(currentTab){
            case"aqi":color=getAqiColor(val);break;
            case"pm25":color=getPm25Color(val);break;
            case"pm10":color=getPm10Color(val);break;
            case"no2":color=getNo2Color(val);break;
            case"so2":color=getSo2Color(val);break;
            case"o3":color=getO3Color(val);break;
            case"co":color=getCoColor(val);break;
        }
        const iconHtml=`<div style="background:${color};color:#fff;border-radius:50%;width:50px;height:50px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:bold;">${val}</div>`;
        const icon=L.divIcon({html:iconHtml,className:"",iconSize:[50,50],iconAnchor:[25,25]});
        const marker=L.marker([pos.lat,pos.lng],{icon}).addTo(map);
        marker.bindPopup(`<strong>${name}</strong>`);
        marker.on('click',()=>renderSingleCard({...point,code:pos.code}));
        allMarkers.push(marker);
    })
}

function renderDataTable(type,sortType=lastSort){
    const cfg=fieldMap[type];
    const field=cfg.field,label=cfg.label,unit=cfg.unit;
    document.getElementById('table-title').textContent=`${label} 數據表格`;
    const tbody=document.getElementById('table-body');tbody.innerHTML="";
    let validList=airDataList.filter(i=>i[field]!=='--'&&i[field]!=='');
    if(sortType==='desc')validList.sort((a,b)=>parseFloat(b[field])-parseFloat(a[field]));
    else if(sortType==='asc')validList.sort((a,b)=>parseFloat(a[field])-parseFloat(b[field]));
    lastSort=sortType;
    validList.forEach(item=>{
        const name=item.name,code=airStations[name]?.code||"";
        const dVal=item[field]+(unit?" "+unit:"");
        const tr=document.createElement('tr');tr.innerHTML=`<td>${name}</td><td>${code}</td><td>${dVal}</td>`;tbody.appendChild(tr);
    })
}

document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.onclick=()=>{
        document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');currentTab=btn.dataset.type;
        updateMapMarkers();updateLegendPanel(currentTab);renderDataTable(currentTab);
    }
})
document.getElementById('btn-map').onclick=function(){this.classList.add('active');document.getElementById('btn-table').classList.remove('active');document.getElementById('map-view').classList.remove('hide');document.getElementById('table-view').classList.add('hide');}
document.getElementById('btn-table').onclick=function(){this.classList.add('active');document.getElementById('btn-map').classList.remove('active');document.getElementById('map-view').classList.add('hide');document.getElementById('table-view').classList.remove('hide');renderDataTable(currentTab);}
document.querySelectorAll('.sort-btn').forEach(b=>b.onclick=()=>renderDataTable(currentTab,b.dataset.sort));

// 固定讀取你倉庫已存在的data.json
async function fetchAirData() {
    const url = `https://cdn.jsdelivr.net/gh/macaosso/MSSOweb@main/data.json?_t=${Date.now()}`;
    try {
        const res = await fetch(url, { cache: "no-store" });
        if (!res.ok) throw new Error(res.status);
        const json = await res.json();
        // get publish time
        const pubTime = json.datetime || "未知時間";
        document.getElementById("pub-date").textContent = pubTime;
        document.getElementById("time-stamp").textContent = pubTime;

        airDataList = [];
        singleCardBox.innerHTML = '<div class="empty-tip">請點擊地圖上圓圈查看監測站數據</div>';

        // Filter only station objects (skip top-level datetime)
        const stationKeys = Object.keys(json).filter(k=>k!=='datetime');
        stationKeys.forEach(key=>{
            const rec = json[key];
            const sName = rec.siteName || "未知站點";
            airDataList.push({
                name: sName,
                pubTime: pubTime,
                aqi: rec.AQI ?? '--',
                pm10: rec.PM10 ?? '--',
                pm25: rec.PM2_5 ?? '--',
                no2: rec.NO2 ?? '--',
                so2: rec.SO2 ?? '--',
                o3: rec.O3 ?? '--',
                co: rec.CO ?? '--'
            })
        })

        updateMapMarkers();
        updateLegendPanel(currentTab);
        renderDataTable(currentTab);
    } catch (err) {
        console.error('Load error:', err);
        document.getElementById("pub-date").textContent = "數據載入失敗";
    }
}

window.addEventListener('DOMContentLoaded',fetchAirData);
setInterval(fetchAirData,300000);
</script>
