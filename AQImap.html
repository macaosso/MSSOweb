<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>澳門空氣質素實況地圖</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f3f7;
            color: #2c3e50;
            padding: 20px;
            font-size: 14px;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        header {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            padding: 20px 30px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        header h1 {
            font-size: 1.6rem;
            font-weight: 600;
        }
        .meta-info {
            text-align: right;
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .view-switch {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }
        .view-switch button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            background: #e8edf2;
            cursor: pointer;
            font-size: 0.95rem;
        }
        .view-switch button.active {
            background: #2a5298;
            color: #fff;
        }

        .tab-wrapper {
            background: #fff;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            transition: all 0.25s ease;
        }
        .tab-wrapper.hide-tab{
            height:0;
            padding:0;
            margin-bottom:0;
            overflow:hidden;
        }
        .tab-group {
            margin-bottom: 10px;
        }
        .group-title {
            font-size: 1rem;
            font-weight: 600;
            color: #2c3e50;
            margin: 0 0 8px 0;
            padding: 4px 0;
        }
        .group-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding-left: 10px;
        }

        .tab-btn {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            background: #e8edf2;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: #2a5298;
            color: #fff;
        }
        .tab-btn:hover:not(.active) {
            background: #d0d9e2;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 1024px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
        }
        .map-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            padding: 15px;
            position: relative;
        }
        #macau-map {
            width: 100%;
            height: 650px;
            border-radius: 8px;
        }

        .map-legend {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background: rgba(255,255,255,0.95);
            padding: 8px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            z-index: 1000;
            min-width: 120px;
        }
        .map-legend h4 {
            margin: 0 0 5px 0;
            font-size: 0.8rem;
            text-align: center;
            border-bottom: 1px solid #eee;
            padding-bottom: 3px;
        }
        .legend-items {
            max-height: 180px;
            overflow-y: auto;
        }
        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 3px;
        }
        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 5px;
        }

        .time-stamp {
            position: absolute;
            top: 25px;
            right: 25px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.9rem;
            z-index: 1000;
        }

        .time-stamp-indicator {
            position: absolute;
            top: 60px;
            right: 25px;
            background: rgba(42, 82, 152, 0.9);
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.9rem;
            z-index: 1000;
        }

        .station-single {
            height: 650px;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 20px;
        }
        .empty-tip {
            color: #999;
            font-size: 1rem;
        }

        .station-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            padding: 18px;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            border-top: 4px solid #3498db;
            width: 100%;
            max-width: 420px;
            font-size: 13px;
        }
        .station-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        .station-name {
            font-size: 1.1rem;
            font-weight: bold;
            color: #2c3e50;
            border-bottom: 1px solid #ecf0f1;
            padding-bottom: 8px;
        }
        .aqi-row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin: 15px 0;
        }
        .current-aqi {
            font-size: 2rem;
            font-weight: 700;
            color: #1a1a1a;
        }
        .aqi-level {
            font-size: 0.9rem;
            padding: 4px 8px;
            border-radius: 4px;
            color: #fff;
        }
        .main-pollutant{
            margin:-10px 0 12px 0;
            color:#c0392b;
        }
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            font-size: 0.8rem;
        }
        .metric {
            background: #f8f9fa;
            padding: 8px 10px;
            border-radius: 6px;
        }
        .col-half {
            grid-column: span 3;
        }
        .metric span {
            display: block;
            color: #7f8c8d;
            font-size: 0.7rem;
            margin-bottom: 2px;
        }
        .metric strong {
            color: #2c3e50;
            font-size: 0.9rem;
        }

        .level-good { background: #2ecc71; }
        .level-moderate { background: #f1c40f; }
        .level-unhealthy-sensitive { background: #f39c12; }
        .level-unhealthy { background: #e74c3c; }
        .level-very-unhealthy { background: #9b59b6; }
        .level-hazardous { background: #7b241c; }

        .table-container {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 0.85rem;
        }
        .data-table th, .data-table td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }
        .data-table th {
            background: #f1f5f9;
            font-weight: 600;
        }
        .hide {
            display: none !important;
        }
        .tip-table{
            margin-top:25px;
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div>
            <h1>澳門空氣質素實況地圖</h1>
            <small style="color: #2ecc71;">● 點擊地圖圓圈查看數據 | 切換分類查看不同污染物指標</small>
        </div>
        <div class="meta-info">
            <div>資料更新時間：<span id="pub-date">載入中...</span></div>
            <div>每5分鐘自動刷新</div>
        </div>
    </header>

    <div class="view-switch">
        <button id="btn-map" class="active">地圖</button>
        <button id="btn-table">表格</button>
        <button id="btn-forecast">預測</button>
    </div>

    <div class="tab-wrapper" id="main-tab">
        <div class="tab-group">
            <h3 class="group-title">空氣污染物指標</h3>
            <div class="group-buttons show">
                <button class="tab-btn active" data-type="aqi">空氣質素指數 AQI</button>
                <button class="tab-btn" data-type="pm10">可吸入懸浮粒子 PM10 (μg/m³)</button>
                <button class="tab-btn" data-type="pm25">細懸浮粒子 PM2.5 (μg/m³)</button>
                <button class="tab-btn" data-type="no2">二氧化氮 NO₂ (μg/m³)</button>
                <button class="tab-btn" data-type="so2">二氧化硫 SO₂ (μg/m³)</button>
                <button class="tab-btn" data-type="o3">臭氧 O₃ (μg/m³)</button>
                <button class="tab-btn" data-type="co">一氧化碳 CO (mg/m³)</button>
            </div>
        </div>
    </div>

    <div class="main-layout" id="map-view">
        <div class="map-card">
            <div id="macau-map"></div>
            <div id="time-stamp" class="time-stamp"></div>
            <div id="current-indicator" class="time-stamp-indicator"></div>
            <div id="map-legend" class="map-legend">
                <h4>圖例</h4>
                <div id="legend-content" class="legend-items"></div>
            </div>
        </div>
        <div id="single-card-box" class="station-single">
            <div class="empty-tip">請點擊地圖上圓圈查看監測站數據</div>
        </div>
    </div>

    <div id="table-view" class="hide">
        <div class="table-container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom:10px;">
                <div id="table-title" style="font-size:1.1rem;font-weight:bold;">數據表格</div>
            </div>
            <table class="data-table" id="data-table">
                <thead><tr><th>監測站名稱</th><th>站代碼</th><th>數值</th></tr></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <div id="forecast-view" class="hide">
        <div class="table-container">
            <div style="font-size:1.1rem;font-weight:bold;margin-bottom:10px;">空氣質素預報（SMG）</div>
            <table class="data-table" id="forecast-table">
                <thead>
                    <tr>
                        <th>監測區域</th>
                        <th>預報日期</th>
                        <th>AQI區間</th>
                        <th>提示描述</th>
                    </tr>
                </thead>
                <tbody id="forecast-body"></tbody>
            </table>
            <div style="font-size:1.1rem;font-weight:bold;margin:25px 0 10px 0;">建議採取的預防措施</div>
            <table class="data-table tip-table" id="tip-table">
                <thead>
                    <tr>
                        <th>人群分類</th>
                        <th>防護建議</th>
                    </tr>
                </thead>
                <tbody id="tip-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
const legendMap = {
  aqi: [{c:"#2a9958",t:"良好"},{c:"#957d1d",t:"普通"},{c:"#c36e25",t:"不良"},{c:"#b02525",t:"非常不良"},{c:"#ae2693",t:"嚴重"},{c:"#280c0c",t:"有害"}],
  pm25: [{c:"#2a9958",t:"0 - 49"},{c:"#957d1d",t:"50 - 114"},{c:"#c36e25",t:"115 - 149"},{c:"#b02525",t:"150 - 249"},{c:"#ae2693",t:"250 - 349"},{c:"#280c0c",t:">= 350"}],
  pm10: [{c:"#2a9958",t:"0 - 99"},{c:"#957d1d",t:"100 - 249"},{c:"#c36e25",t:"250 - 349"},{c:"#b02525",t:"350 - 419"},{c:"#ae2693",t:"420 - 499"},{c:"#280c0c",t:">= 500"}],
  no2: [{c:"#2a9958",t:"0 - 199"},{c:"#957d1d",t:"200 - 699"},{c:"#c36e25",t:"700 - 1199"},{c:"#b02525",t:"1200 - 1999"},{c:"#ae2693",t:"2000 - 2499"},{c:"#280c0c",t:">= 2500"}],
  so2: [{c:"#2a9958",t:"0 - 49"},{c:"#957d1d",t:"50 - 149"},{c:"#c36e25",t:"150 - 474"},{c:"#b02525",t:"475 - 799"},{c:"#ae2693",t:"800 - 1599"},{c:"#280c0c",t:">= 1600"}],
  o3: [{c:"#2a9958",t:"0 - 159"},{c:"#957d1d",t:"160 - 239"},{c:"#c36e25",t:"240 - 339"},{c:"#b02525",t:"400 - 599"},{c:"#ae2693",t:"600 - 799"},{c:"#280c0c",t:">= 800"}],
  co: [{c:"#2a9958",t:"0 - 9"},{c:"#957d1d",t:"10 - 16"},{c:"#c36e25",t:"17 - 33"},{c:"#b02525",t:"34 - 45"},{c:"#ae2693",t:"46 - 56"},{c:"#280c0c",t:">= 57"}]
};
const aqiBreak = {
    pm10: [{c:0,i:0},{c:50,i:50},{c:100,i:100},{c:250,i:200},{c:350,i:300},{c:420,i:400},{c:500,i:500}],
    pm25: [{c:0,i:0},{c:25,i:50},{c:50,i:100},{c:115,i:200},{c:150,i:300},{c:250,i:400},{c:350,i:500}],
    no2:  [{c:0,i:0},{c:100,i:50},{c:200,i:100},{c:700,i:200},{c:1200,i:300},{c:2000,i:400},{c:2500,i:500}],
    so2:  [{c:0,i:0},{c:20,i:50},{c:50,i:100},{c:150,i:200},{c:475,i:300},{c:800,i:400},{c:1600,i:500}],
    o3:   [{c:0,i:0},{c:80,i:50},{c:160,i:100},{c:240,i:200},{c:400,i:300},{c:600,i:400},{c:800,i:500}],
    co:   [{c:0,i:0},{c:5,i:50},{c:10,i:100},{c:17,i:200},{c:34,i:300},{c:46,i:400},{c:57,i:500}]
};
const pollNameCN={pm10:"PM10",pm25:"PM2.5",no2:"NO₂",so2:"SO₂",o3:"O₃",co:"CO"};
const iconGradeMap = {"c_good.png":{color:"#2a9958"},"c_moderate.png":{color:"#957d1d"},"c_bad.png":{color:"#c36e25"},"c_verybad.png":{color:"#b02525"},"c_severe.png":{color:"#ae2693"},"c_harmful.png":{color:"#280c0c"}};

function calcSubIdx(val, bpList){
    const v=Number(val);if(isNaN(v))return 0;let low=bpList[0],high=bpList.at(-1);for(let p of bpList){if(v<=p.c){high=p;break;}low=p;}return low.i + ((high.i-low.i)/(high.c-low.c))*(v-low.c);
}
function updateLegendPanel(t){document.getElementById('legend-content').innerHTML=legendMap[t].map(x=>`<div class="legend-item"><div class="legend-color" style="background:${x.c}"></div>${x.t}</div>`).join('');}
function getAqiColor(v){const arr=legendMap.aqi;const n=Number(v);if(n<=50)return arr[0].c;if(n<=100)return arr[1].c;if(n<=150)return arr[2].c;if(n<=200)return arr[3].c;if(n<=300)return arr[4].c;return arr[5].c;}
function getPm25Color(v){const arr=legendMap.pm25;const n=Number(v);if(n<=49)return arr[0].c;if(n<=114)return arr[1].c;if(n<=149)return arr[2].c;if(n<=249)return arr[3].c;if(n<=349)return arr[4].c;return arr[5].c;}
function getPm10Color(v){const arr=legendMap.pm10;const n=Number(v);if(n<=99)return arr[0].c;if(n<=249)return arr[1].c;if(n<=349)return arr[2].c;if(n<=419)return arr[3].c;if(n<=499)return arr[4].c;return arr[5].c;}
function getNo2Color(v){const arr=legendMap.no2;const n=Number(v);if(n<=199)return arr[0].c;if(n<=699)return arr[1].c;if(n<=1199)return arr[2].c;if(n<=1999)return arr[3].c;if(n<=2499)return arr[4].c;return arr[5].c;}
function getSo2Color(v){const arr=legendMap.so2;const n=Number(v);if(n<=49)return arr[0].c;if(n<=149)return arr[1].c;if(n<=474)return arr[2].c;if(n<=799)return arr[3].c;if(n<=1599)return arr[4].c;return arr[5].c;}
function getO3Color(v){const arr=legendMap.o3;const n=Number(v);if(n<=159)return arr[0].c;if(n<=239)return arr[1].c;if(n<=339)return arr[2].c;if(n<=599)return arr[3].c;if(n<=799)return arr[4].c;return arr[5].c;}
function getCoColor(v){const arr=legendMap.co;const n=Number(v);if(n<=9)return arr[0].c;if(n<=16)return arr[1].c;if(n<=33)return arr[2].c;if(n<=45)return arr[3].c;if(n<=56)return arr[4].c;return arr[5].c;}

const airStations = {
    "荷蘭園（路邊）": { code: "PO", lat: 22.1957226, lng: 113.5447928 },
    "九澳（路邊）": { code: "KH", lat: 22.1330617, lng: 113.5835098 },
    "台山（高密度住宅區）": { code: "EN", lat: 22.2143048, lng: 113.5430605 },
    "氹仔中心區（高密度住宅區）": { code: "TC", lat: 22.1585991, lng: 113.5555425 },
    "大潭山（一般性）": { code: "TG", lat: 22.1594111, lng: 113.5684563 },
    "石排灣（一般性）": { code: "CD", lat: 22.1250727, lng: 113.5544267 }
};
const fieldMap = {
    aqi:{field:"aqi",label:"空氣質素AQI",unit:"",fn:getAqiColor},
    pm10:{field:"pm10",label:"PM10",unit:"μg/m³",fn:getPm10Color},
    pm25:{field:"pm25",label:"PM2.5",unit:"μg/m³",fn:getPm25Color},
    no2:{field:"no2",label:"NO₂",unit:"μg/m³",fn:getNo2Color},
    so2:{field:"so2",label:"SO₂",unit:"μg/m³",fn:getSo2Color},
    o3:{field:"o3",label:"O₃",unit:"μg/m³",fn:getO3Color},
    co:{field:"co",label:"CO",unit:"mg/m³",fn:getCoColor}
};

let map = L.map('macau-map').setView([22.17,113.55],12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'©OSM'}).addTo(map);
let allMarkers = [],currentTab="aqi",airDataList=[],lastSort="default";
const singleCardBox=document.getElementById('single-card-box'),tabWrapperDom=document.getElementById('main-tab');
function clearMarkers(){allMarkers.forEach(m=>map.removeLayer(m));allMarkers=[];}
function fmt(v,u){if(isNaN(Number(v)))return'--';return Number(v).toFixed(1)+(u?' '+u:'');}
function getAqiLevel(v){const n=Number(v);if(n<=50)return{cls:'level-good',text:'良好'};if(n<=100)return{cls:'level-moderate',text:'普通'};if(n<=150)return{cls:'level-unhealthy-sensitive',text:'不良'};if(n<=200)return{cls:'level-unhealthy',text:'非常不良'};if(n<=300)return{cls:'level-very-unhealthy',text:'嚴重'};return{cls:'level-hazardous',text:'有害'};}

function renderSingleCard(d){
    const lv=getAqiLevel(d.aqi);
    const tip=d.aqi>100?`<div class="main-pollutant">首要污染物：${d.mainPoll}</div>`:'';
    singleCardBox.innerHTML=`<div class="station-card"><div class="station-name">${d.name}(${d.code})</div><div style="font-size:0.8rem;color:#666;margin:8px 0">更新：${d.pubTime}</div>${tip}<div class="aqi-row"><div class="current-aqi">${fmt(d.aqi,'')}</div><div class="aqi-level ${lv.cls}">${lv.text}</div></div><div class="metrics-grid"><div class="metric col-half"><span>PM10</span><strong>${fmt(d.pm10,'μg/m³')}</strong></div><div class="metric col-half"><span>PM2.5</span><strong>${fmt(d.pm25,'μg/m³')}</strong></div><div class="metric col-half"><span>NO₂</span><strong>${fmt(d.no2,'μg/m³')}</strong></div><div class="metric col-half"><span>SO₂</span><strong>${fmt(d.so2,'μg/m³')}</strong></div><div class="metric col-half"><span>O₃</span><strong>${fmt(d.o3,'μg/m³')}</strong></div><div class="metric col-half"><span>CO</span><strong>${fmt(d.co,'mg/m³')}</strong></div></div></div>`;
}
function updateMapMarkers(){
    clearMarkers();document.getElementById('current-indicator').textContent=fieldMap[currentTab].label;
    airDataList.forEach(p=>{
        const pos=airStations[p.name];if(!pos)return;
        const val=p[fieldMap[currentTab].field];
        const color=fieldMap[currentTab].fn(val);
        const icon=L.divIcon({html:`<div style="background:${color};color:#fff;border-radius:50%;width:50px;height:50px;display:flex;align-items:center;justify-content:center;font-weight:bold">${Number(val).toFixed(1)}</div>`,className:'',iconSize:[50,50],iconAnchor:[25,25]});
        const m=L.marker([pos.lat,pos.lng],{icon}).addTo(map);
        m.on('click',()=>renderSingleCard({...p,code:pos.code}));allMarkers.push(m);
    })
}
function renderTable(){
    const cfg=fieldMap[currentTab];
    document.getElementById('table-title').textContent=cfg.label+'數據';
    const tb=document.getElementById('table-body');tb.innerHTML='';
    airDataList.forEach(item=>{
        const pos=airStations[item.name];
        tb.innerHTML+=`<tr><td>${item.name}</td><td>${pos?.code||''}</td><td>${fmt(item[cfg.field],cfg.unit)}</td>`;
    })
}

// 雙代理備用列表
const proxyList = [
    "https://corsproxy.io/?",
    "https://cors-anywhere.azm.workers.dev/"
];
let proxyIdx = 0;

//預報
async function loadForecast(){
    const tbF=document.getElementById('forecast-body'),tbTip=document.getElementById('tip-body');
    tbF.innerHTML='<tr><td colspan="4">載入預報</td>';tbTip.innerHTML='';
    try{
        const proxy = proxyList[proxyIdx];
        const xml=await fetch(proxy+encodeURIComponent('https://xml.smg.gov.mo/c_foreiqa.xml'));
        const txt=await xml.text();
        if(txt.trim().startsWith('<!DOCTYPE')) throw '返回HTML非XML';
        const doc=new DOMParser().parseFromString(txt,'text/xml');
        const list=doc.querySelectorAll('AQIForecastReport');
        tbF.innerHTML='';
        list.forEach(r=>{
            const zone=r.querySelector('Stationname')?.textContent||'';
            const dt=r.querySelector('ValidFor')?.textContent||'';
            const val=r.querySelector('Value')?.textContent||'';
            const desc=r.querySelector('AQIForecastDescription')?.textContent||'';
            const ico=r.querySelector('IconName')?.textContent||'c_moderate.png';
            const c=iconGradeMap[ico]?.color||'#957d1d';
            tbF.innerHTML+=`<tr style="background:${c};color:#fff"><td>${zone}</td><td>${dt}</td><td>${val}</td><td>${desc}</td></tr>`;
        })
        const comp=doc.querySelector('Complementary');
        if(comp){
            const sen=comp.querySelector('SensitivePopulationGroups')?.textContent||'';
            const gen=comp.querySelector('GeneralPublic')?.textContent||'';
            tbTip.innerHTML=`<tr><td>敏感人群（患有呼吸系統疾病或心臟病人士、孕婦、兒童及長者）</td><td>${sen}</td></tr><tr><td>一般市民</td><td>${gen}</td></tr>`;
        }
    }catch(e){
        proxyIdx=(proxyIdx+1)%proxyList.length;
        tbF.innerHTML='<tr><td colspan="4">預報載入失敗，切換代理中</td>';
        console.error(e);
    }
}

//實況
async function loadReal(){
    const proxy = proxyList[proxyIdx];
    const url=proxy+encodeURIComponent('https://www.smg.gov.mo/opendata/AirQualityData.json?_='+Date.now());
    try{
        const res=await fetch(url,{cache:'no-store'});
        const raw=await res.text();
        // 判斷如果開頭是<就是HTML報錯頁
        if(raw.trim().startsWith('<')) throw new Error('Proxy返回HTML');
        const js=JSON.parse(raw);
        const time=js.UpdateTime||'';
        document.getElementById('pub-date').textContent=time;
        document.getElementById('time-stamp').textContent=time;
        airDataList=[];
        js.Items.forEach(item=>{
            const name=item.StationName;
            const pm25=Number(item.PM25),pm10=Number(item.PM10),no2=Number(item.NO2),so2=Number(item.SO2),o3=Number(item.O3),co=Number(item.CO);
            const obj={pm10:calcSubIdx(pm10,aqiBreak.pm10),pm25:calcSubIdx(pm25,aqiBreak.pm25),no2:calcSubIdx(no2,aqiBreak.no2),so2:calcSubIdx(so2,aqiBreak.so2),o3:calcSubIdx(o3,aqiBreak.o3),co:calcSubIdx(co,aqiBreak.co)};
            let max=-1,main='';for(let k in obj){if(obj[k]>max){max=obj[k];main=pollNameCN[k];}}
            airDataList.push({name,pubTime:time,aqi:Math.round(max),pm25,pm10,no2,so2,o3,co,mainPoll:main});
        })
        updateMapMarkers();updateLegendPanel(currentTab);renderTable();
    }catch(e){
        proxyIdx=(proxyIdx+1)%proxyList.length;
        document.getElementById('pub-date').textContent='載入失敗，自動切換備用代理';
        console.error(e);
    }
    setTimeout(loadReal,5*60*1000);
}
