<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Macau Live Weather</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #74b9ff, #0984e3);
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .weather-card {
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 350px;
            text-align: center;
        }
        .header {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 10px;
        }
        .temp-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin: 15px 0;
        }
        .temperature {
            font-size: 3.5rem;
            font-weight: bold;
            color: #2d3436;
        }
        .weather-icon {
            width: 60px;
            height: 60px;
        }
        .status-badge {
            display: inline-block;
            background: #ff7675;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            text-align: left;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }
        .detail-item span {
            display: block;
            color: #777;
            font-size: 0.85rem;
        }
        .detail-item strong {
            font-size: 1.1rem;
            color: #2d3436;
        }
        .footer {
            margin-top: 20px;
            font-size: 0.75rem;
            color: #999;
        }
        .error-message {
            color: #d63031;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="weather-card">
    <div class="header">Macau Actual Weather</div>
    
    <div class="temp-container">
        <img id="weather-icon" class="weather-icon" src="" alt="Weather Icon" style="display:none;">
        <div class="temperature"><span id="temp">--</span>°C</div>
    </div>

    <div id="feels-like-container">
        <span id="feels-like" class="status-badge">--</span>
    </div>

    <div class="details">
        <div class="detail-item">
            <span>Humidity</span>
            <strong id="humidity">--</strong>%
        </div>
        <div class="detail-item">
            <span>Wind Direction</span>
            <strong id="wind-dir">--</strong>
        </div>
        <div class="detail-item">
            <span>Wind Speed</span>
            <strong id="wind-speed">--</strong> km/h
        </div>
        <div class="detail-item">
            <span>Wind Scale</span>
            <strong id="wind-desc">--</strong>
        </div>
    </div>

    <div class="footer">
        System Pub Stage: <span id="pub-date">--</span><br>
        <small style="color: #00b894;">Auto-refreshing every 5 minutes</small>
    </div>
</div>

<script>
    // URL of the XML data
    const xmlUrl = 'https://corsproxy.io/?https://xml.smg.gov.mo/c_actual_brief.xml';
    
    // If you run into CORS issues during local testing, you can temporarily use a CORS proxy:
    // const xmlUrl = 'https://cors-anywhere.herokuapp.com/https://xml.smg.gov.mo/c_actual_brief.xml';

    function fetchWeatherData() {
        fetch(xmlUrl)
            .then(response => {
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                return response.text();
            })
            .then(str => {
                // Parse the string into an XML DOM object
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(str, "text/xml");

                // Extract data using query selectors matching the XML tags
                const temp = xmlDoc.querySelector("Temperature Value").textContent;
                const humidity = xmlDoc.querySelector("Humidity Value").textContent;
                const windSpeed = xmlDoc.querySelector("WindSpeed Value").textContent;
                const windSpeedDesc = xmlDoc.querySelector("WindSpeedDescription").textContent;
                const windDirDesc = xmlDoc.querySelector("WindDescription").textContent;
                const feelsLike = xmlDoc.querySelector("FeelsLikeDescription").textContent;
                const pubDate = xmlDoc.querySelector("SysPubdate").textContent;
                const iconURL = xmlDoc.querySelector("IconURL").textContent;

                // Update the HTML elements with the extracted data
                document.getElementById('temp').textContent = temp;
                document.getElementById('humidity').textContent = humidity;
                document.getElementById('wind-speed').textContent = windSpeed;
                document.getElementById('wind-desc').textContent = windSpeedDesc;
                document.getElementById('wind-dir').textContent = windDirDesc;
                document.getElementById('feels-like').textContent = feelsLike;
                document.getElementById('pub-date').textContent = pubDate;
                
                const iconImg = document.getElementById('weather-icon');
                iconImg.src = iconURL;
                iconImg.style.display = 'block';
            })
            .catch(error => {
                console.error('Error fetching or parsing XML:', error);
                document.getElementById('feels-like').innerHTML = '<span class="error-message">Failed to load data</span>';
            });
    }

    // Run the function immediately when the page loads
    fetchWeatherData();

    // Auto-refresh the data every 5 minutes (300,000 milliseconds)
    // Weather data rarely changes faster than this, preventing spam to the server.
    setInterval(fetchWeatherData, 300000); 
</script>

</body>
</html>
