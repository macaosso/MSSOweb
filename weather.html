<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>澳門各區天氣實況</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f3f7;
            color: #2c3e50;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        header {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            padding: 20px 30px;
            border-radius: 12px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        header h1 {
            font-size: 1.6rem;
            font-weight: 600;
        }
        .meta-info {
            text-align: right;
            font-size: 0.9rem;
            opacity: 0.9;
        }
        /* Auto-responsive grid: items scale and pack themselves tightly */
        .station-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        .station-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            padding: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            border-top: 4px solid #3498db;
        }
        .station-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        .station-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 12px;
            border-bottom: 1px solid #ecf0f1;
            padding-bottom: 8px;
        }
        .temp-row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        .current-temp {
            font-size: 2.2rem;
            font-weight: 700;
            color: #1a1a1a;
        }
        .temp-range {
            font-size: 0.9rem;
            text-align: right;
        }
        .high-temp { color: #e74c3c; font-weight: 600; }
        .low-temp { color: #34495e; font-weight: 600; }
         
        /* Upgraded to a 6-column base for perfect layout combinations */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            font-size: 0.9rem;
        }
        .metric {
            background: #f8f9fa;
            padding: 8px 12px;
            border-radius: 6px;
        }
        /* Standard items take up 3 columns (half width) */
        .col-half {
            grid-column: span 3;
        }
        /* Rainfall items take up 2 columns (one-third width, making 3 in a row) */
        .col-third {
            grid-column: span 2;
        }
        .metric span {
            display: block;
            color: #7f8c8d;
            font-size: 0.75rem;
            text-transform: uppercase;
            margin-bottom: 2px;
        }
        .metric strong {
            color: #2c3e50;
        }
        .rain-active {
            background: #e8f4fd;
            border: 1px solid #bcdffb;
        }
        .rain-active strong {
            color: #2980b9;
        }
        .loading {
            grid-column: 1 / -1;
            text-align: center;
            padding: 5px;
            font-size: 1.2rem;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>澳門各區天氣實況</h1>
            <small style="color: #2ecc71;">● 即時監控網格</small>
        </div>
        <div class="meta-info">
            <div>資料更新時間：<span id="pub-date">載入中...</span></div>
            <div>每5分鐘自動刷新驗證</div>
        </div>
    </header>

    <div id="grid-container" class="station-grid">
        <div class="loading">正在擷取區域數據...</div>
    </div>
</div>

<script>
function fetchGridData() {
    const cacheBuster = Date.now();
    const freshUrl = `https://corsproxy.io/?https://xml.smg.gov.mo/c_actualweather.xml?t=${cacheBuster}`;

    fetch(freshUrl, { cache: "no-store" })
        .then(response => {
            if (!response.ok) throw new Error('Network error pulling XML map.');
            return response.text();
        })
        .then(xmlString => {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlString, "text/xml");

            // Get system update time
            const pubDateNode = xmlDoc.querySelector("SysPubdate");
            if (pubDateNode) {
                document.getElementById('pub-date').textContent = pubDateNode.textContent;
            }

            // Grab every single distinct station node
            const stations = xmlDoc.querySelectorAll("station");
            const gridContainer = document.getElementById('grid-container');
            gridContainer.innerHTML = ''; 

            stations.forEach(station => {
                const name = station.querySelector("stationname")?.textContent || "Unnamed Node";
                const code = station.querySelector("stationcode")?.textContent || "";
                
                // Construct clean title with station code attached to the back
                const nameDisplay = code ? `${name} (${code})` : name;
                
                // Helper function to extract values cleanly
                const extractNodeValue = (selector) => {
                    const parent = station.querySelector(selector);
                    if (!parent) return '--';
                    return parent.querySelector("dValue")?.textContent || parent.querySelector("Value")?.textContent || '--';
                };

                const currentTemp = extractNodeValue("Temperature");
                const maxTemp = extractNodeValue("Temperature_daily_max");
                const minTemp = extractNodeValue("Temperature_daily_min");
                const humidity = extractNodeValue("Humidity");
                const windSpeed = extractNodeValue("WindSpeed");
                const windGust = extractNodeValue("WindGust");
                const mslPressure = extractNodeValue("MeanSeaLevelPressure");
                const stationPressure = extractNodeValue("StationPressure");
                
                // Parsing logic to specifically construct: dValue(Degree°)
                const windDirNode = station.querySelector("WindDirection");
                const winddValue = windDirNode?.querySelector("dValue")?.textContent || '--';
                const windDegree = windDirNode?.querySelector("Degree")?.textContent || '--';
                
                let windDirDisplay = '--';
                if (winddValue !== '--' && windDegree !== '--') {
                    windDirDisplay = `${winddValue}(${windDegree}°)`;
                } else if (winddValue !== '--') {
                    windDirDisplay = winddValue;
                } else if (windDegree !== '--') {
                    windDirDisplay = `${windDegree}°`;
                }

                // Initialized to '--' for stations lacking rainfall monitors (bridges)
                let rain1m = "--";
                let rain1h = "--";
                let rainToday = "--";
                
                const rainfallNodes = station.querySelectorAll("Rainfall");
                
                rainfallNodes.forEach(node => {
                    const type = node.querySelector("Type")?.textContent;
                    const val = node.querySelector("dValue")?.textContent || node.querySelector("Value")?.textContent || "0.0";
                    
                    if (type === "3") rain1m = val;    // 即時錄得之觀察值 (1-min)
                    if (type === "4") rain1h = val;    // 1小時前至即時的累積值 (1-hr)
                    if (type === "5") rainToday = val; // 由當日之 00:01 至即時的累積值 (Today total)
                });

                // Contextual alert highlights if active rain arrays trigger positive numbers
                const rain1mClass = parseFloat(rain1m) > 0 ? 'rain-active' : '';
                const rain1hClass = parseFloat(rain1h) > 0 ? 'rain-active' : '';
                const rainTodayClass = parseFloat(rainToday) > 0 ? 'rain-active' : '';

                const cardHtml = `
                    <div class="station-card">
                        <div class="station-name">${nameDisplay}</div>
                        <div class="temp-row">
                            <div class="current-temp">${currentTemp}°C</div>
                            <div class="temp-range">
                                <div>Max: <span class="high-temp">${maxTemp}°C</span></div>
                                <div>Min: <span class="low-temp">${minTemp}°C</span></div>
                            </div>
                        </div>
                        <div class="metrics-grid">
                            <div class="metric col-half">
                                <span>相對濕度(%)</span>
                                <strong>${humidity}%</strong>
                            </div>
                            <div class="metric col-half">
                                <span>風向(°)</span>
                                <strong>${windDirDisplay}</strong>
                            </div>
                            <div class="metric col-half">
                                <span>風速(km/h)</span>
                                <strong>${windSpeed}${windSpeed !== '--' ? ' <small>km/h</small>' : ''}</strong>
                            </div>
                            <div class="metric col-half">
                                <span>陣風(km/h)</span>
                                <strong>${windGust}${windGust !== '--' ? ' <small>km/h</small>' : ''}</strong>
                            </div>
                            <div class="metric col-half">
                                <span>平均海平面氣壓(hPa)</span>
                                <strong>${mslPressure}${mslPressure !== '--' ? ' <small>hPa</small>' : ''}</strong>
                            </div>
                            <div class="metric col-half">
                                <span>站氣壓(hPa)</span>
                                <strong>${stationPressure}${stationPressure !== '--' ? ' <small>hPa</small>' : ''}</strong>
                            </div>
                            
                            <div class="metric col-third ${rain1mClass}">
                                <span>分鐘雨量(mm)</span>
                                <strong>${rain1m}${rain1m !== '--' ? ' <small>mm</small>' : ''}</strong>
                            </div>
                            <div class="metric col-third ${rain1hClass}">
                                <span>時雨量(mm)</span>
                                <strong>${rain1h}${rain1h !== '--' ? ' <small>mm</small>' : ''}</strong>
                            </div>
                            <div class="metric col-third ${rainTodayClass}">
                                <span>日總降雨(mm)</span>
                                <strong>${rainToday}${rainToday !== '--' ? ' <small>mm</small>' : ''}</strong>
                            </div>
                        </div>
                    </div>
                `;
                gridContainer.innerHTML += cardHtml;
            });
        })
        .catch(err => {
            console.error("Grid loop failure:", err);
            document.getElementById('grid-container').innerHTML = `
                <div class="loading" style="color: #e74c3c;">
                    Failed loading weather grid array. Check browser CORS proxy status.
                </div>`;
        });
}

// Initialize layout immediately
fetchGridData();

// Auto update grid space parameters every 5 minutes (300000ms)
setInterval(fetchGridData, 60000);
</script>

</body>
</html>
