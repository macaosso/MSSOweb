<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>澳门实时天气</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
body { font-family: "Microsoft JhengHei", sans-serif; background: #0a2c5f; color: white; text-align: center; padding: 20px; }
.container { max-width: 400px; margin: 0 auto; background: rgba(255,255,255,0.1); border-radius: 12px; padding: 20px; }
h1 { margin: 0 0 10px; font-size: 24px; }
.temp { font-size: 60px; font-weight: bold; margin: 10px 0; }
.desc { font-size: 20px; margin-bottom: 20px; }
.info { font-size: 16px; line-height: 1.8; }
.loading { color: #ccc; }
</style>
</head>
<body>
<div class="container">
  <h1>澳门天气</h1>
  <div id="status" class="loading">加载中...</div>
  <div id="temp" class="temp"></div>
  <div id="desc" class="desc"></div>
  <div class="info">
    <div>湿度：<span id="humidity"></span></div>
    <div>风向：<span id="windDir"></span></div>
    <div>风速：<span id="windSpeed"></span></div>
    <div>更新时间：<span id="updateTime"></span></div>
  </div>
</div>

<script>
// 换成更稳的 corsproxy，加时间戳防缓存
const XML_URL = "https://corsproxy.io/?url=https://xml.smg.gov.mo/c_actualweather.xml";
const REFRESH_INTERVAL = 60000; // 1分钟刷新

function loadData() {
  const url = XML_URL + "&_=" + Date.now();
  fetch(url)
    .then(r => {
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.text();
    })
    .then(xmlText => {
      const parser = new DOMParser();
      const xml = parser.parseFromString(xmlText, "text/xml");

      // 节点（根据澳门SMG XML结构）
      const temp = xml.querySelector("Temperature")?.textContent || "--";
      const desc = xml.querySelector("WeatherDescription")?.textContent || "--";
      const humidity = xml.querySelector("Humidity")?.textContent || "--";
      const windDir = xml.querySelector("WindDirection")?.textContent || "--";
      const windSpeed = xml.querySelector("WindSpeed")?.textContent || "--";
      const updateTime = xml.querySelector("UpdateTime")?.textContent || "--";

      // 渲染
      document.getElementById("status").textContent = "";
      document.getElementById("temp").textContent = temp + " °C";
      document.getElementById("desc").textContent = desc;
      document.getElementById("humidity").textContent = humidity + " %";
      document.getElementById("windDir").textContent = windDir;
      document.getElementById("windSpeed").textContent = windSpeed + " km/h";
      document.getElementById("updateTime").textContent = updateTime;
    })
    .catch(e => {
      document.getElementById("status").textContent = "加载失败：" + e.message;
      console.error("Failed to load data:", e);
    });
}

loadData();
setInterval(loadData, REFRESH_INTERVAL);
</script>
</body>
</html>
