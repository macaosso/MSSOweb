<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Macao Real-Time Weather Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif;}
        #header {background: #3a8c7c; color: #fff; padding: 14px; text-align: center; font-size: 22px; font-weight: bold;}
        #tabs {display: flex; background: #e6efec; padding: 10px; gap: 10px; flex-wrap: wrap; justify-content: center;}
        .tab-btn {background: #fff; border: 1px solid #3a8c7c; padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 16px;}
        .tab-btn.active {background: #3a8c7c; color: #fff;}
        #update-info {padding: 8px 16px; font-size: 14px; color: #444; text-align: center;}
        #map {height: calc(100vh - 170px); width: 100%;}
        .legend {position: absolute; bottom: 15px; left: 15px; background: #fff; padding: 10px; border-radius: 8px; font-size: 13px; z-index: 999; box-shadow: 0 1px 4px rgba(0,0,0,0.2);}
        .legend-item {display: inline-flex; align-items: center; margin-right: 12px;}
        .dot {width: 12px; height: 12px; border-radius: 50%; margin-right: 5px;}
        .temp-label {background: #ff8833; color: #fff; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 14px; white-space: nowrap;}
        .humidity-label {background: #4a90e2; color: #fff; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 14px; white-space: nowrap;}
    </style>
</head>
<body>
    <div id="header">Macao Weather Monitoring Stations</div>

    <div id="tabs">
        <button class="tab-btn active" data-type="temperature">Temperature</button>
        <button class="tab-btn" data-type="temp_max">Max Temp</button>
        <button class="tab-btn" data-type="temp_min">Min Temp</button>
        <button class="tab-btn" data-type="humidity">Humidity</button>
    </div>

    <div id="update-info">Loading real-time data...</div>
    <div id="map"></div>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:#ff2222"></span> Very Hot</div>
        <div class="legend-item"><span class="dot" style="background:#ff6633"></span> Hot</div>
        <div class="legend-item"><span class="dot" style="background:#ff9955"></span> Warm</div>
        <div class="legend-item"><span class="dot" style="background:#66bb66"></span> Cool</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Initialize Map
        const map = L.map('map').setView([22.16, 113.56], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // Weather Stations (Name, Short Code, Coordinates)
        const stations = [
            { name: "紀念孫中山市政公園", short: "DP", lat: 22.215322, lng: 113.543490 },
            { name: "黑沙環", short: "EM", lat: 22.207129, lng: 113.559971 },
            { name: "大炮台", short: "FM", lat: 22.197066, lng: 113.542261 },
            { name: "外港", short: "PE", lat: 22.197066, lng: 113.542261 },
            { name: "媽閣", short: "MM", lat: 22.185863, lng: 113.530675 },
            { name: "大潭山", short: "TG", lat: 22.159102, lng: 113.568947 },
            { name: "東亞運大馬路", short: "JA", lat: 22.155396, lng: 113.542412 },
            { name: "九澳", short: "KV", lat: 22.134686, lng: 113.580143 },
            { name: "澳門大學", short: "UM", lat: 22.131808, lng: 113.546970 },
            { name: "路環市區", short: "DC", lat: 22.117091, lng: 113.551041 }
        ];

        let weatherData = {};
        let markers = [];
        let currentType = "temperature";
        const XML_URL = "./c_actualweather.xml";
        const REFRESH_INTERVAL = 60000; // Auto refresh every 60 seconds

        // Fetch real-time weather XML
        async function fetchWeather() {
            try {
                const res = await fetch(XML_URL);
                const text = await res.text();
                const xml = new DOMParser().parseFromString(text, "text/xml");
                const sites = xml.querySelectorAll("site");
                weatherData = {};

                sites.forEach(site => {
                    const name = site.getAttribute("name");
                    weatherData[name] = {
                        temperature: site.querySelector("temperature")?.textContent || "-",
                        temp_max: site.querySelector("temp_max")?.textContent || "-",
                        temp_min: site.querySelector("temp_min")?.textContent || "-",
                        humidity: site.querySelector("humidity")?.textContent || "-"
                    };
                });

                const updateTime = xml.querySelector("actualweather")?.getAttribute("updatetime") || "Unknown";
                document.getElementById("update-info").textContent =
                    `Last Update: ${updateTime} | Auto-refresh every 1 minute`;
                renderMarkers(currentType);
            } catch (err) {
                document.getElementById("update-info").textContent = "Failed to load data";
                console.error(err);
            }
        }

        // Render markers on map
        function renderMarkers(type) {
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            stations.forEach(sta => {
                const data = weatherData[sta.name];
                if (!data) return;
                const value = data[type];

                let labelClass = "temp-label";
                let unit = "℃";
                if (type === "humidity") {
                    labelClass = "humidity-label";
                    unit = "%";
                }

                const icon = L.divIcon({
                    html: `<div class="${labelClass}">${value}${unit}</div>`,
                    iconSize: [60, 30]
                });

                const marker = L.marker([sta.lat, sta.lng], { icon })
                    .addTo(map)
                    .bindPopup(`${sta.name} (${sta.short})<br>${type}: ${value}${unit}`);
                markers.push(marker);
            });
        }

        // Tab switch event
        document.querySelectorAll(".tab-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                currentType = btn.dataset.type;
                renderMarkers(currentType);
            });
        });

        // First load + auto refresh loop
        fetchWeather();
        setInterval(fetchWeather, REFRESH_INTERVAL);
    </script>
</body>
</html>
