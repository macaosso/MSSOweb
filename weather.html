<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>澳門各區天氣實況</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f3f7;
            color: #2c3e50;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        header {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            padding: 20px 30px;
            border-radius: 12px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        header h1 {
            font-size: 1.6rem;
            font-weight: 600;
        }
        .meta-info {
            text-align: right;
            font-size: 0.9rem;
            opacity: 0.9;
        }
        .station-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        .station-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            padding: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            border-top: 4px solid #3498db;
        }
        .station-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        .station-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: #2c3e50;
            border-bottom: 1px solid #ecf0f1;
            padding-bottom: 8px;
        }
        .temp-row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin: 15px 0;
        }
        .current-temp {
            font-size: 2.2rem;
            font-weight: 700;
            color: #1a1a1a;
        }
        .temp-range {
            font-size: 0.9rem;
            text-align: right;
        }
        .high-temp { color: #e74c3c; font-weight: 600; }
        .low-temp { color: #34495e; font-weight: 600; }
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            font-size: 0.9rem;
        }
        .metric {
            background: #f8f9fa;
            padding: 8px 12px;
            border-radius: 6px;
        }
        .col-half {
            grid-column: span 3;
        }
        .col-third {
            grid-column: span 2;
        }
        .metric span {
            display: block;
            color: #7f8c8d;
            font-size: 0.75rem;
            text-transform: uppercase;
            margin-bottom: 2px;
        }
        .metric strong {
            color: #2c3e50;
        }
        .loading {
            grid-column: 1 / -1;
            text-align: center;
            padding: 5px;
            font-size: 1.2rem;
            color: #7f8c8d;
        }

        /* 酷熱指數 ≥40℃ 樣式 */
        .heat-high {
            background: #ffe6e6;
            border: 1px solid #f5a9a9;
        }
        .heat-high strong {
            color: #c0392b;
        }

        /* 體感溫度 ≥36℃ 樣式 */
        .apparent-high {
            background: #f3e5f5;
            border: 1px solid #d2bade;
        }
        .apparent-high strong {
            color: #8e44ad;
        }

        /* 1小時雨量 分級 */
        .rain1-yellow {
            background: #fff9c4;
            border: 1px solid #ffe082;
        }
        .rain1-red {
            background: #ffebee;
            border: 1px solid #ef9a9a;
        }
        .rain1-gray {
            background: #eceff1;
            border: 1px solid #b0bec5;
        }

        /* 日總雨量 分級 */
        .rainDay-orange {
            background: #fff3e0;
            border: 1px solid #ffcc80;
        }
        .rainDay-red {
            background: #ffebee;
            border: 1px solid #ef9a9a;
        }
        .rainDay-gray {
            background: #eceff1;
            border: 1px solid #b0bec5;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>澳門各區天氣實況</h1>
            <small style="color: #2ecc71;">● 即時監控網格</small>
        </div>
        <div class="meta-info">
            <div>資料更新時間：<span id="pub-date">載入中...</span></div>
            <div>每5分鐘自動刷新</div>
        </div>
    </header>

    <div id="grid-container" class="station-grid">
        <div class="loading">正在擷取區域數據...</div>
    </div>
</div>

<script>
// 體感溫度計算
function calculateApparentTemp(T, RH, windSpeedKmH) {
    const V = windSpeedKmH / 3.6;
    const e = (RH / 100) * 6.105 * Math.exp((17.27 * T) / (237.7 + T));
    const apparentTemp = 1.04 * T + 0.2 * e - 0.65 * V - 2.7;
    return isNaN(apparentTemp) ? '--' : apparentTemp.toFixed(1);
}

// 酷熱指數 Heat Index
function calculateHeatIndex(T, RH) {
    if (isNaN(T) || isNaN(RH)) return '--';
    let hi = -8.7846947556 + 1.61139411 * T + 2.3385488388 * RH
             - 0.14611605 * T * RH - 0.012308094 * Math.pow(T, 2)
             - 0.0164248278 * Math.pow(RH, 2)
             + 0.002211732 * Math.pow(T, 2) * RH
             + 0.00072546 * T * Math.pow(RH, 2)
             - 0.000003582 * Math.pow(T, 2) * Math.pow(RH, 2);
    return hi.toFixed(1);
}

// 取得欄位樣式
function getHeatIndexClass(val) {
    let num = parseFloat(val);
    if (!isNaN(num) && num >= 40) return 'metric col-half heat-high';
    return 'metric col-half';
}
function getApparentClass(val) {
    let num = parseFloat(val);
    if (!isNaN(num) && num >= 36) return 'metric col-half apparent-high';
    return 'metric col-half';
}
function getRain1hClass(val) {
    let num = parseFloat(val);
    if (isNaN(num)) return 'metric col-third';
    if (num >= 79.5) return 'metric col-third rain1-gray';
    if (num >= 49.5) return 'metric col-third rain1-red';
    if (num >= 19.5) return 'metric col-third rain1-yellow';
    return 'metric col-third';
}
function getRainDayClass(val) {
    let num = parseFloat(val);
    if (isNaN(num)) return 'metric col-third';
    if (num >= 350) return 'metric col-third rainDay-gray';
    if (num >= 200) return 'metric col-third rainDay-red';
    if (num >= 100) return 'metric col-third rainDay-orange';
    return 'metric col-third';
}

// 格式化顯示：-- 就不加單位
function formatVal(val, unit) {
    return val === '--' ? val : `${val} ${unit}`;
}

function fetchGridData() {
    const cacheBuster = Date.now();
    const freshUrl = `https://corsproxy.io/?https://xml.smg.gov.mo/c_actualweather.xml?t=${cacheBuster}`;

    fetch(freshUrl, { cache: "no-store" })
        .then(response => {
            if (!response.ok) throw new Error('Network error');
            return response.text();
        })
        .then(xmlString => {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlString, "text/xml");

            const pubDateNode = xmlDoc.querySelector("SysPubdate");
            if (pubDateNode) {
                document.getElementById('pub-date').textContent = pubDateNode.textContent;
            }

            const stations = xmlDoc.querySelectorAll("WeatherReport station");
            const gridContainer = document.getElementById('grid-container');
            gridContainer.innerHTML = '';

            const extractNodeValue = (selector, parent) => {
                const el = parent.querySelector(selector);
                if (!el) return '--';
                return el.querySelector("dValue")?.textContent || el.querySelector("Value")?.textContent || '--';
            };

            stations.forEach(station => {
                const code = station.getAttribute("code")?.trim() || "N/A";
                const name = station.querySelector("stationname")?.textContent || "未命名站點";
                const nameDisplay = `${name}(${code})`;

                const currentTemp = extractNodeValue("Temperature", station);
                const maxTemp = extractNodeValue("Temperature_daily_max", station);
                const minTemp = extractNodeValue("Temperature_daily_min", station);
                const humidity = extractNodeValue("Humidity", station);
                const windSpeed = extractNodeValue("WindSpeed", station);
                const windGust = extractNodeValue("WindGust", station);
                const mslPressure = extractNodeValue("MeanSeaLevelPressure", station);
                const stationPressure = extractNodeValue("StationPressure", station);

                const windDirNode = station.querySelector("WindDirection");
                const winddValue = windDirNode?.querySelector("dValue")?.textContent || '--';
                const windDegree = windDirNode?.querySelector("Degree")?.textContent || '--';
                let windDirDisplay = '--';
                if (winddValue !== '--' && windDegree !== '--') {
                    windDirDisplay = `${winddValue}(${windDegree}°)`;
                } else if (winddValue !== '--') {
                    windDirDisplay = winddValue;
                } else if (windDegree !== '--') {
                    windDirDisplay = `${windDegree}°`;
                }

                let rain1m = "--", rain1h = "--", rainToday = "--";
                const rainfallNodes = station.querySelectorAll("Rainfall");
                rainfallNodes.forEach(node => {
                    const type = node.querySelector("Type")?.textContent;
                    const val = node.querySelector("dValue")?.textContent || node.querySelector("Value")?.textContent || "0.0";
                    if (type === "3") rain1m = val;
                    if (type === "4") rain1h = val;
                    if (type === "5") rainToday = val;
                });

                const T = parseFloat(currentTemp);
                const RH = parseFloat(humidity);
                const windSpeedKmH = parseFloat(windSpeed);

                const apparentTemp = calculateApparentTemp(T, RH, windSpeedKmH);
                const heatIndex = calculateHeatIndex(T, RH);

                // 取得各欄位樣式
                const hiClass = getHeatIndexClass(heatIndex);
                const apClass = getApparentClass(apparentTemp);
                const r1mClass = getRain1hClass(rain1m);
                const r1hClass = getRain1hClass(rain1h);
                const rDayClass = getRainDayClass(rainToday);

                const cardHtml = `
                    <div class="station-card">
                        <div class="station-name">${nameDisplay}</div>
                        <div class="temp-row">
                            <div class="current-temp">${formatVal(currentTemp, '°C')}</div>
                            <div class="temp-range">
                                <div>最高: <span class="high-temp">${formatVal(maxTemp, '°C')}</span></div>
                                <div>最低: <span class="low-temp">${formatVal(minTemp, '°C')}</span></div>
                            </div>
                        </div>
                        <div class="metrics-grid">
                            <!-- 第一行：酷熱指數 | 體感溫度 -->
                            <div class="${hiClass}">
                                <span>酷熱指數</span>
                                <strong>${formatVal(heatIndex, '°C')}</strong>
                            </div>
                            <div class="${apClass}">
                                <span>體感溫度</span>
                                <strong>${formatVal(apparentTemp, '°C')}</strong>
                            </div>

                            <!-- 第二行：相對濕度 | 風向 -->
                            <div class="metric col-half">
                                <span>相對濕度</span>
                                <strong>${formatVal(humidity, '%')}</strong>
                            </div>
                            <div class="metric col-half">
                                <span>風向</span>
                                <strong>${windDirDisplay}</strong>
                            </div>

                            <!-- 第三行：風速 | 陣風 -->
                            <div class="metric col-half">
                                <span>風速</span>
                                <strong>${formatVal(windSpeed, 'km/h')}</strong>
                            </div>
                            <div class="metric col-half">
                                <span>陣風</span>
                                <strong>${formatVal(windGust, 'km/h')}</strong>
                            </div>

                            <!-- 第四行：平均海平面氣壓 | 站氣壓 -->
                            <div class="metric col-half">
                                <span>平均海平面氣壓</span>
                                <strong>${formatVal(mslPressure, 'hPa')}</strong>
                            </div>
                            <div class="metric col-half">
                                <span>站氣壓</span>
                                <strong>${formatVal(stationPressure, 'hPa')}</strong>
                            </div>

                            <!-- 雨量三欄 -->
                            <div class="${r1mClass}">
                                <span>一分鐘雨量</span>
                                <strong>${formatVal(rain1m, 'mm')}</strong>
                            </div>
                            <div class="${r1hClass}">
                                <span>一小時雨量</span>
                                <strong>${formatVal(rain1h, 'mm')}</strong>
                            </div>
                            <div class="${rDayClass}">
                                <span>日總雨量</span>
                                <strong>${formatVal(rainToday, 'mm')}</strong>
                            </div>
                        </div>
                    </div>
                `;
                gridContainer.innerHTML += cardHtml;
            });
        })
        .catch(err => {
            console.error(err);
            document.getElementById('grid-container').innerHTML = `
                <div class="loading" style="color: #e74c3c;">
                    載入失敗，請檢查網絡或代理狀態
                </div>`;
        });
}

fetchGridData();
setInterval(fetchGridData, 60000);
</script>

</body>
</html>
