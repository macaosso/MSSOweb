<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>澳門天氣 SMG | 地球物理暨氣象局</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .has-warn { background: #d32f2f; color: white; font-weight: bold; }
        .info-popup { position: fixed; inset: 0; z-index: 99; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 98; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <!-- 頂部警告欄 -->
    <div id="top-bar" class="py-2 px-4 text-sm text-center"></div>

    <!-- 導航欄 -->
    <div id="menu-bar" class="flex gap-6 px-4 py-3 border-b border-slate-200 bg-white"></div>

    <!-- 主內容 -->
    <main class="pb-8 max-w-7xl mx-auto px-4" id="main-content">
        <!-- 3欄網格：警告面板 / 地圖雷達 / 溫度排行 -->
        <div class="grid grid-cols-[340px_1fr_220px] gap-4 mt-4">
            <div class="col-left"></div>
            <div class="col-center"></div>
            <div class="col-right"></div>
        </div>
    </main>

    <!-- 頁脚 -->
    <footer class="px-4 pb-8 text-center text-xs border-t border-slate-700/50 pt-5 mt-2" style="line-height:1.7">
        <p>數據來源：澳門地球物理暨氣象局 SMG</p>
        <p>官方開放接口：xml.smg.gov.mo</p>
        <p>© 2026 Macau Weather Portal</p>
    </footer>

    <!-- 延遲載入JS模塊 -->
    <script src="/js/info.js?v=203" defer></script>
    <script src="/js/personalize.js?v=2" defer></script>
    <script src="/js/warnings.js?v=205" defer></script>
    <script src="/js/weather.js?t=1778579157" defer></script>
    <script src="/js/forecast.js?v=184" defer></script>
    <script src="/js/rainfall.js?v=184" defer></script>
    <script src="/js/chart.js?v=192" defer></script>
    <script src="/js/location.js?t=1778057520" defer></script>
    <script src="/js/extras.js?v=194" defer></script>
    <script src="/js/analysis.js?v=200" defer></script>
    <script src="/js/districts.js?t=1778057520" defer></script>
    <script src="/js/rain.js?v=184" defer></script>
    <script src="/js/weather-map.js?v=206" defer></script>
    <script src="/js/radar.js?v=184" defer></script>
    <script src="/js/hourly.js?t=1778057520" defer></script>
    <script src="/js/radar_smg.js?v=2" defer></script>
    <script src="/js/metric-grid.js?t=1778057520" defer></script>
    <script src="/js/tc.js?v=12" defer></script>
    <script src="/js/rain-watch.js?v=14" defer></script>
    <script src="/js/main.js?t=1778057520" defer></script>

    <!-- 全域彈窗 -->
    <div id="info-popup" class="info-popup"></div>
    <script id="extfc-js"></script>

    <!-- 設置彈窗遮罩 -->
    <div id="settings-overlay" onclick="if(event.target===this)closeSettings()" class="modal-overlay hidden"></div>
    <!-- 更新日誌彈窗遮罩 -->
    <div id="changelog-overlay" onclick="if(event.target===this)closeChangelog()" class="modal-overlay hidden"></div>

    <!-- 性能埋點（可保留/刪除） -->
    <script defer src="https://static.cloudflareinsights.com/beacon.min.js/..."></script>

</html>
