<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>氣象監測地圖</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Basic Layout */
        #macau-map { width: 100%; height: 600px; }
        .hide { display: none; }
        .empty-tip { padding: 20px; color: #666; text-align: center; }

        /* Legend */
        .legend-item { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
        .legend-color { width: 20px; height: 20px; border-radius: 3px; }

        /* Station Card */
        .station-card { border: 1px solid #ccc; padding: 15px; margin-top: 10px; border-radius: 6px; }
        .card-header { font-weight: bold; font-size: 16px; margin-bottom: 10px; }
        .section-title { font-weight: bold; margin: 12px 0 6px; }
        .row-2, .row-3, .row-3-col { display: flex; gap: 10px; flex-wrap: wrap; margin: 8px 0; }
        .data-item { padding: 6px 10px; border: 1px solid #eee; border-radius: 4px; }
        .water-item { padding: 10px; border-radius: 4px; }

        /* Table */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }

        /* Buttons & Tabs */
        .tab-btn, #btn-map, #btn-table, #sort-default, #sort-desc, #sort-asc {
            padding: 6px 12px; margin: 4px; cursor: pointer;
        }
        .active { background: #2266cc; color: #fff; border: none; }
    </style>
</head>
<body>
    <!-- View Switch -->
    <div>
        <button id="btn-map" class="active">地圖視圖</button>
        <button id="btn-table">表格視圖</button>
    </div>

    <!-- Tabs -->
    <div class="tab-group">
        <button class="tab-btn" data-type="tempCurrent">實時氣溫</button>
        <button class="tab-btn" data-type="tempMax">最高氣溫</button>
        <button class="tab-btn" data-type="tempMin">最低氣溫</button>
        <button class="tab-btn" data-type="humidity">相對濕度</button>
        <button class="tab-btn" data-type="dewPoint">露點溫度</button>
        <button class="tab-btn" data-type="windDir">風向</button>
        <button class="tab-btn" data-type="windSpeed">風速</button>
        <button class="tab-btn" data-type="windGust">陣風</button>
        <button class="tab-btn" data-type="pressSea">海平面氣壓</button>
        <button class="tab-btn" data-type="pressStation">站氣壓</button>
        <button class="tab-btn" data-type="apparentTemp">體感溫度</button>
        <button class="tab-btn" data-type="heatIndex">酷熱指數</button>
        <button class="tab-btn" data-type="waterLevel">實時水位</button>
    </div>

    <!-- Legend -->
    <div id="legend-content"></div>

    <!-- Map View -->
    <div id="map-view">
        <div id="macau-map"></div>
    </div>

    <!-- Table View -->
    <div id="table-view" class="hide">
        <h3 id="table-title"></h3>
        <div>
            <button id="sort-default">預設排序</button>
            <button id="sort-desc">由高至低</button>
            <button id="sort-asc">由低至高</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>測站名稱</th>
                    <th>測站代碼</th>
                    <th>數值</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <!-- Station Detail Card -->
    <div id="single-card-box"></div>

    <!-- Time Info -->
    <div>發布時間: <span id="pub-date"></span></div>
    <div>更新時間: <span id="time-stamp"></span></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Your Main JS -->
    <script src="main.js"></script>
</body>
</html>
