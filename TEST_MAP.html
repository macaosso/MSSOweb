<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="icon" type="image/png" href="icons/MSSO.png">
<title>澳門民間氣象台 MSSO | 綜合氣象平台</title>
<!-- Leaflet Map CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
/* Global Base */
:root {
  --bg-main: #f5f8fa;
  --bg-card: #ffffff;
  --text-main: #222222;
  --text-secondary: #555555;
  --border-color: #e0e6ef;
  --header-bg: #1f3a4d;
  --primary: #4fa6a6;
  --danger: #d9534f;
  --shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.dark-mode {
  --bg-main: #0f141c;
  --bg-card: #151d2b;
  --text-main: #e2e8f0;
  --text-secondary: #a0aec0;
  --border-color: #243249;
  --header-bg: #151d2b;
  --shadow: 0 2px 8px rgba(0,0,0,0.25);
}
html {scroll-behavior: smooth;}
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: var(--bg-main);
  color: var(--text-main);
  transition: background 0.3s, color 0.3s;
}
a {text-decoration: none;}

/* Header Nav */
.header {
  background: var(--header-bg);
  color: white;
  padding: 18px 24px;
  display: flex;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 3000;
  box-shadow: var(--shadow);
}
.logo {height: 40px;}
.title {
  font-size: 20px;
  font-weight: bold;
  margin-left: 10px;
  flex: 1;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}
.theme-switch {
  padding: 8px 12px;
  border: none;
  border-radius: 6px;
  background: #233752;
  color: white;
  cursor: pointer;
}
.menu-container {
  position: relative;
}
.menu-toggle {
  display: none;
  font-size: 26px;
  padding: 10px 15px;
  cursor: pointer;
  background: #233752;
  color: white;
  border: none;
  border-radius: 6px;
  z-index: 3001;
  position: relative;
}
.nav {
  display: flex;
}
.nav a {
  color: #cbd5e1;
  padding: 14px 16px;
  font-size: 16px;
  transition: 0.25s;
}
.nav a:hover {
  background: #233752;
  color: #fff;
}

/* Main Container */
.container {
  max-width: 1240px;
  margin: 24px auto;
  padding: 0 24px;
}
.row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 24px;
}
@media (max-width: 992px) {.row {grid-template-columns: 1fr;}}
.card {
  background: var(--bg-card);
  border-radius: 12px;
  padding: 20px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border-color);
}
.card-title {
  font-size: 18px;
  font-weight: bold;
  margin-bottom: 16px;
  color: var(--primary);
}

/* Real-time Weather Card */
.weather-dash {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
}
.weather-item {
  flex: 1;
  min-width: 120px;
  text-align: center;
}
.weather-val {
  font-size: 28px;
  font-weight: bold;
  margin: 6px 0;
}
.weather-label {
  color: var(--text-secondary);
  font-size: 14px;
}

/* Leaflet Map */
#weatherMap {
  width: 100%;
  height: 420px;
  border-radius: 8px;
}

/* Filter Bar */
.filter-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  align-items: center;
  margin-bottom: 16px;
}
.filter-group {
  display: flex;
  align-items: center;
  gap: 8px;
}
.filter-group label {font-weight: bold;}
.filter-group select {
  padding: 8px 12px;
  border: 2px solid var(--primary);
  border-radius: 8px;
  background: var(--bg-card);
  color: var(--text-main);
}
.reset-btn {
  margin-left: auto;
  padding: 8px 16px;
  background: var(--danger);
  color: white;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}
.reset-btn:hover {opacity:0.9;}

/* Warning Table */
.table-wrap {
  overflow-x: auto;
}
table {
  width: 100%;
  border-collapse: collapse;
  min-width: 800px;
}
th {
  background: var(--primary);
  color: #000;
  padding: 14px;
  text-align: left;
  cursor: pointer;
  user-select: none;
}
th:hover {background: #3b8c8c;}
.sort-icon {font-size:12px;margin-left:6px;}
td {
  padding: 14px;
  border-bottom: 1px solid var(--border-color);
}
tr:nth-child(even) {background: rgba(79,166,166,0.08);}
tr:hover {background: rgba(79,166,166,0.15);}
.tag {
  padding:4px 8px;
  border-radius:4px;
  font-weight: bold;
}
/* Warning Tag Color Rules */
.warning-cold-1 { background-color: #e3f2fd; color: #000; }
.warning-cold-2 { background-color: #d1d9e6; color: #000; }
.warning-cold-3 { background-color: #b0bac5; color: #fff; }
.warning-hot-1 { background-color: #fff9c4; color: #000; }
.warning-hot-2 { background-color: #fce4d6; color: #000; }
.warning-hot-3 { background-color: #f4cccc; color: #000; }
.warning-rain-1 { background-color: #a2c4c9; color: #000; }
.warning-rain-2 { background-color: #d96a6a; color: #fff; }
.warning-rain-3 { background-color: #674ea7; color: #fff; }
.warning-surge-1 { background-color: #d9ead3; color: #000; }
.warning-surge-2 { background-color: #e09999; color: #000; }
.warning-surge-3 { background-color: #8e7cc3; color: #fff; }
.warning-notice { background-color: #b7b7b7; color: #000; }
.warning-caution { background-color: #76a54a; color: #fff; }
.warning-wind { background-color: #6d9eeb; color: #000; }
.warning-gale { background-color: #f1c232; color: #000; }
.warning-storm { background-color: #a61c00; color: #fff; }
.warning-typhoon { background-color: #85200c; color: #fff; }
.warning-tsunami { background-color: #1c4587; color: #fff; }
.warning-tsunami-s { background-color: #240a33; color: #fff; }

/* Mobile Responsive */
@media (max-width:768px) {
  .menu-toggle {display:block;}
  .nav {
    display: flex;
    flex-direction: column;
    width: 240px;
    position: absolute;
    top: 66px;
    right: 0;
    background: #1a2538;
    border-radius: 10px;
    box-shadow: 0 6px 16px rgba(0,0,0,0.4);
    opacity: 0;
    visibility: hidden;
    transform: translateY(-10px);
    transition: all 0.25s ease;
    pointer-events: none;
  }
  .nav.active {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
    pointer-events: auto;
  }
  .nav a {width:100%;padding:14px 18px;border-top:1px solid rgba(255,255,255,0.08);}
  .header {padding:14px;}
  .title {font-size:16px;}
  .logo {height:28px;}
  .filter-bar {flex-direction:column;align-items:stretch;}
  .reset-btn {margin-left:0;margin-top:8px;}
  th, td {padding:10px 8px;font-size:14px;}
  #weatherMap {height:320px;}
}
</style>
</head>
<body>
<!-- Header Navigation -->
<div class="header">
  <img src="icons/MSSO.png" class="logo" alt="Logo">
  <div class="title">澳門民間氣象台 MSSO</div>
  <div class="header-right">
    <button class="theme-switch" onclick="toggleTheme()">🌓 主題</button>
    <div class="menu-container">
      <div class="menu-toggle" onclick="toggleMenu(event)">☰</div>
      <div class="nav" id="navMenu">
        <a href="#dashboard">實況主頁</a>
        <a href="#map">氣象地圖</a>
        <a href="#warningTable">警告記錄</a>
        <a href="#">酷熱指數計算</a>
        <a href="#">熱帶氣旋追蹤</a>
        <a href="#">關於我們</a>
      </div>
    </div>
  </div>
</div>

<div class="container">
  <!-- Row 1: Realtime Dashboard + Weather Map -->
  <div class="row" id="dashboard">
    <!-- Realtime Card -->
    <div class="card">
      <div class="card-title">📍 澳門實時氣象</div>
      <div class="weather-dash">
        <div class="weather-item">
          <div class="weather-label">氣溫</div>
          <div class="weather-val">28.6°C</div>
          <div class="weather-label">體感 31.2°C</div>
        </div>
        <div class="weather-item">
          <div class="weather-label">相對濕度</div>
          <div class="weather-val">78%</div>
          <div class="weather-label">露點 24°C</div>
        </div>
        <div class="weather-item">
          <div class="weather-label">風向風速</div>
          <div class="weather-val">東南 8km/h</div>
          <div class="weather-label">陣風 15km/h</div>
        </div>
        <div class="weather-item">
          <div class="weather-label">海平面氣壓</div>
          <div class="weather-val">1006.2hPa</div>
          <div class="weather-label">微降</div>
        </div>
      </div>
    </div>
    <!-- Leaflet Map Card -->
    <div class="card" id="map">
      <div class="card-title">🗺️ 綜合氣象地圖</div>
      <div id="weatherMap"></div>
    </div>
  </div>

  <!-- Row 2: Warning Record History Table -->
  <div class="card" id="warningTable">
    <div class="card-title">📜 歷年氣象警告記錄查詢</div>
    <!-- Filter Bar -->
    <div class="filter-bar">
      <div class="filter-group">
        <label>年份：</label>
        <select id="yearFilter">
          <option value="all">全部年份</option>
        </select>
      </div>
      <div class="filter-group">
        <label>月份：</label>
        <select id="monthFilter">
          <option value="all">全部月份</option>
        </select>
      </div>
      <div class="filter-group">
        <label>警告類型：</label>
        <select id="typeFilter">
          <option value="all">全部類型</option>
        </select>
      </div>
      <button class="reset-btn" onclick="resetFilters()">重置篩選</button>
    </div>
    <!-- Table -->
    <div class="table-wrap">
      <table id="warningTableDom">
        <thead>
          <tr>
            <th data-sort="type">警告類型 <span class="sort-icon">↕</span></th>
            <th data-sort="start">發出時間 <span class="sort-icon">↕</span></th>
            <th data-sort="end">取消時間 <span class="sort-icon">↕</span></th>
            <th data-sort="duration">生效時長(hh:mm) <span class="sort-icon">↕</span></th>
          </tr>
        </thead>
        <tbody id="warningTableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// 1. Theme Toggle Dark/Light Mode
function toggleTheme() {
  document.body.classList.toggle("dark-mode");
}

// 2. Mobile Hamburger Menu
function toggleMenu(e) {
  if(e) e.stopPropagation();
  const nav = document.getElementById("navMenu");
  const btn = document.querySelector(".menu-toggle");
  nav.classList.toggle("active");
  btn.innerHTML = nav.classList.contains("active") ? "✕" : "☰";
}
// Close menu when click blank area
document.addEventListener("click", (e)=>{
  const nav = document.getElementById("navMenu");
  const toggleBtn = document.querySelector(".menu-toggle");
  if(nav.classList.contains("active") && !toggleBtn.contains(e.target) && !nav.contains(e.target)){
    nav.classList.remove("active");
    toggleBtn.innerHTML = "☰";
  }
});

// 3. Leaflet Weather Map Init
const map = L.map('weatherMap').setView([22.1987, 113.5439], 10);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);
// Sample Station Marker
L.marker([22.1987, 113.5439]).bindPopup("澳門氣象局<br>溫度：28.6°C").addTo(map);

// 4. Warning Record Full Dataset
const warningData = [
  // Your full records
  { type: "大雨警報", start: "2026-06-08 18:50", end: "2026-06-08 20:20", duration: "01:30" },
  { type: "大雨警報", start: "2026-06-13 03:10", end: "2026-06-13 04:30", duration: "01:20" },
  { type: "暴雨警報", start: "2026-06-13 04:30", end: "2026-06-13 06:00", duration: "01:30" },
  { type: "大雨警報", start: "2026-06-13 06:00", end: "2026-06-13 06:40", duration: "00:40" },
  { type: "大雨警報", start: "2026-06-14 23:00", end: "2026-06-15 00:30", duration: "01:30" },
  { type: "大雨警報", start: "2026-06-15 00:42", end: "2026-06-15 01:02", duration: "00:20" },
  { type: "大雨警報", start: "2026-06-17 13:55", end: "2026-06-17 16:55", duration: "03:00" },
  { type: "大雨警報", start: "2026-06-18 01:30", end: "2026-06-18 04:10", duration: "02:40" },
  { type: "大雨警報", start: "2026-06-18 17:25", end: "2026-06-18 18:05", duration: "00:40" },
  { type: "豪雨特別報告", start: "2026-06-13 04:20", end: "2026-06-19 10:20", duration: "150:00" },
  { type: "黃色大風提示", start: "2026-06-13 12:35", end: "2026-06-13 13:05", duration: "00:30" },
  { type: "橙色大風提示", start: "2026-06-13 13:05", end: "2026-06-13 13:45", duration: "00:40" },
  { type: "黃色大風提示", start: "2026-06-14 09:30", end: "2026-06-14 16:20", duration: "06:50" },
  { type: "黃色大風提示", start: "2026-06-17 13:50", end: "2026-06-17 15:50", duration: "02:00" },
];
let filteredData = [...warningData];

// Get Tag CSS Class
function getWarningClass(type) {
  if (type === "大雨警報") return "warning-rain-1";
  if (type === "暴雨警報") return "warning-rain-2";
  if (type === "豪雨特別報告") return "report-rain-1";
  if (type === "黃色大風提示") return "hint-wind-y";
  if (type === "橙色大風提示") return "hint-wind-o";
  return "";
}

// Init Filter Dropdown Options
function initFilters() {
  const years = new Set();
  const months = new Set();
  const types = new Set();
  warningData.forEach(item=>{
    const [y,m] = item.start.split("-");
    years.add(y); months.add(m); types.add(item.type);
  });
  const yearSel = document.getElementById("yearFilter");
  [...years].sort().forEach(y=>yearSel.innerHTML += `<option value="${y}">${y}</option>`);
  const monthSel = document.getElementById("monthFilter");
  [...months].sort().forEach(m=>monthSel.innerHTML += `<option value="${m}">${m}月</option>`);
  const typeSel = document.getElementById("typeFilter");
  [...types].sort().forEach(t=>typeSel.innerHTML += `<option value="${t}">${t}</option>`);
}

// Render Warning Table
function renderTable(data) {
  const tbody = document.getElementById("warningTableBody");
  tbody.innerHTML = "";
  data.forEach(item=>{
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td><span class="tag ${getWarningClass(item.type)}">${item.type}</span></td>
      <td>${item.start}</td>
      <td>${item.end}</td>
      <td>${item.duration}</td>
    `;
    tbody.appendChild(tr);
  });
}

// Filter Logic
function filterData() {
  const y = document.getElementById("yearFilter").value;
  const m = document.getElementById("monthFilter").value;
  const t = document.getElementById("typeFilter").value;
  filteredData = warningData.filter(item=>{
    const [yy,mm] = item.start.split("-");
    const matchY = y === "all" || yy === y;
    const matchM = m === "all" || mm === m;
    const matchT = t === "all" || item.type === t;
    return matchY && matchM && matchT;
  });
  renderTable(filteredData);
}

// Reset Filter
function resetFilters() {
  document.getElementById("yearFilter").value = "all";
  document.getElementById("monthFilter").value = "all";
  document.getElementById("typeFilter").value = "all";
  filteredData = [...warningData];
  renderTable(filteredData);
}

// Table Sort Logic
let currentSort = {key:null, dir:1};
function sortData(key) {
  if(currentSort.key === key) currentSort.dir *= -1;
  else {currentSort.key = key; currentSort.dir = 1;}
  const sorted = [...filteredData].sort((a,b)=>{
    let valA, valB;
    if(key === "type") {valA = a.type; valB = b.type;}
    else if(key === "start") {valA = a.start; valB = b.start;}
    else if(key === "end") {valA = a.end; valB = b.end;}
    else if(key === "duration") {
      const [ah,am] = a.duration.split(":").map(Number);
      const [bh,bm] = b.duration.split(":").map(Number);
      valA = ah*60+am; valB = bh*60+bm;
    }
    if(valA < valB) return -1 * currentSort.dir;
    if(valA > valB) return 1 * currentSort.dir;
    return 0;
  });
  filteredData = sorted;
  renderTable(filteredData);
  // Update sort icon
  document.querySelectorAll(".sort-icon").forEach(i=>i.textContent="↕");
  const activeTh = document.querySelector(`th[data-sort="${key}"] .sort-icon`);
  activeTh.textContent = currentSort.dir === 1 ? "↑" : "↓";
}

// Page Load Initialize
window.addEventListener("DOMContentLoaded", ()=>{
  initFilters();
  renderTable(warningData);
  // Bind filter change event
  document.getElementById("yearFilter").addEventListener("change", filterData);
  document.getElementById("monthFilter").addEventListener("change", filterData);
  document.getElementById("typeFilter").addEventListener("change", filterData);
  // Bind table sort click
  document.querySelectorAll("th[data-sort]").forEach(th=>{
    th.addEventListener("click", ()=>sortData(th.dataset.sort));
  });
});
</script>
</body>
</html>
