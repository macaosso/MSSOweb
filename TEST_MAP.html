<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>澳門實時氣溫地圖 MSSO</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#f3f6f8;font-family:Arial,Noto Sans TC;}
.top-info{padding:12px 20px;background:#1f3a4d;color:#fff;font-size:17px;}
.wrap{position:relative;width:95%;max-width:1200px;margin:15px auto;border:2px solid #4fa6a6;border-radius:10px;overflow:hidden;}
#baseMap{width:100%;display:block;}
#canvas-layer{position:absolute;top:0;left:0;width:100%;height:100%;}
</style>
</head>
<body>
<div class="top-info">
實時氣溫 | 更新時間：<span id="updateTime">--</span>（每5分鐘自動刷新）
</div>
<div class="wrap">
  <!-- put your macau base map -->
  <img id="baseMap" src="macau_base.png" alt="澳門地圖">
  <canvas id="canvas-layer"></canvas>
</div>

<script>
// Temp color rule same metwarn.hk
function getTempColor(temp){
  let t = Number(temp);
  if(t>=35) return "#781919";
  if(t>=33) return "#e63c3c";
  if(t>=28) return "#f28c82";
  if(t>=22.1) return "#f7b826";
  if(t>=17.1) return "#f9dd94";
  if(t>=12.1) return "#38dd99";
  if(t>=7.1) return "#49a9e9";
  return "#623996";
}

// All Macau stations (your coordinate list)
const stationGeo = [
  {name:"紀念孫中山市政公園",code:"DP",lat:22.215322,lon:113.543490},
  {name:"黑沙環",code:"EM",lat:22.207129,lon:113.559971},
  {name:"大炮台",code:"FM",lat:22.197066,lon:113.542261},
  {name:"外港",code:"PE",lat:22.196556,lon:113.558333},
  {name:"媽閣",code:"MM",lat:22.185863,lon:113.530675},
  {name:"大潭山",code:"TG",lat:22.159102,lon:113.568947},
  {name:"東亞運大馬路",code:"JA",lat:22.155396,lon:113.542412},
  {name:"九澳",code:"KV",lat:22.134686,lon:113.580143},
  {name:"澳門大學",code:"UM",lat:22.131808,lon:113.546970},
  {name:"路環市區",code:"DC",lat:22.117091,lon:113.551041},
  {name:"西灣大橋",code:"PV",lat:22.173240,lon:113.535416},
  {name:"友誼大橋北",code:"PN",lat:22.191167,lon:113.563219},
  {name:"友誼大橋南",code:"PS",lat:22.180189,lon:113.563299},
  {name:"嘉樂庇總督大橋",code:"PG",lat:22.180057,lon:113.545435},
  {name:"澳門大橋北",code:"MN",lat:22.186985,lon:113.573231},
  {name:"澳門大橋南",code:"MS",lat:22.173484,lon:113.573047},
  {name:"蓮花大橋",code:"PL",lat:22.139934,lon:113.549094}
];

// Map lon/lat boundary for Macau
const mapBounds = {
  minLon:113.522, maxLon:113.588,
  minLat:22.112, maxLat:22.222
};

// Lat/Lon to canvas pixel
function geoToPx(lat,lon,canvasW,canvasH){
  const x = ((lon - mapBounds.minLon)/(mapBounds.maxLon-mapBounds.minLon)) * canvasW;
  const y = canvasH - ((lat - mapBounds.minLat)/(mapBounds.maxLat-mapBounds.minLat)) * canvasH;
  return {x,y};
}

const canvas = document.getElementById("canvas-layer");
const ctx = canvas.getContext("2d");
let mapW,mapH;
const baseImg = document.getElementById("baseMap");

// Resize canvas match base map size
function resizeCanvas(){
  mapW = baseImg.offsetWidth;
  mapH = baseImg.offsetHeight;
  canvas.width = mapW;
  canvas.height = mapH;
  fetchSMGWeather(); // reload data after resize
}
window.addEventListener("load",resizeCanvas);
window.addEventListener("resize",resizeCanvas);

// Core fetch SMG XML | FIXED CORSPROXY URL (must add url=encodeURIComponent)
async function fetchSMGWeather(){
  try{
    const targetXml = "https://xml.smg.gov.mo/c_actualweather.xml";
    // Correct corsproxy format
    const proxyLink = `https://corsproxy.io/?url=${encodeURIComponent(targetXml)}`;
    const res = await fetch(proxyLink);
    const xmlText = await res.text();
    const parser = new DOMParser();
    const xmlDoc = parser.parseFromString(xmlText,"text/xml");
    // SMG XML root: <StationList><Station> 
    const stationNodes = xmlDoc.querySelectorAll("Station");

    // Clear old drawing
    ctx.clearRect(0,0,canvas.width,canvas.height);
    // Update time text
    const now = new Date();
    document.getElementById("updateTime").innerText = `${now.getMonth()+1}/${now.getDate()} ${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`;

    // Build name-temperature dictionary
    let tempDict = {};
    stationNodes.forEach(item=>{
      const cName = item.querySelector("NameCH").textContent.trim();
      const tempVal = parseFloat(item.querySelector("Temp").textContent.trim());
      tempDict[cName] = tempVal;
    })

    // Draw every station circle + text
    stationGeo.forEach(sta=>{
      const t = tempDict[sta.name];
      if(isNaN(t)) return;
      const pos = geoToPx(sta.lat,sta.lon,mapW,mapH);
      const fillCol = getTempColor(t);
      const circleR = 26;

      // Draw temp circle
      ctx.beginPath();
      ctx.arc(pos.x,pos.y,circleR,0,Math.PI*2);
      ctx.fillStyle = fillCol;
      ctx.fill();

      // Draw center temp number
      ctx.fillStyle="#000";
      ctx.font="bold 16px Arial";
      ctx.textAlign="center";
      ctx.textBaseline="middle";
      ctx.fillText(t.toFixed(1),pos.x,pos.y);

      // Station name black label on right
      ctx.fillStyle="#0c3549";
      ctx.fillRect(pos.x+circleR+3,pos.y-12,sta.name.length*15,24);
      ctx.fillStyle="#fff";
      ctx.font="bold 14px Arial";
      ctx.textAlign="left";
      ctx.fillText(sta.name,pos.x+circleR+7,pos.y+3);
    })

  }catch(err){
    console.error("Fetch Error:",err);
  }
}

// Auto refresh every 5min =300000ms
setInterval(fetchSMGWeather,300000);
</script>
</body>
</html>
