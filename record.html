<style>
/* ========== 全域基礎樣式 ========== */
html {
  scroll-behavior: smooth;
}
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: #f5f8fa;
}

/* ========== 頁頭Header ========== */
.header {
  background: #1f3a4d;
  color: white;
  padding: 20px 25px;
  display: flex;
  align-items: center;
}
.title {
  font-size: 20px;
  font-weight: bold;
  margin-left: 10px;
}
.logo {
  height: 40px;
}

/* ========== 頂部導航菜單 ========== */
.menu-container {
  position: relative;
  z-index: 3000;
  margin-left: auto;
}
.menu-toggle {
  display: none;
  font-size: 26px;
  padding: 10px 15px;
  cursor: pointer;
  background: #2d6c94;
  color: white;
}
.nav {
  background: #2d6c94;
  display: flex;
}
.nav a {
  color: white;
  padding: 14px 18px;
  font-size: 16px;
  text-decoration: none;
  display: block;
}
.nav a:hover {
  background: #1f4f6d;
}

/* ========== 主要容器 ========== */
.main-container {
  max-width: 1200px;
  margin: 25px auto;
  padding: 0 25px;
}

/* ========== 篩選控制區 ========== */
.filter-bar {
  background: white;
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
  align-items: center;
}
.filter-group {
  display: flex;
  align-items: center;
  gap: 8px;
}
.filter-group label {
  font-weight: bold;
  color: #333;
}
.filter-group select {
  padding: 8px 12px;
  border: 2px solid #4fa6a6;
  border-radius: 8px;
  font-size: 16px;
}
.reset-btn {
  margin-left: auto;
  padding: 8px 16px;
  background: #d9534f;
  color: white;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}
.reset-btn:hover {
  opacity: 0.9;
}

/* ========== 表格區域 ========== */
.table-container {
  background: white;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
table {
  width: 100%;
  border-collapse: collapse;
}
th {
  background: #4fa6a6;
  color: white;
  padding: 15px;
  text-align: left;
  cursor: pointer;
  position: relative;
  user-select: none;
}
th:hover {
  background: #3b8c8c;
}
th .sort-icon {
  margin-left: 8px;
  font-size: 12px;
}
td {
  padding: 15px;
  border-bottom: 1px solid #eee;
}
tr:nth-child(even) {
  background-color: #f8fdfd;
}
tr:hover {
  background-color: #e6f7f7;
}

/* 警告類型顏色標示 */
.warning-cold { background-color: #e3f2fd; color: #0d47a1; }
.warning-rain { background-color: #e0f2f1; color: #00695c; }
.warning-storm { background-color: #ffebee; color: #b71c1c; }
.warning-hot { background-color: #fff8e1; color: #ff8f00; }
.warning-veryhot { background-color: #ffe0b2; color: #e65100; }

/* ========== 響應式樣式 ========== */
@media (max-width: 768px) {
  .menu-toggle {
    display: block;
  }
  .nav {
    display: none;
    flex-direction: column;
    width: 100%;
    position: absolute;
    top: 100%;
    right: 0;
  }
  .nav.active {
    display: flex;
  }
  .nav a {
    width: 100%;
    padding: 12px 15px;
    border-top: 1px solid rgba(255,255,255,0.2);
  }
  .filter-bar {
    flex-direction: column;
    align-items: stretch;
  }
  .reset-btn {
    margin-left: 0;
    margin-top: 10px;
  }
  th, td {
    padding: 10px 8px;
    font-size: 14px;
  }
  .table-container {
    overflow-x: auto;
  }
  table {
    min-width: 800px;
  }
}
</style>
</head>

</div>

// 獲取警告類型對應的CSS類
function getWarningClass(type) {
    // 寒冷系列
    if (type.includes("極為寒冷")) return "warning-extremecold";
    if (type.includes("非常寒冷")) return "warning-verycold";
    if (type.includes("寒冷")) return "warning-cold";

    // 酷熱系列
    if (type.includes("極為酷熱")) return "warning-extremehot";
    if (type.includes("非常酷熱")) return "warning-veryhot";
    if (type.includes("酷熱")) return "warning-hot";

    // 降雨系列
    if (type.includes("大暴雨")) return "warning-heavystorm";
    if (type.includes("暴雨")) return "warning-storm";
    if (type.includes("大雨")) return "warning-rain";

    // 風暴潮系列
    if (type.includes("風暴潮危險")) return "warning-surge-danger";
    if (type.includes("風暴潮戒備")) return "warning-surge-prep";
    if (type.includes("風暴潮觀察")) return "warning-surge-observe";

    // 注意 / 戒備
    if (type.includes("注意警報")) return "warning-notice";
    if (type.includes("戒備警報")) return "warning-prepare";

    // 風力系列
    if (type.includes("西南烈風")) return "warning-gale-sw";
    if (type.includes("西北烈風")) return "warning-gale-nw";
    if (type.includes("東南烈風")) return "warning-gale-se";
    if (type.includes("東北烈風")) return "warning-gale-ne";
    if (type.includes("颶風")) return "warning-hurricane";
    if (type.includes("暴風")) return "warning-stormwind";
    if (type.includes("強風")) return "warning-strongwind";

    // 海嘯系列
    if (type.includes("嚴重海嘯")) return "warning-sevtsunami";
    if (type.includes("海嘯")) return "warning-tsunami";

    return "";
}

// 初始化篩選選項
function initFilters() {
  const years = new Set();
  const months = new Set();
  const types = new Set();
  
  warningData.forEach(item => {
    const [year, month] = item.start.split("-");
    years.add(year);
    months.add(month);
    types.add(item.type);
  });
  
  // 填充年份
  const yearFilter = document.getElementById("yearFilter");
  [...years].sort().forEach(y => {
    yearFilter.innerHTML += `<option value="${y}">${y}</option>`;
  });
  
  // 填充月份
  const monthFilter = document.getElementById("monthFilter");
  [...months].sort().forEach(m => {
    monthFilter.innerHTML += `<option value="${m}">${m}月</option>`;
  });
  
  // 填充類型
  const typeFilter = document.getElementById("typeFilter");
  [...types].sort().forEach(t => {
    typeFilter.innerHTML += `<option value="${t}">${t}</option>`;
  });
}

// 渲染表格
function renderTable(data) {
  const tbody = document.getElementById("warningTableBody");
  tbody.innerHTML = "";
  
  data.forEach(item => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td><span class="${getWarningClass(item.type)}" style="padding:4px 8px; border-radius:4px;">${item.type}</span></td>
      <td>${item.start}</td>
      <td>${item.end}</td>
      <td>${item.duration}</td>
    `;
    tbody.appendChild(tr);
  });
}

// 篩選數據
function filterData() {
  const year = document.getElementById("yearFilter").value;
  const month = document.getElementById("monthFilter").value;
  const type = document.getElementById("typeFilter").value;
  
  let filtered = warningData.filter(item => {
    const [y, m] = item.start.split("-");
    const matchYear = year === "all" || y === year;
    const matchMonth = month === "all" || m === month;
    const matchType = type === "all" || item.type === type;
    return matchYear && matchMonth && matchType;
  });
  
  renderTable(filtered);
}

// 重置篩選
function resetFilters() {
  document.getElementById("yearFilter").value = "all";
  document.getElementById("monthFilter").value = "all";
  document.getElementById("typeFilter").value = "all";
  renderTable(warningData);
}

// 表格排序
let currentSort = { key: null, dir: 1 };
function sortData(key) {
  if (currentSort.key === key) {
    currentSort.dir *= -1;
  } else {
    currentSort.key = key;
    currentSort.dir = 1;
  }
  
  const sorted = [...warningData].sort((a, b) => {
    let valA, valB;
    switch(key) {
      case "type":
        valA = a.type; valB = b.type;
        break;
      case "start":
        valA = a.start; valB = b.start;
        break;
      case "end":
        valA = a.end; valB = b.end;
        break;
      case "duration":
        // 轉換為分鐘排序
        const [ah, am] = a.duration.split(":").map(Number);
        const [bh, bm] = b.duration.split(":").map(Number);
        valA = ah * 60 + am;
        valB = bh * 60 + bm;
        break;
    }
    if (valA < valB) return -1 * currentSort.dir;
    if (valA > valB) return 1 * currentSort.dir;
    return 0;
  });
  
  renderTable(sorted);
  
  // 更新排序箭頭
  document.querySelectorAll(".sort-icon").forEach(icon => icon.textContent = "↕");
  const activeHeader = document.querySelector(`th[data-sort="${key}"] .sort-icon`);
  activeHeader.textContent = currentSort.dir === 1 ? "↑" : "↓";
}

// 初始化
window.addEventListener('DOMContentLoaded', () => {
  initFilters();
  renderTable(warningData);
  
  // 綁定篩選事件
  document.getElementById("yearFilter").addEventListener("change", filterData);
  document.getElementById("monthFilter").addEventListener("change", filterData);
  document.getElementById("typeFilter").addEventListener("change", filterData);
  
  // 綁定排序事件
  document.querySelectorAll("th[data-sort]").forEach(th => {
    th.addEventListener("click", () => sortData(th.dataset.sort));
  });
});
