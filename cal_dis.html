<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Macau Distance Tool</title>

<style>
  body {
    font-family: "Segoe UI", Arial, sans-serif;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0;
  }

  .card {
    background: white;
    padding: 25px;
    border-radius: 16px;
    width: 420px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  }

  h2 {
    text-align: center;
    margin-bottom: 15px;
  }

  input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 14px;
  }

  button {
    width: 100%;
    padding: 12px;
    background: #4facfe;
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 10px;
    cursor: pointer;
  }

  button:hover {
    background: #3a8ce0;
  }

  #result {
    margin-top: 15px;
    white-space: pre-line;
    text-align: center;
    font-weight: bold;
  }

  iframe {
    width: 100%;
    height: 300px;
    border: none;
    margin-top: 15px;
    border-radius: 12px;
  }
</style>
</head>

<body>

<div class="card">
  <h2>📍 Macau Distance Tool</h2>

  <input type="number" id="lat" placeholder="Latitude (e.g. 22.1595)">
  <input type="number" id="lon" placeholder="Longitude (e.g. 113.5685)">

  <button onclick="calculate()">Calculate</button>

  <div id="result"></div>

  <!-- ✅ Working map -->
  <iframe id="map"></iframe>
</div>

<script>
const macauLat = 22.1987;
const macauLon = 113.5439;

function toRad(d){ return d * Math.PI / 180; }
function toDeg(r){ return r * 180 / Math.PI; }

// Distance
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);

  const a = Math.sin(dLat/2)**2 +
            Math.cos(toRad(lat1)) *
            Math.cos(toRad(lat2)) *
            Math.sin(dLon/2)**2;

  return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// Bearing
function bearing(lat1, lon1, lat2, lon2) {
  const dLon = toRad(lon2 - lon1);

  const y = Math.sin(dLon) * Math.cos(toRad(lat2));
  const x = Math.cos(toRad(lat1))*Math.sin(toRad(lat2)) -
            Math.sin(toRad(lat1))*Math.cos(toRad(lat2))*Math.cos(dLon);

  return (toDeg(Math.atan2(y, x)) + 360) % 360;
}

// Direction text
function compass(b) {
  const dirs = ["N","NNE","NE","ENE","E","ESE","SE","SSE",
                "S","SSW","SW","WSW","W","WNW","NW","NNW"];
  return dirs[Math.round(b / 22.5) % 16];
}

function calculate() {
  const lat = parseFloat(document.getElementById("lat").value);
  const lon = parseFloat(document.getElementById("lon").value);

  if (isNaN(lat) || isNaN(lon)) {
    document.getElementById("result").innerText = "❗ Enter valid coordinates";
    return;
  }

  const dist = haversine(macauLat, macauLon, lat, lon);
  const b = bearing(macauLat, macauLon, lat, lon);

  document.getElementById("result").innerText =
    `Distance: ${dist.toFixed(2)} km\nDirection: ${compass(b)} (${b.toFixed(1)}°)`;

  // ✅ Reliable map (iframe)
  const mapUrl =
    "https://www.openstreetmap.org/export/embed.html?layer=mapnik" +
    "&marker=" + macauLat + "," + macauLon +
    "&marker=" + lat + "," + lon;

  document.getElementById("map").src = mapUrl;
}
</script>

</body>
</html>
