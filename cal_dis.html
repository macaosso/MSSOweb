<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Distance from Macau + Map</title>
<style>
  body {
    font-family: Arial, sans-serif;
    padding: 20px;
    background: #f5f5f5;
  }
  .container {
    background: white;
    padding: 20px;
    border-radius: 10px;
    max-width: 500px;
    margin: auto;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
  }
  input, button {
    padding: 10px;
    margin: 5px 0;
    width: 100%;
  }
  button {
    background: #0078D7;
    color: white;
    border: none;
    cursor: pointer;
  }
  img {
    margin-top: 15px;
    width: 100%;
    border-radius: 8px;
  }
</style>
</head>
<body>

<div class="container">
  <h2>Distance from Macau</h2>

  <label>Latitude:</label>
  <input type="number" id="lat" step="any" placeholder="Enter latitude">

  <label>Longitude:</label>
  <input type="number" id="lon" step="any" placeholder="Enter longitude">

  <button onclick="calculateDistance()">Calculate</button>

  <h3 id="result"></h3>

  <!-- Map Image -->
  <img id="map" src="" alt="Map will appear here">
</div>

<script>
  const macauLat = 22.1987;
  const macauLon = 113.5439;

  function toRadians(deg) {
    return deg * Math.PI / 180;
  }

  function haversine(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const dLat = toRadians(lat2 - lat1);
    const dLon = toRadians(lon2 - lon1);

    const a =
      Math.sin(dLat / 2) ** 2 +
      Math.cos(toRadians(lat1)) *
      Math.cos(toRadians(lat2)) *
      Math.sin(dLon / 2) ** 2;

    return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  }

  function calculateDistance() {
    const lat = parseFloat(document.getElementById("lat").value);
    const lon = parseFloat(document.getElementById("lon").value);

    if (isNaN(lat) || isNaN(lon)) {
      document.getElementById("result").innerText = "Please enter valid numbers.";
      return;
    }

    const distance = haversine(macauLat, macauLon, lat, lon);
    document.getElementById("result").innerText =
      "Distance: " + distance.toFixed(2) + " km";

    // Generate static map PNG (OpenStreetMap via staticmap service)
    const mapUrl = `https://staticmap.openstreetmap.de/staticmap.php?size=600x400
      &markers=${macauLat},${macauLon},red-pushpin
      &markers=${lat},${lon},blue-pushpin
      &zoom=5`.replace(/\s/g, "");

    document.getElementById("map").src = mapUrl;
  }
</script>

</body>
</html>
