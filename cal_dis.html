<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Macau Distance Tool</title>

<style>

  .header { background: #1f3a4d; color: white; padding: 25px 20px; display:flex; align-items:center; }
  .title { font-size: 20px; font-weight: bold; margin-left:10px; }
  .logo { height:40px; }

  .forecast-time {font-weight: bold; }

  .nav { background: #2d6c94; display: flex; }
  .nav a {
      color: white;
      padding: 25px 20px;
      font-size: 15px
      text-decoration: none;
      display: block;
  }
  .nav a:hover { background: #1f4f6d; }
  body {
    font-family: "Segoe UI", Arial, sans-serif;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0;
  }

  .card {
    background: white;
    padding: 25px;
    border-radius: 16px;
    width: 420px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  }

  h2 {
    text-align: center;
  }

  input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
  }

  button {
    width: 100%;
    padding: 12px;
    background: #4facfe;
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 10px;
    cursor: pointer;
  }

  button:hover {
    background: #3a8ce0;
  }

  #result {
    margin-top: 15px;
    white-space: pre-line;
    text-align: center;
    font-weight: bold;
  }

  iframe {
    width: 100%;
    height: 300px;
    border: none;
    margin-top: 15px;
    border-radius: 12px;
  }
</style>
</head>

<body>
<div class="header">
  <img src="icons/MSSO.png" class="logo">
  <div class="title">澳門民間氣象台 MSSO</div>
</div>
  
<!-- 🟠 NEW alertips box  <a href="https://macaosso.github.io/MSSOweb/weather.html">天氣資訊</ a>  -->
  
<div class="nav">
  <a href="https://macaosso.github.io/MSSOweb/index.html">首頁</a>
  <a href="https://macaosso.github.io/Apparent_Temperature/">酷熱指數</a>
  <a href="https://macaosso.github.io/MSSOweb/cal_dis.html">熱帶氣旋距離計算工具</a> 
  <a href="https://macaosso.github.io/MSSOweb/tc.html">熱帶氣旋資訊</a>
  <a href="https://macaosso.github.io/MSSOweb/about.html">關於我們</a>
</div>

<div class="card">
  <h2>📍 Macau Distance Tool</h2>

  <input type="number" id="lat" placeholder="Latitude">
  <input type="number" id="lon" placeholder="Longitude">

  <button onclick="calculate()">Calculate</button>

  <div id="result"></div>

  <iframe id="map"></iframe>
</div>

<script>
const macauLat = 22.1987;
const macauLon = 113.5439;

function toRad(d){ return d * Math.PI / 180; }
function toDeg(r){ return r * 180 / Math.PI; }

// Distance
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);

  const a = Math.sin(dLat/2)**2 +
            Math.cos(toRad(lat1)) *
            Math.cos(toRad(lat2)) *
            Math.sin(dLon/2)**2;

  return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// Bearing
function bearing(lat1, lon1, lat2, lon2) {
  const dLon = toRad(lon2 - lon1);

  const y = Math.sin(dLon) * Math.cos(toRad(lat2));
  const x = Math.cos(toRad(lat1))*Math.sin(toRad(lat2)) -
            Math.sin(toRad(lat1))*Math.cos(toRad(lat2))*Math.cos(dLon);

  return (toDeg(Math.atan2(y, x)) + 360) % 360;
}

// Compass
function compass(b) {
  const dirs = ["N","NNE","NE","ENE","E","ESE","SE","SSE",
                "S","SSW","SW","WSW","W","WNW","NW","NNW"];
  return dirs[Math.round(b / 22.5) % 16];
}

function calculate() {
  const lat = parseFloat(document.getElementById("lat").value);
  const lon = parseFloat(document.getElementById("lon").value);

  if (isNaN(lat) || isNaN(lon)) {
    document.getElementById("result").innerText = "❗ Enter valid coordinates";
    return;
  }

  const dist = haversine(macauLat, macauLon, lat, lon);
  const b = bearing(macauLat, macauLon, lat, lon);

  document.getElementById("result").innerText =
    `Distance: ${dist.toFixed(2)} km\nDirection: ${compass(b)} (${b.toFixed(1)}°)`;

  // ✅ AUTO-ZOOM BBOX CALCULATION
  const minLat = Math.min(macauLat, lat);
  const maxLat = Math.max(macauLat, lat);
  const minLon = Math.min(macauLon, lon);
  const maxLon = Math.max(macauLon, lon);

  // Add padding (important!)
  const padding = 2;

  const bbox =
    (minLon - padding) + "," +
    (minLat - padding) + "," +
    (maxLon + padding) + "," +
    (maxLat + padding);

  const mapUrl =
    "https://www.openstreetmap.org/export/embed.html?bbox=" +
    bbox +
    "&layer=mapnik" +
    "&marker=" + macauLat + "," + macauLon +
    "&marker=" + lat + "," + lon;

  document.getElementById("map").src = mapUrl;
}
</script>

</body>
</html>
