<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="icons/MSSO.png">
<title>酷熱指數｜體感溫度｜露點溫度計算 | 澳門民間氣象台 MSSO</title>
<style>
/* ========== Global Base ========== */
body {
  margin: 0;
  font-family: Arial, sans-serif;
}
/* ========== Header & Navigation (Same Index Style) ========== */
.header {
  background: #1f3a4d;
  color: white;
  padding: 25px 20px;
  display: flex;
  align-items: center;
}
.title {
  font-size: 20px;
  font-weight: bold;
  margin-left: 10px;
}
.logo {
  height: 40px;
}
.menu-container {
  position: relative;
  z-index: 3000;
  margin-left: auto;
}
.menu-toggle {
  display: none;
  font-size: 26px;
  padding: 10px 15px;
  cursor: pointer;
  background: #2d6c94;
  color: white;
}
.nav {
  background: #2d6c94;
  display: flex;
}
.nav a {
  color: white;
  padding: 25px 20px;
  font-size: 18px;
  text-decoration: none;
  display: block;
}
.nav a:hover {
  background: #1f4f6d;
}

/* ========== Page Wrap Layout ========== */
.calc-wrap{
  display: grid;
  grid-template-columns: 1fr;
  gap:35px;
  margin:18px 35px;
  max-width:900px;
}

/* ========== Unified Card Style (Same forecast-tab box) ========== */
.calc-card{
  border:2px solid #4fa6a6;
  border-radius:12px;
  background:#e6f7f7;
  box-shadow:0 2px 8px rgba(0,0,0,0.2);
  padding:25px;
  transition: all 0.25s ease;
}
.calc-card:hover{
  box-shadow:0 4px 12px rgba(79,166,166,0.25);
}
.card-title{
  font-size:19px;
  font-weight:bold;
  color:#1f3a4d;
  margin:0 0 20px 0;
  padding-bottom:10px;
  border-bottom:1px solid #b8d8d8;
}

/* ========== Form Layout ========== */
.form-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  margin-bottom:16px;
}
.form-full{
  margin-bottom:16px;
}
label{
  display:block;
  font-size:15px;
  margin-bottom:6px;
  color:#333;
}
input, select{
  width:100%;
  box-sizing:border-box;
  padding:11px 12px;
  border:1px solid #b8d8d8;
  border-radius:10px;
  font-size:15px;
  background:#fff;
  transition:0.2s;
}
input:focus, select:focus{
  outline:none;
  border-color:#4fa6a6;
  box-shadow:0 0 0 3px rgba(79,166,166,0.18);
}

/* ========== Buttons Beautified (Gradient + Hover animate) ========== */
.btn-row{
  display:grid;
  grid-template-columns: 2fr 1fr;
  gap:10px;
  margin-top:10px;
}
.calc-btn{
  padding:12px;
  border:none;
  border-radius:25px;
  background: linear-gradient(135deg,#4fa6a6,#398888);
  color:#fff;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}
.calc-btn:hover{
  opacity:0.92;
  transform:translateY(-2px);
}
.clear-btn{
  padding:12px;
  border:none;
  border-radius:25px;
  background:#cccccc;
  color:#333;
  font-size:15px;
  cursor:pointer;
  transition:0.3s;
}
.clear-btn:hover{
  background:#bbbbbb;
}
.unit-title{
  font-size:18px;
  font-weight:bold;
  color:#222;
  margin-bottom:14px;
  display:block;
}

/* ========== Result Display Box (Highlight output) ========== */
.result-box{
  margin-top:18px;
  padding:14px;
  background:#ffffff;
  border-left:5px solid #4fa6a6;
  border-radius:8px;
  font-size:15px;
  line-height:1.7;
  min-height:42px;
}
.result-error{
  border-left-color:#e1665c;
  background:#fef1f1;
}
.result-empty{
  color:#777;
}

/* ========== Mobile responsive ========== */
@media(max-width:768px){
  .calc-wrap{
    grid-template-columns:1fr;
    margin:18px 22px;
  }
  .menu-toggle{
    display:block;
  }
  .nav{
    display:none;
    flex-direction:column;
    width:100%;
  }
  .nav.active{
    display:flex;
  }
  .nav a{
    width:100%;
    padding:12px 15px;
    border-top:1px solid rgba(255,255,255,0.2);
  }
}
</style>
</head>
<body>
<!-- Header Nav Copy from your index -->
<div class="header">
<img src="icons/MSSO.png" class="logo">
<div class="title">澳門民間氣象台 MSSO</div>
</div>
<div class="menu-container">
<div class="menu-toggle" onclick="toggleMenu()">☰</div>
<div class="nav" id="navMenu">
<a href="https://macaosso.github.io/MSSOweb/index.html">首頁</a>
<a href="https://macaosso.github.io/Apparent_Temperature/">酷熱指數</a>
<a href="https://macaosso.github.io/MSSOweb/cal_dis.html">熱帶氣旋距離計算工具</a>
<a href="https://macaosso.github.io/MSSOweb/tc_gis.html">熱帶氣旋路徑地圖</a>
<a href="https://macaosso.github.io/MSSOweb/tc.html">熱帶氣旋資訊</a>
<a href="https://macaosso.github.io/MSSOweb/about.html">關於我們</a>
<a href="https://macaosso.github.io/MSSOweb/ver.html">版本記錄</a>
</div>
</div>

<!-- Main Content -->
<div class="calc-wrap">
  <!-- 1.體感溫度 AT 計算 -->
  <div class="calc-card">
    <div class="card-title">體感溫度 AT 計算｜公式：AT = 1.04T + 0.2e − 0.65V − 2.7</div>
    <div class="form-row">
      <div>
        <label>氣溫 T (℃)</label>
        <input id="at_T" type="number" step="0.1" placeholder="例：30.5">
      </div>
      <div>
        <label>相對濕度 RH (%)</label>
        <input id="at_RH" type="number" step="1" placeholder="0~100">
      </div>
    </div>
    <div class="form-full">
      <label>風速 V (km/h)</label>
      <input id="at_V" type="number" step="0.1" placeholder="例：5.0">
    </div>
    <div class="btn-row">
      <button class="calc-btn" onclick="calcAT()">計算體感溫度</button>
      <button class="clear-btn" onclick="clearAT()">清空</button>
    </div>
    <div id="resAT" class="result-box result-empty">體感溫度計算結果</div>
  </div>

  <!-- 2.酷熱指數 HI 計算 -->
  <div class="calc-card">
    <div class="card-title">酷熱指數 Heat Index HI 計算(美國NOAA標準公式)</div>
    <div class="form-row">
      <div>
        <label>氣溫 T (℉)</label>
        <input id="hi_T" type="number" step="0.1" placeholder="華氏溫度">
      </div>
      <div>
        <label>相對濕度 RH (%)</label>
        <input id="hi_RH" type="number" step="1" placeholder="0~100">
      </div>
    </div>
    <div class="btn-row">
      <button class="calc-btn" onclick="calcHI()">計算酷熱指數</button>
      <button class="clear-btn" onclick="clearHI()">清空</button>
    </div>
    <div id="resHI" class="result-box result-empty">酷熱指數(℉/自動轉℃)結果</div>
  </div>

  <!--3.露點溫度 Td 計算 -->
  <div class="calc-card">
    <div class="card-title">露點溫度 Td 計算｜a=17.27,b=237.7 馬格努斯公式</div>
    <div class="form-row">
      <div>
        <label>氣溫 T (℃)</label>
        <input id="td_T" type="number" step="0.1">
      </div>
      <div>
        <label>相對濕度 RH (%)</label>
        <input id="td_RH" type="number" step="1" placeholder="0~100">
      </div>
    </div>
    <div class="btn-row">
      <button class="calc-btn" onclick="calcTd()">計算露點溫度</button>
      <button class="clear-btn" onclick="clearTd()">清空</button>
    </div>
    <div id="resTd" class="result-box result-empty">露點溫度計算結果(℃)</div>
  </div>
</div>

<script>
// Mobile Menu Same as your index page
function toggleMenu(){
  const nav = document.getElementById("navMenu");
  const btn = document.querySelector(".menu-toggle");
  nav.classList.toggle("active");
  btn.innerHTML = nav.classList.contains("active") ? "✕" : "☰";
}

// ====================== 1.體感溫度 AT 公式 ======================
/*
e = RH/100 * 6.105 * exp( (17.27*T)/(237.7+T) )
AT = 1.04*T + 0.2*e - 0.65*V - 2.7
*/
function calcAT(){
  const T = Number(document.getElementById("at_T").value);
  const RH = Number(document.getElementById("at_RH").value);
  const V = Number(document.getElementById("at_V").value);
  const resDom = document.getElementById("resAT");
  if(isNaN(T)||isNaN(RH)||isNaN(V)||RH<0||RH>100){
    resDom.className = "result-box result-error";
    resDom.innerText = "輸入數據異常：溫度、濕度(0~100)、風速請填寫有效數值";
    return;
  }
  // 計算實際水汽壓e
  const e = (RH/100) * 6.105 * Math.exp( (17.27*T)/(237.7+T) );
  const AT = 1.04*T + 0.2*e - 0.65*V - 2.7;
  resDom.className = "result-box";
  resDom.innerText = `水汽壓 e = ${e.toFixed(3)} hPa\n體感溫度 AT = ${AT.toFixed(2)} ℃`;
}
function clearAT(){
  ["at_T","at_RH","at_V"].forEach(id=>document.getElementById(id).value="");
  const dom = document.getElementById("resAT");
  dom.innerText = "體感溫度計算結果";
  dom.className = "result-box result-empty";
}

// ====================== 2.酷熱指數 HI 公式 ======================
/*
HI = -42.379 + 2.04901523*T +10.14333127*RH
-0.22475541*T*RH -0.00683783*T² -0.05481717*RH²
+0.00122874*T²RH +0.00085282*TRH² -0.00000199*T²RH²
T單位：℉，RH%
℉轉℃：C=(F-32)/1.8
*/
function calcHI(){
  const Tf = Number(document.getElementById("hi_T").value);
  const RH = Number(document.getElementById("hi_RH").value);
  const resDom = document.getElementById("resHI");
  if(isNaN(Tf)||isNaN(RH)||RH<0||RH>100){
    resDom.className = "result-box result-error";
    resDom.innerText = "數據錯誤：RH需在0~100之間，溫度填寫華氏℉";
    return;
  }
  const T = Tf;
  const RHv = RH;
  let HI = -42.379
          + 2.04901523*T
          + 10.14333127*RHv
          - 0.22475541*T*RHv
          - 0.00683783*T*T
          - 0.05481717*RHv*RHv
          + 0.00122874*T*T*RHv
          + 0.00085282*T*RHv*RHv
          - 0.00000199*T*T*RHv*RHv;
  // ℉轉攝氏℃
  const HIc = (HI -32)/1.8;
  resDom.className = "result-box";
  resDom.innerText = `酷熱指數 HI = ${HI.toFixed(2)} ℉ ≈ ${HIc.toFixed(2)} ℃`;
}
function clearHI(){
  ["hi_T","hi_RH"].forEach(id=>document.getElementById(id).value="");
  const dom = document.getElementById("resHI");
  dom.innerText = "酷熱指數(℉/自動轉℃)結果";
  dom.className = "result-box result-empty";
}

// ======================3.露點溫度Td 馬格努斯公式 ======================
/*
a=17.27 b=237.7
γ = (a*T)/(b+T)+ln(RH/100)
Td = (b*γ)/(a-γ)
*/
function calcTd(){
  const T = Number(document.getElementById("td_T").value);
  const RH = Number(document.getElementById("td_RH").value);
  const resDom = document.getElementById("resTd");
  if(isNaN(T)||isNaN(RH)||RH<=0||RH>100){
    resDom.className = "result-box result-error";
    resDom.innerText = "濕度錯誤：RH範圍0~100，不可為0或負數";
    return;
  }
  const a=17.27,b=237.7;
  const γ = (a*T)/(b+T)+Math.log(RH/100);
  const Td = (b*γ)/(a-γ);
  resDom.className = "result-box";
  resDom.innerText = `露點溫度 Td = ${Td.toFixed(2)} ℃`;
}
function clearTd(){
  ["td_T","td_RH"].forEach(id=>document.getElementById(id).value="");
  const dom = document.getElementById("resTd");
  dom.innerText = "露點溫度計算結果(℃)";
  dom.className = "result-box result-empty";
}
</script>
</body>
