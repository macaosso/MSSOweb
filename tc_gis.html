<style>
/* ================= BASE ================= */
body {
  margin: 0;
  font-family: Segoe UI;
}

#map {
  height: calc(100vh - 50px);
  background: #222a35;
}


/* ================= NAVBAR ================= */
.navbar {
  height: 50px;
  z-index: 1000;
  background: #2c3e50;
  color: white;
  display: flex;
  align-items: center;
  padding: 0 15px;
  font-weight: bold;
}


/* ================= LEGEND PANEL ================= */
.legend {
  position: absolute;
  z-index: 1000;
  right: 15px;
  bottom: 15px;
  width: 220px;

  background: #000;
  color: #fff;

  padding: 12px;
  border-radius: 12px;
  font-size: 13px;

  box-shadow: 0 0 10px rgba(0,0,0,0.5);
}

/* spacing between legend rows */
.legend div {
  margin-bottom: 4px;
}


/* ================= SYMBOLS ================= */

/* circle marker preview */
.dot {
  display: inline-block;
  width: 14px;
  height: 14px;

  border: 2px solid #fff;
  border-radius: 50%;

  margin-right: 6px;
  vertical-align: middle;
}

/* hollow (real-time position) */
.dot.real {
  background: white;
}

/* line preview */
.line {
  display: inline-block;
  width: 25px;
  height: 0;

  margin-right: 6px;
  vertical-align: middle;
}

.line.past {
  border-top: 3px solid #ffffff;
}

.line.forecast {
  border-top: 3px dashed #ffffff;
}

/* cone preview */
.box {
  display: inline-block;
  width: 22px;
  height: 16px;

  border: 2px solid rgb(255, 214, 80);

  margin-right: 6px;
  vertical-align: middle;
}


/* ================= TOOLTIP (TIME LABEL) ================= */
.time-label {
  color: #ffffff;
  font-size: 11px;
  font-weight: 500;

  background: none;
  border: none;
  box-shadow: none;
}

/* remove triangle pointer */
.time-label:before,
.time-label:after {
  display: none !important;
}


/* ================= POPUP ================= */
.leaflet-popup-content-wrapper {
  border-radius: 12px;
  font-size: 14px;
}
.header { background: #1f3a4d; color: white; padding: 25px 20px; display:flex; align-items:center; }
.title { font-size: 20px; font-weight: bold; margin-left:10px; }
.logo { height:40px; }

.forecast-time {font-weight: bold; }

.nav { background: #2d6c94; display: flex; }
.nav a {
  color: white;
  padding: 25px 20px;
  font-size: 15px;
  text-decoration: none;
  display: block;
}
.nav a:hover { background: #1f4f6d; }
/* ================= MOBILE ================= */
@media (max-width: 768px) {

  /* header */
  .header {
    flex-direction: column;
    align-items: flex-start;
    padding: 15px;
  }

  .logo {
    height: 30px;
    margin-bottom: 5px;
  }

  .title {
    font-size: 16px;
  }

  /* navigation */
  .nav {
    flex-wrap: wrap;
  }

  .nav a {
    flex: 1 1 50%;   /* 2 per row */
    text-align: center;
    padding: 12px;
    font-size: 13px;
  }

  /* content boxes */
  .box,
  .forecast-box {
    margin: 10px;
  }

  .content-yellow,
  .content-red,
  .forecast-content {
    font-size: 14px;   /* bigger text */
    padding: 15px;
  }

  /* forecast titles */
  .forecast-title {
    font-size: 13px;
    padding: 10px;
  }

  /* update time */
  .forecast-time {
    font-size: 12px;
    margin: 10px;
  }

}
  
</style>

<body>
  <div id="updateTime" style="
  position:absolute;
  left:15px;
  bottom:15px;
  color:white;
  font-size:14px;
  z-index:1000;
  background: rgba(0,0,0,0.5);
  padding:6px 10px;
  border-radius:8px;
">
  更新時間:
</div>
  
<div class="header">
  <img src="MSSO.png" class="logo">
  <div class="title">澳門民間氣象台 MSSO</div>
  <div class="navbar">熱帶氣旋路徑預測</div>
</div>
  
<!-- 🟠 NEW alertips box  <a href="https://macaosso.github.io/MSSOweb/weather.html">天氣資訊</ a>  -->
  
<div class="nav">
  <a href="https://macaosso.github.io/MSSOweb/index.html">首頁</a>
  <a href="https://macaosso.github.io/Apparent_Temperature/">酷熱指數</a>
  <a href="https://macaosso.github.io/MSSOweb/cal_dis.html">熱帶氣旋距離計算工具</a> 
  <a href="https://macaosso.github.io/MSSOweb/tc_gis.html">熱帶氣旋路徑地圖</a>  
  <a href="https://macaosso.github.io/MSSOweb/tc.html">熱帶氣旋資訊</a>
  <a href="https://macaosso.github.io/MSSOweb/about.html">關於我們</a>
</div>
  
<div id="map"></div>

<div class="legend">
  <b>路徑圖例</b><br><br>
  <div><span class="line past"></span> 過去路徑</div>
  <div><span class="line forecast"></span> 預報路徑</div>
  <div><span class="box"></span> 誤差圈</div>
  <br><b>強度</b><br>

  <div><span class="dot" style="background:#DDDFE2"></span> LPA 低壓區</div>
  <div><span class="dot" style="background:#6DD8FA"></span> TD 熱帶低氣壓</div>
  <div><span class="dot" style="background:#9DD79C"></span> TS 熱帶風暴</div>
  <div><span class="dot" style="background:#FFD363"></span> STS 強烈熱帶風暴</div>
  <div><span class="dot" style="background:#F78A31"></span> TY 颱風</div>
  <div><span class="dot" style="background:#FF6F6F"></span> STY 強颱風</div>
  <div><span class="dot" style="background:#A230FF"></span> SUTY 超強颱風</div>
</div>

<script>
// ================= MAP =================
const map = L.map('map').setView([20,120],5);

L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
).addTo(map);


// ================= UI =================
document.getElementById("updateTime").innerHTML =
  "更新時間: " + forecastInfo.updated;


// ================= CONSTANTS =================
const colors = {
  "SuTY":"#A230FF",
  "STY":"#FF6F6F",
  "TY":"#F78A31",
  "STS":"#FFD363",
  "TS":"#9DD79C",
  "TD":"#6DD8FA",
  "LPA":"#DDDFE2"
};

const hours = [0,12,24,48,72,96,120];
const radii = [15,60,100,170,255,345,465];
const macau = [22.1595, 113.5685];


// ================= UTILITIES =================
function getColor(type) {
  return colors[type] || "#FFFFFF";
}
function getTypeName(type) {
  return {
    "LPA": "低壓區",
    "TD": "熱帶低氣壓",
    "TS": "熱帶風暴",
    "STS": "強烈熱帶風暴",
    "TY": "颱風",
    "STY": "強颱風",
    "SuTY": "超強颱風"
  }[type] || type;
}
function getTypeFromWind(wind) {
  if (wind <= 40) return "LPA";
  else if (wind <= 60) return "TD";
  else if (wind <= 87) return "TS";
  else if (wind <= 117) return "STS";
  else if (wind <= 149) return "TY";
  else if (wind <= 184) return "STY";
  else return "SuTY";
}

function getRadius(hour, hoursArr, radiiArr){
  for(let i=0;i<hoursArr.length-1;i++){
    if(hour >= hoursArr[i] && hour <= hoursArr[i+1]){
      let t = (hour - hoursArr[i]) / (hoursArr[i+1] - hoursArr[i]);
      return radiiArr[i] + t * (radiiArr[i+1] - radiiArr[i]);
    }
  }
  return radiiArr[radiiArr.length-1];
}

function smoothPoints(points, segments = 20){
  let newPts = [];

  for (let i = 0; i < points.length - 1; i++){
    let p0 = points[i - 1] || points[i];
    let p1 = points[i];
    let p2 = points[i + 1];
    let p3 = points[i + 2] || p2;

    for (let j = 0; j <= segments; j++){
      let t = j / segments;

      let lat =
        0.5 * ((2*p1.lat)+(-p0.lat+p2.lat)*t+(2*p0.lat-5*p1.lat+4*p2.lat-p3.lat)*t*t+(-p0.lat+3*p1.lat-3*p2.lat+p3.lat)*t*t*t);

      let lon =
        0.5 * ((2*p1.lon)+(-p0.lon+p2.lon)*t+(2*p0.lon-5*p1.lon+4*p2.lon-p3.lon)*t*t+(-p0.lon+3*p1.lon-3*p2.lon+p3.lon)*t*t*t);

      newPts.push({ lat, lon });
    }
  }
  return newPts;
}

function smoothPointsWithTime(points, hours, segments = 20){
  let base = smoothPoints(points, segments);
  let newPts = [];

  for (let i = 0; i < base.length; i++){
    let t = i / (base.length - 1);

    newPts.push({
      lat: base[i].lat,
      lon: base[i].lon,
      hour: hours[0] + t * (hours[hours.length - 1] - hours[0])
    });
  }
  return newPts;
}

function catmullRom2bezier(points){
  let path = [];
  path.push("M", [points[0].lat, points[0].lon]);

  for (let i = 0; i < points.length - 1; i++){
    let p0 = points[i - 1] || points[i];
    let p1 = points[i];
    let p2 = points[i + 1];
    let p3 = points[i + 2] || p2;

    let cp1 = [
      p1.lat + (p2.lat - p0.lat) / 6,
      p1.lon + (p2.lon - p0.lon) / 6
    ];

    let cp2 = [
      p2.lat - (p3.lat - p1.lat) / 6,
      p2.lon - (p3.lon - p1.lon) / 6
    ];

    path.push("C", cp1, cp2, [p2.lat, p2.lon]);
  }

  return path;
}

function makeCone(points, hours, radii){
  const smoothPts = smoothPointsWithTime(points, hours, 20);
  let merged = null;

  for(let p of smoothPts){
    const r = getRadius(p.hour, hours, radii);

    const circle = turf.buffer(
      turf.point([p.lon, p.lat]),
      r,
      {units:"kilometers", steps:256}
    );

    if(!merged) merged = circle;
    else { try { merged = turf.union(merged, circle); } catch(e){} }
  }

  return merged;
}

function createWindRadii(lat, lon, radii) {

  const center = turf.point([lon, lat]);
  let coords = [];

  function arc(start, end, radius) {
    for (let angle = start; angle <= end; angle += 2) {
      const pt = turf.destination(center, radius, angle, {
        units: "kilometers"
      });
      coords.push(pt.geometry.coordinates);
    }
  }

  // ✅ each quadrant has FIXED radius
  arc(0, 90, radii.ne);
  arc(90, 180, radii.se);
  arc(180, 270, radii.sw);
  arc(270, 360, radii.nw);

  coords.push(coords[0]);

  return turf.polygon([coords]);
}


// ================= STATIC =================
[100,200,400,800].forEach(r=>{
  L.circle(macau,{
    radius:r*1000,
    color:"#fff",
    weight:1,
    dashArray:"4,6",
    fill:false,
    opacity:0.5
  }).addTo(map);
});


// ================= DRAW =================

// ✅ 1. Past track
L.polyline(pastPoints.map(p=>[p.lat,p.lon]),{
  color:"#fff",
  weight:2
}).addTo(map);

// ✅ 2. Cone
const cone = makeCone(forecastPoints, hours, radii);

const smoothed = turf.simplify(cone,{
  tolerance:0.0005,
  highQuality:true
});

const finalCone = smoothed && smoothed.geometry ? smoothed : cone;

L.geoJSON(finalCone,{
  style:{
    fillColor:"#d6b85c",
    fillOpacity:0.35,
    color:"#d6b85c",
    weight:1
  }
}).addTo(map);

// ✅ 3. Forecast track
const trackLine = L.curve(catmullRom2bezier(forecastPoints),{
  color:"#fff",
  weight:2,
  dashArray:"6,6"
}).addTo(map);


// ✅ 4. MARKERS
let forecastMarkers = [];
let pastMarkers = [];

// forecast
forecastPoints.forEach(p => {

  const type = getTypeFromWind(p.wind);

  const marker = L.circleMarker([p.lat, p.lon], {
    radius: 4.5,
    color: getColor(type),
    weight: 2,
    fillColor: getColor(type),
    fillOpacity: 1
  }).addTo(map);

  const popupContent = `
    <b>預報位置</b><br>
    預報時效: ${p.time}<br>
    位置: ${p.lat.toFixed(1)}°N, ${p.lon.toFixed(1)}°E<br>
    強度: ${getTypeName(type)} (${type})<br>
    中心風力: ${p.wind} km/h<br>
  `;

  marker.bindPopup(popupContent);

  marker.bindTooltip(p.time, {
    permanent: true,
    direction: "right",
    offset: [5, 0],
    className: "time-label"
  });

  marker.on('mouseover', function(){
    this.setStyle({ radius: 5 });
    this.openPopup();
  });

  marker.on('mouseout', function(){
    this.setStyle({ radius: 4.5 });
    this.closePopup();
  });

  forecastMarkers.push(marker);
});

// past
pastPoints.forEach(p => {

  const type = getTypeFromWind(p.wind);

  const marker = L.circleMarker([p.lat, p.lon], {
    radius: 3,
    color: getColor(type),
    weight: 2,
    fillColor: getColor(type),
    fillOpacity: 1
  }).addTo(map);

  marker.bindPopup(`
    <b>實況位置</b><br>
    時間: ${p.time}<br>
    位置: ${p.lat.toFixed(1)}°N, ${p.lon.toFixed(1)}°E<br>
    強度: ${getTypeName(type)} (${type})<br>
    中心風力: ${p.wind} kph
  `);

  marker.on("mouseover", function(){
    this.setStyle({radius:4});
    this.openPopup();
  });

  marker.on("mouseout", function(){
    this.setStyle({radius:3});
    this.closePopup();
  });

  pastMarkers.push(marker);
});

// ================= WIND RADII (+0H) =================

const p0 = forecastPoints[0];

// ✅ Yellow 41kt
if (p0.wind41) {
  const poly41 = createWindRadii(p0.lat, p0.lon, p0.wind41);

  L.geoJSON(poly41, {
    style: {
      color: "#FFD700",
      weight: 1.5,
      fillColor: "#FFD700",
      fillOpacity: 0.18
    }
  }).addTo(map);
}

// ✅ Red 88kt
if (p0.wind88) {
  const poly88 = createWindRadii(p0.lat, p0.lon, p0.wind88);

  L.geoJSON(poly88, {
    style: {
      color: "#FF0000",
      weight: 1.5,
      fillColor: "#FF0000",
      fillOpacity: 0.20
    }
  }).addTo(map);
}

// ================= FINAL ORDER =================

// past dots above past line
pastMarkers.forEach(m=>m.bringToFront());

// forecast line above past dots
trackLine.bringToFront();

// forecast dots top
forecastMarkers.forEach(m=>m.bringToFront());

  // wind below markers
map.eachLayer(layer => {
  if (layer.feature && layer.feature.geometry) {
    layer.bringToBack();
  }
});

// keep important layers on top
trackLine.bringToFront();
forecastMarkers.forEach(m => m.bringToFront());

// ================= FIT =================
map.fitBounds([
  [22.1987,113.5439],
  ...forecastPoints.map(p=>[p.lat,p.lon]),
  ...pastPoints.map(p=>[p.lat,p.lon])
]);
</script>

</body>
