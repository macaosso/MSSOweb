<script>
// ================= 地圖初始化 =================
const p0 = forecastPoints[0];
const isMobile = window.innerWidth <= 768;
let center;
if (isMobile) {
  center = [p0.lat, p0.lon];
} else {
  center = [26, 127.3];
}
const map = L.map('map').setView(center, 5);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

// 自定義圖層順序
map.createPane('conePane');
map.getPane('conePane').style.zIndex = 300;
map.createPane('wind41Pane');
map.getPane('wind41Pane').style.zIndex = 350;
map.createPane('wind88Pane');
map.getPane('wind88Pane').style.zIndex = 360;

// 更新時間文字渲染
document.getElementById("updateTime").innerHTML = "更新時間: " + forecastInfo.updated;

// 澳門固定標記
const macauMarker = L.marker([22.1595, 113.5685], {
  icon: L.divIcon({
    className: "macau-marker",
    iconSize: [12, 12],
    iconAnchor: [6, 6]
  })
}).addTo(map);
macauMarker.bindTooltip("澳門", {
  permanent: false,
  direction: "right",
  offset: [8, 0]
});

// 強度配色常量
const colors = {
  "SuTY":"#A230FF",
  "STY":"#FF6F6F",
  "TY":"#F78A31",
  "STS":"#FFD363",
  "TS":"#9DD79C",
  "TD":"#6DD8FA",
  "LPA":"#DDDFE2",
  "Ex":"#DDDFE2"
};
const hours = [0,12,24,48,72,96,120];
const radii = [15,60,100,170,255,345,465];
const macau = [22.1595, 113.5685];

// ================= 通用工具函數 =================
// 改良版切換菜單，解決移動端點擊延遲、殘留狀態
function toggleMenu(e) {
  // 阻止事件冒泡，避免地圖捕獲點擊
  if(e) e.stopPropagation();
  const nav = document.getElementById("navMenu");
  const btn = document.querySelector(".menu-toggle");
  nav.classList.toggle("active");
  // 切換圖標 ☰ / ✕
  btn.innerHTML = nav.classList.contains("active") ? "✕" : "☰";
}

// 頁面載入強制重置菜單狀態，防止緩存殘留active
window.addEventListener('load', ()=>{
  const nav = document.getElementById("navMenu");
  nav.classList.remove("active");
});

// 點擊頁面空白處自動關閉菜單（額外優化，避免彈出後關不掉）
document.addEventListener("click", (e)=>{
  const nav = document.getElementById("navMenu");
  const toggleBtn = document.querySelector(".menu-toggle");
  // 如果菜單開啟，且點擊區域不是按鈕、不是導航面板，就關閉
  if(nav.classList.contains("active") && !toggleBtn.contains(e.target) && !nav.contains(e.target)){
    nav.classList.remove("active");
    toggleBtn.innerHTML = "☰";
  }
});
function getIcon(type, size = 16) {
  return L.icon({
    iconUrl: `TC logo/${type}.png`,
    iconSize: [size, size],
    iconAnchor: [size/2, size/2],
    popupAnchor: [0, -size/2]
  });
}
function getDirection(lat1, lon1, lat2, lon2) {
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const y = Math.sin(dLon) * Math.cos(lat2 * Math.PI / 180);
  const x = Math.cos(lat1 * Math.PI / 180) * Math.sin(lat2 * Math.PI / 180)
          - Math.sin(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.cos(dLon);
  let brng = Math.atan2(y, x) * 180 / Math.PI;
  brng = (brng + 360) % 360;
  const dirs = ["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"];
  return dirs[Math.round(brng / 22.5) % 16];
}
function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
function getSpeed(p1, p2) {
  const dist = getDistance(p1.lat, p1.lon, p2.lat, p2.lon);
  const hours = 12;
  return dist / hours;
}
function getColor(type) {
  return colors[type] || "#FFFFFF";
}
function getTypeName(type) {
  return {
    "LPA": "低壓區",
    "TD": "熱帶低氣壓",
    "TS": "熱帶風暴",
    "STS": "強烈熱帶風暴",
    "TY": "颱風",
    "STY": "強颱風",
    "SuTY": "超強颱風",
    "Ex": "溫帶氣旋"
  }[type] || type;
}
function getTypeFromWind(wind) {
  if (wind === "-" || wind == null) return "Ex";
  wind = Number(wind);
  if (wind <= 40) return "LPA";
  else if (wind <= 60) return "TD";
  else if (wind <= 87) return "TS";
  else if (wind <= 117) return "STS";
  else if (wind <= 149) return "TY";
  else if (wind <= 184) return "STY";
  else return "SuTY";
}
function getRadius(hour, hoursArr, radiiArr){
  for(let i=0;i<hoursArr.length-1;i++){
    if(hour >= hoursArr[i] && hour <= hoursArr[i+1]){
      let t = (hour - hoursArr[i]) / (hoursArr[i+1] - hoursArr[i]);
      return radiiArr[i] + t * (radiiArr[i+1] - radiiArr[i]);
    }
  }
  return radiiArr[radiiArr.length-1];
}

// 路徑平滑、誤差圓、風圈計算函數
function smoothPoints(points, segments = 20){
  let newPts = [];
  for (let i = 0; i < points.length - 1; i++){
    let p0 = points[i - 1] || points[i];
    let p1 = points[i];
    let p2 = points[i + 1];
    let p3 = points[i + 2] || p2;
    for (let j = 0; j <= segments; j++){
      let t = j / segments;
      let lat = 0.5 * ((2*p1.lat)+(-p0.lat+p2.lat)*t+(2*p0.lat-5*p1.lat+4*p2.lat-p3.lat)*t*t+(-p0.lat+3*p1.lat-3*p2.lat+p3.lat)*t*t*t);
      let lon = 0.5 * ((2*p1.lon)+(-p0.lon+p2.lon)*t+(2*p0.lon-5*p1.lon+4*p2.lon-p3.lon)*t*t+(-p0.lon+3*p1.lon-3*p2.lon+p3.lon)*t*t*t);
      newPts.push({ lat, lon });
    }
  }
  return newPts;
}
function smoothPointsWithTime(points, hours, segments = 20){
  let base = smoothPoints(points, segments);
  let newPts = [];
  for (let i = 0; i < base.length; i++){
    let t = i / (base.length - 1);
    newPts.push({
      lat: base[i].lat,
      lon: base[i].lon,
      hour: hours[0] + t * (hours[hours.length - 1] - hours[0])
    });
  }
  return newPts;
}
function catmullRom2bezier(points){
  let path = [];
  path.push("M", [points[0].lat, points[0].lon]);
  for (let i = 0; i < points.length - 1; i++){
    let p0 = points[i - 1] || points[i];
    let p1 = points[i];
    let p2 = points[i + 1];
    let p3 = points[i + 2] || p2;
    let cp1 = [p1.lat + (p2.lat - p0.lat) / 6, p1.lon + (p2.lon - p0.lon) / 6];
    let cp2 = [p2.lat - (p3.lat - p1.lat) / 6, p2.lon - (p3.lon - p1.lon) / 6];
    path.push("C", cp1, cp2, [p2.lat, p2.lon]);
  }
  return path;
}
function makeSplitCone(points, hours, radii){
  const smoothPts = smoothPointsWithTime(points, hours, 20);
  let segment1 = [];
  let segment2 = [];
  for (let p of smoothPts){
    const r = getRadius(p.hour, hours, radii);
    const circle = turf.buffer(turf.point([p.lon, p.lat]), r, {units: "kilometers", steps: 128});
    if (p.hour <= 80) segment1.push(circle);
    else segment2.push(circle);
  }
  let cone1 = null, cone2 = null;
  segment1.forEach(c => cone1 = cone1 ? turf.union(cone1, c) : c);
  segment2.forEach(c => cone2 = cone2 ? turf.union(cone2, c) : c);
  let p72 = smoothPts.reduce((a,b)=> Math.abs(a.hour-72) < Math.abs(b.hour-72) ? a : b);
  const r72 = getRadius(p72.hour, hours, radii);
  const circle72 = turf.buffer(turf.point([p72.lon, p72.lat]), r72, {units:"kilometers"});
  if (cone2) try {cone2 = turf.difference(cone2, circle72);} catch(e){}
  if (cone1 && cone2) try {cone2 = turf.difference(cone2, cone1);} catch(e){}
  return {first: cone1, second: cone2};
}
function addCountryLabel(name, lat, lon) {
  L.marker([lat, lon], {
    icon: L.divIcon({
      className: 'country-label',
      html: name,
      iconSize: [0, 0]
    })

}
addCountryLabel("澳門", 22.1595, 113.5685);
addCountryLabel("日本", 35.6895, 139.6917);
addCountryLabel("南韓", 37.567, 126.967);
addCountryLabel("菲律賓", 13, 122);
addCountryLabel("越南", 16, 107);
addCountryLabel("台灣", 25.033, 121.507);
function createWindRadii(lat, lon, radii) {
  const center = turf.point([lon, lat]);
  let coords = [];
  function arc(start, end, radius) {
    for (let angle = start; angle <= end; angle += 2) {
      const pt = turf.destination(center, radius, angle, {units: "kilometers"});
      coords.push(pt.geometry.coordinates);
    }
  }
  arc(0, 90, radii.ne);
  arc(90, 180, radii.se);
  arc(180, 270, radii.sw);
  arc(270, 360, radii.nw);
  coords.push(coords[0]);
  return turf.polygon([coords]);
}
function updateMarkerSize() {
  const zoom = map.getZoom();
  // Loop over forecastPoints instead of reading marker icon filenames
  forecastMarkers.forEach((m, idx) => {
    const p = forecastPoints[idx];
    const type = getTypeFromWind(p.wind);
    const size = zoom >= 7 ? 30 : zoom >= 5 ? 24 : 20;
    m.setIcon(getIcon(type, size));
  });
}

// 澳門800/400/200/100km虛線圈
[100,200,400,800].forEach(r=>{
  L.circle(macau,{
    radius:r*1000,
    color:"#fff",
    weight:1,
    dashArray:"4,6",
    fill:false,
    opacity:0.5
  }).addTo(map);
});

// 繪製過去路徑線
L.polyline(pastPoints.map(p=>[p.lat,p.lon]),{
  color:"#fff",
  weight:2
}).addTo(map);

// 繪製預報誤差圓錐
const cones = makeSplitCone(forecastPoints, hours, radii);
if (cones.first) {
  L.geoJSON(cones.first, {
    pane: 'conePane',
    style: {
      fillColor: "#ffffff",
      fillOpacity: 0.3,
      color: "#d6b85c",
      weight: 1,
      stroke: false
    }
  }).addTo(map);
}
if (cones.second) {
  L.geoJSON(cones.second, {
    pane: 'conePane',
    style: {
      fillColor: "#ffffff",
      fillOpacity: 0.15,
      color: "#d6b85c",
      weight: 1,
      stroke: false
    }
  }).addTo(map);
}

// 預報平滑虛線路徑
const trackLine = L.curve(catmullRom2bezier(forecastPoints),{
  color:"#fff",
  weight:2,
  dashArray:"6,6"
}).addTo(map);

// 預報標記點
let forecastMarkers = [];
let pastMarkers = [];
forecastPoints.forEach(p => {
  // Step 1: Calculate storm category FROM WIND SPEED (correct order)
  const type = getTypeFromWind(p.wind);
  // Step 2: Load matching icon based on real wind-derived type
  let marker = L.marker([p.lat, p.lon], {
    icon: getIcon(type, isMobile ? 24 : 22)
  }).addTo(map);

  marker.bindPopup(`
    <b>預報位置</b><br>
    時間: ${p.time}<br>
    位置: ${p.lat.toFixed(1)}°N, ${p.lon.toFixed(1)}°E<br>
    強度: ${getTypeName(type)} (${type})<br>
    中心風力: ${p.wind} km/h<br>
  `);

  marker.bindTooltip(p.time, {
    permanent: true,
    direction: "right",
    offset: [8, 0],
    className: "time-label"
  });

  if (!isMobile) {
    marker.on('mouseover', function () {
      // Recalc type from point wind, not icon file
      const t = getTypeFromWind(p.wind);
      this.setIcon(getIcon(t, 32));
      this.openPopup();
    });
    marker.on('mouseout', function () {
      const t = getTypeFromWind(p.wind);
      this.setIcon(getIcon(t, 22));
    });
  } else {
    marker.on('click', function () {
      const t = getTypeFromWind(p.wind);
      this.setIcon(getIcon(t, 30));
      this.openPopup();
    });
    marker.on('popupclose', function () {
      const t = getTypeFromWind(p.wind);
      this.setIcon(getIcon(t, 24));
    });
  }

  forecastMarkers.push(marker);
});

// 過去實心圓標記
pastPoints.forEach(p => {
  const type = getTypeFromWind(p.wind);
  const mob = window.innerWidth <= 768;
  const marker = L.circleMarker([p.lat,p.lon],{
    radius: mob ? 3.5 : 3,
    color:getColor(type),
    weight:2,
    fillColor:getColor(type),
    fillOpacity:1
  }).addTo(map);
  marker.bindPopup(`
    <b>過去位置</b><br>
    時間: ${p.time}<br>
    位置: ${p.lat.toFixed(1)}°N, ${p.lon.toFixed(1)}°E<br>
    強度: ${getTypeName(type)} (${type})<br>
    中心風力: ${p.wind} km/h
  `);
  marker.on("mouseover", function(){this.setStyle({radius:5.5}); this.openPopup();});
  marker.on("mouseout", function(){this.setStyle({radius:mob?3.5:3}); this.closePopup();});
  pastMarkers.push(marker);
});

// 強風圈、暴風圈多邊形
if (p0.wind41) {
  const poly41 = createWindRadii(p0.lat, p0.lon, p0.wind41);
  L.geoJSON(poly41,{
    pane: 'wind41Pane',
    style:{
      color:"#FFD700",
      weight:1.5,
      fillColor:"#FFD700",
      fillOpacity:0.18
    }
  }).addTo(map);
}
if (p0.wind88) {
  const poly88 = createWindRadii(p0.lat, p0.lon, p0.wind88);
  L.geoJSON(poly88,{
    pane: 'wind88Pane',
    style:{
      color:"#FF0000",
      weight:1.5,
      fillColor:"#FF0000",
      fillOpacity:0.20
    }
  }).addTo(map);
}

// 左側TC資訊面板渲染
if (window.tcInfo && forecastPoints.length > 0) {
  const p1 = forecastPoints[1] || p0;
  const dist = getDistance(macau[0], macau[1], p0.lat, p0.lon).toFixed(0);
  const dir = getDirection(macau[0], macau[1], p0.lat, p0.lon);
  const moveDir = getDirection(p0.lat, p0.lon, p1.lat, p1.lon);
  const speed = getSpeed(p0, p1).toFixed(0);
  const type = getTypeFromWind(p0.wind);
  document.getElementById("tcInfoBox").innerHTML = `
    <div class="tc-title">${getTypeName(type)} ${tcInfo.name}</div>
    <div class="tc-row">中心風力: ${tcInfo.wind} km/h</div>
    <div class="tc-row">氣壓: ${tcInfo.pressure} hPa</div>
    <div class="tc-row">位置 : ${p0.lat}°N, ${p0.lon}°E</div>
    <div class="tc-row">距離澳門: ${dir} ${dist} km </div>
    <div class="tc-row">移動方向: ${moveDir}, ${speed} km/h</div>
  `;
}

// 地圖縮放更新標記大小
map.on('zoomend', updateMarkerSize);
updateMarkerSize();

// 點擊導航連結自動關閉移動菜單
document.querySelectorAll("#navMenu a").forEach(link => {
  link.addEventListener("click", () => {
    document.getElementById("navMenu").classList.remove("active");
  });
});

// 圖層層級排序
trackLine.bringToFront();
forecastMarkers.forEach(m=>m.bringToFront());
pastMarkers.forEach(m=>m.bringToFront());

// 自動縮放視窗包住全部路徑
map.fitBounds([
  macau,
  ...forecastPoints.map(p=>[p.lat,p.lon]),
  ...pastPoints.map(p=>[p.lat,p.lon])
]);
</script>

</body>
</html>
