<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="icons/MSSO.png">
<title>澳門民間氣象台-首頁</title>
<style>
/* ========== 1. 全域基礎樣式 ========== */
html {
  scroll-behavior: smooth;
}
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: #f5f8fa;
}

/* ========== 2. 頁頭Header ========== */
.header {
  background: #1f3a4d;
  color: white;
  padding: 25px 20px;
  display: flex;
  align-items: center;
}
.title {
  font-size: 20px;
  font-weight: bold;
  margin-left: 10px;
}
.logo {
  height: 40px;
}

/* ========== 3. 頂部導航菜單 ========== */
.menu-container {
  position: relative;
  z-index: 3000;
  margin-left: auto;
}
.menu-toggle {
  display: none;
  font-size: 26px;
  padding: 10px 15px;
  cursor: pointer;
  background: #2d6c94;
  color: white;
}
.nav {
  background: #2d6c94;
  display: flex;
}
.nav a {
  color: white;
  padding: 25px 20px;
  font-size: 18px;
  text-decoration: none;
  display: block;
}
.nav a:hover {
  background: #1f4f6d;
}

/* ========== 4. 首頁快捷鏈接模塊 ========== */
.quick-links {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
  margin: 15px 35px;
}
.link-box {
  display: block;
  padding: 25px;
  border-radius: 15px;
  text-align: center;
  font-size: 15px;
  font-weight: bold;
  text-decoration: none;
  color: white;
  box-shadow: 0 5px 12px rgba(0,0,0,0.2);
  transition: all 0.3s ease;
}
.link-box.weather {
  background: linear-gradient(135deg, #4fa6a6, #2d6c94);
}
.link-box.flood {
  background: linear-gradient(135deg, #5dade2, #1b4f72);
}
.link-box.map {
  background: linear-gradient(135deg, #74b9ff, #0984e3);
}
.link-box:hover {
  transform: translateY(-3px);
  opacity: 0.9;
}

/* ========== 5. 紅色警告卡片(熱帶氣旋/天氣警告) ========== */
.warning-card {
  margin: 15px 35px;
  border-radius: 15px;
  background: #fdeeee;
  border: 2px solid #d9534f;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  overflow: hidden;
}
.warning-header {
  background: #d9534f;
  color: white;
  padding: 15px;
  font-size: 18px;
  font-weight: bold;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.warning-item {
  display: flex;
  gap: 15px;
  padding: 20px;
  align-items: flex-start;
}
.icon-box {
  width: 80px;
  height: 80px;
  background: #fff;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.icon-box img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}
.text-box {
  flex: 1;
  font-size: 15px;
  line-height: 1.6;
  color: #333;
  text-align: left;
}
.divider {
  height: 1px;
  background: #e6a5a5;
  margin: 0 20px;
}
.tc-btn {
  background: rgba(255,255,255,0.2);
  color: white;
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 14px;
  text-decoration: none;
  font-weight: bold;
}
.tc-btn:hover {
  background: #f5d7d6;
}

/* ========== 6. 橙色提示框(特別天氣提示、預警提示) ========== */
.box {
  margin: 15px 35px;
  border-radius: 15px;
  background: #fdfbee;
  border: 2px solid #f39c12;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  overflow: hidden;
}
.header-orange {
  background: #f39c12;
  color: white;
  padding: 15px;
  font-size: 18px;
  font-weight: bold;
}
.content-yellow {
  background: #fff4cc;
  padding: 25px;
  font-size: 15px;
  line-height:1.6;
  color:#333;
}

/* ========== 7. 天氣預報TAB切換模塊 ========== */
.forecast-tab-wrap {
  border-radius:12px;
  overflow:hidden;
  border:2px solid #4fa6a6;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  background:#e6f7f7;
  /* 手機預設有 margin，桌面由 grid 控制 */
  margin: 15px 35px;
}
.tab-header{
  display:flex;
  gap:10px;
  padding:15px;
}
.tab-btn{
  flex:1;
  border: 2px solid #4fa6a6;
  border-radius: 25px;
  background: #ffffff;
  color: #4fa6a6;
  padding:10px;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  transition: all 0.3s;
}
.tab-btn.active{
  background:#4fa6a6;
  color:#ffffff;
}
.tab-btn:hover{
  opacity:0.8;
}
.tab-content-box{
  background:#e6f7f7;
  padding:30px;
}
.tab-content{
  display:none;
  font-size:15px;
  line-height:1.6;
  color:#333;
}
.tab-content.active{
  display:block;
}
.forecast-time {
  margin: 0 35px;
  text-align: right;
  font-size: 16px;
  color: #555;
  font-weight: bold;
}

/* ========== 8. plot 圖 ========== */
.chart-wrap{
  border-radius:12px;
  overflow:hidden;
  border:2px solid #4fa6a6;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  background:#e6f7f7;
  /* 手機預設有 margin，桌面由 grid 控制 */
  margin: 15px 35px;
}
.chart-btn-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  padding:15px;
}
.btn-group{
  display:flex;
  gap:10px;
}
.chart-date-text{
  font-size:16px;
  font-weight:bold;
  color:#4fa6a6;
}
.chart-container {
  padding:30px;
  height:320px;
  box-sizing: border-box;
}
.chart-btn {
  padding: 10px 20px;
  border: 2px solid #4fa6a6;
  border-radius: 25px;
  background: white;
  color: #4fa6a6;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.3s;
}
.chart-btn.active {background: #4fa6a6;color: white;}
.chart-btn:hover {opacity: 0.8;}

/* ========== 9. 三標籤天氣模塊（整點/實時/熱帶氣旋路徑） ========== */
.three-tab-weather-wrap {
  margin: 15px 35px;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
.three-tab-header {
  display: flex;
  background-color: #43c082;
}
.three-tab-item {
  flex: 1;
  padding: 16px 10px;
  text-align: center;
  color: #fff;
  font-size: 17px;
  font-weight: bold;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: background 0.25s;
}
.three-tab-item.active {
  background-color: #36a36e;
}
.three-tab-item:hover {
  background-color: #36a36e;
}
.tab-icon-small {
  width: 26px;
  height: 26px;
}
.three-tab-content-box {
  background-color: #fff;
  padding: 20px;
  border: 2px solid #86e0b0;
  border-top: none;
}
.region-select {
  padding: 8px 16px;
  border: 2px solid #43c082;
  border-radius: 8px;
  font-size: 16px;
  color: #43c082;
  background: #fff;
  margin-bottom: 18px;
}
.tab-panel {
  display: none;
}
.tab-panel.active {
  display: block;
}
.hourly-weather-table {
  width: 100%;
  border-collapse: collapse;
  text-align: center;
}
.hourly-weather-table th,
.hourly-weather-table td {
  border: 1px solid #ccecdb;
  padding: 10px;
}
.hourly-weather-table th {
  background-color: #e6f9f0;
}

/* 手機端適配 */
@media (max-width:768px) {
  .three-tab-item {
    font-size: 14px;
    padding: 12px 5px;
  }
  .tab-icon-small {
    width: 20px;
    height: 20px;
  }
}

/* ========== 桌面端佈局 (螢幕 ≥769px) ========== */
@media (min-width: 769px) {
  /* 桌面才用 grid，左右並排 */
  .forecast-chart-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin: 15px 35px;
  }
  /* grid 子元素不要自己的 margin，由父 grid 控制 */
  .forecast-tab-wrap,
  .chart-wrap {
    margin: 0;
  }
}

/* ========== 手機端響應式樣式 (螢幕 ≤768px) ========== */
@media (max-width: 768px) {
  .menu-toggle {
    display: block;
  }
  .nav {
    display: none;
    flex-direction: column;
    width: 100%;
    transition: all 0.3s ease;
  }
  .nav a {
    width: 100%;
    padding: 12px 15px;
    border-top: 1px solid rgba(255,255,255,0.2);
  }
  .nav.active {
    display:flex;
  }

  /* 手機取消 grid，变回普通流，让子元素自己的 margin 生效 */
  .forecast-chart-row {
    display: block;
    margin: 0;
  }
}
</style>
</head>

<script>
// Menu toggle function
function toggleMenu() {
const nav = document.getElementById("navMenu");
const btn = document.querySelector(".menu-toggle");
nav.classList.toggle("active");
btn.innerHTML = nav.classList.contains("active") ? "✕" : "☰";
}

// Fill all text content from webdata.js
window.addEventListener('DOMContentLoaded', function(){
    // Alertips box
    const alertBox = document.getElementById('alertBox');
    const alertContent = document.getElementById('alertContent');
    if(alertipsText.trim()){
        alertBox.style.display = 'block';
        alertContent.innerText = alertipsText;
    }else alertBox.style.display = 'none';

    // SWT box
    const swtBox = document.getElementById('swtBox');
    const swtContent = document.getElementById('swtContent');
    if(swtText.trim()){
        swtBox.style.display = 'block';
        swtContent.innerText = swtText;
    }else swtBox.style.display = 'none';

    // Forecast split
    const parts = forecastRaw.split(/\n\n/);
    let overviewText = parts[0] ?? "";
    let todayText = parts[1] ?? "";
    let tomorrowText = parts[2] ?? "";
    let updateTimeStr = parts[3] ?? "";

    document.getElementById("forecastTime").innerText = updateTimeStr;
    document.getElementById("tab0").innerHTML = overviewText.replaceAll("\n","<br>");
    document.getElementById("tab1").innerHTML = todayText.replaceAll("\n","<br>");
    document.getElementById("tab2").innerHTML = tomorrowText.replaceAll("\n","<br>");

    // Tab切換點擊
    const tabBtns = document.querySelectorAll('.tab-btn');
    const tabItems = document.querySelectorAll('.tab-content');
    tabBtns.forEach(btn=>{
      btn.onclick = function(){
        tabBtns.forEach(b=>b.classList.remove('active'));
        tabItems.forEach(c=>c.classList.remove('active'));
        this.classList.add('active');
        let idx = this.dataset.index;
        document.getElementById('tab'+idx).classList.add('active');
      }
    });
});

// Render TC & Warning Cards
function renderWarnings(data, containerId, cardId) {
const container = document.getElementById(containerId);
const card = document.getElementById(cardId);
let html = "";
data.forEach((item, index) => {
if ((!item.icon || item.icon.trim()==="") && (!item.text || item.text.trim()==="")) return;
html += `
         <div class="warning-item">
           ${item.icon ? `<div class="icon-box"><img src="${item.icon}" alt="Warning Icon"></div>` : ""}
           ${item.text ? `<div class="text-box">${item.text}</div>` : ""}
         </div>
       `;
if (index < data.length - 1) html += `<div class="divider"></div>`;
});
container.innerHTML = html;
card.style.display = html.trim() ? "block" : "none";
}

renderWarnings(tcWarnings, "tcContent", "tcCard");
renderWarnings(warnWarnings, "warnContent", "warnCard");
</script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
let tempChart;
const dateDom = document.getElementById("chartDate");

function initChart(){
  dateDom.innerText = chartRightDate;
  const ctx = document.getElementById('tempChart').getContext('2d');
  render24hChart(ctx);

  document.querySelectorAll('.chart-btn').forEach(btn=>{
    btn.onclick = function(){
      document.querySelectorAll('.chart-btn').forEach(b=>b.classList.remove('active'));
      this.classList.add('active');
      if(tempChart) tempChart.destroy();
      const type = this.dataset.type;
      type === '24h' ? render24hChart(ctx) : render7dChart(ctx);
    }
  })
}

// 24h use X label from webdata.label24hX
function render24hChart(ctx){
  tempChart = new Chart(ctx,{
    type:"line",
    data:{
      labels: label24hX,
      datasets:[{
        label:"氣溫(°C)",
        data:temp24h,
        borderColor:"#ff6b6b",
        backgroundColor:"rgba(255,107,107,0.2)",
        fill:true,
        tension:0,
        pointRadius:4
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{title:{display:true,text:"24小時逐時氣溫預報"}},
      scales:{
        x:{display:true,title:{display:true,text:"時間"},ticks:{maxTicksLimit:12}},
        y:{display:true,title:{display:true,text:"溫度℃"}}
      }
    }
  })
}
// ========== 三標籤切換邏輯 ==========
const tabItems = document.querySelectorAll('.three-tab-item');
const tabPanels = document.querySelectorAll('.tab-panel');
tabItems.forEach(item => {
  item.addEventListener('click', () => {
    // 清除所有激活狀態
    tabItems.forEach(btn => btn.classList.remove('active'));
    tabPanels.forEach(panel => panel.classList.remove('active'));
    // 激活當前標籤+面板
    item.classList.add('active');
    const targetTab = item.dataset.tab;
    document.getElementById(`panel-${targetTab}`).classList.add('active');
  })
})

// ========== 抓取 SMG 澳門實時簡報XML：https://xml.smg.gov.mo/c_actual_brief.xml ==========
async function fetchHourlyWeatherData() {
  try {
    const res = await fetch('https://xml.smg.gov.mo/c_actual_brief.xml');
    const xmlText = await res.text();
    // 解析XML文檔
    const parser = new DOMParser();
    const xmlDoc = parser.parseFromString(xmlText, 'text/xml');
    const obsList = xmlDoc.querySelectorAll('actual_brief > data');
    const tbody = document.querySelector('#hourlyWeatherTable tbody');
    tbody.innerHTML = '';

    obsList.forEach(obs => {
      const time = obs.querySelector('time')?.textContent || '--';
      const temp = obs.querySelector('temperature')?.textContent || '--';
      const humidity = obs.querySelector('humidity')?.textContent || '--';
      const wind = obs.querySelector('wind')?.textContent || '--';
      const pressure = obs.querySelector('pressure')?.textContent || '--';

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${time}</td>
        <td>${temp}</td>
        <td>${humidity}</td>
        <td>${wind}</td>
        <td>${pressure}</td>
      `;
      tbody.appendChild(tr);
    })
  } catch (err) {
    console.error('XML數據加載失敗：', err);
    document.querySelector('#hourlyWeatherTable tbody').innerHTML = `
      <tr><td colspan="5">暫無法獲取澳門整點天氣數據，請稍後重試</td></tr>
    `;
  }
}

// 頁面載入後自動請求XML數據
window.addEventListener('DOMContentLoaded', fetchHourlyWeatherData);
//7day use X label from webdata.label7dX
function render7dChart(ctx){
  const maxArr = temp7dMax;
  const minArr = temp7dMin;
  tempChart = new Chart(ctx,{
    type:"line",
    data:{
      labels: label7dX,
      datasets:[
        {label:"最高氣溫",data:maxArr,borderColor:"#ff5555",fill:false,tension:0},
        {label:"最低氣溫",data:minArr,borderColor:"#38b8b0",fill:false,tension:0}
      ]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{title:{display:true,text:"七日高低溫預報"}},
      scales:{
        x:{display:true,title:{display:true,text:"日期"}},

  })
}

window.addEventListener('DOMContentLoaded',initChart);
</script>
