<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="icons/MSSO.png">
  
  <title>澳門民間氣象台-首頁</title>

  <style>
    body { margin: 0; font-family: Arial, sans-serif; }

    .header { background: #1f3a4d; color: white; padding: 25px 20px; display:flex; align-items:center; }
    .title { font-size: 20px; font-weight: bold; margin-left:10px; }
    .logo { height:40px; }

    /* ========== 新增：實時天氣欄 ========== */
    .live-weather-bar {
      background: linear-gradient(135deg, #4fa6a6, #2d6c94);
      color: #fff;
      padding: 14px 20px;
      margin: 0;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 15px;
    }
    .live-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .live-label {
      opacity: 0.9;
    }
    .live-value {
      font-weight: bold;
      font-size: 16px;
    }
    /* ====================================== */

    .quick-links {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin: 20px;
    }
    
    .link-box {
      display: block;
      padding: 25px;
      border-radius: 15px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      text-decoration: none;
      color: white;
      box-shadow: 0 5px 12px rgba(0,0,0,0.2);
      transition: all 0.3s ease;
    }
    
    /* Weather box */
    .link-box.weather {
      background: linear-gradient(135deg, #4fa6a6, #2d6c94);
    }
    
    /* Flood box */
    .link-box.flood {
      background: linear-gradient(135deg, #5dade2, #1b4f72);
    }
    
    .link-box:hover {
      transform: translateY(-3px);
      opacity: 0.9;
    }

/* CARD */
    .warning-card {
      margin: 20px;
      border-radius: 15px;
      background: #fdeeee;
      border: 2px solid #d9534f;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      overflow: hidden;
    }
    
    /* HEADER */
    .warning-header {
      background: #d9534f;
      color: white;
      padding: 15px;
      font-size: 18px;
      font-weight: bold;
    }
    
    /* ITEM */
    .warning-item {
      display: flex;
      gap: 15px;
      padding: 20px;
    }
    
    /* ICON */
    .icon-box {
      width: 80px;
      height: 80px;
      background: #fff;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .icon-box img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    
    /* TEXT */
    .text-box {
      flex: 1;
      font-size: 15px;
      line-height: 1.6;
      color: #333;
    }
    
    /* DIVIDER */
    .divider {
      height: 1px;
      background: #e6a5a5;
      margin: 0 20px;
    }
    
    /* BUTTON */
    .btn {
      display: inline-block;
      margin-top: 10px;
      background: #d9534f;
      color: white;
      padding: 8px 15px;
      border-radius: 20px;
      text-decoration: none;
      font-size: 14px;
    }
    
    .btn:hover {
      background: #c63d3a;
    }
    .tc-btn {
      background: rgba(255,255,255,0.2);
      color: white;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 14px;
      text-decoration: none;
      font-weight: bold;
    }

    .tc-btn:hover {
      background: #f5d7d6;
    }
    
    .menu-container {
      position: relative;
      z-index: 3000;
      margin-left: auto;
    }
    .forecast-time {font-weight: bold; }

    .nav { background: #2d6c94; display: flex; }
    .nav a {
      color: white;
      padding: 25px 20px;
      font-size: 18px;
      text-decoration: none;
      display: block;
    }
    .nav a:hover { background: #1f4f6d; }
 
    .box {
      display: none;
      margin: 20px;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .header-orange { background: #f39c12; color: white; padding: 15px; font-size: 16px; font-weight: bold; }
    .header-red { background: #e1665c; color: white; padding: 15px; font-size: 16px; font-weight: bold; }

    .content-yellow { background: #fff4cc; padding: 25px;font-size: 14px; }
    .content-red { background: #f5d7d6; padding: 25px; font-size: 14px;}

    .forecast-container { margin: 20px; gap: 10px; }
    .forecast-box { margin: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); background: #d9e6e6; border-radius: 10px; overflow: hidden; }
    .forecast-title { background: #4fa6a6; color: white; padding: 15px; font-size: 16px; font-weight: bold;}
    .forecast-content { padding: 25px; font-size: 14px;}

    .forecast-time {
      margin: 0 20px;
      text-align: right;
      font-size: 16px;
      color: #555;
    }
    .menu-toggle {
      display: none;
      font-size: 26px;
      padding: 10px 15px;
      cursor: pointer;
      background: #2d6c94;
      color: white;
    }
    @media (max-width: 768px) {
      .menu-toggle {
        display: block;
      }
      .nav {
        display: none;
        flex-direction: column;
        width: 100%;
        background: #2d6c94;
      }
      .nav {
        transition: all 0.3s ease;
      }
      .nav a {
        width: 100%;
        padding: 12px 15px;
        border-top: 1px solid rgba(255,255,255,0.2);
      }
      .nav.active {
        display:flex;
      }
    }
  </style>
</head>

<body>

<div class="header">
  <img src="icons/MSSO.png" class="logo">
  <div class="title">澳門民間氣象台 MSSO</div>
</div>
  
<div class="menu-container">
  <div class="menu-toggle" onclick="toggleMenu()">☰</div>
  <div class="nav" id="navMenu">
    <a href="https://macaosso.github.io/MSSOweb/index.html">首頁</a>
    <a href="https://macaosso.github.io/Apparent_Temperature/">酷熱指數</a>
    <a href="https://macaosso.github.io/MSSOweb/cal_dis.html">熱帶氣旋距離計算工具</a> 
    <a href="https://macaosso.github.io/MSSOweb/tc_gis.html">熱帶氣旋路徑地圖</a>  
    <a href="https://macaosso.github.io/MSSOweb/tc.html">熱帶氣旋資訊</a>
    <a href="https://macaosso.github.io/MSSOweb/about.html">關於我們</a>
    <a href="https://macaosso.github.io/MSSOweb/ver.html">版本記錄</a>
  </div>
</div>

<!-- ========== 實時天氣橫幅 (自動更新) ========== -->
<div class="live-weather-bar" id="liveWeatherBar">
  <div class="live-item">
    <span class="live-label">實時天氣：</span>
    <span class="live-value" id="wxText">載入中...</span>
  </div>
  <div class="live-item">
    <span class="live-label">氣溫：</span>
    <span class="live-value" id="tempText">--°C</span>
  </div>
  <div class="live-item">
    <span class="live-label">相對濕度：</span>
    <span class="live-value" id="humText">--%</span>
  </div>
  <div class="live-item">
    <span class="live-label">更新時間：</span>
    <span class="live-value" id="updateTime">--</span>
  </div>
</div>
<!-- ========================================== -->

<div class="quick-links">
  <a href="https://macaosso.github.io/MSSOweb/weather.html" class="link-box weather">
    🌤️ 澳門各區天氣實況
  </a>
  <a href="https://macaosso.github.io/MSSOweb/flood.html" class="link-box flood">
    🌊 澳門即時水位監測
  </a>
</div>

<div class="warning-card" id="tcCard">
  <div class="warning-header">
    熱帶氣旋
    <a href="https://macaosso.github.io/MSSOweb/tc_gis.html" class="tc-btn">查看路徑</a>
  </div>
  <div id="tcContent"></div>
</div>

<div class="warning-card" id="warnCard">
  <div class="warning-header">天氣警告</div>
  <div id="warnContent"></div>
</div>
  
<div id="alertBox" class="box">
  <div class="header-orange">預警提示</div>
  <div id="alertContent" class="content-yellow"></div>
</div>

<div id="swtBox" class="box">
  <div class="header-orange">特別天氣提示</div>
  <div id="swtContent" class="content-yellow"></div>
</div>

<div class="forecast-container-vertical">
  <div class="forecast-box">
    <div class="forecast-title">天氣概況</div>
    <div id="futureText" class="forecast-content"></div>
  </div>
  <div class="forecast-box">
    <div class="forecast-title">今日天氣</div>
    <div id="todayText" class="forecast-content"></div>
  </div>
  <div class="forecast-box">
    <div class="forecast-title">明日天氣</div>
    <div id="tomorrowText" class="forecast-content"></div>
  </div>
</div>

<div id="forecastTime" class="forecast-time"></div>

<script>
// ✅ MENU TOGGLE
function toggleMenu() {
  const nav = document.getElementById("navMenu");
  const btn = document.querySelector(".menu-toggle");
  nav.classList.toggle("active");
  btn.innerHTML = nav.classList.contains("active") ? "✕" : "☰";
}

// ✅ 載入本地文字檔
function loadBox(file, boxId, contentId) {
  fetch(file)
    .then(res => res.text())
    .then(text => {
      const content = text.trim();
      if (content.length > 0) {
        document.getElementById(boxId).style.display = "block";
        document.getElementById(contentId).innerText = content;
      } else {
        document.getElementById(boxId).style.display = "none";
      }
    })
    .catch(() => console.log("Cannot load " + file));
}

loadBox("alertips.txt", "alertBox", "alertContent");
loadBox("SWT.txt", "swtBox", "swtContent");
loadBox("warn.txt", "warnBox", "warnContent");

// ✅ 天氣預報文字
fetch("weatherforecast.txt")
  .then(res => res.text())
  .then(text => {
    const parts = text.split(/\n\s*\n/);
    document.getElementById("forecastTime").innerText = parts[3] || ""; 
    document.getElementById("futureText").innerHTML = (parts[0] || "").replace(/\n/g, "<br>");
    document.getElementById("todayText").innerHTML = (parts[1] || "").replace(/\n/g, "<br>");
    document.getElementById("tomorrowText").innerHTML = (parts[2] || "").replace(/\n/g, "<br>");
  })
  .catch(() => console.log("Cannot load weatherforecast.txt"));

// ========== 實時天氣 XML 解析 + 自動更新 ==========
function fetchLiveWeather() {
  const url = `https://corsproxy.io/?https://xml.smg.gov.mo/c_actual_brief.xml?_t=${Date.now()}`;
  fetch(url)
    .then(res => res.text())
    .then(xmlStr => {
      const parser = new DOMParser();
      const xmlDoc = parser.parseFromString(xmlStr, "text/xml");

      // 解析節點
      const wxText = xmlDoc.querySelector("WeatherBrief > WeatherText")?.textContent || "---";
      const temp = xmlDoc.querySelector("WeatherBrief > Temperature")?.textContent || "--";
      const hum = xmlDoc.querySelector("WeatherBrief > Humidity")?.textContent || "--";
      const update = xmlDoc.querySelector("WeatherBrief > UpdateTime")?.textContent || "--";

      // 寫入頁面
      document.getElementById("wxText").textContent = wxText;
      document.getElementById("tempText").textContent = `${temp}°C`;
      document.getElementById("humText").textContent = `${hum}%`;
      document.getElementById("updateTime").textContent = update;
    })
    .catch(err => {
      console.error("實時天氣載入失敗", err);
      document.getElementById("wxText").textContent = "載入失敗";
    });
}

// 初始執行 + 每5分鐘自動重新整理
fetchLiveWeather();
setInterval(fetchLiveWeather, 60000);
// =================================================
</script>

<!-- 天氣警告 JS -->
<script src="tc_data.js"></script>
<script src="warn.js"></script>

<script>
// ✅ 渲染警告卡片
function renderWarnings(data, containerId, cardId) {
  const container = document.getElementById(containerId);
  const card = document.getElementById(cardId);
  let html = "";

  data.forEach((item, index) => {
    if ((!item.icon || item.icon.trim()==="") && (!item.text || item.text.trim()==="")) return;

    html += `
      <div class="warning-item">
        ${item.icon ? `<div class="icon-box"><img src="${item.icon}" alt="Warning Icon"></div>` : ""}
        ${item.text ? `<div class="text-box">${item.text}</div>` : ""}
      </div>
    `;
    if (index < data.length - 1) html += `<div class="divider"></div>`;
  });

  container.innerHTML = html;
  card.style.display = html.trim() ? "block" : "none";
}

renderWarnings(tcWarnings, "tcContent", "tcCard");
renderWarnings(warnWarnings, "warnContent", "warnCard");
</script>

</body>
</html>
