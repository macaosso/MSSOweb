<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="icons/MSSO.png">
<title>澳門民間氣象台-首頁</title>
<style>
/* ========== 1. 全域基礎樣式 ========== */
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* ========== 2. 頁頭Header ========== */
.header {
  background: #1f3a4d;
  color: white;
  padding: 25px 20px;
  display: flex;
  align-items: center;
}
.title {
  font-size: 20px;
  font-weight: bold;
  margin-left: 10px;
}
.logo {
  height: 40px;
}

/* ========== 3. 頂部導航菜單 ========== */
.menu-container {
  position: relative;
  z-index: 3000;
  margin-left: auto;
}
.menu-toggle {
  display: none;
  font-size: 26px;
  padding: 10px 15px;
  cursor: pointer;
  background: #2d6c94;
  color: white;
}
.nav {
  background: #2d6c94;
  display: flex;
}
.nav a {
  color: white;
  padding: 25px 20px;
  font-size: 18px;
  text-decoration: none;
  display: block;
}
.nav a:hover {
  background: #1f4f6d;
}

/* ========== 4. 首頁快捷鏈接模塊 ========== */
.quick-links {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
  margin: 20px;
}
.link-box {
  display: block;
  padding: 25px;
  border-radius: 15px;
  text-align: center;
  font-size: 15px;
  font-weight: bold;
  text-decoration: none;
  color: white;
  box-shadow: 0 5px 12px rgba(0,0,0,0.2);
  transition: all 0.3s ease;
}
.link-box.weather {
  background: linear-gradient(135deg, #4fa6a6, #2d6c94);
}
.link-box.flood {
  background: linear-gradient(135deg, #5dade2, #1b4f72);
}
.link-box.map {
  background: linear-gradient(135deg, #74b9ff, #0984e3);
}
.link-box:hover {
  transform: translateY(-3px);
  opacity: 0.9;
}

/* ========== 5. 紅色警告卡片(熱帶氣旋/天氣警告) ========== */
.warning-card {
  margin: 35px;
  border-radius: 15px;
  background: #fdeeee;
  border: 2px solid #d9534f;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  overflow: hidden;
}
.warning-header {
  background: #d9534f;
  color: white;
  padding: 15px;
  font-size: 18px;
  font-weight: bold;
}
.warning-item {
  display: flex;
  gap: 15px;
  padding: 20px;
}
.icon-box {
  width: 80px;
  height: 80px;
  background: #fff;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.icon-box img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}
.text-box {
  flex: 1;
  font-size: 15px;
  line-height: 1.6;
  color: #333;
}
.divider {
  height: 1px;
  background: #e6a5a5;
  margin: 0 20px;
}
.tc-btn {
  background: rgba(255,255,255,0.2);
  color: white;
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 14px;
  text-decoration: none;
  font-weight: bold;
}
.tc-btn:hover {
  background: #f5d7d6;
}

/* ========== 6. 橙色提示框(特別天氣提示、預警提示) ========== */
.box {
  margin: 35px;
  border-radius: 15px;
  background: #fdfbee;
  border: 2px solid #f39c12;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  overflow: hidden;
}
.header-orange {
  background: #f39c12;
  color: white;
  padding: 15px;
  font-size: 18px;
  font-weight: bold;
}
.content-yellow {
  background: #fff4cc;
  padding: 25px;
  font-size: 15px;
  line-height:1.6;
  color:#333;
}

/* ========== 7. 天氣預報TAB切換模塊 ========== */
.forecast-tab-wrap {
  margin:35px;
  border-radius:12px;
  overflow:hidden;
  border:2px solid #4fa6a6;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
.tab-header{
  display:flex;
}
.tab-btn{
  flex:1;
  border:none;
  padding:15px;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  background:#4fa6a6;
  color:#ffffff;
  border-radius:12px 12px 0 0;
  margin:0 3px;
  position:relative;
  top:2px;
}
.tab-btn.active{
  background:#e6f7f7;
  color:#4fa6a6;
  top:0;
}
.tab-content-box{
  background:#e6f7f7;
  padding:30px;
}
.tab-content{
  display:none;
  font-size:15px;
  line-height:1.6;
  color:#333;
}
.tab-content.active{
  display:block;
}
.forecast-time {
  margin: 0 35px;
  text-align: right;
  font-size: 16px;
  color: #555;
  font-weight: bold;
}

/* ========== 8. 手機端響應式樣式 ========== */
@media (max-width: 768px) {
  .menu-toggle {
    display: block;
  }
  .nav {
    display: none;
    flex-direction: column;
    width: 100%;
    transition: all 0.3s ease;
  }
  .nav a {
    width: 100%;
    padding: 12px 15px;
    border-top: 1px solid rgba(255,255,255,0.2);
  }
  .nav.active {
    display:flex;
  }
}
</style>
</head>

<body>
<div class="header">
<img src="icons/MSSO.png" class="logo">
<div class="title">澳門民間氣象台 MSSO</div>
</div>

<div class="menu-container">
<div class="menu-toggle" onclick="toggleMenu()">☰</div>
<div class="nav" id="navMenu">
<a href="https://macaosso.github.io/MSSOweb/index.html">首頁</a>
<a href="https://macaosso.github.io/Apparent_Temperature/">酷熱指數</a>
<a href="https://macaosso.github.io/MSSOweb/cal_dis.html">熱帶氣旋距離計算工具</a> 
<a href="https://macaosso.github.io/MSSOweb/tc_gis.html">熱帶氣旋路徑地圖</a>  
<a href="https://macaosso.github.io/MSSOweb/tc.html">熱帶氣旋資訊</a>
<a href="https://macaosso.github.io/MSSOweb/about.html">關於我們</a>
<a href="https://macaosso.github.io/MSSOweb/ver.html">版本記錄</a>
</div>
</div>

<div class="quick-links">
  <a href="https://macaosso.github.io/MSSOweb/AQImap.html" class="link-box weather">空氣質量實況</a>
  <a href="https://macaosso.github.io/MSSOweb/TCtracker.html" class="link-box flood">熱帶氣旋追蹤</a>
  <a href="map.html" class="link-box weather">綜合氣象實況</a>
</div>

<div class="warning-card" id="tcCard">
<div class="warning-header">
熱帶氣旋
<a href="https://macaosso.github.io/MSSOweb/tc_gis.html" class="tc-btn">查看路徑</a>
</div>
<div id="tcContent"></div>
</div>

<div class="warning-card" id="warnCard">
<div class="warning-header">天氣警告</div>
<div id="warnContent"></div>
</div>

<div id="swtBox" class="box">
<div class="header-orange">特別天氣提示</div>
<div id="swtContent" class="content-yellow"></div>
</div>

<div id="alertBox" class="box">
<div class="header-orange">預警提示</div>
<div id="alertContent" class="content-yellow"></div>
</div>

<div class="forecast-tab-wrap">
  <div class="tab-header">
    <button class="tab-btn active" data-index="0">天氣概況</button>
    <button class="tab-btn" data-index="1">今日天氣</button>
    <button class="tab-btn" data-index="2">明日天氣</button>
  </div>
  <div class="tab-content-box">
    <div class="tab-content active" id="tab0"></div>
    <div class="tab-content" id="tab1"></div>
    <div class="tab-content" id="tab2"></div>
  </div>
</div>

<div id="forecastTime" class="forecast-time"></div>

<script src="webdata.js"></script>
<script>
// Menu toggle function
function toggleMenu() {
const nav = document.getElementById("navMenu");
const btn = document.querySelector(".menu-toggle");
nav.classList.toggle("active");
btn.innerHTML = nav.classList.contains("active") ? "✕" : "☰";
}

// Fill all text content from webdata.js
window.addEventListener('DOMContentLoaded', function(){
    // Alertips box
    const alertBox = document.getElementById('alertBox');
    const alertContent = document.getElementById('alertContent');
    if(alertipsText.trim()){
        alertBox.style.display = 'block';
        alertContent.innerText = alertipsText;
    }else alertBox.style.display = 'none';

    // SWT box
    const swtBox = document.getElementById('swtBox');
    const swtContent = document.getElementById('swtContent');
    if(swtText.trim()){
        swtBox.style.display = 'block';
        swtContent.innerText = swtText;
    }else swtBox.style.display = 'none';

    // Forecast split
    const parts = forecastRaw.split(/\n\n/);
    let overviewText = parts[0] ?? "";
    let todayText = parts[1] ?? "";
    let tomorrowText = parts[2] ?? "";
    let updateTimeStr = parts[3] ?? "";

    document.getElementById("forecastTime").innerText = updateTimeStr;
    document.getElementById("tab0").innerHTML = overviewText.replaceAll("\n","<br>");
    document.getElementById("tab1").innerHTML = todayText.replaceAll("\n","<br>");
    document.getElementById("tab2").innerHTML = tomorrowText.replaceAll("\n","<br>");

    // Tab切換點擊
    const tabBtns = document.querySelectorAll('.tab-btn');
    const tabItems = document.querySelectorAll('.tab-content');
    tabBtns.forEach(btn=>{
      btn.onclick = function(){
        tabBtns.forEach(b=>b.classList.remove('active'));
        tabItems.forEach(c=>c.classList.remove('active'));
        this.classList.add('active');
        let idx = this.dataset.index;
        document.getElementById('tab'+idx).classList.add('active');
      }
    });
});

// Render TC & Warning Cards
function renderWarnings(data, containerId, cardId) {
const container = document.getElementById(containerId);
const card = document.getElementById(cardId);
let html = "";
data.forEach((item, index) => {
if ((!item.icon || item.icon.trim()==="") && (!item.text || item.text.trim()==="")) return;
html += `
         <div class="warning-item">
           ${item.icon ? `<div class="icon-box"><img src="${item.icon}" alt="Warning Icon"></div>` : ""}
           ${item.text ? `<div class="text-box">${item.text}</div>` : ""}
         </div>
       `;
if (index < data.length - 1) html += `<div class="divider"></div>`;
});
container.innerHTML = html;
card.style.display = html.trim() ? "block" : "none";
}

renderWarnings(tcWarnings, "tcContent", "tcCard");
renderWarnings(warnWarnings, "warnContent", "warnCard");
</script>
</body>
</html>
