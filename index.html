<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>澳門民間氣象台 MSSO</title>

  <style>
    body { margin: 0; font-family: Arial, sans-serif; }

    .header { background: #1f3a4d; color: white; padding: 15px 20px; display:flex; align-items:center; }
    .title { font-size: 24px; font-weight: bold; margin-left:10px; }
    .logo { height:40px; }

    .nav { background: #2d6c94; display: flex; }
    .nav a {
      color: white;
      padding: 15px 20px;
      text-decoration: none;
      display: block;
    }
    .nav a:hover { background: #1f4f6d; }

    /* Boxes */
    .box {
      display: none;
      margin: 20px;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .header-orange {
      background: #f39c12;
      color: white;
      padding: 15px;
      font-size: 20px;
      font-weight: bold;
    }

    .header-red {
      background: #e1665c;
      color: white;
      padding: 15px;
      font-size: 20px;
      font-weight: bold;
    }

    .content-yellow {
      background: #fff4cc;
      padding: 20px;
      color: #333;
    }

    .content-red {
      background: #f5d7d6;
      padding: 20px;
      color: #333;
    }
  </style>
</head>

<body>

<div class="header">
  <img src="icons/MSSO.png" class="logo">
  <div class="title">澳門民間氣象台 MSSO</div>
</div>

<div class="nav">
  <a href="#home">首頁</a>
  <a href="https://macaosso.github.io/MSSOweb/weather.html">天氣資訊</a>
  <a href="https://macaosso.github.io/MSSOweb/tc.html">熱帶氣旋資訊</a>
  <a href="https://macaosso.github.io/MSSOweb/about.html">關於我們</a>
</div>

<!-- 🟠 SWT.txt -->
<div id="swtBox" class="box">
  <div class="header-orange">特別天氣提示</div>
  <div id="swtContent" class="content-yellow"></div>
</div>

<!-- 🔴 warn.txt -->
<div id="warnBox" class="box">
  <div class="header-red">天氣警告</div>
  <div id="warnContent" class="content-red"></div>
</div>

<!-- 🔴 tc.txt -->
<div id="tcBox" class="box">
  <div class="header-red">熱帶氣旋提示</div>
  <div id="tcContent" class="content-red"></div>
</div>

<script>

function loadBox(file, boxId, contentId) {
  fetch(file)
    .then(res => res.text())
    .then(text => {
      const content = text.trim();
      if (content.length > 0) {
        document.getElementById(boxId).style.display = "block";
        document.getElementById(contentId).innerText = content;
      } else {
        document.getElementById(boxId).style.display = "none";
      }
    })
    .catch(() => console.log("Cannot load " + file));
}

// Load all
loadBox("SWT.txt", "swtBox", "swtContent");
loadBox("warn.txt", "warnBox", "warnContent");
loadBox("tc.txt", "tcBox", "tcContent");

</script>

</body>
</html>
