<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>澳門各區天氣實況 | 5分鐘滾動24小時雨量</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f3f7;
            color: #2c3e50;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        header {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            padding: 20px 30px;
            border-radius: 12px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            gap: 15px;
        }
        header h1 {
            font-size: 1.6rem;
            font-weight: 600;
        }
        .meta-info {
            text-align: right;
            font-size: 0.9rem;
            opacity: 0.9;
        }
        .export-btn {
            background: #27ae60;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-top: 8px;
            transition: background 0.2s;
        }
        .export-btn:hover {
            background: #219653;
        }
        .station-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        .station-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            padding: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            border-top: 4px solid #3498db;
        }
        .station-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        .station-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: #2c3e50;
            border-bottom: 1px solid #ecf0f1;
            padding-bottom: 8px;
        }
        .temp-row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin: 15px 0;
        }
        .current-temp {
            font-size: 2.2rem;
            font-weight: 700;
            color: #1a1a1a;
        }
        .temp-range {
            font-size: 0.9rem;
            text-align: right;
        }
        .high-temp { color: #e74c3c; font-weight: 600; }
        .low-temp { color: #34495e; font-weight: 600; }
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            font-size: 0.9rem;
        }
        .metric {
            background: #f8f9fa;
            padding: 8px 12px;
            border-radius: 6px;
        }
        .col-half {
            grid-column: span 3;
        }
        .col-third {
            grid-column: span 2;
        }
        .col-full {
            grid-column: span 6;
            background: #f0f8ff;
            border: 1px solid #bde0fe;
        }
        .metric span {
            display: block;
            color: #7f8c8d;
            font-size: 0.75rem;
            text-transform: uppercase;
            margin-bottom: 2px;
        }
        .metric strong {
            color: #2c3e50;
        }
        .rain-active {
            background: #e8f4fd;
            border: 1px solid #bcdffb;
        }
        .rain-active strong {
            color: #2980b9;
        }
        .loading {
            grid-column: 1 / -1;
            text-align: center;
            padding: 5px;
            font-size: 1.2rem;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>澳門各區天氣實況</h1>
            <small style="color: #2ecc71;">● 5分鐘更新 | 滾動24小時雨量 (防重複記錄)</small>
        </div>
        <div class="meta-info">
            <div>資料更新時間：<span id="pub-date">載入中...</span></div>
            <div>每5分鐘自動刷新</div>
            <button class="export-btn" id="exportCsvBtn">匯出歷史雨量 CSV</button>
        </div>
    </header>

    <div id="grid-container" class="station-grid">
        <div class="loading">正在擷取區域數據...</div>
    </div>
</div>

<script>
// ===================== Global Config =====================
const STORAGE_KEY = "MACAU_5MIN_RAIN_DATA";
const RECORDS_PER_24H = 288;       // 5min * 288 = 24h
const MAX_STORE_RECORDS = 576;     // Keep 48h data buffer

// Read records from LocalStorage
function getRainRecords() {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : [];
}

// Save records + DUPICATE CHECK
function saveRainRecords(oldRecords, newBatch) {
    const merged = [...oldRecords];
    // Skip duplicate: same station code + same capture time
    newBatch.forEach(newItem => {
        const exists = merged.some(
            r => r.code === newItem.code && r.time === newItem.time
        );
        if (!exists) {
            merged.push(newItem);
        }
    });
    // Trim old records (keep latest MAX_STORE_RECORDS)
    if (merged.length > MAX_STORE_RECORDS) {
        merged.splice(0, merged.length - MAX_STORE_RECORDS);
    }
    localStorage.setItem(STORAGE_KEY, JSON.stringify(merged));
    return merged;
}

// Calculate Rolling 24h Rainfall
function getRolling24hRain(stationCode) {
    const allRecords = getRainRecords();
    const stationRecords = allRecords.filter(r => r.code === stationCode);
    const windowRecords = stationRecords.slice(-RECORDS_PER_24H);

    let total = 0;
    windowRecords.forEach(item => {
        const val = parseFloat(item.hourRain);
        if (!isNaN(val)) total += val;
    });
    return total.toFixed(2);
}

// Generate CSV content
function generateCsv() {
    const records = getRainRecords();
    if (records.length === 0) return "採集時間,站點代碼,站點名稱,一小時雨量(mm)\n無數據";

    let csv = "採集時間,站點代碼,站點名稱,一小時雨量(mm)\n";
    records.forEach(row => {
        csv += `${row.time},${row.code},${row.name},${row.hourRain}\n`;
    });
    return csv;
}

// Download CSV file
function downloadCsv() {
    const csvText = generateCsv();
    const blob = new Blob([csvText], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `澳門5分鐘雨量記錄_${new Date().toLocaleString()}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}

document.getElementById("exportCsvBtn").addEventListener("click", downloadCsv);

// ===================== Fetch & Render Data =====================
function fetchGridData() {
    const cacheBuster = Date.now();
    const apiUrl = `https://corsproxy.io/?https://xml.smg.gov.mo/c_actualweather.xml?t=${cacheBuster}`;

    fetch(apiUrl, { cache: "no-store" })
        .then(res => {
            if (!res.ok) throw new Error("Network Error");
            return res.text();
        })
        .then(xmlStr => {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlStr, "text/xml");
            const currentCaptureTime = new Date().toISOString();

            const pubDateNode = xmlDoc.querySelector("SysPubdate");
            if (pubDateNode) {
                document.getElementById("pub-date").textContent = pubDateNode.textContent;
            }

            const stations = xmlDoc.querySelectorAll("WeatherReport station");
            const gridContainer = document.getElementById("grid-container");
            gridContainer.innerHTML = "";

            const getVal = (selector, parent) => {
                const el = parent.querySelector(selector);
                if (!el) return "0.0";
                return el.querySelector("dValue")?.textContent || el.querySelector("Value")?.textContent || "0.0";
            };

            const newBatch = [];

            stations.forEach(station => {
                const code = (station.getAttribute("code") || "").trim() || "N/A";
                const name = station.querySelector("stationname")?.textContent || "未命名站點";
                const nameDisplay = `${name}(${code})`;

                const temp = getVal("Temperature", station);
                const tempMax = getVal("Temperature_daily_max", station);
                const tempMin = getVal("Temperature_daily_min", station);
                const humidity = getVal("Humidity", station);
                const windSpeed = getVal("WindSpeed", station);
                const windGust = getVal("WindGust", station);
                const mslPress = getVal("MeanSeaLevelPressure", station);
                const stPress = getVal("StationPressure", station);

                let windDir = "--";
                const windDirNode = station.querySelector("WindDirection");
                if (windDirNode) {
                    const dVal = windDirNode.querySelector("dValue")?.textContent;
                    const deg = windDirNode.querySelector("Degree")?.textContent;
                    if (dVal && deg) windDir = `${dVal}(${deg}°)`;
                    else if (dVal) windDir = dVal;
                    else if (deg) windDir = `${deg}°`;
                }

                let rain1m = "0.0", rain1h = "0.0", rainDay = "0.0";
                station.querySelectorAll("Rainfall").forEach(node => {
                    const type = node.querySelector("Type")?.textContent;
                    const val = node.querySelector("dValue")?.textContent || node.querySelector("Value")?.textContent || "0.0";
                    if (type === "3") rain1m = val;
                    if (type === "4") rain1h = val;
                    if (type === "5") rainDay = val;
                });

                newBatch.push({
                    time: currentCaptureTime,
                    code: code,
                    name: name,
                    hourRain: rain1h
                });

                const class1m = parseFloat(rain1m) > 0 ? "rain-active" : "";
                const class1h = parseFloat(rain1h) > 0 ? "rain-active" : "";
                const classDay = parseFloat(rainDay) > 0 ? "rain-active" : "";

                const total24h = getRolling24hRain(code);

                const card = `
                <div class="station-card">
                    <div class="station-name">${nameDisplay}</div>
                    <div class="temp-row">
                        <div class="current-temp">${temp}°C</div>
                        <div class="temp-range">
                            <div>最高: <span class="high-temp">${tempMax}°C</span></div>
                            <div>最低: <span class="low-temp">${tempMin}°C</span></div>
                        </div>
                    </div>
                    <div class="metrics-grid">
                        <div class="metric col-half">
                            <span>相對濕度(%)</span>
                            <strong>${humidity}%</strong>
                        </div>
                        <div class="metric col-half">
                            <span>風向(°)</span>
                            <strong>${windDir}</strong>
                        </div>
                        <div class="metric col-half">
                            <span>風速(km/h)</span>
                            <strong>${windSpeed}${windSpeed !== '--' ? ' <small>km/h</small>' : ''}</strong>
                        </div>
                        <div class="metric col-half">
                            <span>陣風(km/h)</span>
                            <strong>${windGust}${windGust !== '--' ? ' <small>km/h</small>' : ''}</strong>
                        </div>
                        <div class="metric col-half">
                            <span>平均海平面氣壓(hPa)</span>
                            <strong>${mslPress}${mslPress !== '--' ? ' <small>hPa</small>' : ''}</strong>
                        </div>
                        <div class="metric col-half">
                            <span>站氣壓(hPa)</span>
                            <strong>${stPress}${stPress !== '--' ? ' <small>hPa</small>' : ''}</strong>
                        </div>

                        <div class="metric col-third ${class1m}">
                            <span>一分鐘雨量</span>
                            <strong>${rain1m}${rain1m !== '--' ? ' <small>mm</small>' : ''}</strong>
                        </div>
                        <div class="metric col-third ${class1h}">
                            <span>一小時雨量</span>
                            <strong>${rain1h}${rain1h !== '--' ? ' <small>mm</small>' : ''}</strong>
                        </div>
                        <div class="metric col-third ${classDay}">
                            <span>日總雨量</span>
                            <strong>${rainDay}${rainDay !== '--' ? ' <small>mm</small>' : ''}</strong>
                        </div>

                        <div class="metric col-full">
                            <span>滾動24小時累計雨量 (5分鐘滑動視窗)</span>
                            <strong>${total24h} mm</strong>
                        </div>
                    </div>
                </div>
                `;
                gridContainer.innerHTML += card;
            });

            // Merge + prevent duplicate records
            const oldRecords = getRainRecords();
            saveRainRecords(oldRecords, newBatch);
        })
        .catch(err => {
            console.error(err);
            document.getElementById("grid-container").innerHTML = `
                <div class="loading" style="color: #e74c3c;">
                    載入失敗，請檢查網絡或代理狀態
                </div>`;
        });
}

// Initial run + 5-minute auto refresh (300000ms)
fetchGridData();
setInterval(fetchGridData, 300000);
</script>

</body>
</html>
