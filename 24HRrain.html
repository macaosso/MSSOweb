<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>澳門各區天氣實況 | 雨量記錄與24小時累計</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f3f7;
            color: #2c3e50;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        header {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            padding: 20px 30px;
            border-radius: 12px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            gap: 15px;
        }
        header h1 {
            font-size: 1.6rem;
            font-weight: 600;
        }
        .meta-info {
            text-align: right;
            font-size: 0.9rem;
            opacity: 0.9;
        }
        /* 导出CSV按钮样式 */
        .export-btn {
            background: #27ae60;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-top: 8px;
            transition: background 0.2s;
        }
        .export-btn:hover {
            background: #219653;
        }
        .station-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        .station-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            padding: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            border-top: 4px solid #3498db;
        }
        .station-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        .station-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: #2c3e50;
            border-bottom: 1px solid #ecf0f1;
            padding-bottom: 8px;
        }
        .temp-row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin: 15px 0;
        }
        .current-temp {
            font-size: 2.2rem;
            font-weight: 700;
            color: #1a1a1a;
        }
        .temp-range {
            font-size: 0.9rem;
            text-align: right;
        }
        .high-temp { color: #e74c3c; font-weight: 600; }
        .low-temp { color: #34495e; font-weight: 600; }
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            font-size: 0.9rem;
        }
        .metric {
            background: #f8f9fa;
            padding: 8px 12px;
            border-radius: 6px;
        }
        .col-half {
            grid-column: span 3;
        }
        .col-third {
            grid-column: span 2;
        }
        /* 新增：24小时雨量独占整行 */
        .col-full {
            grid-column: span 6;
            background: #f0f8ff;
            border: 1px solid #bde0fe;
        }
        .metric span {
            display: block;
            color: #7f8c8d;
            font-size: 0.75rem;
            text-transform: uppercase;
            margin-bottom: 2px;
        }
        .metric strong {
            color: #2c3e50;
        }
        .rain-active {
            background: #e8f4fd;
            border: 1px solid #bcdffb;
        }
        .rain-active strong {
            color: #2980b9;
        }
        .loading {
            grid-column: 1 / -1;
            text-align: center;
            padding: 5px;
            font-size: 1.2rem;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>澳門各區天氣實況</h1>
            <small style="color: #2ecc71;">● 即時監控網格 | 雨量自動記錄</small>
        </div>
        <div class="meta-info">
            <div>資料更新時間：<span id="pub-date">載入中...</span></div>
            <div>每1分鐘自動刷新</div>
            <!-- CSV导出按钮 -->
            <button class="export-btn" id="exportCsvBtn">匯出歷史雨量 CSV</button>
        </div>
    </header>

    <div id="grid-container" class="station-grid">
        <div class="loading">正在擷取區域數據...</div>
    </div>
</div>

<script>
// ===================== 全局配置 & 本地存儲初始化 =====================
const STORAGE_KEY = "MACAU_WEATHER_RAIN_RECORDS";
// 保留最近 24 條逐小時記錄 (對應24小時雨量)
const MAX_RECORD_COUNT = 24;

// 從LocalStorage讀取歷史雨量記錄
function getRainRecords() {
    const data = localStorage.getItem(STORAGE_KEY);
    return data ? JSON.parse(data) : [];
}

// 保存記錄到LocalStorage
function saveRainRecords(records) {
    // 只保留最新24條，超出刪除舊數據
    if (records.length > MAX_RECORD_COUNT) {
        records = records.slice(-MAX_RECORD_COUNT);
    }
    localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
}

// 計算單個站點 24小時累計雨量
function calc24hRain(stationCode) {
    const records = getRainRecords();
    let total = 0;
    records.forEach(item => {
        if (item.code === stationCode && !isNaN(parseFloat(item.hourRain))) {
            total += parseFloat(item.hourRain);
        }
    });
    return total.toFixed(2);
}

// 生成CSV文本
function generateCsv() {
    const records = getRainRecords();
    if (records.length === 0) return "時間,站點代碼,站點名稱,一小時雨量(mm)\n無數據";

    let csv = "採集時間,站點代碼,站點名稱,一小時雨量(mm)\n";
    records.forEach(row => {
        csv += `${row.time},${row.code},${row.name},${row.hourRain}\n`;
    });
    return csv;
}

// 下載CSV文件
function downloadCsv() {
    const csvContent = generateCsv();
    const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `澳門天氣雨量記錄_${new Date().toLocaleString()}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}

// 綁定導出按鈕事件
document.getElementById("exportCsvBtn").addEventListener("click", downloadCsv);

// ===================== 數據請求 & 頁面渲染邏輯 =====================
function fetchGridData() {
    const cacheBuster = Date.now();
    const freshUrl = `https://corsproxy.io/?https://xml.smg.gov.mo/c_actualweather.xml?t=${cacheBuster}`;

    fetch(freshUrl, { cache: "no-store" })
        .then(response => {
            if (!response.ok) throw new Error('Network error');
            return response.text();
        })
        .then(xmlString => {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlString, "text/xml");
            const nowTime = new Date().toLocaleString(); // 當前採集時間

            const pubDateNode = xmlDoc.querySelector("SysPubdate");
            if (pubDateNode) {
                document.getElementById('pub-date').textContent = pubDateNode.textContent;
            }

            const stations = xmlDoc.querySelectorAll("WeatherReport station");
            const gridContainer = document.getElementById('grid-container');
            gridContainer.innerHTML = '';

            const extractNodeValue = (selector, parent) => {
                const el = parent.querySelector(selector);
                if (!el) return '0.0';
                return el.querySelector("dValue")?.textContent || el.querySelector("Value")?.textContent || '0.0';
            };

            // 本次輪次新增的記錄
            const newRecords = [];

            stations.forEach(station => {
                const code = station.getAttribute("code")?.trim() || "N/A";
                const name = station.querySelector("stationname")?.textContent || "未命名站點";
                const nameDisplay = `${name}(${code})`;

                const currentTemp = extractNodeValue("Temperature", station);
                const maxTemp = extractNodeValue("Temperature_daily_max", station);
                const minTemp = extractNodeValue("Temperature_daily_min", station);
                const humidity = extractNodeValue("Humidity", station);
                const windSpeed = extractNodeValue("WindSpeed", station);
                const windGust = extractNodeValue("WindGust", station);
                const mslPressure = extractNodeValue("MeanSeaLevelPressure", station);
                const stationPressure = extractNodeValue("StationPressure", station);

                const windDirNode = station.querySelector("WindDirection");
                const winddValue = windDirNode?.querySelector("dValue")?.textContent || '--';
                const windDegree = windDirNode?.querySelector("Degree")?.textContent || '--';
                let windDirDisplay = '--';
                if (winddValue !== '--' && windDegree !== '--') {
                    windDirDisplay = `${winddValue}(${windDegree}°)`;
                } else if (winddValue !== '--') {
                    windDirDisplay = winddValue;
                } else if (windDegree !== '--') {
                    windDirDisplay = `${windDegree}°`;
                }

                let rain1m = "0.0", rain1h = "0.0", rainToday = "0.0";
                const rainfallNodes = station.querySelectorAll("Rainfall");
                rainfallNodes.forEach(node => {
                    const type = node.querySelector("Type")?.textContent;
                    const val = node.querySelector("dValue")?.textContent || node.querySelector("Value")?.textContent || "0.0";
                    if (type === "3") rain1m = val;
                    if (type === "4") rain1h = val; // 重點：一小時雨量
                    if (type === "5") rainToday = val;
                });

                // 記錄本輪一小時雨量（用於24小時累加）
                newRecords.push({
                    time: nowTime,
                    code: code,
                    name: name,
                    hourRain: rain1h
                });

                const rain1mClass = parseFloat(rain1m) > 0 ? 'rain-active' : '';
                const rain1hClass = parseFloat(rain1h) > 0 ? 'rain-active' : '';
                const rainTodayClass = parseFloat(rainToday) > 0 ? 'rain-active' : '';

                // 計算該站點24小時累計雨量
                const total24hRain = calc24hRain(code);

                // 渲染卡片（新增 24小時累計雨量 欄位）
                const cardHtml = `
                    <div class="station-card">
                        <div class="station-name">${nameDisplay}</div>
                        <div class="temp-row">
                            <div class="current-temp">${currentTemp}°C</div>
                            <div class="temp-range">
                                <div>最高: <span class="high-temp">${maxTemp}°C</span></div>
                                <div>最低: <span class="low-temp">${minTemp}°C</span></div>
                            </div>
                        </div>
                        <div class="metrics-grid">
                            <div class="metric col-half">
                                <span>相對濕度(%)</span>
                                <strong>${humidity}%</strong>
                            </div>
                            <div class="metric col-half">
                                <span>風向(°)</span>
                                <strong>${windDirDisplay}</strong>
                            </div>
                            <div class="metric col-half">
                                <span>風速(km/h)</span>
                                <strong>${windSpeed}${windSpeed !== '--' ? ' <small>km/h</small>' : ''}</strong>
                            </div>
                            <div class="metric col-half">
                                <span>陣風(km/h)</span>
                                <strong>${windGust}${windGust !== '--' ? ' <small>km/h</small>' : ''}</strong>
                            </div>
                            <div class="metric col-half">
                                <span>平均海平面氣壓(hPa)</span>
                                <strong>${mslPressure}${mslPressure !== '--' ? ' <small>hPa</small>' : ''}</strong>
                            </div>
                            <div class="metric col-half">
                                <span>站氣壓(hPa)</span>
                                <strong>${stationPressure}${stationPressure !== '--' ? ' <small>hPa</small>' : ''}</strong>
                            </div>
                            
                            <div class="metric col-third ${rain1mClass}">
                                <span>一分鐘雨量</span>
                                <strong>${rain1m}${rain1m !== '--' ? ' <small>mm</small>' : ''}</strong>
                            </div>
                            <div class="metric col-third ${rain1hClass}">
                                <span>一小時雨量</span>
                                <strong>${rain1h}${rain1h !== '--' ? ' <small>mm</small>' : ''}</strong>
                            </div>
                            <div class="metric col-third ${rainTodayClass}">
                                <span>日總雨量</span>
                                <strong>${rainToday}${rainToday !== '--' ? ' <small>mm</small>' : ''}</strong>
                            </div>

                            <!-- 新增：24小時累計雨量 -->
                            <div class="metric col-full">
                                <span>近24小時累計雨量 (逐小時累加)</span>
                                <strong>${total24hRain} mm</strong>
                            </div>
                        </div>
                    </div>
                `;
                gridContainer.innerHTML += cardHtml;
            });

            // 合併新記錄 + 保存到本地存儲
            const oldRecords = getRainRecords();
            const allRecords = [...oldRecords, ...newRecords];
            saveRainRecords(allRecords);
        })
        .catch(err => {
            console.error(err);
            document.getElementById('grid-container').innerHTML = `
                <div class="loading" style="color: #e74c3c;">
                    載入失敗，請檢查網絡或代理狀態
                </div>`;
        });
}

// 初始化執行 + 定時刷新（1分鐘執行一次，累計雨量自動更新）
fetchGridData();
setInterval(fetchGridData, 60000);
</script>

</body>
</html>
