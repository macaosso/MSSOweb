<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>澳門各區天氣實況</title>
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f3f7;
            color: #2c3e50;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        header {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            padding: 20px 30px;
            border-radius: 12px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        header h1 {
            font-size: 1.6rem;
            font-weight: 600;
        }
        .meta-info {
            text-align: right;
            font-size: 0.9rem;
            opacity: 0.9;
        }
        .station-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        .station-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            padding: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            border-top: 4px solid #3498db;
        }
        .station-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        .station-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: #2c3e50;
            border-bottom: 1px solid #ecf0f1;
            padding-bottom: 8px;
        }
        .temp-row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin: 15px 0;
        }
        .current-temp {
            font-size: 2.2rem;
            font-weight: 700;
            color: #1a1a1a;
        }
        .temp-range {
            font-size: 0.9rem;
            text-align: right;
        }
        .high-temp { color: #e74c3c; font-weight: 600; }
        .low-temp { color: #34495e; font-weight: 600; }
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            font-size: 0.9rem;
        }
        .metric {
            background: #f8f9fa;
            padding: 8px 12px;
            border-radius: 6px;
        }
        .col-half {
            grid-column: span 3;
        }
        .col-third {
            grid-column: span 2;
        }
        .metric span {
            display: block;
            color: #7f8c8d;
            font-size: 0.75rem;
            text-transform: uppercase;
            margin-bottom: 2px;
        }
        .metric strong {
            color: #2c3e50;
        }
        .rain-active {
            background: #e8f4fd;
            border: 1px solid #bcdffb;
        }
        .rain-active strong {
            color: #2980b9;
        }
        .loading {
            grid-column: 1 / -1;
            text-align: center;
            padding: 5px;
            font-size: 1.2rem;
            color: #7f8c8d;
        }

        /* --- New: Station Table Style --- */
        .table-wrapper {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .table-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
        }
        .station-table {
            width: 100%;
            border-collapse: collapse;
        }
        .station-table th, .station-table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        .station-table th {
            background: #f7f8fa;
            font-weight: 600;
        }
        .station-table tr {
            cursor: pointer;
            transition: background 0.2s;
        }
        .station-table tr:hover {
            background: #eef5fc;
        }
        .station-table tr.active {
            background: #dceaf8;
        }

        /* --- New: Chart Container --- */
        .chart-wrapper {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            margin: 25px 0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: none;
        }
        .chart-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
        }
        #multi-chart {
            width: 100%;
            height: 450px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>澳門各區天氣實況</h1>
            <small style="color: #2ecc71;">● 即時監控網格</small>
        </div>
        <div class="meta-info">
            <div>資料更新時間：<span id="pub-date">載入中...</span></div>
            <div>每5分鐘自動刷新</div>
        </div>
    </header>

    <!-- Clickable Station Table -->
    <div class="table-wrapper">
        <div class="table-title">站點列表 (點擊行查看24小時綜合趨勢圖)</div>
        <table class="station-table" id="station-table">
            <thead>
                <tr>
                    <th>站點名稱</th>
                    <th>站點編碼</th>
                    <th>即時氣溫 (°C)</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <tr><td colspan="3" class="loading">載入站點數據中...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- Multi Metrics Chart -->
    <div class="chart-wrapper" id="chart-wrapper">
        <div class="chart-title" id="chart-title">24小時氣象參數趨勢</div>
        <div id="multi-chart"></div>
    </div>

    <div id="grid-container" class="station-grid">
        <div class="loading">正在擷取區域數據...</div>
    </div>
</div>

<script>
// ===================== YOUR ORIGINAL CODE (NO CHANGES) =====================
function fetchGridData() {
    const cacheBuster = Date.now();
    const freshUrl = `https://corsproxy.io/?https://xml.smg.gov.mo/c_actualweather.xml?t=${cacheBuster}`;

    fetch(freshUrl, { cache: "no-store" })
        .then(response => {
            if (!response.ok) throw new Error('Network error');
            return response.text();
        })
        .then(xmlString => {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlString, "text/xml");

            const pubDateNode = xmlDoc.querySelector("SysPubdate");
            if (pubDateNode) {
                document.getElementById('pub-date').textContent = pubDateNode.textContent;
            }

            const stations = xmlDoc.querySelectorAll("WeatherReport station");
            const gridContainer = document.getElementById('grid-container');
            gridContainer.innerHTML = '';

            const extractNodeValue = (selector, parent) => {
                const el = parent.querySelector(selector);
                if (!el) return '--';
                return el.querySelector("dValue")?.textContent || el.querySelector("Value")?.textContent || '--';
            };

            stations.forEach(station => {
                const code = station.getAttribute("code")?.trim() || "N/A";
                const name = station.querySelector("stationname")?.textContent || "未命名站點";
                const nameDisplay = `${name}(${code})`;

                const currentTemp = extractNodeValue("Temperature", station);
                const maxTemp = extractNodeValue("Temperature_daily_max", station);
                const minTemp = extractNodeValue("Temperature_daily_min", station);
                const humidity = extractNodeValue("Humidity", station);
                const windSpeed = extractNodeValue("WindSpeed", station);
                const windGust = extractNodeValue("WindGust", station);
                const mslPressure = extractNodeValue("MeanSeaLevelPressure", station);
                const stationPressure = extractNodeValue("StationPressure", station);

                const windDirNode = station.querySelector("WindDirection");
                const winddValue = windDirNode?.querySelector("dValue")?.textContent || '--';
                const windDegree = windDirNode?.querySelector("Degree")?.textContent || '--';
                let windDirDisplay = '--';
                if (winddValue !== '--' && windDegree !== '--') {
                    windDirDisplay = `${winddValue}(${windDegree}°)`;
                } else if (winddValue !== '--') {
                    windDirDisplay = winddValue;
                } else if (windDegree !== '--') {
                    windDirDisplay = `${windDegree}°`;
                }

                let rain1m = "--", rain1h = "--", rainToday = "--";
                const rainfallNodes = station.querySelectorAll("Rainfall");
                rainfallNodes.forEach(node => {
                    const type = node.querySelector("Type")?.textContent;
                    const val = node.querySelector("dValue")?.textContent || node.querySelector("Value")?.textContent || "0.0";
                    if (type === "3") rain1m = val;
                    if (type === "4") rain1h = val;
                    if (type === "5") rainToday = val;
                });

                const rain1mClass = parseFloat(rain1m) > 0 ? 'rain-active' : '';
                const rain1hClass = parseFloat(rain1h) > 0 ? 'rain-active' : '';
                const rainTodayClass = parseFloat(rainToday) > 0 ? 'rain-active' : '';

                const cardHtml = `
                    <div class="station-card">
                        <div class="station-name">${nameDisplay}</div>
                        <div class="temp-row">
                            <div class="current-temp">${currentTemp}°C</div>
                            <div class="temp-range">
                                <div>最高: <span class="high-temp">${maxTemp}°C</span></div>
                                <div>最低: <span class="low-temp">${minTemp}°C</span></div>
                            </div>
                        </div>
                        <div class="metrics-grid">
                            <div class="metric col-half">
                                <span>相對濕度(%)</span>
                                <strong>${humidity}%</strong>
                            </div>
                            <div class="metric col-half">
                                <span>風向(°)</span>
                                <strong>${windDirDisplay}</strong>
                            </div>
                            <div class="metric col-half">
                                <span>風速(km/h)</span>
                                <strong>${windSpeed}${windSpeed !== '--' ? ' <small>km/h</small>' : ''}</strong>
                            </div>
                            <div class="metric col-half">
                                <span>陣風(km/h)</span>
                                <strong>${windGust}${windGust !== '--' ? ' <small>km/h</small>' : ''}</strong>
                            </div>
                            <div class="metric col-half">
                                <span>平均海平面氣壓(hPa)</span>
                                <strong>${mslPressure}${mslPressure !== '--' ? ' <small>hPa</small>' : ''}</strong>
                            </div>
                            <div class="metric col-half">
                                <span>站氣壓(hPa)</span>
                                <strong>${stationPressure}${stationPressure !== '--' ? ' <small>hPa</small>' : ''}</strong>
                            </div>
                            
                            <div class="metric col-third ${rain1mClass}">
                                <span>一分鐘雨量</span>
                                <strong>${rain1m}${rain1m !== '--' ? ' <small>mm</small>' : ''}</strong>
                            </div>
                            <div class="metric col-third ${rain1hClass}">
                                <span>一小時雨量</span>
                                <strong>${rain1h}${rain1h !== '--' ? ' <small>mm</small>' : ''}</strong>
                            </div>
                            <div class="metric col-third ${rainTodayClass}">
                                <span>日總雨量</span>
                                <strong>${rainToday}${rainToday !== '--' ? ' <small>mm</small>' : ''}</strong>
                            </div>
                        </div>
                    </div>
                `;
                gridContainer.innerHTML += cardHtml;
            });

            // Render table & save history data after XML loaded
            buildStationTable(stations);
            recordCurrentData(stations);
        })
        .catch(err => {
            console.error(err);
            document.getElementById('grid-container').innerHTML = `
                <div class="loading" style="color: #e74c3c;">
                    載入失敗，請檢查網絡或代理狀態
                </div>`;
            document.getElementById('table-body').innerHTML = `<tr><td colspan="3" style="color:#e74c3c;">載入失敗</td></tr>`;
        });
}

fetchGridData();
setInterval(fetchGridData, 60000);

// ===================== NEW FEATURES START =====================
// Global storage: persist 24h history data (localStorage)
const HISTORY_KEY = "macao_weather_24h_history";
const MAX_RECORDS = 288; // 5min interval * 24h = 288 records

// Extract value helper
function getVal(node, selector){
    const el = node.querySelector(selector);
    if(!el) return null;
    let v = el.querySelector("dValue")?.textContent || el.querySelector("Value")?.textContent;
    return v === '--' ? null : parseFloat(v);
}

// 1. Record real-time data to 24h history (auto save overtime)
function recordCurrentData(stationList){
    let history = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
    const now = new Date();
    const timeStr = now.toLocaleTimeString('zh-HK', {hour:'2-digit', minute:'2-digit'});

    stationList.forEach(station => {
        const code = station.getAttribute("code") || "";
        const name = station.querySelector("stationname")?.textContent || "";

        const temp = getVal(station, "Temperature");
        const hum = getVal(station, "Humidity");
        const ws = getVal(station, "WindSpeed");
        const wg = getVal(station, "WindGust");
        const mslp = getVal(station, "MeanSeaLevelPressure");
        const stp = getVal(station, "StationPressure");
        const wdNode = station.querySelector("WindDirection");
        const wd = wdNode ? getVal(wdNode, "Degree") : null;

        let r1m = null, r1h = null;
        station.querySelectorAll("Rainfall").forEach(rn=>{
            const t = rn.querySelector("Type")?.textContent;
            const rv = getVal(rn, "");
            if(t === "3") r1m = rv;
            if(t === "4") r1h = rv;
        });

        history.push({
            time: timeStr,
            timestamp: now.getTime(),
            code, name,
            temp, humidity: hum, windSpeed: ws, windGust: wg,
            windDir: wd, mslPressure: mslp, stationPressure: stp,
            rain1m: r1m, rain1h: r1h
        });
    });

    // Keep only latest 24h records
    if(history.length > MAX_RECORDS) history = history.slice(-MAX_RECORDS);
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
}

// 2. Build clickable station table
function buildStationTable(stationList){
    const tbody = document.getElementById("table-body");
    tbody.innerHTML = "";

    stationList.forEach(station=>{
        const code = station.getAttribute("code") || "";
        const name = station.querySelector("stationname")?.textContent || "";
        const temp = getVal(station, "Temperature");
        const tempText = temp !== null ? `${temp} °C` : "--";

        const tr = document.createElement("tr");
        tr.dataset.code = code;
        tr.innerHTML = `<td>${name}</td><td>${code}</td><td>${tempText}</td>`;

        tr.addEventListener("click", ()=>{
            // Remove active from all rows
            document.querySelectorAll("#table-body tr").forEach(r=>r.classList.remove("active"));
            tr.classList.add("active");
            // Load chart
            renderMultiChart(code, name);
        });
        tbody.appendChild(tr);
    });
}

// 3. Render combined chart: line + scatter(dot) + bar
function renderMultiChart(targetCode, targetName){
    const chartWrap = document.getElementById("chart-wrapper");
    const chartTitle = document.getElementById("chart-title");
    chartWrap.style.display = "block";
    chartTitle.textContent = `${targetName} (${targetCode}) - 24小時綜合氣象趨勢`;

    // Filter history for selected station
    const fullHistory = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
    const stationData = fullHistory.filter(d => d.code === targetCode);
    if(stationData.length === 0){
        Highcharts.chart("multi-chart", {
            title:{text:"暫無歷史數據，請等待數據累積"},
            credits:{enabled:false}
        });
        return;
    }

    // Prepare series data
    const timeLabels = stationData.map(d => d.time);
    const tempData = stationData.map(d => d.temp);
    const humData = stationData.map(d => d.humidity);
    const wsData = stationData.map(d => d.windSpeed);
    const wgData = stationData.map(d => d.windGust);
    const mslpData = stationData.map(d => d.mslPressure);
    const stpData = stationData.map(d => d.stationPressure);
    const wdData = stationData.map(d => d.windDir);
    const r1mData = stationData.map(d => d.rain1m);
    const r1hData = stationData.map(d => d.rain1h);

    Highcharts.chart("multi-chart", {
        chart: {
            backgroundColor: "#fff",
            zoomType: "x"
        },
        title: { text: "" },
        xAxis: {
            categories: timeLabels,
            tickInterval: 12,
            labels: { rotation: -30 }
        },
        yAxis: [
            { title: { text: "溫度 / 濕度" }, opposite: false },
            { title: { text: "風速 / 風向" }, opposite: true },
            { title: { text: "氣壓 (hPa)" }, opposite: false },
            { title: { text: "雨量 (mm)" }, opposite: true }
        ],
        tooltip: { shared: true, crosshairs: true },
        legend: { layout: "horizontal", align: "center", y: 0 },
        credits: { enabled: false },

        series: [
            { name: "氣溫 (°C)", type: "line", yAxis: 0, data: tempData, color: "#e74c3c", lineWidth:2 },
            { name: "相對濕度 (%)", type: "line", yAxis: 0, data: humData, color: "#27ae60", lineWidth:2 },
            { name: "風速 (km/h)", type: "line", yAxis: 1, data: wsData, color: "#3498db", lineWidth:2 },
            { name: "陣風 (km/h)", type: "line", yAxis: 1, data: wgData, color: "#9b59b6", lineWidth:2 },
            { name: "風向 (°)", type: "scatter", yAxis: 1, data: wdData, color: "#2c3e50", marker: { radius:4 } },
            { name: "海平面氣壓 (hPa)", type: "line", yAxis: 2, data: mslpData, color: "#f39c12", lineWidth:2 },
            { name: "站氣壓 (hPa)", type: "line", yAxis: 2, data: stpData, color: "#e67e22", lineWidth:2 },
            { name: "1分鐘雨量 (mm)", type: "bar", yAxis: 3, data: r1mData, color: "#74b9ff" },
            { name: "1小時雨量 (mm)", type: "bar", yAxis: 3, data: r1hData, color: "#0984e3" }
        ]
    });
}
</script>

</body>
</html>
