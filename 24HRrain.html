<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>澳門各區天氣實況</title>
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f3f7;
            color: #2c3e50;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        header {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            padding: 20px 30px;
            border-radius: 12px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        header h1 {
            font-size: 1.6rem;
            font-weight: 600;
        }
        .meta-info {
            text-align: right;
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .accordion {
            background: white;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            overflow: hidden;
        }
        .accordion-header {
            padding: 18px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: 600;
            background: #f8f9fa;
            transition: background 0.15s;
        }
        .accordion-header:hover {
            background: #eef5fc;
        }
        .accordion-header.active {
            background: #dceaf8;
        }
        .accordion-icon {
            transition: transform 0.15s;
        }
        .accordion-header.active .accordion-icon {
            transform: rotate(180deg);
        }
        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.2s ease;
        }
        .accordion-content.active {
            max-height: 600px;
        }

        .param-table {
            width: 100%;
            border-collapse: collapse;
        }
        .param-table th, .param-table td {
            padding: 12px 25px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        .param-table th {
            background: #f1f3f5;
            font-weight: 600;
        }
        .param-table tr {
            cursor: pointer;
            transition: background 0.15s;
        }
        .param-table tr:hover {
            background: #eef5fc;
        }
        .param-table tr.active {
            background: #dceaf8;
        }

        .chart-wrapper {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            margin: 25px 0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: none;
        }
        .chart-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
        }
        #single-chart {
            width: 100%;
            height: 400px;
        }

        .station-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        .station-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            padding: 20px;
            transition: transform 0.15s, box-shadow 0.15s;
            display: flex;
            flex-direction: column;
            border-top: 4px solid #3498db;
        }
        .station-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        .station-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: #2c3e50;
            border-bottom: 1px solid #ecf0f1;
            padding-bottom: 8px;
        }
        .temp-row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin: 15px 0;
        }
        .current-temp {
            font-size: 2.2rem;
            font-weight: 700;
            color: #1a1a1a;
        }
        .temp-range {
            font-size: 0.9rem;
            text-align: right;
        }
        .high-temp { color: #e74c3c; font-weight: 600; }
        .low-temp { color: #34495e; font-weight: 600; }
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            font-size: 0.9rem;
        }
        .metric {
            background: #f8f9fa;
            padding: 8px 12px;
            border-radius: 6px;
        }
        .col-half { grid-column: span 3; }
        .col-third { grid-column: span 2; }
        .metric span {
            display: block;
            color: #7f8c8d;
            font-size: 0.75rem;
            text-transform: uppercase;
            margin-bottom: 2px;
        }
        .metric strong { color: #2c3e50; }
        .rain-active {
            background: #e8f4fd;
            border: 1px solid #bcdffb;
        }
        .rain-active strong { color: #2980b9; }
        .loading {
            grid-column: 1 / -1;
            text-align: center;
            padding: 5px;
            font-size: 1.2rem;
            color: #7f8c8d;
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div>
            <h1>澳門各區天氣實況</h1>
            <small style="color: #2ecc71;">● 即時監控網格</small>
        </div>
        <div class="meta-info">
            <div>資料更新時間：<span id="pub-date">載入中...</span></div>
            <div>每5分鐘自動刷新</div>
        </div>
    </header>

    <div id="accordion-container">
        <div class="accordion">
            <div class="accordion-header" data-param="temp">
                <span>氣溫 (°C)</span>
                <span class="accordion-icon">⬇️</span>
            </div>
            <div class="accordion-content">
                <table class="param-table" id="table-temp">
                    <thead>
                        <tr><th>站點名稱</th><th>站點編碼</th><th>即時數值</th></tr>
                    </thead>
                    <tbody class="param-tbody"></tbody>
                </table>
            </div>
        </div>
        <div class="accordion">
            <div class="accordion-header" data-param="humidity">
                <span>相對濕度 (%)</span>
                <span class="accordion-icon">⬇️</span>
            </div>
            <div class="accordion-content">
                <table class="param-table" id="table-humidity">
                    <thead>
                        <tr><th>站點名稱</th><th>站點編碼</th><th>即時數值</th></tr>
                    </thead>
                    <tbody class="param-tbody"></tbody>
                </table>
            </div>
        </div>
        <div class="accordion">
            <div class="accordion-header" data-param="windSpeed">
                <span>風速 (km/h)</span>
                <span class="accordion-icon">⬇️</span>
            </div>
            <div class="accordion-content">
                <table class="param-table" id="table-windSpeed">
                    <thead>
                        <tr><th>站點名稱</th><th>站點編碼</th><th>即時數值</th></tr>
                    </thead>
                    <tbody class="param-tbody"></tbody>
                </table>
            </div>
        </div>
        <div class="accordion">
            <div class="accordion-header" data-param="windGust">
                <span>陣風 (km/h)</span>
                <span class="accordion-icon">⬇️</span>
            </div>
            <div class="accordion-content">
                <table class="param-table" id="table-windGust">
                    <thead>
                        <tr><th>站點名稱</th><th>站點編碼</th><th>即時數值</th></tr>
                    </thead>
                    <tbody class="param-tbody"></tbody>
                </table>
            </div>
        </div>
        <div class="accordion">
            <div class="accordion-header" data-param="windDir">
                <span>風向 (°)</span>
                <span class="accordion-icon">⬇️</span>
            </div>
            <div class="accordion-content">
                <table class="param-table" id="table-windDir">
                    <thead>
                        <tr><th>站點名稱</th><th>站點編碼</th><th>即時數值</th></tr>
                    </thead>
                    <tbody class="param-tbody"></tbody>
                </table>
            </div>
        </div>
        <div class="accordion">
            <div class="accordion-header" data-param="mslPressure">
                <span>海平面氣壓 (hPa)</span>
                <span class="accordion-icon">⬇️</span>
            </div>
            <div class="accordion-content">
                <table class="param-table" id="table-mslPressure">
                    <thead>
                        <tr><th>站點名稱</th><th>站點編碼</th><th>即時數值</th></tr>
                    </thead>
                    <tbody class="param-tbody"></tbody>
                </table>
            </div>
        </div>
        <div class="accordion">
            <div class="accordion-header" data-param="stationPressure">
                <span>站氣壓 (hPa)</span>
                <span class="accordion-icon">⬇️</span>
            </div>
            <div class="accordion-content">
                <table class="param-table" id="table-stationPressure">
                    <thead>
                        <tr><th>站點名稱</th><th>站點編碼</th><th>即時數值</th></tr>
                    </thead>
                    <tbody class="param-tbody"></tbody>
                </table>
            </div>
        </div>
        <div class="accordion">
            <div class="accordion-header" data-param="rain1m">
                <span>1分鐘雨量 (mm)</span>
                <span class="accordion-icon">⬇️</span>
            </div>
            <div class="accordion-content">
                <table class="param-table" id="table-rain1m">
                    <thead>
                        <tr><th>站點名稱</th><th>站點編碼</th><th>即時數值</th></tr>
                    </thead>
                    <tbody class="param-tbody"></tbody>
                </table>
            </div>
        </div>
        <div class="accordion">
            <div class="accordion-header" data-param="rain1h">
                <span>1小時雨量 (mm)</span>
                <span class="accordion-icon">⬇️</span>
            </div>
            <div class="accordion-content">
                <table class="param-table" id="table-rain1h">
                    <thead>
                        <tr><th>站點名稱</th><th>站點編碼</th><th>即時數值</th></tr>
                    </thead>
                    <tbody class="param-tbody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="chart-wrapper" id="chart-wrapper">
        <div class="chart-title" id="chart-title">參數趨勢圖</div>
        <div id="single-chart"></div>
    </div>

    <div id="grid-container" class="station-grid">
        <div class="loading">正在擷取區域數據...</div>
    </div>
</div>

<script>
const XML_URL = 'https://xml.smg.gov.mo/c_actualweather.xml';
const PROXY1 = 'https://api.allorigins.win/raw?url=';
const PROXY2 = 'https://corsproxy.io/?';
const TIMEOUT = 6000;
const RETRY_TIMES = 1;
const HISTORY_KEY = "macao_weather_24h_history";
const MAX_RECORDS = 288;

const PARAM_CONFIG = {
    temp: { label: '氣溫', unit: '°C', color: '#e74c3c', type: 'line' },
    humidity: { label: '相對濕度', unit: '%', color: '#27ae60', type: 'line' },
    windSpeed: { label: '風速', unit: 'km/h', color: '#3498db', type: 'line' },
    windGust: { label: '陣風', unit: 'km/h', color: '#9b59b6', type: 'line' },
    windDir: { label: '風向', unit: '°', color: '#2c3e50', type: 'scatter' },
    mslPressure: { label: '海平面氣壓', unit: 'hPa', color: '#f39c12', type: 'line' },
    stationPressure: { label: '站氣壓', unit: 'hPa', color: '#e67e22', type: 'line' },
    rain1m: { label: '1分鐘雨量', unit: 'mm', color: '#74b9ff', type: 'bar' },
    rain1h: { label: '1小時雨量', unit: 'mm', color: '#0984e3', type: 'bar' }
};

// Cache DOM once
const DOM = {
    pubDate: document.getElementById('pub-date'),
    gridContainer: document.getElementById('grid-container'),
    chartWrap: document.getElementById('chart-wrapper'),
    chartTitle: document.getElementById('chart-title'),
    chartBox: document.getElementById('single-chart')
};

function getValue(el) {
    if (!el) return null;
    let v = el.querySelector("dValue")?.textContent || el.querySelector("Value")?.textContent;
    return (v === '--' || v == null) ? null : parseFloat(v);
}

async function fetchData() {
    const cb = Date.now();
    const url = encodeURIComponent(`${XML_URL}?t=${cb}`);
    let res;
    try {
        res = await fetch(PROXY1 + url, { signal: AbortSignal.timeout(TIMEOUT), cache: "no-store" });
    } catch {
        res = await fetch(PROXY2 + url, { signal: AbortSignal.timeout(TIMEOUT), cache: "no-store" });
    }
    if (!res.ok) throw new Error("Fetch fail");
    const txt = await res.text();
    const xml = new DOMParser().parseFromString(txt, "text/xml");
    if (xml.querySelector("parsererror")) throw new Error("XML error");
    return xml;
}

function buildTablesAndCards(xml) {
    const stations = xml.querySelectorAll("WeatherReport station");
    DOM.pubDate.textContent = xml.querySelector("SysPubdate")?.textContent || "";

    // Build all tables
    Object.keys(PARAM_CONFIG).forEach(param => {
        const tbody = document.querySelector(`#table-${param} .param-tbody`);
        tbody.innerHTML = "";
        const unit = PARAM_CONFIG[param].unit;
        stations.forEach(st => {
            const code = st.getAttribute("code") || "";
            const name = st.querySelector("stationname")?.textContent || "";
            let val;
            switch(param) {
                case 'temp': val = getValue(st.querySelector("Temperature")); break;
                case 'humidity': val = getValue(st.querySelector("Humidity")); break;
                case 'windSpeed': val = getValue(st.querySelector("WindSpeed")); break;
                case 'windGust': val = getValue(st.querySelector("WindGust")); break;
                case 'windDir': val = getValue(st.querySelector("WindDirection Degree")); break;
                case 'mslPressure': val = getValue(st.querySelector("MeanSeaLevelPressure")); break;
                case 'stationPressure': val = getValue(st.querySelector("StationPressure")); break;
                case 'rain1m':
                    let r1 = Array.from(st.querySelectorAll("Rainfall")).find(n=>n.querySelector("Type")?.textContent==="3");
                    val = getValue(r1); break;
                case 'rain1h':
                    let r2 = Array.from(st.querySelectorAll("Rainfall")).find(n=>n.querySelector("Type")?.textContent==="4");
                    val = getValue(r2); break;
            }
            const txt = val !== null ? `${val} ${unit}` : "--";
            const tr = document.createElement("tr");
            tr.dataset.code = code;
            tr.dataset.param = param;
            tr.innerHTML = `<td>${name}</td><td>${code}</td><td>${txt}</td>`;
            tr.onclick = () => {
                document.querySelectorAll(".param-table tr").forEach(r=>r.classList.remove("active"));
                tr.classList.add("active");
                drawChart(param, code, name);
            };
            tbody.appendChild(tr);
        });
    });

    // Build station cards
    DOM.gridContainer.innerHTML = "";
    stations.forEach(st => {
        const code = st.getAttribute("code")?.trim() || "N/A";
        const name = st.querySelector("stationname")?.textContent || "未命名站點";
        const temp = getValue(st.querySelector("Temperature"));
        const tmax = getValue(st.querySelector("Temperature_daily_max"));
        const tmin = getValue(st.querySelector("Temperature_daily_min"));
        const hum = getValue(st.querySelector("Humidity"));
        const ws = getValue(st.querySelector("WindSpeed"));
        const wg = getValue(st.querySelector("WindGust"));
        const mslp = getValue(st.querySelector("MeanSeaLevelPressure"));
        const stp = getValue(st.querySelector("StationPressure"));

        const wdNode = st.querySelector("WindDirection");
        let wdText = "--";
        if(wdNode){
            let dVal = wdNode.querySelector("dValue")?.textContent||"--";
            let deg = wdNode.querySelector("Degree")?.textContent||"--";
            wdText = (dVal!="--"&&deg!="--") ? `${dVal}(${deg}°)` : (dVal!="--"?dVal:`${deg}°`);
        }

        let r1m="--",r1h="--",rToday="--";
        st.querySelectorAll("Rainfall").forEach(n=>{
            let t = n.querySelector("Type")?.textContent;
            let v = n.querySelector("dValue")?.textContent||n.querySelector("Value")?.textContent||"0.0";
            if(t==="3")r1m=v;
            if(t==="4")r1h=v;
            if(t==="5")rToday=v;
        });
        let c1 = parseFloat(r1m)>0?"rain-active":"";
        let c2 = parseFloat(r1h)>0?"rain-active":"";
        let c3 = parseFloat(rToday)>0?"rain-active":"";

        const html = `
        <div class="station-card">
            <div class="station-name">${name}(${code})</div>
            <div class="temp-row">
                <div class="current-temp">${temp??'--'}°C</div>
                <div class="temp-range">
                    <div>最高: <span class="high-temp">${tmax??'--'}°C</span></div>
                    <div>最低: <span class="low-temp">${tmin??'--'}°C</span></div>
                </div>
            </div>
            <div class="metrics-grid">
                <div class="metric col-half"><span>相對濕度(%)</span><strong>${hum??'--'}%</strong></div>
                <div class="metric col-half"><span>風向(°)</span><strong>${wdText}</strong></div>
                <div class="metric col-half"><span>風速(km/h)</span><strong>${ws??'--'}${ws?' <small>km/h</small>':''}</strong></div>
                <div class="metric col-half"><span>陣風(km/h)</span><strong>${wg??'--'}${wg?' <small>km/h</small>':''}</strong></div>
                <div class="metric col-half"><span>海平面氣壓(hPa)</span><strong>${mslp??'--'}${mslp?' <small>hPa</small>':''}</strong></div>
                <div class="metric col-half"><span>站氣壓(hPa)</span><strong>${stp??'--'}${stp?' <small>hPa</small>':''}</strong></div>
                <div class="metric col-third ${c1}"><span>一分鐘雨量</span><strong>${r1m}${r1m!='--'?' <small>mm</small>':''}</strong></div>
                <div class="metric col-third ${c2}"><span>一小時雨量</span><strong>${r1h}${r1h!='--'?' <small>mm</small>':''}</strong></div>
                <div class="metric col-third ${c3}"><span>日總雨量</span><strong>${rToday}${rToday!='--'?' <small>mm</small>':''}</strong></div>
            </div>
        </div>`;
        DOM.gridContainer.insertAdjacentHTML("beforeend", html);
    });
    return stations;
}

function saveHistory(stations) {
    const now = Date.now();
    const timeStr = new Date(now).toLocaleTimeString('zh-HK',{hour:'2-digit',minute:'2-digit'});
    let history = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");

    stations.forEach(st => {
        const code = st.getAttribute("code") || "";
        const name = st.querySelector("stationname")?.textContent || "";
        const temp = getValue(st.querySelector("Temperature"));
        const hum = getValue(st.querySelector("Humidity"));
        const ws = getValue(st.querySelector("WindSpeed"));
        const wg = getValue(st.querySelector("WindGust"));
        const mslp = getValue(st.querySelector("MeanSeaLevelPressure"));
        const stp = getValue(st.querySelector("StationPressure"));
        const wd = getValue(st.querySelector("WindDirection Degree"));

        let r1m=null,r1h=null;
        st.querySelectorAll("Rainfall").forEach(n=>{
            let t = n.querySelector("Type")?.textContent;
            if(t==="3") r1m = getValue(n);
            if(t==="4") r1h = getValue(n);
        });

        history.push({
            timestamp: now, time: timeStr, code, name,
            temp,humidity:hum,windSpeed:ws,windGust:wg,
            windDir:wd,mslPressure:mslp,stationPressure:stp,
            rain1m:r1m,rain1h:r1h
        });
    });
    if(history.length > MAX_RECORDS) history = history.slice(-MAX_RECORDS);
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
}

function drawChart(param, code, name) {
    const cfg = PARAM_CONFIG[param];
    DOM.chartWrap.style.display = "block";
    DOM.chartTitle.textContent = `${name} (${code}) - ${cfg.label} 24小時趨勢`;

    const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
    const data = history.filter(d=>d.code === code).map(item=>[item.timestamp, item[param]]);

    if(!data.length){
        Highcharts.chart(DOM.chartBox, {
            title:{text:"暫無歷史數據"}, credits:{enabled:false}
        });
        return;
    }

    Highcharts.chart(DOM.chartBox, {
        chart:{type:cfg.type, backgroundColor:"#fff"},
        title:{text:""},
        xAxis:{
            type:"datetime",
            title:{text:"時間"},
            dateTimeLabelFormats:{minute:'%H:%M', hour:'%H:%M'}
        },
        yAxis:{title:{text:`${cfg.label} (${cfg.unit})`}},
        tooltip:{xDateFormat:'%H:%M', valueSuffix:` ${cfg.unit}`},
        legend:{enabled:false},
        credits:{enabled:false},
        series:[{
            data: data,
            color: cfg.color,
            lineWidth: cfg.type==='line'?3:undefined,
            marker: cfg.type==='scatter'?{radius:5}:{enabled:true}
        }]
    });
}

// Accordion click
document.querySelectorAll(".accordion-header").forEach(h=>{
    h.onclick = ()=>{
        const content = h.nextElementSibling;
        const active = h.classList.contains("active");
        document.querySelectorAll(".accordion-header").forEach(x=>x.classList.remove("active"));
        document.querySelectorAll(".accordion-content").forEach(x=>x.classList.remove("active"));
        if(!active){
            h.classList.add("active");
            content.classList.add("active");
        }
    };
});

async function main() {
    try {
        const xml = await fetchData();
        const stations = buildTablesAndCards(xml);
        saveHistory(stations);
    } catch {
        DOM.gridContainer.innerHTML = `<div class="loading" style="color:#e74c3c;">載入失敗，請稍後重試</div>`;
    }
}

main();
setInterval(main, 5 * 60 * 1000);
</script>
</body>
</html>
