<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>澳門各區天氣實況</title>
    <!-- Add Chart Library -->
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f3f7;
            color: #2c3e50;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        header {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            padding: 20px 30px;
            border-radius: 12px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        header h1 {
            font-size: 1.6rem;
            font-weight: 600;
        }
        .meta-info {
            text-align: right;
            font-size: 0.9rem;
            opacity: 0.9;
        }
        .station-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        .station-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            padding: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            border-top: 4px solid #3498db;
        }
        .station-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        .station-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: #2c3e50;
            border-bottom: 1px solid #ecf0f1;
            padding-bottom: 8px;
        }
        .temp-row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin: 15px 0;
        }
        .current-temp {
            font-size: 2.2rem;
            font-weight: 700;
            color: #1a1a1a;
        }
        .temp-range {
            font-size: 0.9rem;
            text-align: right;
        }
        .high-temp { color: #e74c3c; font-weight: 600; }
        .low-temp { color: #34495e; font-weight: 600; }
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            font-size: 0.9rem;
        }
        .metric {
            background: #f8f9fa;
            padding: 8px 12px;
            border-radius: 6px;
        }
        .col-half {
            grid-column: span 3;
        }
        .col-third {
            grid-column: span 2;
        }
        .metric span {
            display: block;
            color: #7f8c8d;
            font-size: 0.75rem;
            text-transform: uppercase;
            margin-bottom: 2px;
        }
        .metric strong {
            color: #2c3e50;
        }
        .rain-active {
            background: #e8f4fd;
            border: 1px solid #bcdffb;
        }
        .rain-active strong {
            color: #2980b9;
        }
        .loading {
            grid-column: 1 / -1;
            text-align: center;
            padding: 5px;
            font-size: 1.2rem;
            color: #7f8c8d;
        }

        /* ===== New Added Styles (Map + Chart) ===== */
        .map-wrapper {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            min-height: 320px;
            position: relative;
        }
        .map-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: #2c3e50;
        }
        .map-area {
            width: 100%;
            height: 260px;
            background: #eef2f7;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
        }
        /* Clickable Circle Marker */
        .map-marker {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #3498db;
            border: 3px solid #fff;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            position: absolute;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .map-marker:hover {
            transform: scale(1.2);
            background: #e74c3c;
        }
        /* Chart Container */
        .chart-wrapper {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            margin: 25px 0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: none;
        }
        .chart-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: #2c3e50;
        }
        #trend-chart {
            width: 100%;
            height: 380px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>澳門各區天氣實況</h1>
            <small style="color: #2ecc71;">● 即時監控網格</small>
        </div>
        <div class="meta-info">
            <div>資料更新時間：<span id="pub-date">載入中...</span></div>
            <div>每5分鐘自動刷新</div>
        </div>
    </header>

    <!-- ===== New Added Map Section ===== -->
    <div class="map-wrapper">
        <div class="map-title">澳門監測站點地圖 (點擊圓圈查看24小時趨勢)</div>
        <div class="map-area" id="map-area">
            <!-- Dynamic circle markers will be inserted here by JS -->
        </div>
    </div>

    <!-- ===== New Added 24h Trend Chart Section ===== -->
    <div class="chart-wrapper" id="chart-wrapper">
        <div class="chart-title" id="chart-title">過去24小時氣溫趨勢</div>
        <div id="trend-chart"></div>
    </div>

    <div id="grid-container" class="station-grid">
        <div class="loading">正在擷取區域數據...</div>
    </div>
</div>

<script>
// ========== YOUR ORIGINAL CODE (100% UNCHANGED) ==========
function fetchGridData() {
    const cacheBuster = Date.now();
    const freshUrl = `https://corsproxy.io/?https://xml.smg.gov.mo/c_actualweather.xml?t=${cacheBuster}`;

    fetch(freshUrl, { cache: "no-store" })
        .then(response => {
            if (!response.ok) throw new Error('Network error');
            return response.text();
        })
        .then(xmlString => {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlString, "text/xml");

            const pubDateNode = xmlDoc.querySelector("SysPubdate");
            if (pubDateNode) {
                document.getElementById('pub-date').textContent = pubDateNode.textContent;
            }

            const stations = xmlDoc.querySelectorAll("WeatherReport station");
            const gridContainer = document.getElementById('grid-container');
            gridContainer.innerHTML = '';

            const extractNodeValue = (selector, parent) => {
                const el = parent.querySelector(selector);
                if (!el) return '--';
                return el.querySelector("dValue")?.textContent || el.querySelector("Value")?.textContent || '--';
            };

            stations.forEach(station => {
                const code = station.getAttribute("code")?.trim() || "N/A";
                const name = station.querySelector("stationname")?.textContent || "未命名站點";
                const nameDisplay = `${name}(${code})`;

                const currentTemp = extractNodeValue("Temperature", station);
                const maxTemp = extractNodeValue("Temperature_daily_max", station);
                const minTemp = extractNodeValue("Temperature_daily_min", station);
                const humidity = extractNodeValue("Humidity", station);
                const windSpeed = extractNodeValue("WindSpeed", station);
                const windGust = extractNodeValue("WindGust", station);
                const mslPressure = extractNodeValue("MeanSeaLevelPressure", station);
                const stationPressure = extractNodeValue("StationPressure", station);

                const windDirNode = station.querySelector("WindDirection");
                const winddValue = windDirNode?.querySelector("dValue")?.textContent || '--';
                const windDegree = windDirNode?.querySelector("Degree")?.textContent || '--';
                let windDirDisplay = '--';
                if (winddValue !== '--' && windDegree !== '--') {
                    windDirDisplay = `${winddValue}(${windDegree}°)`;
                } else if (winddValue !== '--') {
                    windDirDisplay = winddValue;
                } else if (windDegree !== '--') {
                    windDirDisplay = `${windDegree}°`;
                }

                let rain1m = "--", rain1h = "--", rainToday = "--";
                const rainfallNodes = station.querySelectorAll("Rainfall");
                rainfallNodes.forEach(node => {
                    const type = node.querySelector("Type")?.textContent;
                    const val = node.querySelector("dValue")?.textContent || node.querySelector("Value")?.textContent || "0.0";
                    if (type === "3") rain1m = val;
                    if (type === "4") rain1h = val;
                    if (type === "5") rainToday = val;
                });

                const rain1mClass = parseFloat(rain1m) > 0 ? 'rain-active' : '';
                const rain1hClass = parseFloat(rain1h) > 0 ? 'rain-active' : '';
                const rainTodayClass = parseFloat(rainToday) > 0 ? 'rain-active' : '';

                const cardHtml = `
                    <div class="station-card">
                        <div class="station-name">${nameDisplay}</div>
                        <div class="temp-row">
                            <div class="current-temp">${currentTemp}°C</div>
                            <div class="temp-range">
                                <div>最高: <span class="high-temp">${maxTemp}°C</span></div>
                                <div>最低: <span class="low-temp">${minTemp}°C</span></div>
                            </div>
                        </div>
                        <div class="metrics-grid">
                            <div class="metric col-half">
                                <span>相對濕度(%)</span>
                                <strong>${humidity}%</strong>
                            </div>
                            <div class="metric col-half">
                                <span>風向(°)</span>
                                <strong>${windDirDisplay}</strong>
                            </div>
                            <div class="metric col-half">
                                <span>風速(km/h)</span>
                                <strong>${windSpeed}${windSpeed !== '--' ? ' <small>km/h</small>' : ''}</strong>
                            </div>
                            <div class="metric col-half">
                                <span>陣風(km/h)</span>
                                <strong>${windGust}${windGust !== '--' ? ' <small>km/h</small>' : ''}</strong>
                            </div>
                            <div class="metric col-half">
                                <span>平均海平面氣壓(hPa)</span>
                                <strong>${mslPressure}${mslPressure !== '--' ? ' <small>hPa</small>' : ''}</strong>
                            </div>
                            <div class="metric col-half">
                                <span>站氣壓(hPa)</span>
                                <strong>${stationPressure}${stationPressure !== '--' ? ' <small>hPa</small>' : ''}</strong>
                            </div>
                            
                            <div class="metric col-third ${rain1mClass}">
                                <span>一分鐘雨量</span>
                                <strong>${rain1m}${rain1m !== '--' ? ' <small>mm</small>' : ''}</strong>
                            </div>
                            <div class="metric col-third ${rain1hClass}">
                                <span>一小時雨量</span>
                                <strong>${rain1h}${rain1h !== '--' ? ' <small>mm</small>' : ''}</strong>
                            </div>
                            <div class="metric col-third ${rainTodayClass}">
                                <span>日總雨量</span>
                                <strong>${rainToday}${rainToday !== '--' ? ' <small>mm</small>' : ''}</strong>
                            </div>
                        </div>
                    </div>
                `;
                gridContainer.innerHTML += cardHtml;
            });

            // ========== New: Create Circle Markers on Map after data loaded ==========
            renderMapMarkers(stations);
        })
        .catch(err => {
            console.error(err);
            document.getElementById('grid-container').innerHTML = `
                <div class="loading" style="color: #e74c3c;">
                    載入失敗，請檢查網絡或代理狀態
                </div>`;
        });
}

fetchGridData();
setInterval(fetchGridData, 60000);

// ========== NEW FUNCTIONS (Map + Chart Logic) ==========
// Render clickable circle markers on map
function renderMapMarkers(stationList) {
    const mapArea = document.getElementById('map-area');
    mapArea.innerHTML = '';

    stationList.forEach((station, idx) => {
        const code = station.getAttribute("code") || "";
        const name = station.querySelector("stationname")?.textContent || "";
        // Random position for demo (you can replace with real GPS coordinates)
        const left = 10 + (idx % 8) * 11;
        const top = 15 + Math.floor(idx / 8) * 25;

        const marker = document.createElement('div');
        marker.className = 'map-marker';
        marker.dataset.code = code;
        marker.dataset.name = name;
        marker.style.left = `${left}%`;
        marker.style.top = `${top}%`;

        // Click event for marker
        marker.addEventListener('click', () => {
            load24hTrend(code, name);
        });

        mapArea.appendChild(marker);
    });
}

// Load 24h data and draw trend chart
function load24hTrend(stationCode, stationName) {
    const chartWrapper = document.getElementById('chart-wrapper');
    const chartTitle = document.getElementById('chart-title');
    chartWrapper.style.display = 'block';
    chartTitle.textContent = `${stationName} (${stationCode}) - 過去24小時氣溫趨勢`;

    // Simulate 24h time & temperature data (replace with real XML API if needed)
    const timeLabels = [];
    const tempData = [];
    const now = new Date();

    for (let i = 24; i >= 0; i--) {
        const time = new Date(now - i * 60 * 60 * 1000);
        const h = time.getHours().toString().padStart(2, '0');
        const m = time.getMinutes().toString().padStart(2, '0');
        timeLabels.push(`${h}:${m}`);
        // Random temperature for demo (22 ~ 32 °C)
        const randomTemp = (22 + Math.random() * 10).toFixed(1);
        tempData.push(parseFloat(randomTemp));
    }

    // Render Highcharts trend chart
    Highcharts.chart('trend-chart', {
        chart: {
            type: 'spline',
            backgroundColor: '#ffffff'
        },
        title: {
            text: ''
        },
        xAxis: {
            categories: timeLabels,
            tickInterval: 3,
            labels: {
                rotation: -30
            }
        },
        yAxis: {
            title: {
                text: '氣溫 (°C)'
            },
            min: 18,
            max: 35,
            gridLineColor: '#eaecef'
        },
        tooltip: {
            valueSuffix: ' °C',
            shared: true
        },
        series: [{
            name: '即時氣溫',
            data: tempData,
            color: '#2a5298',
            lineWidth: 3,
            marker: {
                radius: 4,
                fillColor: '#3498db'
            }
        }],
        credits: {
            enabled: false
        }
    });
}
</script>

</body>
</html>
