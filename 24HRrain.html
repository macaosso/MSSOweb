<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>澳門實時天氣 | 自動氣象監測</title>
<script src="https://code.highcharts.com/highcharts.js"></script>
<style>
* {box-sizing:border-box; margin:0; padding:0; font-family: "Microsoft JhengHei", "Heiti TC", sans-serif;}
body {background:#f7f8fa; color:#222; padding:15px;}
.container {max-width:1000px; margin:0 auto;}
.header {background:#0a5196; color:white; padding:18px 22px; border-radius:10px; margin-bottom:18px; text-align:center;}
.header h1 {font-size:20px; font-weight:600;}
.update-info {font-size:13px; opacity:0.9; margin-top:5px;}

.panel {background:white; border-radius:10px; padding:18px; margin-bottom:16px; box-shadow:0 2px 6px rgba(0,0,0,0.06);}
.panel-title {font-size:15px; font-weight:bold; margin-bottom:12px; color:#0a5196;}

.select-row {display:flex; gap:12px; margin-bottom:15px; flex-wrap:wrap;}
.select-box {flex:1; min-width:220px;}
select {width:100%; padding:10px 12px; border:1px solid #ddd; border-radius:8px; font-size:14px; background:white;}

.station-table {width:100%; border-collapse:collapse; font-size:14px;}
.station-table th {background:#f0f4f9; padding:10px; text-align:left; font-weight:bold; color:#0a5196;}
.station-table td {padding:10px; border-bottom:1px solid #eee;}
.station-table tr {cursor:pointer;}
.station-table tr:hover {background:#f0f7ff;}
.station-table tr.active {background:#d6e8ff;}
.station-table tr.hide {display:none;}

.chart-box {width:100%; height:360px; margin-top:10px; display:none;}
.tip-text {color:#e53935; text-align:center; padding:20px; font-size:14px;}
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>澳門實時天氣監測</h1>
        <div class="update-info">更新時間：<span id="show-time">載入中...</span></div>
    </div>

    <div class="panel">
        <div class="panel-title">選擇觀測參數</div>
        <div class="select-row">
            <div class="select-box">
                <select id="param-select">
                    <option value="temp">氣溫 (°C)</option>
                    <option value="humidity">相對濕度 (%)</option>
                    <option value="windSpeed">風速 (km/h)</option>
                    <option value="windGust">陣風 (km/h)</option>
                    <option value="windDir">風向 (°)</option>
                    <option value="mslPressure">海平面氣壓 (hPa)</option>
                    <option value="stationPressure">站氣壓 (hPa)</option>
                    <option value="rain1m">1分鐘雨量 (mm)</option>
                    <option value="rain1h">1小時雨量 (mm)</option>
                </select>
            </div>
        </div>
    </div>

    <div class="panel">
        <div class="panel-title">觀測站數據（點擊查看趨勢）</div>
        <table class="station-table">
            <thead>
                <tr>
                    <th>站名</th>
                    <th>站號</th>
                    <th>數值</th>
                </tr>
            </thead>
            <tbody id="station-list">
                <tr><td colspan="3" class="tip-text">正在讀取數據，請稍候...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="panel">
        <div class="panel-title">24小時變化趨勢</div>
        <div id="trend-chart" class="chart-box"></div>
    </div>
</div>

<script>
const XML_URL = "https://xml.smg.gov.mo/c_actualweather.xml";
const HISTORY_KEY = "weather_history_24h";
const MAX_POINTS = 288;

const PARAM = {
    temp:       {name:"氣溫",      unit:"°C",  type:"line",   color:"#e63946"},
    humidity:   {name:"相對濕度", unit:"%",   type:"line",   color:"#2a9d8f"},
    windSpeed:  {name:"風速",     unit:"km/h",type:"line",   color:"#457b9d"},
    windGust:   {name:"陣風",     unit:"km/h",type:"line",   color:"#9b59b6"},
    windDir:    {name:"風向",     unit:"°",   type:"scatter",color:"#264653"},
    mslPressure:{name:"海平面氣壓",unit:"hPa", type:"line",   color:"#f4a261"},
    stationPressure:{name:"站氣壓",unit:"hPa",type:"line",   color:"#e76f51"},
    rain1m:     {name:"1分鐘雨量",unit:"mm",  type:"column", color:"#43aa8b"},
    rain1h:     {name:"1小時雨量",unit:"mm",  type:"column", color:"#277da1"}
};

let stationsCache = [];
let updateTime = "";
let updateTs = 0;
const $ = (s)=>document.querySelector(s);

function val(node){
    if(!node) return null;
    let v = node.querySelector("dValue")?.textContent || node.querySelector("Value")?.textContent;
    return (v==='--'||v===null||v===undefined) ? null : parseFloat(v);
}

// Direct fetch + ignore CORS for modern browser (Chrome/Firefox)
async function loadXML(){
    try {
        const res = await fetch(XML_URL + "?t=" + Date.now(), {
            mode: "no-cors",
            cache: "no-store"
        });
        const txt = await res.text();
        const xml = new DOMParser().parseFromString(txt,"text/xml");

        const parserErr = xml.querySelector("parsererror");
        if(parserErr) throw new Error("XML 解析失敗，來源伺服器拒絕連線");

        const ut = xml.querySelector("ActualWeather > Custom > UpdateTime");
        if(!ut) throw new Error("找不到 UpdateTime 時間節點");
        updateTime = ut.textContent.trim();
        updateTs = new Date(updateTime).getTime();
        $("#show-time").textContent = updateTime;

        stationsCache = Array.from(xml.querySelectorAll("WeatherReport station"));
        refreshTable();
        saveHistory();
    }catch(e){
        let errMsg = e.message || "網路跨域限制";
        $("#station-list").innerHTML = `<tr><td colspan="3" class="tip-text">載入失敗：${errMsg}<br>請使用後端代理伺服器</td></tr>`;
        $("#show-time").textContent = "載入失敗";
        console.error(e);
    }
}

function refreshTable(){
    let key = $("#param-select").value;
    let cfg = PARAM[key];
    let list = $("#station-list");
    list.innerHTML = "";

    stationsCache.forEach(st=>{
        let code = st.getAttribute("code")||"";
        let name = st.querySelector("stationname")?.textContent||"";
        let v = null;

        switch(key){
            case "temp": v=val(st.querySelector("Temperature")); break;
            case "humidity":v=val(st.querySelector("Humidity"));break;
            case "windSpeed":v=val(st.querySelector("WindSpeed"));break;
            case "windGust":v=val(st.querySelector("WindGust"));break;
            case "windDir":v=val(st.querySelector("WindDirection Degree"));break;
            case "mslPressure":v=val(st.querySelector("MeanSeaLevelPressure"));break;
            case "stationPressure":v=val(st.querySelector("StationPressure"));break;
            case "rain1m":
                let r1=Array.from(st.querySelectorAll("Rainfall")).find(x=>x.querySelector("Type")?.textContent=="3");
                v=val(r1); break;
            case "rain1h":
                let r2=Array.from(st.querySelectorAll("Rainfall")).find(x=>x.querySelector("Type")?.textContent=="4");
                v=val(r2); break;
        }

        let tr = document.createElement("tr");
        tr.dataset.code = code;
        tr.innerHTML = `<td>${name}</td><td>${code}</td><td>${v===null?"—":v+" "+cfg.unit}</td>`;
        if(v===null) tr.classList.add("hide");
        tr.onclick = ()=>drawChart(key,code,name);
        list.appendChild(tr);
    });
}

function saveHistory(){
    let hist = JSON.parse(localStorage.getItem(HISTORY_KEY)||"[]");
    let has = hist.some(x=>x.ts === updateTs);
    if(has) return;

    let oneDayAgo = Date.now() - 86400000;
    hist = hist.filter(x=>x.ts >= oneDayAgo);

    stationsCache.forEach(st=>{
        let code = st.getAttribute("code")||"";
        hist.push({
            ts:updateTs, time:updateTime, code:code,
            temp:val(st.querySelector("Temperature")),
            humidity:val(st.querySelector("Humidity")),
            windSpeed:val(st.querySelector("WindSpeed")),
            windGust:val(st.querySelector("WindGust")),
            windDir:val(st.querySelector("WindDirection Degree")),
            mslPressure:val(st.querySelector("MeanSeaLevelPressure")),
            stationPressure:val(st.querySelector("StationPressure")),
            rain1m:val(Array.from(st.querySelectorAll("Rainfall")).find(x=>x.querySelector("Type")?.textContent=="3")),
            rain1h:val(Array.from(st.querySelectorAll("Rainfall")).find(x=>x.querySelector("Type")?.textContent=="4"))
        });
    });

    if(hist.length>MAX_POINTS) hist=hist.slice(-MAX_POINTS);
    localStorage.setItem(HISTORY_KEY,JSON.stringify(hist));
}

function drawChart(key,code,name){
    let cfg = PARAM[key];
    $("#trend-chart").style.display = "block";

    let hist = JSON.parse(localStorage.getItem(HISTORY_KEY)||"[]");
    let data = hist.filter(x=>x.code===code).sort((a,b)=>a.ts-b.ts);
    let points = data.map(x=>[x.ts, x[key]]);

    Highcharts.chart("trend-chart",{
        chart:{type:cfg.type, backgroundColor:"#fff"},
        title:{text:name+"｜"+cfg.name, style:{fontSize:"15px",color:"#0a5196"}},
        xAxis:{
            type:"datetime", dateTimeLabelFormats:{minute:"%H:%M",hour:"%H:%M"},
            title:{text:"時間"}
        },
        yAxis:{title:{text:cfg.name+" ("+cfg.unit+")"}},
        tooltip:{xDateFormat:"%m-%d %H:%M", valueSuffix:" "+cfg.unit},
        legend:{enabled:false},
        credits:{enabled:false},
        series:[{data:points, color:cfg.color, marker:{radius:4}}]
    });

    document.querySelectorAll("#station-list tr").forEach(r=>r.classList.remove("active"));
    let activeTr = document.querySelector(`#station-list tr[data-code="${code}"]`);
    if(activeTr) activeTr.classList.add("active");
}

$("#param-select").addEventListener("change",refreshTable);
loadXML();
setInterval(loadXML, 300000);
</script>
</body>
</html>
