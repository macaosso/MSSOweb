<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8"> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>熱帶氣旋資訊</title>
  <link rel="icon" type="image/png" href="icons/MSSO.png">

  <style>
    body { margin: 0; font-family: Arial, sans-serif; }

    .header {
      background: #1f3a4d;
      color: white;
      padding: 25px 20px;
      display:flex;
      align-items:center;
    }

    .title { font-size: 20px; font-weight: bold; margin-left:10px; }
    .logo { height:40px; }

    /* ✅ MENU SYSTEM */
    .menu-container {
      position: relative;
      z-index: 3000;
    }

    .menu-toggle {
      display: none;
      font-size: 26px;
      padding: 10px 15px;
      cursor: pointer;
      background: #2d6c94;
      color: white;
    }

    .nav {
      background: #2d6c94;
      display: flex;
    }

    .nav a {
      color: white;
      padding: 12px 15px;
      font-size: 18px;
      text-decoration: none;
      display: block;
    }

    .nav a:hover { background: #1f4f6d; }

    /* ✅ MOBILE FIX */
    @media (max-width: 768px) {

      .menu-toggle {
        display: block;
      }

      .nav {
        display: none;
        flex-direction: column;
        width: 100%;
      }

      .nav.active {
        display: flex;   /* ✅ KEY */
      }
    }

    /* Warning boxes */
    .box {
      display: none;
      margin: 20px;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .header-red {
      background: #e1665c;
      color: white;
      padding: 15px;
      font-size: 20px;
      font-weight: bold;
    }

    .content-red {
      background: #f5d7d6;
      padding: 20px;
      color: #333;
    }

  </style>
</head>

<body>

<div class="header">
  <img src="icons/MSSO.png" class="logo">
  <div class="title">澳門民間氣象台 MSSO</div>
</div>

<!-- ✅ MENU WRAPPER -->
  <div class="menu-container">
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>

    <div class="nav" id="navMenu">
      <a href="https://macaosso.github.io/MSSOweb/index.html">首頁</a>
      <a href="https://macaosso.github.io/Apparent_Temperature/">酷熱指數</a>
      <a href="https://macaosso.github.io/MSSOweb/cal_dis.html">熱帶氣旋距離計算工具</a> 
      <a href="https://macaosso.github.io/MSSOweb/tc_gis.html">熱帶氣旋路徑地圖</a>  
      <a href="https://macaosso.github.io/MSSOweb/tc.html">熱帶氣旋資訊</a>
      <a href="https://macaosso.github.io/MSSOweb/about.html">關於我們</a>
      <a href="https://macaosso.github.io/MSSOweb/ver.html">版本記錄</a>
    </div>
  </div>
</div>

<!-- 🔴 tc.txt -->
<div id="tcBox" class="box">
  <div class="header-red">熱帶氣旋提示</div>
  <div id="tcContent" class="content-red"></div>
</div>

<!-- ✅ Image below the box -->
<div class="tc-image">
  images/tc_track.png
</div>

<script>

// ✅ MENU TOGGLE
function toggleMenu() {
  const nav = document.getElementById("navMenu");
  const btn = document.querySelector(".menu-toggle");

  nav.classList.toggle("active");
  btn.innerHTML = nav.classList.contains("active") ? "✕" : "☰";
}

// ✅ Load box
function loadBox(file, boxId, contentId) {
  fetch(file)
    .then(res => res.text())
    .then(text => {
      const content = text.trim();
      if (content.length > 0) {
        document.getElementById(boxId).style.display = "block";
        document.getElementById(contentId).innerText = content;
      } else {
        document.getElementById(boxId).style.display = "none";
      }
    })
    .catch(() => console.log("Cannot load " + file));
}

loadBox("tc.txt", "tcBox", "tcContent");

</script>

</body>
</html>
