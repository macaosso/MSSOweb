<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8"> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>澳門民間氣象台 MSSO</title>

  <style>
    body { margin: 0; font-family: Arial, sans-serif; }

    .header { background: #1f3a4d; color: white; padding: 15px 20px; display:flex; align-items:center; }
    .title { font-size: 24px; font-weight: bold; margin-left:10px; }
    .logo { height:40px; }

    .nav { background: #2d6c94; display: flex; } 
    .nav a {
      color: white;
      padding: 15px 20px;
      text-decoration: none;
      display: block;
    }
    .nav a:hover { background: #1f4f6d; }

    /* Warning boxes */
    .box {
      display: none;
      margin: 20px;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .header-orange {
      background: #f39c12;
      color: white;
      padding: 15px;
      font-size: 20px;
      font-weight: bold;
    }

    .header-red {
      background: #e1665c;
      color: white;
      padding: 15px;
      font-size: 20px;
      font-weight: bold;
    }

    .content-yellow {
      background: #fff4cc;
      padding: 20px;
      color: #333;
    }

    .content-red {
      background: #f5d7d6;
      padding: 20px;
      color: #333;
    }

    /* ✅ Forecast boxes */
    .forecast-container {
      display: flex;
      margin: 20px;
      gap: 10px;
    }

    .forecast-box {
      flex: 1;
      background: #d9e6e6;
      border-radius: 10px;
      overflow: hidden;
    }

    .forecast-title {
      background: #4fa6a6;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .forecast-content {
      padding: 20px;
      line-height: 1.6;
    }

  </style>
</head>

<body>

<div class="header">
  <img src="icons/MSSO.png" class="logo">
  <div class="title">澳門民間氣象台 MSSO</div>
</div>
<!-- 🟠 NEW alertips box  <a href="https://macaosso.github.io/MSSOweb/weather.html">天氣資訊n</a>  -->
<div class="nav">
  <a href="https://macaosso.github.io/MSSOweb/index.html">首頁</a
  <a href="https://macaosso.github.io/MSSOweb/tc.html">熱帶氣旋資訊//</a> 
  <a href="https://macaosso.github.io/MSSOweb/about.html">關於我們</a>
</div>

<!-- ✅ Forecast Section -->

<!-- 🔴 tc.txt -->
<div id="tcBox" class="box">
  <div class="header-red">熱帶氣旋提示</div>
  <div id="tcContent" class="content-red"></div>
</div>

<script>

// ✅ Warning boxes
function loadBox(file, boxId, contentId) {
  fetch(file)
    .then(res => res.text())
    .then(text => {
      const content = text.trim();
      if (content.length > 0) {
        document.getElementById(boxId).style.display = "block";
        document.getElementById(contentId).innerText = content;
      } else {
        document.getElementById(boxId).style.display = "none";
      }
    })
    .catch(() => console.log("Cannot load " + file));
}

loadBox("tc.txt", "tcBox", "tcContent");


</script>

</body>
</html>
