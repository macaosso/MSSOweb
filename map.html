<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Macau Weather Stations Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
#map { width: 100%; height: 500px; }

</head>
<body>
<h2>澳門實時氣象站地圖</h2>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// 1. Init map centered on Macau
const map = L.map('map').setView([22.19, 113.55], 13);

// 2. Add base map
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

// 3. Your weather stations (name, lat, lng, temp)
const stations = [
  { name: '大炮台', lat: 22.1933, lng: 113.5533, temp: 28.4 },
  { name: '黑沙環', lat: 22.2058, lng: 113.5644, temp: 29.3 },
  { name: '外港', lat: 22.1983, lng: 113.5583, temp: 28.8 },
  { name: '媽閣', lat: 22.1817, lng: 113.5417, temp: 29.3 },
  { name: '大潭山', lat: 22.1567, lng: 113.5667, temp: 27.4 },
  { name: '路環市區', lat: 22.1333, lng: 113.5733, temp: 28.9 },
];

const XML_URL = "https://xml.smg.gov.mo/c_actualweather.xml";

async function updateMap() {
  const res = await fetch("https://api.allorigins.win/raw?url="+encodeURIComponent(XML_URL));
  const text = await res.text();
  const parser = new DOMParser();
  const xml = parser.parseFromString(text, "application/xml");

  // Match your station list and update popup/color
}

// Run now + every 5 min
updateMap();
setInterval(updateMap, 300 * 1000);
  
// 4. Add markers with temp color
stations.forEach(s => {
  // Color by temperature
  let color = '#5cadff';
  if (s.temp >= 29) color = '#ff6b6b';
  else if (s.temp >= 28) color = '#ffce54';

  L.circleMarker([s.lat, s.lng], {
    radius: 10,
    fillColor: color,
    color: '#fff',
    weight: 2,
    fillOpacity: 0.9
  })
  .addTo(map)
  .bindPopup(`<b>${s.name}</b><br>氣溫: ${s.temp}°C`);
});
</script>
</body>
</html>
