<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>澳門各氣象站數據</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f3f7;
            color: #2c3e50;
            padding: 20px;
            font-size: 14px;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        header {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            padding: 20px 30px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        header h1 {
            font-size: 1.6rem;
            font-weight: 600;
        }
        .meta-info {
            text-align: right;
            font-size: 0.9rem;
            opacity: 0.9;
        }

        /* 頂部切換按鈕 */
        .view-switch {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }
        .view-switch button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            background: #e8edf2;
            cursor: pointer;
            font-size: 0.95rem;
        }
        .view-switch button.active {
            background: #2a5298;
            color: #fff;
        }

        /* 分類折疊按鈕區 */
        .tab-wrapper {
            background: #fff;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }
        .tab-group {
            margin-bottom: 10px;
        }
        .group-title {
            font-size: 1rem;
            font-weight: 600;
            color: #2c3e50;
            margin: 0 0 8px 0;
            padding: 4px 0;
        }
        .group-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding-left: 10px;
        }

        .tab-btn {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            background: #e8edf2;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;

            color: #fff;
        }
        .tab-btn:hover:not(.active) {
            background: #d0d9e2;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 1024px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
        }

            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            padding: 15px;
            position: relative;
        }
        #macau-map {
            width: 100%;
            height: 650px;
            border-radius: 8px;

            position: absolute;
            bottom: 15px;
            right: 15px;
            background: rgba(255,255,255,0.95);
            padding: 8px 10px;
            border-radius: 6px;
            font-size: 0.75rem;

            max-height: 180px;
            overflow-y: auto;

            align-items: center;
            margin-bottom: 3px;
        }

            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 5px;
        }

        .time-stamp {
            position: absolute;
            top: 25px;
            right: 25px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.9rem;
            z-index: 1000;
        }

        /* 單個氣象卡片容器 */
        .station-single {
            height: 650px;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 20px;
        }
        .empty-tip {
            color: #999;
            font-size: 1rem;
        }

        .station-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            padding: 18px;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            border-top: 4px solid #3498db;
            width: 100%;
            max-width: 420px;
            font-size: 13px;
        }
        .station-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        .station-name {
            font-size: 1.1rem;
            font-weight: bold;
            color: #2c3e50;
            border-bottom: 1px solid #ecf0f1;
            padding-bottom: 8px;
        }
        .temp-row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin: 15px 0;

        .current-temp {
            font-size: 2rem;
            font-weight: 700;
            color: #1a1a1a;
        }
        .temp-range {
            font-size: 0.85rem;
            text-align: right;
        }
        .high-temp { color: #e74c3c; font-weight: 600; }
        .low-temp { color: #34495e; font-weight: 600; }
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            font-size: 0.8rem;
        }
        .metric {
            background: #f8f9fa;
            padding: 8px 10px;
            border-radius: 6px;
        }
        .col-half {
            grid-column: span 3;
        }
        .col-third {
            grid-column: span 2;
        }
        .metric span {
            display: block;
            color: #7f8c8d;
            font-size: 0.7rem;
            text-transform: uppercase;
            margin-bottom: 2px;
        }
        .metric strong {
            color: #2c3e50;
            font-size: 0.9rem;
        }
        .rain-active {
            background: #e8f4fd;
            border: 1px solid #bcdffb;
        }
        .rain-active strong {
            color: #2980b9;
        }
        .heat-high {
            background: #ffe6e6;
            border: 1px solid #f5a9a9;
        }
        .heat-high strong {
            color: #c0392b;
        }
        .apparent-high {
            background: #f3e5f5;
            border: 1px solid #d2bade;
        }
        .apparent-high strong {
            color: #8e44ad;
        }
        .dew-high {
            background: #e8f4fd;
            border: 1px solid #a0cfee;
        }
        .dew-high strong {
            color: #2980b9;
        }
        .rain1-yellow {
            background: #fff9c4;
            border: 1px solid #ffe082;
        }
        .rain1-red {
            background: #ffebee;
            border: 1px solid #ef9a9a;
        }
        .rain1-gray {
            background: #eceff1;
            border: 1px solid #b0bec5;
        }

            background: #fff3e0;

        }

            background: #ffebee;
            border: 1px solid #ef9a9a;

        </div>

        <div class="tab-group">
            <h3 class="group-title">氣象數據</h3>
            <div class="group-buttons show">
                <button class="tab-btn active" data-type="tempCurrent">實時氣溫 (°C)</button>
                <button class="tab-btn" data-type="tempMax">最高氣溫 (°C)</button>
                <button class="tab-btn" data-type="tempMin">最低氣溫 (°C)</button>
                <button class="tab-btn" data-type="apparentTemp">體感溫度 (°C)</button>
                <button class="tab-btn" data-type="heatIndex">酷熱指數 (°C)</button>

                <button class="tab-btn" data-type="wbgt">綜合溫度熱指數WBGT(°C)</button>
                <button class="tab-btn" data-type="dewPoint">露點溫度 (°C)</button>
                <button class="tab-btn" data-type="humidity">相對濕度 (%)</button>
                <button class="tab-btn" data-type="windDir">風向</button>

                <button class="tab-btn" data-type="windGust">陣風 (km/h)</button>
                <button class="tab-btn" data-type="pressSea">海平面氣壓 (hPa)</button>
                <button class="tab-btn" data-type="pressStation">站氣壓 (hPa)</button>
            </div>
        </div>
        <!-- 新增水位/積水分類 -->
        <div class="tab-group">
            <h3 class="group-toggle">水位</h3>

            </div>
        </div>
    </div>

    <!-- 地圖視圖 -->
    <div class="main-layout" id="map-view">
        <div class="map-card">
            <div id="macau-map"></div>
            <div id="time-stamp" class="time-stamp"></div>
            <div id="current-indicator" class="time-stamp-indicator"></div>
            <div id="map-legend" class="map-legend">
                <h4>圖例</h4>
                <div id="legend-content" class="legend-items"></div>
            </div>
        </div>
        <div id="single-card-box" class="station-single">
            <div class="empty-tip">請點擊地圖上圓圈查看氣象站實時數據</div>
        </div>
    </div>

    <!-- 表格視圖 -->
    <div id="table-view" class="hide">
        <div class="table-container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom:10px;">
                <div id="table-title" style="font-size:1.1rem;font-weight:bold;">數據表格</div>
                <div class="sort-buttons">
                    <button class="sort-btn" data-sort="default">預設</button>
                    <button class="sort-btn" data-sort="desc">高至低</button>
                    <button class="sort-btn" data-sort="asc">低至高</button>
                </div>
            </div>
            <table class="data-table" id="data-table">
                <thead><tr><th>測站名稱</th><th>站代碼</th><th>數值</th></tr></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
// ========== 常數定義(WBGT計算用) ==========
const sigma = 5.670374419e-8; //史蒂芬波茲曼常數 W/(m²·K⁴)
const eps = 0.95;             //地面輻射率

// ========== 原有計算函數 ==========
function calculateApparentTemp(T, RH, windSpeedKmH) {
    const V = windSpeedKmH / 3.6;
    const e = (RH / 100) * 6.105 * Math.exp((17.27 * T) / (237.7 + T));
    const apparentTemp = 1.04 * T + 0.2 * e - 0.65 * V - 2.7;
    return isNaN(apparentTemp) ? '--' : apparentTemp.toFixed(1);
}
function calculateHeatIndex(T, RH) {
    if (isNaN(T) || isNaN(RH)) return '--';
    let hi = -8.7846947556 + 1.61139411 * T + 2.3385488388 * RH
             - 0.14611605 * T * RH - 0.012308094 * Math.pow(T, 2)
             - 0.0164248278 * Math.pow(RH, 2)
             + 0.002211732 * Math.pow(T, 2) * RH
             + 0.00072546 * T * Math.pow(RH, 2)
             - 0.000003582 * Math.pow(T, 2) * Math.pow(RH, 2);
    return hi.toFixed(1);
}
function calculateDewPoint(T, RH) {
    if (isNaN(T) || isNaN(RH) || RH <= 0) return '--';
    const a = 17.27;
    const b = 237.7;
    const gamma = (a * T) / (b + T) + Math.log(RH / 100);
    const dew = (b * gamma) / (a - gamma);
    return dew.toFixed(1);
}

// ========== 新增 WBGT 全套計算子函數 ==========
// Tnw計算
function calcTnw(Ta, RH) {
    if(isNaN(Ta)||isNaN(RH)) return NaN;
    let part1 = Math.atan(0.151977 * Math.sqrt(RH + 8.313659));
    let part2 = Math.atan(Ta + RH);
    let part3 = Math.atan(RH - 1.676331);
    let part4 = 0.00391838 * Math.pow(RH, 1.5) * Math.atan(0.023101 * RH);
    let Tnw = Ta * part1 + part2 - part3 + part4 - 4.686035;
    return Tnw;
}
// hc對流換熱係數
function calcHc(Va) {
    if(isNaN(Va)) return NaN;
    let v_ms = Va / 3.6; // km/h → m/s
    let hc = 6.3 * Math.pow(v_ms,0.6) / Math.pow(0.15,0.4);
    return hc;
}
// 迭代求解Tg、Tmrt、hr，回傳Tg
function solveTgTmrtHr(TaC, Va) {
    const TaK = TaC + 273.15;
    const hc = calcHc(Va);
    if (isNaN(hc)) return {Tg:NaN, Tmrt:NaN, hr:NaN};

    // Initial guess in Kelvin
    let TgK = TaK + 3;
    let TmrtK = TaK + 5;
    let hr;

    for(let iter=0; iter<20; iter++){
        // Radiative heat transfer coefficient hr
        hr = eps * sigma * (TgK*TgK + TmrtK*TmrtK) * (TgK + TmrtK);
        // Globe heat balance: εσ(Tg⁴-Tmrt⁴)+hc(Tg-Ta)=0 → solve new TgK
        const Tg4 = Math.pow(TgK,4);
        const Tmrt4 = Math.pow(TmrtK,4);
        // Correct Tg from heat balance equation
        const newTgK = ( eps*sigma*Tmrt4 + hc*TaK ) / ( eps*sigma*Math.pow(TgK,3) + hc );
        // Update Tg
        TgK = newTgK;
        // Update Tmrt from empirical solar approx (standard for meteor WBGT calc)
        TmrtK = TaK + 12;
    }
    // convert back to Celsius
    const Tg = TgK - 273.15;
    const Tmrt = TmrtK - 273.15;
    return {Tg, Tmrt, hr};
}
// 最終WBGT =0.7*Tnw +0.2*Tg +0.1*Ta
function calcWBGT(Ta,RH,windKmH){
    if(isNaN(Ta)||isNaN(RH)||isNaN(windKmH)) return '--';
    let Tnw = calcTnw(Ta,RH);
    let {Tg} = solveTgTmrtHr(Ta,windKmH);
    if(isNaN(Tnw)||isNaN(Tg)) return '--';
    let wbgt = 0.7*Tnw + 0.2*Tg + 0.1*Ta;
    return wbgt.toFixed(1);
}

// ========== 卡片樣式 Class ==========
function getHeatIndexClass(val) {
    let num = parseFloat(val);
    if (!isNaN(num) && num >= 40) return 'metric col-half heat-high';
    return 'metric col-half';
}
function getApparentClass(val) {
    let num = parseFloat(val);
    if (!isNaN(num) && num >= 36) return 'metric col-half apparent-high';
    return 'metric col-half';
}
function getDewClass(val) {
    let num = parseFloat(val);
    if (!isNaN(num) && num >= 28) return 'metric col-half dew-high';
    return 'metric col-half';
}
// WBGT卡片樣式
function getWBGTClass(val){
    let n=parseFloat(val);
    if(isNaN(n)) return "metric col-half";
    if(n>=32) return "metric col-half wbgt-danger";
    if(n>=28) return "metric col-half wbgt-warn";
    return "metric col-half";
}
function getRain1hClass(val) {
    let num = parseFloat(val);
    if (isNaN(num)) return 'metric col-third';
    if (num >= 79.5) return 'metric col-third rain1-gray';
    if (num >= 49.5) return 'metric col-third rain1-red';
    if (num >= 19.5) return 'metric col-third rain1-yellow';
    return 'metric col-third';
}
function getRainDayClass(val) {
    let num = parseFloat(val);
    if (isNaN(num)) return 'metric col-third';
    if (num >= 350) return 'metric col-third rainDay-gray';
    if (num >= 200) return 'metric col-third rainDay-red';
    if (num >= 100) return 'metric col-third rainDay-orange';
    return 'metric col-third';
}
function getWaterLevelClass(val) {
    let num = parseFloat(val);
    if (isNaN(num) || num <= 0) return 'metric col-third flood-normal';
    if (num >= 0.5) return 'metric col-third flood-heavy';
    if (num >= 0.2) return 'metric col-third flood-mid';
    return 'metric col-third flood-light';
}
function formatVal(val, unit) {
    return val === '--' ? val : `${val} ${unit}`;
}

// ========== 測站座標 & 代碼 ==========
const weatherPoints = {
    "紀念孫中山市政公園": { code: "DP", lat: 22.215322, lng: 113.543490 },
    "黑沙環": { code: "EM", lat: 22.207129, lng: 113.559971 },

    "澳門大橋北": { code: "MN", lat: 22.186985, lng: 113.573231 },

    "蓮花大橋": { code: "LH", lat: 22.139934, lng: 113.549094 }

const floodPoints = {
    "青洲河邊馬路": { lat: 22.212097, lng: 113.535243 },
    "花地瑪教會街": { lat: 22.211374, lng: 113.546674 },
    "紅街市": { lat: 22.205155, lng: 113.544597 },
    "光復街": { lat: 22.202498, lng: 113.544916 },
    "永樂戲院": { lat: 22.202574, lng: 113.542885 },
    "內港北": { lat: 22.199984, lng: 113.536861 },
    "內港": { lat: 22.198031, lng: 113.536426 },
    "康公廟": { lat: 22.197330, lng: 113.537858 },

// ========== 地圖標記配色規則【新增WBGT配色】 ==========
function getTempColor(tempStr) {
    const temp = parseFloat(tempStr);
    if (isNaN(temp)) return "#3498db";
    if (temp >= 37.5) return "#330101";   // 非常酷熱
    if (temp >= 35.5) return "#8d1919";   // 非常酷熱
    if (temp >= 32.5) return "#f12828";   // 酷熱
    if (temp >= 27.5) return "#eb5321";   // 炎熱
    if (temp >= 22.5) return "#b37802";   // 溫暖
    if (temp >= 17.5) return "#919107";   // 和暖
    if (temp >= 12.5) return "#19aa75";   // 清涼
    if (temp >= 7.5)  return "#0d517a";   // 寒冷
    if (temp >= 3.5)  return "#141970";
    return "#300c46";                     // 非常寒冷
}

function getHeatIndexColor(hiStr) {
    const hi = parseFloat(hiStr);
    if (isNaN(hi)) return "#927608";
    if (hi >= 54.5) return "#571288";     // 極度危險
    if (hi >= 45.5) return "#ad3123";     // 危險
    if (hi >= 39.5) return "#ad5e19";     // 特別注意
    if (hi >= 35.5) return "#927608";     // 注意
    return "#927608";
}
// WBGT色標
function getWBGTColor(wbgtStr){
    let w=parseFloat(wbgtStr);
    if(isNaN(w)) return "#3498db";
    if(w>=32) return "#910000";    //極危險
    if(w>=30) return "#d62828";    //危險
    if(w>=28) return "#f77f00";    //警戒
    if(w>=26) return "#fcbf49";    //留意
    if(w>=22) return "#38b000";    //舒適
    return "#0077b6";              //偏涼
}

function getHumidityColor(humStr) {
    const hum = parseFloat(humStr);
    if (isNaN(hum)) return "#3498db";
    if (hum >= 94.5) return "#071770";    // 非常潮濕
    if (hum >= 84.5) return "#085794";    // 潮濕
    if (hum >= 49.5) return "#0b8743";    // 正常
    if (hum >= 30.5) return "#9f6d10";    // 乾燥
    return "#641515";                     // 非常乾燥
}

function getDewColor(dewStr) {
    const dew = parseFloat(dewStr);
    if (isNaN(dewStr)) return "#3498db";
    if (dew >= 28)  return "#470f64";     // 危險
    if (dew >= 24)  return "#a82020";     // 悶熱
    if (dew >= 18)  return "#347b28";     // 舒適
    if (dew >= 12)  return "#8f6825";     // 乾爽
    return "#8a462b";                     // 乾燥
}

function getWindColor(windStr) {
    const wind = parseFloat(windStr);
    if (isNaN(wind)) return "#3498db";
    if (wind >= 117.5) return "#6a0606";  // 颶風
    if (wind >= 87.5)  return "#b1510d";  // 暴風
    if (wind >= 62.5)  return "#7f710b";  // 烈風
    if (wind >= 40.5)  return "#154c83";  // 強風
    return "#11750a";                     // 強風以下
}

function getPressSeaColor(pressStr) {
    const press = parseFloat(pressStr);
    if (isNaN(pressStr)) return "#3498db";
    if (press < 980)    return "#571b7a"; // < 980 hPa
    if (press < 990)    return "#791919"; // 980 - 989 hPa
    if (press < 1000)   return "#757012"; // 990 - 999 hPa
    return "#2b7c42";                     // ≥ 1000 hPa
}

function getPressStationColor(pressStr) {
    const press = parseFloat(pressStr);
    if (isNaN(press)) return "#3498db";
    if (press < 965)    return "#571b7a"; // < 965 hPa
    if (press < 975)    return "#791919"; // 965 - 974 hPa
    if (press < 985)    return "#757012"; // 975 - 984 hPa
    return "#2b7c42";                     // ≥ 985 hPa
}

function getWaterLevelColor(wlStr) {
    const wl = parseFloat(wlStr);
    if (isNaN(wl)) return "#3498db";
    if (wl >= 2.50)     return "#000000"; // ≥ 2.50 m
    if (wl >= 1.49)     return "#71180b"; // 1.49 - 2.49 m
    if (wl >= 1.00)     return "#9e551a"; // 1.00 - 1.49 m
    if (wl >= 0.50)     return "#778015"; // 0.50 - 0.99 m
    if (wl >= 0.01)     return "#1a6080"; // 0.01 - 0.49 m
    return "#1b6009";                     // 0.00 m
}

// 更新地圖標記
function updateMapMarkers() {
    clearMarkers();
    let sourceList, pointCoords;

    if (currentTab === "waterLevel") {
        sourceList = floodDataList;
        pointCoords = floodPoints;
    } else {
        sourceList = pointDataList;
        pointCoords = weatherPoints;
    }

    sourceList.forEach(point => {
        const name = point.name;
        const info = pointCoords[name];
        if (!info) return;

        let showVal = "";
        let bgColor = "#3498db";
        let skipMarker = false;

        switch (currentTab) {
            case "tempCurrent": showVal = point.temp; bgColor = getTempColor(showVal); break;
            case "tempMax": showVal = point.tempMax; bgColor = getTempColor(showVal); break;
            case "tempMin": showVal = point.tempMin; bgColor = getTempColor(showVal); break;
            case "humidity": showVal = point.humidity; bgColor = getHumidityColor(showVal); break;
            case "dewPoint": showVal = point.dewPoint; bgColor = getDewColor(showVal); break;
            case "windDir": showVal = point.windDir || "--"; bgColor = "#9b59b6"; break;
            case "windSpeed": showVal = point.windSpeed; bgColor = getWindColor(showVal); break;
            case "windGust": showVal = point.windGust; bgColor = getWindColor(showVal); break;
            case "pressSea": showVal = point.pressSea; bgColor = getPressSeaColor(showVal); break;
            case "pressStation": showVal = point.pressStation; bgColor = getPressStationColor(showVal); break;
            case "apparentTemp": showVal = point.apparentTemp; bgColor = getTempColor(showVal); break;
            case "heatIndex":
                showVal = point.heatIndex;
                bgColor = getHeatIndexColor(showVal);
                const hiNum = parseFloat(showVal);
                if (isNaN(hiNum) || hiNum < 32.5) skipMarker = true;
                break;
            case "wbgt":
                showVal = point.wbgt;
                bgColor = getWBGTColor(showVal);
                const wbgtNum = parseFloat(showVal);
                if(isNaN(wbgtNum)) skipMarker = true;
                break;
            case "waterLevel":
                showVal = point.waterLevel;
                // Skip empty/-- value
                if (showVal === '--' || showVal === '') skipMarker = true;
                bgColor = getWaterLevelColor(showVal);
                break;
        }

        if (skipMarker || showVal === '' || showVal === '--') return;

        const markerIconHtml = `<div style="background:${bgColor};color:#fff;border-radius:50%;width:50px;height:50px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:bold;">${showVal}</div>`;
        const icon = L.divIcon({html: markerIconHtml, className: "", iconSize: [50,50], iconAnchor: [25,25]});
        const marker = L.marker([info.lat, info.lng], { icon: icon }).addTo(map);
        marker.bindPopup(`<strong>${name}</strong>`);

        marker.on('click', () => {
            if (currentTab === "waterLevel") {
                // 水位站專用卡片
                singleCardBox.innerHTML = `
                <div class="station-card">
                    <div class="station-name">${name}</div>
                    <div class="metrics-grid">
                        <div class="metric" style="grid-column: span 6;">
                            <span>實時水位</span>
                            <strong>${formatVal(point.waterLevel, 'm')}</strong>
                        </div>
                    </div>
                </div>`;
            } else {
                // 氣象站專用卡片
                renderSingleCard({...point, code: weatherPoints[name]?.code || ""});
            }
        });
        allMarkers.push(marker);
    });
}
// 渲染數據表格
let lastSort = "default";
function renderDataTable(type, sortType = lastSort) {
    const cfg = fieldMap[type];
    const field = cfg.field;
    const label = cfg.label;
    const unit = cfg.unit;
    document.getElementById('table-title').textContent = `${label} 數據表格`;
    const tbody = document.getElementById('table-body');
    tbody.innerHTML = "";

    let sourceList = type === "waterLevel" ? floodDataList : pointDataList;
    let codeMap = type === "waterLevel" ? null : weatherPoints;

    // Filter valid data
    let validList = sourceList.filter(item => {
        const val = item[field];
        return val !== '--' && val !== '';
    });

    // Sort logic
    if (sortType === "desc") {
        validList.sort((a, b) => parseFloat(b[field]) - parseFloat(a[field]));
    } else if (sortType === "asc") {
        validList.sort((a, b) => parseFloat(a[field]) - parseFloat(b[field]));
    }
    lastSort = sortType;

    validList.forEach(item => {
        const name = item.name;
        // Get code: flood → item.code | weather → from weatherPoints
        let code = "";
        if (codeMap) {
            code = codeMap[name]?.code || "";
        } else {
            code = item.code || "";
        }

        let val = item[field];
        let displayVal = val + (unit ? " " + unit : "");
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${name}</td><td>${code}</td><td>${displayVal}</td>`;
        tbody.appendChild(tr);
    });
}

// ========== 抓取氣象 XML 數據 ==========
function fetchWeatherData() {
    const cacheBuster = Date.now();
    const url = `https://corsproxy.io/?https://xml.smg.gov.mo/c_actualweather.xml?t=${cacheBuster}`;
    return fetch(url, { cache: "no-store" })
        .then(res => {
            if (!res.ok) throw new Error("Weather fetch fail");
            return res.text();
        })
        .then(xmlStr => {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlStr, "text/xml");
            const pubTime = xmlDoc.querySelector("SysPubdate")?.textContent || "未知";
            document.getElementById("pub-date").textContent = pubTime;
            document.getElementById("time-stamp").textContent = pubTime;

            const stations = xmlDoc.querySelectorAll("WeatherReport station");
            pointDataList = [];
            singleCardBox.innerHTML = '<div class="empty-tip">請點擊地圖上圓圈查看測站數據</div>';

            stations.forEach(station => {
                const name = station.querySelector("stationname")?.textContent || "";
                const temp = extractNodeValue("Temperature", station);
                const tempMax = extractNodeValue("Temperature_daily_max", station);
                const tempMin = extractNodeValue("Temperature_daily_min", station);
                const humidity = extractNodeValue("Humidity", station);
                const windSpeed = extractNodeValue("WindSpeed", station);
                const windGust = extractNodeValue("WindGust", station);
                const pressSea = extractNodeValue("MeanSeaLevelPressure", station);
                const pressStation = extractNodeValue("StationPressure", station);
                const windDirNode = station.querySelector("WindDirection");
                const windDir = windDirNode?.querySelector("dValue")?.textContent || "";

                let rain1m = "", rain1h = "", rainTotal = "";
                station.querySelectorAll("Rainfall").forEach(r => {
                    const type = r.querySelector("Type")?.textContent;
                    const val = r.querySelector("dValue")?.textContent || "";
                    if (type === "3") rain1m = val;
                    if (type === "4") rain1h = val;
                    if (type === "5") rainTotal = val;
                });

                const T = parseFloat(temp);
                const RH = parseFloat(humidity);
                const windSpeedKmH = parseFloat(windSpeed);
                const apparentTemp = calculateApparentTemp(T, RH, windSpeedKmH);
                const heatIndex = calculateHeatIndex(T, RH);
                const dewPoint = calculateDewPoint(T, RH);
                // 計算WBGT
                const wbgt = calcWBGT(T,RH,windSpeedKmH);

                pointDataList.push({
                    name, temp, tempMax, tempMin, humidity, windDir,
                    windSpeed, windGust, rain1m, rain1h, rainTotal,
                    pressSea, pressStation, apparentTemp, heatIndex, dewPoint,
                    waterLevel: "--", wbgt
                });
            });
        });
}

// ========== 抓取水位/積水 XML 數據 (已補全) ==========
function fetchFloodData() {
    const cacheBuster = Date.now();
    const url = `https://corsproxy.io/?https://xml.smg.gov.mo/c_ftgms.xml?t=${cacheBuster}`;
    return fetch(url, { cache: "no-store" })
        .then(res => {
            if (!res.ok) throw new Error("Flood fetch fail");
            return res.text();
        })
        .then(xmlStr => {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlStr, "text/xml");
            const stations = xmlDoc.querySelectorAll("WLReport station");
            floodDataList = [];

            stations.forEach(station => {
                // Get native code from XML attribute
                const code = station.getAttribute("code") || "";
                const name = (station.querySelector("stationname")?.textContent || "未知監測點").trim();
                let waterLevel = "--";
                const valNode = station.querySelector("Waterlevel > Value");
                if (valNode && valNode.textContent) {
                    waterLevel = valNode.textContent.trim();
                }
                if (!waterLevel) waterLevel = "--";

                // Save code together with data
                floodDataList.push({ name, code, waterLevel });
            });
        })
        .catch(err => {
            console.error("水位數據載入失敗：", err);
        });
}
    
// ========== 統一載入所有數據 + 更新界面 ==========
function loadAllData() {
    Promise.all([fetchWeatherData(), fetchFloodData()])
        .then(() => {
            updateMapMarkers();
            updateLegendPanel(currentTab);
            renderDataTable(currentTab);
        })
        .catch(err => {
            console.error("整體數據載入失敗：", err);
        });
}

// 頁面載入完成後執行 + 每5分鐘自動刷新
window.addEventListener('DOMContentLoaded', loadAllData);
setInterval(loadAllData, 300000);
</script>
