<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>澳門各區天氣實況 - GIS互動地圖</title>
    <!-- Leaflet Map Library -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f3f7;
            color: #2c3e50;
            padding: 20px;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        header {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            padding: 20px 30px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        header h1 {
            font-size: 1.6rem;
            font-weight: 600;
        }
        .meta-info {
            text-align: right;
            font-size: 0.9rem;
            opacity: 0.9;
        }
        /* Tab Buttons */
        .tab-wrapper {
            background: #fff;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }
        .tab-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            background: #e8edf2;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: #2a5298;
            color: #fff;
        }
        .tab-btn:hover:not(.active) {
            background: #d0d9e2;
        }
        /* Main Layout */
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 1024px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
        }
        .map-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            padding: 15px;
        }
        #macau-map {
            width: 100%;
            height: 650px;
            border-radius: 8px;
        }
        /* Station Cards */
        .station-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        .station-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            padding: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            border-top: 4px solid #3498db;
        }
        .station-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        .station-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: #2c3e50;
            border-bottom: 1px solid #ecf0f1;
            padding-bottom: 8px;
        }
        .temp-row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin: 15px 0;
        }
        .current-temp {
            font-size: 2.2rem;
            font-weight: 700;
            color: #1a1a1a;
        }
        .temp-range {
            font-size: 0.9rem;
            text-align: right;
        }
        .high-temp { color: #e74c3c; font-weight: 600; }
        .low-temp { color: #34495e; font-weight: 600; }
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            font-size: 0.9rem;
        }
        .metric {
            background: #f8f9fa;
            padding: 8px 12px;
            border-radius: 6px;
        }
        .col-half {
            grid-column: span 3;
        }
        .col-third {
            grid-column: span 2;
        }
        .metric span {
            display: block;
            color: #7f8c8d;
            font-size: 0.75rem;
            text-transform: uppercase;
            margin-bottom: 2px;
        }
        .metric strong {
            color: #2c3e50;
        }
        .rain-active {
            background: #e8f4fd;
            border: 1px solid #bcdffb;
        }
        .rain-active strong {
            color: #2980b9;
        }
        .loading {
            grid-column: 1 / -1;
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
            color: #7f8c8d;
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div>
            <h1>澳門各區天氣實況（互動GIS地圖）</h1>
            <small style="color: #2ecc71;">● 可縮放/拖曳地圖 | 點擊標示查看名稱</small>
        </div>
        <div class="meta-info">
            <div>資料更新時間：<span id="pub-date">載入中...</span></div>
            <div>每60秒自動刷新</div>
        </div>
    </header>

    <!-- All Split Map Tabs -->
    <div class="tab-wrapper">
        <div class="tab-buttons">
            <button class="tab-btn active" data-type="tempCurrent">即時氣溫</button>
            <button class="tab-btn" data-type="tempMax">最高氣溫</button>
            <button class="tab-btn" data-type="tempMin">最低氣溫</button>
            <button class="tab-btn" data-type="windDir">風向</button>
            <button class="tab-btn" data-type="windSpeed">風速</button>
            <button class="tab-btn" data-type="windGust">陣風</button>
            <button class="tab-btn" data-type="rain1m">一分鐘雨量</button>
            <button class="tab-btn" data-type="rain1h">一小時雨量</button>
            <button class="tab-btn" data-type="rainTotal">累計日雨量</button>
            <button class="tab-btn" data-type="pressSea">海平面氣壓</button>
            <button class="tab-btn" data-type="pressStation">站點氣壓</button>
            <button class="tab-btn" data-type="humidity">相對濕度</button>
        </div>
    </div>

    <div class="main-layout">
        <div class="map-card">
            <div id="macau-map"></div>
        </div>
        <div id="grid-container" class="station-grid">
            <div class="loading">正在擷取區域數據...</div>
        </div>
    </div>
</div>

<script>
// All stations + bridges coordinates (UPDATED)
const allPoints = {
    // Weather Stations
    "紀念孫中山市政公園": { code: "DP", lat: 22.215322, lng: 113.543490 },
    "黑沙環": { code: "EM", lat: 22.207129, lng: 113.559971 },
    "大炮台": { code: "FM", lat: 22.197066, lng: 113.542261 },
    "外港": { code: "PE", lat: 22.197066, lng: 113.542261 },
    "媽閣": { code: "MM", lat: 22.185863, lng: 113.530675 },
    "大潭山": { code: "TG", lat: 22.159102, lng: 113.568947 },
    "東亞運大馬路": { code: "JA", lat: 22.155396, lng: 113.542412 },
    "九澳": { code: "KV", lat: 22.134686, lng: 113.580143 },
    "澳門大學": { code: "UM", lat: 22.131808, lng: 113.546970 },
    "路環市區": { code: "DC", lat: 22.117091, lng: 113.551041 },
    // Bridges (UPDATED names + new bridge added)
    "西灣大橋": { code: "PV", lat: 22.173240, lng: 113.535416 },
    "友誼大橋北": { code: "PN", lat: 22.196000, lng: 113.567000 },
    "友誼大橋南": { code: "PS", lat: 22.174000, lng: 113.568000 },
    "嘉樂庇總督大橋": { code: "PG", lat: 22.179000, lng: 113.546000 },
    "澳門大橋北": { code: "MN", lat: 22.186985, lng: 113.573231 },
    "澳門大橋南": { code: "MS", lat: 22.173484, lng: 113.573047 },
    "蓮花大橋": { code: "LH", lat: 22.139934, lng: 113.549094 }
};

// Temperature color mapping (from your legend)
function getTempColor(tempStr) {
    const temp = parseFloat(tempStr);
    if (isNaN(temp)) return "#3498db";
    if (temp >= 35.0) return "#7b1818";   // 極端酷熱
    if (temp >= 33.0) return "#d64040";   // 酷熱
    if (temp >= 28.0) return "#ed7a7a";   // 炎熱
    if (temp >= 22.1) return "#e8b03e";   // 溫暖
    if (temp >= 17.1) return "#f0d390";   // 和暖
    if (temp >= 12.1) return "#62e0b1";   // 清涼
    if (temp >= 7.1) return "#64b5e7";    // 寒冷
    return "#5c48a1";                     // 嚴寒 (<=7.0)
}

// Init Leaflet Map
let map = L.map('macau-map').setView([22.17, 113.55], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

let allMarkers = [];
let currentTab = "tempCurrent";
let pointDataList = [];

// Tab Switch
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentTab = btn.dataset.type;
        updateMapMarkers();
    });
});

// Extract XML value
const extractNodeValue = (selector, parent) => {
    const el = parent.querySelector(selector);
    if (!el) return '';
    const val = el.querySelector("dValue")?.textContent || el.querySelector("Value")?.textContent || '';
    return val.trim();
};

// Clear all markers
function clearMarkers() {
    allMarkers.forEach(marker => map.removeLayer(marker));
    allMarkers = [];
}

// Update map markers (CIRCLE style, only numbers)
function updateMapMarkers() {
    clearMarkers();
    pointDataList.forEach(point => {
        const name = point.name;
        const info = allPoints[name];
        if (!info) return;

        let showVal = "";
        let bgColor = "#3498db";

        switch (currentTab) {
            case "tempCurrent":
                showVal = point.temp;
                bgColor = getTempColor(showVal);
                break;
            case "tempMax":
                showVal = point.tempMax;
                bgColor = getTempColor(showVal);
                break;
            case "tempMin":
                showVal = point.tempMin;
                bgColor = getTempColor(showVal);
                break;
            case "windDir":
                showVal = point.windDir;
                bgColor = "#9b59b6";
                break;
            case "windSpeed":
                showVal = point.windSpeed;
                bgColor = "#8e44ad";
                break;
            case "windGust":
                showVal = point.windGust;
                bgColor = "#d35400";
                break;
            case "rain1m":
                showVal = point.rain1m;
                bgColor = "#16a085";
                break;
            case "rain1h":
                showVal = point.rain1h;
                bgColor = "#00838f";
                break;
            case "rainTotal":
                showVal = point.rainTotal;
                bgColor = "#0277bd";
                break;
            case "pressSea":
                showVal = point.pressSea;
                bgColor = "#f39c12";
                break;
            case "pressStation":
                showVal = point.pressStation;
                bgColor = "#f1c40f";
                break;
            case "humidity":
                showVal = point.humidity;
                bgColor = "#27ae60";
                break;
        }

        // Hide empty/-- value
        if (showVal === '' || showVal === '--') return;

        // Marker: CIRCLE shape, only number inside
        const icon = L.divIcon({
            html: `<div style="background:${bgColor};color:#fff;border-radius:50%;width:50px;height:50px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:bold;">${showVal}</div>`,
            className: "",
            iconSize: [50, 50],
            iconAnchor: [25, 25]
        });

        const marker = L.marker([info.lat, info.lng], { icon: icon }).addTo(map);
        // Popup: ONLY name + short code
        marker.bindPopup(`<strong>${name} (${info.code})</strong>`);
        allMarkers.push(marker);
    });
}

// Fetch XML Data
function fetchGridData() {
    const cacheBuster = Date.now();
    const url = `https://corsproxy.io/?https://xml.smg.gov.mo/c_actualweather.xml?t=${cacheBuster}`;

    fetch(url, { cache: "no-store" })
        .then(res => {
            if (!res.ok) throw new Error("Request fail");
            return res.text();
        })
        .then(xmlStr => {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlStr, "text/xml");

            // Update publish time
            const pubTime = xmlDoc.querySelector("SysPubdate")?.textContent || "未知";
            document.getElementById("pub-date").textContent = pubTime;

            const stations = xmlDoc.querySelectorAll("WeatherReport station");
            const gridContainer = document.getElementById("grid-container");
            gridContainer.innerHTML = "";
            pointDataList = [];

            stations.forEach(station => {
                const code = station.getAttribute("code") || "";
                const name = station.querySelector("stationname")?.textContent || "";
                const fullName = `${name} (${code})`;

                // Extract all data
                const temp = extractNodeValue("Temperature", station);
                const tempMax = extractNodeValue("Temperature_daily_max", station);
                const tempMin = extractNodeValue("Temperature_daily_min", station);
                const humidity = extractNodeValue("Humidity", station);
                const windSpeed = extractNodeValue("WindSpeed", station);
                const windGust = extractNodeValue("WindGust", station);
                const pressSea = extractNodeValue("MeanSeaLevelPressure", station);
                const pressStation = extractNodeValue("StationPressure", station);

                // Wind direction
                const windDirNode = station.querySelector("WindDirection");
                const windText = windDirNode?.querySelector("dValue")?.textContent || "";
                const windDeg = windDirNode?.querySelector("Degree")?.textContent || "";
                let windDir = windText || windDeg;

                // Rainfall
                let rain1m = "", rain1h = "", rainTotal = "";
                station.querySelectorAll("Rainfall").forEach(r => {
                    const type = r.querySelector("Type")?.textContent;
                    const val = r.querySelector("dValue")?.textContent || "";
                    if (type === "3") rain1m = val;
                    if (type === "4") rain1h = val;
                    if (type === "5") rainTotal = val;
                });

                // Save data for map
                pointDataList.push({
                    name, temp, tempMax, tempMin, humidity,
                    windDir, windSpeed, windGust,
                    rain1m, rain1h, rainTotal,
                    pressSea, pressStation
                });

                // Card rain style
                const rain1mClass = parseFloat(rain1m) > 0 ? "rain-active" : "";
                const rain1hClass = parseFloat(rain1h) > 0 ? "rain-active" : "";
                const rainTotalClass = parseFloat(rainTotal) > 0 ? "rain-active" : "";

                // Build station card
                const card = `
                <div class="station-card">
                    <div class="station-name">${fullName}</div>
                    <div class="temp-row">
                        <div class="current-temp">${temp}°C</div>
                        <div class="temp-range">
                            <div>最高: <span class="high-temp">${tempMax}°C</span></div>
                            <div>最低: <span class="low-temp">${tempMin}°C</span></div>
                        </div>
                    </div>
                    <div class="metrics-grid">
                        <div class="metric col-half"><span>相對濕度(%)</span><strong>${humidity || '--'}%</strong></div>
                        <div class="metric col-half"><span>風向</span><strong>${windDir || '--'}</strong></div>
                        <div class="metric col-half"><span>風速(km/h)</span><strong>${windSpeed || '--'} ${windSpeed?'<small>km/h</small>':''}</strong></div>
                        <div class="metric col-half"><span>陣風(km/h)</span><strong>${windGust || '--'} ${windGust?'<small>km/h</small>':''}</strong></div>
                        <div class="metric col-half"><span>海平面氣壓(hPa)</strong><strong>${pressSea || '--'} ${pressSea?'<small>hPa</small>':''}</strong></div>
                        <div class="metric col-half"><span>站點氣壓(hPa)</span><strong>${pressStation || '--'} ${pressStation?'<small>hPa</small>':''}</strong></div>
                        <div class="metric col-third ${rain1mClass}"><span>一分鐘雨量</span><strong>${rain1m || '--'} ${rain1m?'<small>mm</small>':''}</strong></div>
                        <div class="metric col-third ${rain1hClass}"><span>一小時雨量</span><strong>${rain1h || '--'} ${rain1h?'<small>mm</small>':''}</strong></div>
                        <div class="metric col-third ${rainTotalClass}"><span>日累計雨量</span><strong>${rainTotal || '--'} ${rainTotal?'<small>mm</small>':''}</strong></div>
                    </div>
                </div>`;
                gridContainer.innerHTML += card;
            });

            updateMapMarkers();
        })
        .catch(err => {
            console.error(err);
            document.getElementById("grid-container").innerHTML = `
                <div class="loading" style="color:#e74c3c;">載入失敗，請檢查網絡</div>
            `;
        });
}

fetchGridData();
setInterval(fetchGridData, 60000);
</script>
</body>
</html>
