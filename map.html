<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>澳門各區天氣實況 - GIS互動地圖</title>
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f3f7;
            color: #2c3e50;
            padding: 20px;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        header {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            padding: 20px 30px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        header h1 {
            font-size: 1.6rem;
            font-weight: 600;
        }
        .meta-info {
            text-align: right;
            font-size: 0.9rem;
            opacity: 0.9;
        }
        /* Tab Navigation */
        .tab-wrapper {
            background: #fff;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }
        .tab-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            background: #e8edf2;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: #2a5298;
            color: #fff;
        }
        .tab-btn:hover:not(.active) {
            background: #d0d9e2;
        }
        /* Main Layout */
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 1024px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
        }
        .map-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            padding: 15px;
        }
        #macau-map {
            width: 100%;
            height: 650px;
            border-radius: 8px;
        }
        /* Station Cards */
        .station-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        .station-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            padding: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            border-top: 4px solid #3498db;
        }
        .station-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        .station-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: #2c3e50;
            border-bottom: 1px solid #ecf0f1;
            padding-bottom: 8px;
        }
        .temp-row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin: 15px 0;
        }
        .current-temp {
            font-size: 2.2rem;
            font-weight: 700;
            color: #1a1a1a;
        }
        .temp-range {
            font-size: 0.9rem;
            text-align: right;
        }
        .high-temp { color: #e74c3c; font-weight: 600; }
        .low-temp { color: #34495e; font-weight: 600; }
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            font-size: 0.9rem;
        }
        .metric {
            background: #f8f9fa;
            padding: 8px 12px;
            border-radius: 6px;
        }
        .col-half {
            grid-column: span 3;
        }
        .col-third {
            grid-column: span 2;
        }
        .metric span {
            display: block;
            color: #7f8c8d;
            font-size: 0.75rem;
            text-transform: uppercase;
            margin-bottom: 2px;
        }
        .metric strong {
            color: #2c3e50;
        }
        .rain-active {
            background: #e8f4fd;
            border: 1px solid #bcdffb;
        }
        .rain-active strong {
            color: #2980b9;
        }
        .loading {
            grid-column: 1 / -1;
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
            color: #7f8c8d;
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div>
            <h1>澳門各區天氣實況（互動GIS地圖）</h1>
            <small style="color: #2ecc71;">● 可縮放/拖曳地圖 | 點擊標示查看詳情</small>
        </div>
        <div class="meta-info">
            <div>資料更新時間：<span id="pub-date">載入中...</span></div>
            <div>每60秒自動刷新</div>
        </div>
    </header>

    <!-- Tab Switcher -->
    <div class="tab-wrapper">
        <div class="tab-buttons">
            <button class="tab-btn active" data-type="temp">氣溫</button>
            <button class="tab-btn" data-type="humidity">相對濕度</button>
            <button class="tab-btn" data-type="wind">風向風速</button>
            <button class="tab-btn" data-type="rain">雨量</button>
            <button class="tab-btn" data-type="pressure">氣壓</button>
        </div>
    </div>

    <div class="main-layout">
        <!-- Interactive Leaflet Map -->
        <div class="map-card">
            <div id="macau-map"></div>
        </div>

        <!-- Station Data Cards -->
        <div id="grid-container" class="station-grid">
            <div class="loading">正在擷取區域數據...</div>
        </div>
    </div>
</div>

<script>
// 1. Station Coordinates (provided)
const stationCoord = {
    "紀念孫中山市政公園（DP）": {lat: 22.215322, lng: 113.543490},
    "黑沙環（EM）": {lat: 22.207129, lng: 113.559971},
    "大炮台（FM）": {lat: 22.197066, lng: 113.542261},
    "外港（PE）": {lat: 22.197066, lng: 113.542261},
    "媽閣（MM）": {lat: 22.185863, lng: 113.530675},
    "大潭山（TG）": {lat: 22.159102, lng: 113.568947},
    "東亞運大馬路（JA）": {lat: 22.155396, lng: 113.542412},
    "九澳（KV）": {lat: 22.134686, lng: 113.580143},
    "澳門大學（UM）": {lat: 22.131808, lng: 113.546970},
    "路環市區（DC）": {lat: 22.117091, lng: 113.551041}
};

// 2. Init Leaflet Map
let map = L.map('macau-map').setView([22.17, 113.55], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

let allMarkers = [];
let currentTab = "temp";

// 3. Tab Switch Event
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentTab = btn.dataset.type;
        updateMapMarkers();
    });
});

// 4. Extract XML value
const extractNodeValue = (selector, parent) => {
    const el = parent.querySelector(selector);
    if (!el) return '--';
    return el.querySelector("dValue")?.textContent || el.querySelector("Value")?.textContent || '--';
};

// 5. Clear all map markers
function clearMarkers() {
    allMarkers.forEach(marker => map.removeLayer(marker));
    allMarkers = [];
}

// 6. Global station data storage
let stationDataList = [];

// 7. Update map markers by selected tab
function updateMapMarkers() {
    clearMarkers();
    stationDataList.forEach(station => {
        const name = station.name;
        const coord = stationCoord[name];
        if (!coord) return;

        let displayText = "";
        let markerColor = "#3498db";

        switch(currentTab) {
            case "temp":
                displayText = `${station.temp}°C`;
                let t = parseFloat(station.temp);
                if(!isNaN(t)){
                    if(t >= 28) markerColor = "#e74c3c";
                    else if(t <= 20) markerColor = "#2980b9";
                }
                break;
            case "humidity":
                displayText = `${station.humidity}%`;
                markerColor = "#27ae60";
                break;
            case "wind":
                displayText = `${station.windSpeed} km/h`;
                markerColor = "#9b59b6";
                break;
            case "rain":
                displayText = `${station.rain1h} mm`;
                markerColor = "#16a085";
                break;
            case "pressure":
                displayText = `${station.pressure} hPa`;
                markerColor = "#f39c12";
                break;
        }

        // Custom colored marker
        const customIcon = L.divIcon({
            html: `<div style="background:${markerColor};color:#fff;padding:4px 8px;border-radius:4px;font-size:12px;white-space:nowrap;">${name}<br>${displayText}</div>`,
            className: "",
            iconSize: [80, 40],
            iconAnchor: [40, 20]
        });

        const marker = L.marker([coord.lat, coord.lng], {icon: customIcon}).addTo(map);
        // Popup full info on click
        marker.bindPopup(`
            <b>${name}</b><hr>
            氣溫: ${station.temp}°C<br>
            濕度: ${station.humidity}%<br>
            風向: ${station.windDir}<br>
            風速: ${station.windSpeed} km/h<br>
            1小時雨量: ${station.rain1h} mm<br>
            氣壓: ${station.pressure} hPa
        `);
        allMarkers.push(marker);
    });
}

// 8. Fetch Weather Data
function fetchGridData() {
    const cacheBuster = Date.now();
    const freshUrl = `https://corsproxy.io/?https://xml.smg.gov.mo/c_actualweather.xml?t=${cacheBuster}`;

    fetch(freshUrl, { cache: "no-store" })
        .then(response => {
            if (!response.ok) throw new Error('Network error');
            return response.text();
        })
        .then(xmlString => {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlString, "text/xml");

            const pubDateNode = xmlDoc.querySelector("SysPubdate");
            if (pubDateNode) {
                document.getElementById('pub-date').textContent = pubDateNode.textContent;
            }

            const stations = xmlDoc.querySelectorAll("WeatherReport station");
            const gridContainer = document.getElementById('grid-container');
            gridContainer.innerHTML = '';
            stationDataList = [];

            stations.forEach(station => {
                const code = station.getAttribute("code")?.trim() || "N/A";
                const name = station.querySelector("stationname")?.textContent || "未命名站點";
                const nameDisplay = `${name}(${code})`;

                const currentTemp = extractNodeValue("Temperature", station);
                const maxTemp = extractNodeValue("Temperature_daily_max", station);
                const minTemp = extractNodeValue("Temperature_daily_min", station);
                const humidity = extractNodeValue("Humidity", station);
                const windSpeed = extractNodeValue("WindSpeed", station);
                const windGust = extractNodeValue("WindGust", station);
                const mslPressure = extractNodeValue("MeanSeaLevelPressure", station);
                const stationPressure = extractNodeValue("StationPressure", station);

                const windDirNode = station.querySelector("WindDirection");
                const winddValue = windDirNode?.querySelector("dValue")?.textContent || '--';
                const windDegree = windDirNode?.querySelector("Degree")?.textContent || '--';
                let windDirDisplay = '--';
                if (winddValue !== '--' && windDegree !== '--') {
                    windDirDisplay = `${winddValue}(${windDegree}°)`;
                } else if (winddValue !== '--') {
                    windDirDisplay = winddValue;
                } else if (windDegree !== '--') {
                    windDirDisplay = `${windDegree}°`;
                }

                let rain1m = "--", rain1h = "--", rainToday = "--";
                const rainfallNodes = station.querySelectorAll("Rainfall");
                rainfallNodes.forEach(node => {
                    const type = node.querySelector("Type")?.textContent;
                    const val = node.querySelector("dValue")?.textContent || node.querySelector("Value")?.textContent || "0.0";
                    if (type === "3") rain1m = val;
                    if (type === "4") rain1h = val;
                    if (type === "5") rainToday = val;
                });

                const rain1mClass = parseFloat(rain1m) > 0 ? 'rain-active' : '';
                const rain1hClass = parseFloat(rain1h) > 0 ? 'rain-active' : '';
                const rainTodayClass = parseFloat(rainToday) > 0 ? 'rain-active' : '';

                // Save data for map
                stationDataList.push({
                    name: name,
                    temp: currentTemp,
                    humidity: humidity,
                    windDir: windDirDisplay,
                    windSpeed: windSpeed,
                    rain1h: rain1h,
                    pressure: mslPressure
                });

                // Build station card
                const cardHtml = `
                    <div class="station-card">
                        <div class="station-name">${nameDisplay}</div>
                        <div class="temp-row">
                            <div class="current-temp">${currentTemp}°C</div>
                            <div class="temp-range">
                                <div>最高: <span class="high-temp">${maxTemp}°C</span></div>
                                <div>最低: <span class="low-temp">${minTemp}°C</span></div>
                            </div>
                        </div>
                        <div class="metrics-grid">
                            <div class="metric col-half">
                                <span>相對濕度(%)</span>
                                <strong>${humidity}%</strong>
                            </div>
                            <div class="metric col-half">
                                <span>風向(°)</span>
                                <strong>${windDirDisplay}</strong>
                            </div>
                            <div class="metric col-half">
                                <span>風速(km/h)</span>
                                <strong>${windSpeed}${windSpeed !== '--' ? ' <small>km/h</small>' : ''}</strong>
                            </div>
                            <div class="metric col-half">
                                <span>陣風(km/h)</span>
                                <strong>${windGust}${windGust !== '--' ? ' <small>km/h</small>' : ''}</strong>
                            </div>
                            <div class="metric col-half">
                                <span>平均海平面氣壓(hPa)</span>
                                <strong>${mslPressure}${mslPressure !== '--' ? ' <small>hPa</small>' : ''}</strong>
                            </div>
                            <div class="metric col-half">
                                <span>站氣壓(hPa)</span>
                                <strong>${stationPressure}${stationPressure !== '--' ? ' <small>hPa</small>' : ''}</strong>
                            </div>
                            
                            <div class="metric col-third ${rain1mClass}">
                                <span>一分鐘雨量</span>
                                <strong>${rain1m}${rain1m !== '--' ? ' <small>mm</small>' : ''}</strong>
                            </div>
                            <div class="metric col-third ${rain1hClass}">
                                <span>一小時雨量</span>
                                <strong>${rain1h}${rain1h !== '--' ? ' <small>mm</small>' : ''}</strong>
                            </div>
                            <div class="metric col-third ${rainTodayClass}">
                                <span>日總雨量</span>
                                <strong>${rainToday}${rainToday !== '--' ? ' <small>mm</small>' : ''}</strong>
                            </div>
                        </div>
                    </div>
                `;
                gridContainer.innerHTML += cardHtml;
            });

            // Refresh map markers after data loaded
            updateMapMarkers();
        })
        .catch(err => {
            console.error(err);
            document.getElementById('grid-container').innerHTML = `
                <div class="loading" style="color: #e74c3c;">
                    載入失敗，請檢查網絡或代理狀態
                </div>`;
        });
}

// Start fetch & auto refresh
fetchGridData();
setInterval(fetchGridData, 60000);
</script>
</body>
</html>
