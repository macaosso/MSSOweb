<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>澳門氣象站+水位實況地圖</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f3f7;
            color: #2c3e50;
            padding: 20px;
            font-size: 14px;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        header {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            padding: 20px 30px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        header h1 {
            font-size: 1.6rem;
            font-weight: 600;
        }
        .meta-info {
            text-align: right;
            font-size: 0.9rem;
            opacity: 0.9;
        }

        /* 頂部切換按鈕 */
        .view-switch {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }
        .view-switch button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            background: #e8edf2;
            cursor: pointer;
            font-size: 0.95rem;
        }
        .view-switch button.active {
            background: #2a5298;
            color: #fff;
        }

        /* 分類折疊按鈕區 */
        .tab-wrapper {
            background: #fff;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }
        .tab-group {
            margin-bottom: 10px;
        }
        .group-title {
            font-size: 1rem;
            font-weight: 600;
            color: #2c3e50;
            margin: 0 0 8px 0;
            padding: 4px 0;
        }
        .group-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding-left: 10px;
        }

        .tab-btn {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            background: #e8edf2;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: #2a5298;
            color: #fff;
        }
        .tab-btn:hover:not(.active) {
            background: #d0d9e2;
        }

        /* 主布局 */
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 1024px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
        }
        .map-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            padding: 15px;
            position: relative;
        }
        #macau-map {
            width: 100%;
            height: 650px;
            border-radius: 8px;
        }

        /* 圖例 */
        .map-legend {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background: rgba(255,255,255,0.95);
            padding: 8px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            z-index: 1000;
            min-width: 120px;
        }
        .map-legend h4 {
            margin: 0 0 5px 0;
            font-size: 0.8rem;
            text-align: center;
            border-bottom: 1px solid #eee;
            padding-bottom: 3px;
        }
        .legend-items {
            max-height: 180px;
            overflow-y: auto;
        }
        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 3px;
        }
        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 5px;
        }

        /* 時間戳 */
        .time-stamp {
            position: absolute;
            top: 25px;
            right: 25px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.9rem;
            z-index: 1000;
        }

        /* 單個氣象卡片容器 */
        .station-single {
            height: 650px;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 20px;
        }
        .empty-tip {
            color: #999;
            font-size: 1rem;
        }

        /* 氣象卡片樣式 */
        .station-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            padding: 18px;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            border-top: 4px solid #3498db;
            width: 100%;
            max-width: 420px;
            font-size: 13px;
        }
        .station-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        .station-name {
            font-size: 1.1rem;
            font-weight: bold;
            color: #2c3e50;
            border-bottom: 1px solid #ecf0f1;
            padding-bottom: 8px;
        }
        .temp-row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin: 15px 0;
        }
        .current-temp {
            font-size: 2rem;
            font-weight: 700;
            color: #1a1a1a;
        }
        .temp-range {
            font-size: 0.85rem;
            text-align: right;
        }
        .high-temp { color: #e74c3c; font-weight: 600; }
        .low-temp { color: #34495e; font-weight: 600; }
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            font-size: 0.8rem;
        }
        .metric {
            background: #f8f9fa;
            padding: 8px 10px;
            border-radius: 6px;
        }
        .col-half {
            grid-column: span 3;
        }
        .col-third {
            grid-column: span 2;
        }
        .metric span {
            display: block;
            color: #7f8c8d;
            font-size: 0.7rem;
            text-transform: uppercase;
            margin-bottom: 2px;
        }
        .metric strong {
            color: #2c3e50;
            font-size: 0.9rem;
        }
        .rain-active {
            background: #e8f4fd;
            border: 1px solid #bcdffb;
        }
        .rain-active strong {
            color: #2980b9;
        }
        .heat-high {
            background: #ffe6e6;
            border: 1px solid #f5a9a9;
        }
        .heat-high strong {
            color: #c0392b;
        }
        .apparent-high {
            background: #f3e5f5;
            border: 1px solid #d2bade;
        }
        .apparent-high strong {
            color: #8e44ad;
        }
        .dew-high {
            background: #e8f4fd;
            border: 1px solid #a0cfee;
        }
        .dew-high strong {
            color: #2980b9;
        }
        .rain1-yellow {
            background: #fff9c4;
            border: 1px solid #ffe082;
        }
        .rain1-red {
            background: #ffebee;
            border: 1px solid #ef9a9a;
        }
        .rain1-gray {
            background: #eceff1;
            border: 1px solid #b0bec5;
        }
        .rainDay-orange {
            background: #fff3e0;
            border: 1px solid #ffcc80;
        }
        .rainDay-red {
            background: #ffebee;
            border: 1px solid #ef9a9a;
        }
        .rainDay-gray {
            background: #eceff1;
            border: 1px solid #b0bec5;
        }
        /* 水位/積水樣式 */
        .flood-normal {
            background: #e8f4fd;
            border: 1px solid #bcdffb;
        }
        .flood-light {
            background: #fff9c4;
            border: 1px solid #ffe082;
        }
        .flood-mid {
            background: #fff3e0;
            border: 1px solid #ffcc80;
        }
        .flood-heavy {
            background: #ffebee;
            border: 1px solid #ef9a9a;
        }

        /* 表格區域 */
        .table-container {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 0.85rem;
        }
        .data-table th, .data-table td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }
        .data-table th {
            background: #f1f5f9;
            font-weight: 600;
        }
        .data-table tr:hover {
            background: #f8fafc;
        }
        .time-stamp-indicator {
            position: absolute;
            top: 60px; /* 在時間戳下方，調整位置避免重疊 */
            right: 25px;
            background: rgba(42, 82, 152, 0.9); /* 和主題藍色一致 */
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.9rem;
            z-index: 1000;
        }
        /* 隱藏區塊 */
        .hide {
            display: none !important;
        }
    </style>
</head>
<body>

                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
// ========== 計算函數 ==========
function calculateApparentTemp(T, RH, windSpeedKmH) {
    const V = windSpeedKmH / 3.6;
    const e = (RH / 100) * 6.105 * Math.exp((17.27 * T) / (237.7 + T));
    const apparentTemp = 1.04 * T + 0.2 * e - 0.65 * V - 2.7;
    return isNaN(apparentTemp) ? '--' : apparentTemp.toFixed(1);
}
function calculateHeatIndex(T, RH) {
    if (isNaN(T) || isNaN(RH)) return '--';
    let hi = -8.7846947556 + 1.61139411 * T + 2.3385488388 * RH
             - 0.14611605 * T * RH - 0.012308094 * Math.pow(T, 2)
             - 0.0164248278 * Math.pow(RH, 2)
             + 0.002211732 * Math.pow(T, 2) * RH
             + 0.00072546 * T * Math.pow(RH, 2)
             - 0.000003582 * Math.pow(T, 2) * Math.pow(RH, 2);
    return hi.toFixed(1);
}
function calculateDewPoint(T, RH) {
    if (isNaN(T) || isNaN(RH) || RH <= 0) return '--';
    const a = 17.27;
    const b = 237.7;
    const gamma = (a * T) / (b + T) + Math.log(RH / 100);
    const dew = (b * gamma) / (a - gamma);
    return dew.toFixed(1);
}

// ========== 卡片樣式 Class ==========
function getHeatIndexClass(val) {
    let num = parseFloat(val);
    if (!isNaN(num) && num >= 40) return 'metric col-half heat-high';
    return 'metric col-half';
}
function getApparentClass(val) {
    let num = parseFloat(val);
    if (!isNaN(num) && num >= 36) return 'metric col-half apparent-high';
    return 'metric col-half';
}
function getDewClass(val) {
    let num = parseFloat(val);
    if (!isNaN(num) && num >= 28) return 'metric col-half dew-high';
    return 'metric col-half';
}
function getRain1hClass(val) {
    let num = parseFloat(val);
    if (isNaN(num)) return 'metric col-third';
    if (num >= 79.5) return 'metric col-third rain1-gray';
    if (num >= 49.5) return 'metric col-third rain1-red';
    if (num >= 19.5) return 'metric col-third rain1-yellow';
    return 'metric col-third';
}
function getRainDayClass(val) {
    let num = parseFloat(val);
    if (isNaN(num)) return 'metric col-third';
    if (num >= 350) return 'metric col-third rainDay-gray';
    if (num >= 200) return 'metric col-third rainDay-red';
    if (num >= 100) return 'metric col-third rainDay-orange';
    return 'metric col-third';
}
function getWaterLevelClass(val) {
    let num = parseFloat(val);
    if (isNaN(num) || num <= 0) return 'metric col-third flood-normal';
    if (num >= 0.5) return 'metric col-third flood-heavy';
    if (num >= 0.2) return 'metric col-third flood-mid';
    return 'metric col-third flood-light';
}
function formatVal(val, unit) {
    return val === '--' ? val : `${val} ${unit}`;
}

// ========== 測站座標 & 代碼 ==========
const allPoints = {
    "紀念孫中山市政公園": { code: "DP", lat: 22.215322, lng: 113.543490 },
    "黑沙環": { code: "EM", lat: 22.207129, lng: 113.559971 },

// ========== 欄位對應 ==========
const fieldMap = {
    tempCurrent: {field:'temp', label:'實時氣溫', unit:'℃'},
    tempMax: {field:'tempMax', label:'最高氣溫', unit:'℃'},
    tempMin: {field:'tempMin', label:'最低氣溫', unit:'℃'},
    apparentTemp: {field:'apparentTemp', label:'體感溫度', unit:'℃'},
    heatIndex: {field:'heatIndex', label:'酷熱指數', unit:'℃'},
    dewPoint: {field:'dewPoint', label:'露點溫度', unit:'℃'},
    humidity: {field:'humidity', label:'相對濕度', unit:'%'},
    windDir: {field:'windDir', label:'風向', unit:''},
    windSpeed: {field:'windSpeed', label:'風速', unit:'km/h'},
    windGust: {field:'windGust', label:'陣風', unit:'km/h'},
    pressSea: {field:'pressSea', label:'海平面氣壓', unit:'hPa'},
    pressStation: {field:'pressStation', label:'站氣壓', unit:'hPa'},
    waterLevel: {field:'waterLevel', label:'實時水位', unit:'m'}
};

// ========== 地圖標記配色規則 ==========
function getTempColor(tempStr) {
    const temp = parseFloat(tempStr);
    if (isNaN(temp)) return "#3498db";
    if (temp >= 35.5) return "#7b1818";
    if (temp >= 32.5) return "#d64040";
    if (temp >= 27.5) return "#ed7a7a";
    if (temp >= 22.5) return "#e8b03e";
    if (temp >= 17.5) return "#f0d390";
    if (temp >= 12.5) return "#62e0b1";
    if (temp >= 7.5) return "#64b5e7";
    return "#5c48a1";
}
function getHeatIndexColor(hiStr) {
    const hi = parseFloat(hiStr);
    if (isNaN(hi)) return "#27ae60"; // normal green
    if (hi >= 54.5) return "#6a0dad";       // 極度危險 purple
    if (hi >= 45.5) return "#c0392b";       // 危險 deep red
    if (hi >= 39.5) return "#e67e22";       // 特別注意 deep orange
    if (hi >= 35.5) return "#f1c40f";       // 注意 deep yellow
    return "#27ae60";                       // 正常 green
}
function getHumidityColor(humStr) {
    const hum = parseFloat(humStr);
    if (isNaN(hum)) return "#3498db";
    if (hum >= 94.5) return "#553C9A";
    if (hum >= 84.5) return "#5DADEC";
    if (hum >= 49.5) return "#6EE7B7";
    if (hum >= 30.5) return "#E6B34B";
    return "#7b1818";
}
function getDewColor(dewStr) {
    const dew = parseFloat(dewStr);
    if (isNaN(dewStr)) return "#3498db";
    if (dew >= 28) return "#2980b9";
    if (dew >= 24) return "#64b5e7";
    if (dew >= 18) return "#62e0b1";
    return "#bdd7ee";
}
function getWindColor(windStr) {
    const wind = parseFloat(windStr);
    if (isNaN(wind)) return "#3498db";
    if (wind >= 117.5) return "#d64040";
    if (wind >= 87.5) return "#f2a938";
    if (wind >= 62.5) return "#f9e559";
    if (wind >= 40.5) return "#60c070";
    return "#64b5e7";
}
function getPressSeaColor(pressStr) {
    const press = parseFloat(pressStr);
    if (isNaN(pressStr)) return "#3498db";
    if (press < 980) return "#d64040";
    if (press < 990) return "#e68938";
    if (press < 1000) return "#f9d342";
    return "#3a6ea5";
}
function getPressStationColor(pressStr) {
    const press = parseFloat(pressStr);
    if (isNaN(press)) return "#3498db";
    if (press < 965) return "#d64040";
    if (press < 975) return "#e68938";
    if (press < 985) return "#f9d342";
    return "#3a6ea5";
}
function getWaterLevelColor(wlStr) {
    const wl = parseFloat(wlStr);
    if (isNaN(wl) || wl <= 0) return "#3498db";
    if (wl >= 0.5) return "#e74c3c";
    if (wl >= 0.2) return "#f39c12";
    return "#f1c40f";
}

// ========== 圖例更新 ==========
function updateLegendPanel(tabType) {
    const legendContent = document.getElementById('legend-content');
    let legendHTML = '';
    switch(tabType) {
        case "tempCurrent":case "tempMax":case "tempMin":case "apparentTemp":
            legendHTML = `<div class="legend-item"><div class="legend-color" style="background:#7b1818"></div>非常酷熱</div><div class="legend-item"><div class="legend-color" style="background:#d64040"></div>酷熱</div><div class="legend-item"><div class="legend-color" style="background:#ed7a7a"></div>炎熱</div><div class="legend-item"><div class="legend-color" style="background:#e8b03e"></div>溫暖</div><div class="legend-item"><div class="legend-color" style="background:#f0d390"></div>和暖</div><div class="legend-item"><div class="legend-color" style="background:#62e0b1"></div>清涼</div><div class="legend-item"><div class="legend-color" style="background:#64b5e7"></div>寒冷</div><div class="legend-item"><div class="legend-color" style="background:#5c48a1"></div>非常寒冷</div>`;
            break;
        case "heatIndex":
            legendHTML = `
            <div class="legend-item"><div class="legend-color" style="background:#6a0dad"></div>極度危險</div>
            <div class="legend-item"><div class="legend-color" style="background:#c0392b"></div>危險</div>
            <div class="legend-item"><div class="legend-color" style="background:#e67e22"></div>特別注意</div>
            <div class="legend-item"><div class="legend-color" style="background:#f1c40f"></div>注意</div>`;
            break;
        case "dewPoint":
            legendHTML = `<div class="legend-item"><div class="legend-color" style="background:#2980b9"></div>≥28℃ 高露點</div><div class="legend-item"><div class="legend-color" style="background:#64b5e7"></div>24~27.9℃</div><div class="legend-item"><div class="legend-color" style="background:#62e0b1"></div>18~23.9℃</div><div class="legend-item"><div class="legend-color" style="background:#bdd7ee"></div><18℃</div>`;
            break;
        case "humidity":
            legendHTML = `<div class="legend-item"><div class="legend-color" style="background:#553C9A"></div>非常潮濕</div><div class="legend-item"><div class="legend-color" style="background:#5DADEC"></div>潮濕</div><div class="legend-item"><div class="legend-color" style="background:#6EE7B7"></div>正常</div><div class="legend-item"><div class="legend-color" style="background:#E6B34B"></div>乾燥</div><div class="legend-item"><div class="legend-color" style="background:#7b1818"></div>非常乾燥</div>`;
            break;
        case "windSpeed":case "windGust":
            legendHTML = `<div class="legend-item"><div class="legend-color" style="background:#d64040"></div>颶風</div><div class="legend-item"><div class="legend-color" style="background:#f2a938"></div>暴風</div><div class="legend-item"><div class="legend-color" style="background:#f9e559"></div>烈風</div><div class="legend-item"><div class="legend-color" style="background:#60c070"></div>強風</div><div class="legend-item"><div class="legend-color" style="background:#64b5e7"></div>強風以下</div>`;
            break;
        case "pressSea":
            legendHTML = `<div class="legend-item"><div class="legend-color" style="background:#d64040"></div><980hPa</div><div class="legend-item"><div class="legend-color" style="background:#e68938"></div>980~989hPa</div><div class="legend-item"><div class="legend-color" style="background:#f9d342"></div>990~999hPa</div><div class="legend-item"><div class="legend-color" style="background:#3a6ea5"></div>≥1000hPa</div>`;
            break;
        case "pressStation":
            legendHTML = `<div class="legend-item"><div class="legend-color" style="background:#d64040"></div><965hPa</div><div class="legend-item"><div class="legend-color" style="background:#e68938"></div>965~974hPa</div><div class="legend-item"><div class="legend-color" style="background:#f9d342"></div>975~984hPa</div><div class="legend-item"><div class="legend-color" style="background:#3a6ea5"></div>≥985hPa</div>`;
            break;
        case "waterLevel":
            legendHTML = `<div class="legend-item"><div class="legend-color" style="background:#3498db"></div>無積水 (0m)</div>
            <div class="legend-item"><div class="legend-color" style="background:#f1c40f"></div>輕微積水 0~0.2m</div>
            <div class="legend-item"><div class="legend-color" style="background:#f39c12"></div>中度積水 0.2~0.5m</div>
            <div class="legend-item"><div class="legend-color" style="background:#e74c3c"></div>嚴重積水 >0.5m</div>`;
            break;
        default:
            legendHTML = `<div class="legend-item" style="color:#777;">無圖例</div>`;
    }
    legendContent.innerHTML = legendHTML;
}

// ========== 地圖初始化 ==========
let map = L.map('macau-map').setView([22.17, 113.55], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

let allMarkers = [];
let currentTab = "tempCurrent";
document.getElementById('current-indicator').textContent = 
  `${fieldMap[currentTab]?.label || currentTab}`;
let pointDataList = [];
let floodDataList = [];
const singleCardBox = document.getElementById("single-card-box");

// 分類按鈕切換
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentTab = btn.dataset.type;

        // 新增：更新地圖上的指標顯示
        const labelText = fieldMap[currentTab]?.label || currentTab;
        document.getElementById('current-indicator').textContent = `${labelText}`;

        updateMapMarkers();
        updateLegendPanel(currentTab);
        renderDataTable(currentTab);
    });
});

// 視圖切換：地圖 / 表格
document.getElementById('btn-map').addEventListener('click',function(){
    this.classList.add('active');
    document.getElementById('btn-table').classList.remove('active');
    document.getElementById('map-view').classList.remove('hide');
    document.getElementById('table-view').classList.add('hide');
});
document.getElementById('btn-table').addEventListener('click',function(){
    this.classList.add('active');
    document.getElementById('btn-map').classList.remove('active');
    document.getElementById('map-view').classList.add('hide');
    document.getElementById('table-view').classList.remove('hide');
    renderDataTable(currentTab);
});

// 提取XML節點值
const extractNodeValue = (selector, parent) => {
    const el = parent.querySelector(selector);
    if (!el) return '';
    const val = el.querySelector("dValue")?.textContent || el.querySelector("Value")?.textContent || '';
    return val.trim();
};

// 清空地圖標記
function clearMarkers() {
    allMarkers.forEach(marker => map.removeLayer(marker));
    allMarkers = [];
}

// 渲染單站詳細卡片（包含水位）
function renderSingleCard(data) {
    const {name,code,temp,tempMax,tempMin,humidity,windDir,windSpeed,windGust,rain1m,rain1h,rainTotal,
           pressSea,pressStation,apparentTemp,heatIndex,dewPoint,waterLevel} = data;
    const fullName = `${name} (${code})`;

    const hiClass = getHeatIndexClass(heatIndex);
    const apClass = getApparentClass(apparentTemp);
    const dewClass = getDewClass(dewPoint);
    const r1mClass = getRain1hClass(rain1m);
    const r1hClass = getRain1hClass(rain1h);
    const rTotalClass = getRainDayClass(rainTotal);
    const wlClass = getWaterLevelClass(waterLevel);

    const card = `
    <div class="station-card">
        <div class="station-name">${fullName}</div>
        <div class="temp-row">
            <div class="current-temp">${formatVal(temp, '°C')}</div>
            <div class="temp-range">
                <div>最高: <span class="high-temp">${formatVal(tempMax, '°C')}</span></div>
                <div>最低: <span class="low-temp">${formatVal(tempMin, '°C')}</span></div>
            </div>
        </div>
        <div class="metrics-grid">
            <div class="${hiClass}"><span>酷熱指數</span><strong>${formatVal(heatIndex, '°C')}</strong></div>
            <div class="${apClass}"><span>體感溫度</span><strong>${formatVal(apparentTemp, '°C')}</strong></div>
            <div class="${dewClass}"><span>露點溫度</span><strong>${formatVal(dewPoint, '°C')}</strong></div>
            <div class="metric col-half"><span>相對濕度</span><strong>${formatVal(humidity, '%')}</strong></div>
            <div class="metric col-half"><span>風向</span><strong>${windDir || '--'}</strong></div>
            <div class="metric col-half"><span>風速</span><strong>${formatVal(windSpeed, 'km/h')}</strong></div>
            <div class="metric col-half"><span>陣風</span><strong>${formatVal(windGust, 'km/h')}</strong></div>
            <div class="metric col-half"><span>平均海平面氣壓</span><strong>${formatVal(pressSea, 'hPa')}</strong></div>
            <div class="metric col-half"><span>站氣壓</span><strong>${formatVal(pressStation, 'hPa')}</strong></div>
            <div class="${r1mClass}"><span>一分鐘雨量</span><strong>${formatVal(rain1m, 'mm')}</strong></div>
            <div class="${r1hClass}"><span>一小時雨量</span><strong>${formatVal(rain1h, 'mm')}</strong></div>
            <div class="${rTotalClass}"><span>日總雨量</span><strong>${formatVal(rainTotal, 'mm')}</strong></div>
            <div class="${wlClass}" style="grid-column: span 6;"><span>實時水位</span><strong>${formatVal(waterLevel, 'm')}</strong></div>
        </div>
    </div>`;
    singleCardBox.innerHTML = card;
}

// 更新地圖標記
function updateMapMarkers() {
    clearMarkers();
    let sourceList = currentTab === "waterLevel" ? floodDataList : pointDataList;

    sourceList.forEach(point => {
        const name = point.name;
        const info = allPoints[name];
        if (!info) return;

        let showVal = "";
        let bgColor = "#3498db";
        let skipMarker = false;

        switch (currentTab) {
            case "tempCurrent": showVal = point.temp; bgColor = getTempColor(showVal); break;
            case "tempMax": showVal = point.tempMax; bgColor = getTempColor(showVal); break;
            case "tempMin": showVal = point.tempMin; bgColor = getTempColor(showVal); break;
            case "humidity": showVal = point.humidity; bgColor = getHumidityColor(showVal); break;
            case "dewPoint": showVal = point.dewPoint; bgColor = getDewColor(showVal); break;
            case "windDir": showVal = point.windDir || "--"; bgColor = "#9b59b6"; break;
            case "windSpeed": showVal = point.windSpeed; bgColor = getWindColor(showVal); break;
            case "windGust": showVal = point.windGust; bgColor = getWindColor(showVal); break;
            case "pressSea": showVal = point.pressSea; bgColor = getPressSeaColor(showVal); break;
            case "pressStation": showVal = point.pressStation; bgColor = getPressStationColor(showVal); break;
            case "apparentTemp": showVal = point.apparentTemp; bgColor = getTempColor(showVal); break;
            case "heatIndex":
                showVal = point.heatIndex;
                bgColor = getHeatIndexColor(showVal);
                const hiNum = parseFloat(showVal);
                if (isNaN(hiNum) || hiNum < 35.5) skipMarker = true;
                break;
            case "waterLevel":
                showVal = point.waterLevel;
                bgColor = getWaterLevelColor(showVal);
                break;
        }

        if (skipMarker || showVal === '' || showVal === '--') return;

        const markerIconHtml = `<div style="background:${bgColor};color:#fff;border-radius:50%;width:50px;height:50px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:bold;">${showVal}</div>`;
        const icon = L.divIcon({html: markerIconHtml, className: "", iconSize: [50,50], iconAnchor: [25,25]});
        const marker = L.marker([info.lat, info.lng], { icon: icon }).addTo(map);
        marker.bindPopup(`<strong>${name} (${info.code})</strong>`);

        marker.on('click', () => {
            renderSingleCard({...point, code: info.code});
        });
        allMarkers.push(marker);
    });
}

// 渲染數據表格
function renderDataTable(type) {
    const cfg = fieldMap[type];
    const field = cfg.field;
    const label = cfg.label;
    const unit = cfg.unit;
    document.getElementById('table-title').textContent = `${label} 數據表格`;
    const tbody = document.getElementById('table-body');
    tbody.innerHTML = "";

    let sourceList = type === "waterLevel" ? floodDataList : pointDataList;
    sourceList.forEach(item => {
        const name = item.name;
        const code = allPoints[name]?.code || "";
        let val = item[field];
        let displayVal = val === '--' ? '--' : val + (unit ? " " + unit : "");
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${name}</td><td>${code}</td><td>${displayVal}</td>`;
        tbody.appendChild(tr);
    });
}

// 合併水位數據到氣象測站
function mergeFloodData(){
    floodDataList.forEach(flood => {
        const match = pointDataList.find(p => p.name === flood.name);
        if(match){
            match.waterLevel = flood.waterLevel;
        }
    });
}

// ========== 抓取氣象 XML 數據 ==========
function fetchWeatherData() {
    const cacheBuster = Date.now();
    const url = `https://corsproxy.io/?https://xml.smg.gov.mo/c_actualweather.xml?t=${cacheBuster}`;
    return fetch(url, { cache: "no-store" })
        .then(res => {
            if (!res.ok) throw new Error("Weather fetch fail");
            return res.text();
        })
        .then(xmlStr => {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlStr, "text/xml");
            const pubTime = xmlDoc.querySelector("SysPubdate")?.textContent || "未知";
            document.getElementById("pub-date").textContent = pubTime;
            document.getElementById("time-stamp").textContent = pubTime;

            const stations = xmlDoc.querySelectorAll("WeatherReport station");
            pointDataList = [];
            singleCardBox.innerHTML = '<div class="empty-tip">請點擊地圖上圓圈查看測站數據</div>';

            stations.forEach(station => {
                const name = station.querySelector("stationname")?.textContent || "";
                const temp = extractNodeValue("Temperature", station);
                const tempMax = extractNodeValue("Temperature_daily_max", station);
                const tempMin = extractNodeValue("Temperature_daily_min", station);
                const humidity = extractNodeValue("Humidity", station);
                const windSpeed = extractNodeValue("WindSpeed", station);
                const windGust = extractNodeValue("WindGust", station);
                const pressSea = extractNodeValue("MeanSeaLevelPressure", station);
                const pressStation = extractNodeValue("StationPressure", station);
                const windDirNode = station.querySelector("WindDirection");
                const windDir = windDirNode?.querySelector("dValue")?.textContent || "";

                let rain1m = "", rain1h = "", rainTotal = "";
                station.querySelectorAll("Rainfall").forEach(r => {
                    const type = r.querySelector("Type")?.textContent;
                    const val = r.querySelector("dValue")?.textContent || "";
                    if (type === "3") rain1m = val;
                    if (type === "4") rain1h = val;
                    if (type === "5") rainTotal = val;
                });

                const T = parseFloat(temp);
                const RH = parseFloat(humidity);
                const windSpeedKmH = parseFloat(windSpeed);
                const apparentTemp = calculateApparentTemp(T, RH, windSpeedKmH);
                const heatIndex = calculateHeatIndex(T, RH);
                const dewPoint = calculateDewPoint(T, RH);

                pointDataList.push({
                    name, temp, tempMax, tempMin, humidity, windDir,
                    windSpeed, windGust, rain1m, rain1h, rainTotal,
                    pressSea, pressStation, apparentTemp, heatIndex, dewPoint,
                    waterLevel: "--"
                });
            });
        });
}

// ========== 抓取水位/積水 XML 數據 (已補全) ==========
function fetchFloodData() {
    const cacheBuster = Date.now();
    const url = `https://corsproxy.io/?https://xml.smg.gov.mo/c_ftgms.xml?t=${cacheBuster}`;
    return fetch(url, { cache: "no-store" })
        .then(res => {
            if (!res.ok) throw new Error("Flood fetch fail");
            return res.text();
        })
        .then(xmlStr => {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlStr, "text/xml");
            const stations = xmlDoc.querySelectorAll("WLReport station") || xmlDoc.querySelectorAll("station");
            floodDataList = [];

            stations.forEach(station => {
                const name = station.querySelector("stationname")?.textContent || "未知監測點";
                let waterLevel = "--";
                const wlNode = station.querySelector("WaterLevel") || station.querySelector("Value") || station.querySelector("dValue");
                if(wlNode){
                    waterLevel = wlNode.textContent.trim();
                }
                if (!waterLevel || waterLevel === "") waterLevel = "--";

                floodDataList.push({
                    name: name,
                    waterLevel: waterLevel
                });
            });
        })
        .catch(err => {
            console.error("水位數據載入失敗：", err);
        });
}

// ========== 統一載入所有數據 + 更新界面 ==========
function loadAllData() {
    Promise.all([fetchWeatherData(), fetchFloodData()])
        .then(() => {
            mergeFloodData();
            updateMapMarkers();
            updateLegendPanel(currentTab);
            renderDataTable(currentTab);
        })
        .catch(err => {
            console.error("整體數據載入失敗：", err);
        });
}

// 頁面載入完成後執行 + 每5分鐘自動刷新
window.addEventListener('DOMContentLoaded', loadAllData);
setInterval(loadAllData, 300000);
</script>
