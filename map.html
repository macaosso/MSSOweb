<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>澳門各區天氣實況 - GIS互動地圖</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f3f7;
            color: #2c3e50;
            padding: 20px;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        header {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            padding: 20px 30px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        header h1 {
            font-size: 1.6rem;
            font-weight: 600;
        }
        .meta-info {
            text-align: right;
            font-size: 0.9rem;
            opacity: 0.9;
        }
        /* Tab Buttons */
        .tab-wrapper {
            background: #fff;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }
        .tab-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            background: #e8edf2;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: #2a5298;
            color: #fff;
        }
        .tab-btn:hover:not(.active) {
            background: #d0d9e2;
        }
        /* Main Layout */
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 1024px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
        }
        .map-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            padding: 15px;
            position: relative;
        }
        #macau-map {
            width: 100%;
            height: 650px;
            border-radius: 8px;
        }
        /* --- Smaller, Always-Visible Legend --- */
        .map-legend {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background: rgba(255,255,255,0.95);
            padding: 8px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            z-index: 1000;
            min-width: 120px;
        }
        .map-legend h4 {
            margin: 0 0 5px 0;
            font-size: 0.8rem;
            text-align: center;
            border-bottom: 1px solid #eee;
            padding-bottom: 3px;
        }
        .legend-items {
            max-height: 180px;
            overflow-y: auto;
        }
        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 3px;
        }
        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 5px;
        }
        /* --- Time Stamp --- */
        .time-stamp {
            position: absolute;
            top: 25px;
            right: 25px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.9rem;
            z-index: 1000;
        }
        /* Station Cards */
        .station-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        .station-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            padding: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            border-top: 4px solid #3498db;
        }
        .station-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        .station-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: #2c3e50;
            border-bottom: 1px solid #ecf0f1;
            padding-bottom: 8px;
        }
        .temp-row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin: 15px 0;
        }
        .current-temp {
            font-size: 2.2rem;
            font-weight: 700;
            color: #1a1a1a;
        }
        .temp-range {
            font-size: 0.9rem;
            text-align: right;
        }
        .high-temp { color: #e74c3c; font-weight: 600; }
        .low-temp { color: #34495e; font-weight: 600; }
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            font-size: 0.9rem;
        }
        .metric {
            background: #f8f9fa;
            padding: 8px 12px;
            border-radius: 6px;
        }
        .col-half {
            grid-column: span 3;
        }
        .col-third {
            grid-column: span 2;
        }
        .metric span {
            display: block;
            color: #7f8c8d;
            font-size: 0.75rem;
            text-transform: uppercase;
            margin-bottom: 2px;
        }
        .metric strong {
            color: #2c3e50;
        }
        .rain-active {
            background: #e8f4fd;
            border: 1px solid #bcdffb;
        }
        .rain-active strong {
            color: #2980b9;
        }
        .loading {
            grid-column: 1 / -1;
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
            color: #7f8c8d;
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div>
            <h1>澳門各區天氣實況（互動GIS地圖）</h1>
            <small style="color: #2ecc71;">● 可縮放/拖曳地圖 | 點擊標示查看名稱</small>
        </div>
        <div class="meta-info">
            <div>資料更新時間：<span id="pub-date">載入中...</span></div>
            <div>每5分鐘自動刷新</div>
        </div>
    </header>

    <!-- All Split Map Tabs -->
    <div class="tab-wrapper">
        <div class="tab-buttons">
            <button class="tab-btn active" data-type="tempCurrent">氣溫</button>
            <button class="tab-btn" data-type="tempMax">最高氣溫</button>
            <button class="tab-btn" data-type="tempMin">最低氣溫</button>
            <button class="tab-btn" data-type="humidity">相對濕度</button>
            <button class="tab-btn" data-type="windDir">風向</button>
            <button class="tab-btn" data-type="windSpeed">風速</button>
            <button class="tab-btn" data-type="windGust">陣風</button>
            <button class="tab-btn" data-type="rain1m">一分鐘雨量</button>
            <button class="tab-btn" data-type="rain1h">一小時雨量</button>
            <button class="tab-btn" data-type="rainTotal">累計日雨量</button>
            <button class="tab-btn" data-type="pressSea">海平面氣壓</button>
            <button class="tab-btn" data-type="pressStation">站氣壓</button>
        </div>
    </div>

    <div class="main-layout">
        <div class="map-card">
            <div id="macau-map"></div>
            <!-- Time Stamp -->
            <div id="time-stamp" class="time-stamp"></div>
            <!-- Smaller, Always-Visible Legend -->
            <div id="map-legend" class="map-legend">
                <h4>圖例</h4>
                <div id="legend-content" class="legend-items"></div>
            </div>
        </div>
        <div id="grid-container" class="station-grid">
            <div class="loading">正在擷取區域數據...</div>
        </div>
    </div>
</div>

<script>
// All stations + bridges coordinates (fixed FM/PE no overlap)
const allPoints = {
    "紀念孫中山市政公園": { code: "DP", lat: 22.215322, lng: 113.543490 },
    "黑沙環": { code: "EM", lat: 22.207129, lng: 113.559971 },
    "大炮台": { code: "FM", lat: 22.197066, lng: 113.542261 },
    "外港": { code: "PE", lat: 22.196556, lng: 113.558333 },
    "媽閣": { code: "MM", lat: 22.185863, lng: 113.530675 },
    "大潭山": { code: "TG", lat: 22.159102, lng: 113.568947 },
    "東亞運大馬路": { code: "JA", lat: 22.155396, lng: 113.542412 },
    "九澳": { code: "KV", lat: 22.134686, lng: 113.580143 },
    "澳門大學": { code: "UM", lat: 22.131808, lng: 113.546970 },
    "路環市區": { code: "DC", lat: 22.117091, lng: 113.551041 },
    "西灣大橋": { code: "PV", lat: 22.173240, lng: 113.535416 },
    "友誼大橋北": { code: "PN", lat: 22.191167, lng: 113.563219 },
    "友誼大橋南": { code: "PS", lat: 22.180189, lng: 113.563299 },
    "嘉樂庇總督大橋": { code: "PG", lat: 22.180057, lng: 113.545435 },
    "澳門大橋北": { code: "MN", lat: 22.186985, lng: 113.573231 },
    "澳門大橋南": { code: "MS", lat: 22.173484, lng: 113.573047 },
    "蓮花大橋": { code: "LH", lat: 22.139934, lng: 113.549094 }
};

// Temperature color mapping
function getTempColor(tempStr) {
    const temp = parseFloat(tempStr);
    if (isNaN(temp)) return "#3498db";
    if (temp >= 35.5) return "#7b1818";
    if (temp >= 32.5) return "#d64040";
    if (temp >= 27.5) return "#ed7a7a";
    if (temp >= 22.5) return "#e8b03e";
    if (temp >= 17.5) return "#f0d390";
    if (temp >= 12.5) return "#62e0b1";
    if (temp >= 7.5) return "#64b5e7";
    return "#5c48a1";
}

// Humidity color mapping
function getHumidityColor(humStr) {
    const hum = parseFloat(humStr);
    if (isNaN(hum)) return "#3498db";
    if (hum >= 94.5) return "#553C9A";
    if (hum >= 84.5) return "#5DADEC";
    if (hum >= 49.5) return "#6EE7B7";
    if (hum >= 30.5) return "#E6B34B";
    return "#7b1818";
}

// Wind/Gust color mapping
function getWindColor(windStr) {
    const wind = parseFloat(windStr);
    if (isNaN(wind)) return "#3498db";
    if (wind >= 117.5) return "#d64040";
    if (wind >= 87.5) return "#f2a938";
    if (wind >= 62.5) return "#f9e559";
    if (wind >= 40.5) return "#60c070";
    return "#64b5e7";
}

// Rain 1min
function getRain1mColor(rainStr) {
    const rain = parseFloat(rainStr);
    if (isNaN(rain) || rain === 0) return "#a0a0a0";
    if (rain >= 0.8) return "#d64040";
    if (rain >= 0.6) return "#e68938";
    if (rain >= 0.4) return "#f9d342";
    if (rain >= 0.2) return "#3a6ea5";
    return "#bdd7ee";
}
// Rain 1hour
function getRain1hColor(rainStr) {
    const rain = parseFloat(rainStr);
    if (isNaN(rain) || rain === 0) return "#a0a0a0";
    if (rain >= 80) return "#000000";
    if (rain >= 50) return "#d64040";
    if (rain >= 40) return "#e68938";
    if (rain >= 20) return "#f9d342";
    if (rain >= 10) return "#3a6ea5";
    return "#bdd7ee";
}
// Total daily rain
function getRainTotalColor(rainStr) {
    const rain = parseFloat(rainStr);
    if (isNaN(rain) || rain === 0) return "#a0a0a0";
    if (rain >= 125) return "#800080";
    if (rain >= 100) return "#d64040";
    if (rain >= 80) return "#e68938";
    if (rain >= 50) return "#f9d342";
    if (rain >= 20) return "#3a6ea5";
    return "#bdd7ee";
}

// Pressure Sea Level
function getPressSeaColor(pressStr) {
    const press = parseFloat(pressStr);
    if (isNaN(press)) return "#3498db";
    if (press < 980) return "#d64040";
    if (press < 990) return "#e68938";
    if (press < 1000) return "#f9d342";
    return "#3a6ea5";
}
// Station Pressure
function getPressStationColor(pressStr) {
    const press = parseFloat(pressStr);
    if (isNaN(press)) return "#3498db";
    if (press < 965) return "#d64040";
    if (press < 975) return "#e68938";
    if (press < 985) return "#f9d342";
    return "#3a6ea5";
}

// Update legend panel (Wind direction tab has NO legend now)
function updateLegendPanel(tabType) {
    const legendContent = document.getElementById('legend-content');
    let legendHTML = '';

    switch(tabType) {
        case "tempCurrent":
        case "tempMax":
        case "tempMin":
            legendHTML = `
                <div class="legend-item"><div class="legend-color" style="background:#7b1818"></div>非常酷熱</div>
                <div class="legend-item"><div class="legend-color" style="background:#d64040"></div>酷熱</div>
                <div class="legend-item"><div class="legend-color" style="background:#ed7a7a"></div>炎熱</div>
                <div class="legend-item"><div class="legend-color" style="background:#e8b03e"></div>溫暖</div>
                <div class="legend-item"><div class="legend-color" style="background:#f0d390"></div>和暖</div>
                <div class="legend-item"><div class="legend-color" style="background:#62e0b1"></div>清涼</div>
                <div class="legend-item"><div class="legend-color" style="background:#64b5e7"></div>寒冷</div>
                <div class="legend-item"><div class="legend-color" style="background:#5c48a1"></div>非常寒冷</div>
            `;
            break;
        case "humidity":
            legendHTML = `
                <div class="legend-item"><div class="legend-color" style="background:#553C9A"></div>非常潮濕(95-100%)</div>
                <div class="legend-item"><div class="legend-color" style="background:#5DADEC"></div>潮濕(85-95%)</div>
                <div class="legend-item"><div class="legend-color" style="background:#6EE7B7"></div>正常</div>
                <div class="legend-item"><div class="legend-color" style="background:#E6B34B"></div>乾燥(40-70%)</div>
                <div class="legend-item"><div class="legend-color" style="background:#7b1818"></div>非常乾燥(0-40%)</div>
            `;
            break;
        case "windSpeed":
        case "windGust":
            legendHTML = `
                <div class="legend-item"><div class="legend-color" style="background:#d64040"></div>颶風</div>
                <div class="legend-item"><div class="legend-color" style="background:#f2a938"></div>暴風</div>
                <div class="legend-item"><div class="legend-color" style="background:#f9e559"></div>烈風</div>
                <div class="legend-item"><div class="legend-color" style="background:#60c070"></div>強風</div>
                <div class="legend-item"><div class="legend-color" style="background:#64b5e7"></div>強風以下</div>
            `;
            break;
        case "rain1m":
            legendHTML = `
                <div class="legend-item"><div class="legend-color" style="background:#a0a0a0"></div>無雨</div>
                <div class="legend-item"><div class="legend-color" style="background:#bdd7ee"></div><0.2mm</div>
                <div class="legend-item"><div class="legend-color" style="background:#3a6ea5"></div>0.2~0.3mm</div>
                <div class="legend-item"><div class="legend-color" style="background:#f9d342"></div>0.4~0.5mm</div>
                <div class="legend-item"><div class="legend-color" style="background:#e68938"></div>0.6~0.7mm</div>
                <div class="legend-item"><div class="legend-color" style="background:#d64040"></div>>=0.8mm</div>
            `;
            break;
        case "rain1h":
            legendHTML = `
                <div class="legend-item"><div class="legend-color" style="background:#a0a0a0"></div>無雨</div>
                <div class="legend-item"><div class="legend-color" style="background:#bdd7ee"></div><10mm</div>
                <div class="legend-item"><div class="legend-color" style="background:#3a6ea5"></div>10~19mm</div>
                <div class="legend-item"><div class="legend-color" style="background:#f9d342"></div>20~39mm</div>
                <div class="legend-item"><div class="legend-color" style="background:#e68938"></div>40~49mm</div>
                <div class="legend-item"><div class="legend-color" style="background:#d64040"></div>50~79mm</div>
                <div class="legend-item"><div class="legend-color" style="background:#000000"></div>>=80mm</div>
            `;
            break;
        case "rainTotal":
            legendHTML = `
                <div class="legend-item"><div class="legend-color" style="background:#a0a0a0"></div>無雨</div>
                <div class="legend-item"><div class="legend-color" style="background:#bdd7ee"></div><20mm</div>
                <div class="legend-item"><div class="legend-color" style="background:#3a6ea5"></div>20~49mm</div>
                <div class="legend-item"><div class="legend-color" style="background:#f9d342"></div>50~79mm</div>
                <div class="legend-item"><div class="legend-color" style="background:#e68938"></div>80~99mm</div>
                <div class="legend-item"><div class="legend-color" style="background:#d64040"></div>100~124mm</div>
                <div class="legend-item"><div class="legend-color" style="background:#800080"></div>>=125mm</div>
            `;
            break;
        case "pressSea":
            legendHTML = `
                <div class="legend-item"><div class="legend-color" style="background:#d64040"></div><980hPa</div>
                <div class="legend-item"><div class="legend-color" style="background:#e68938"></div>980~989hPa</div>
                <div class="legend-item"><div class="legend-color" style="background:#f9d342"></div>990~999hPa</div>
                <div class="legend-item"><div class="legend-color" style="background:#3a6ea5"></div>>1000hPa</div>
            `;
            break;
        case "pressStation":
            legendHTML = `
                <div class="legend-item"><div class="legend-color" style="background:#d64040"></div><965hPa</div>
                <div class="legend-item"><div class="legend-color" style="background:#e68938"></div>965~974hPa</div>
                <div class="legend-item"><div class="legend-color" style="background:#f9d342"></div>975~984hPa</div>
                <div class="legend-item"><div class="legend-color" style="background:#3a6ea5"></div>>=985hPa</div>
            `;
            break;
        case "windDir":
            legendHTML = `<div class="legend-item" style="color:#777;">風向代碼</div>`;
            break;
        default:
            legendHTML = `<div class="legend-item" style="color:#777;">無圖例</div>`;
    }

    legendContent.innerHTML = legendHTML;
}

// Init Leaflet Map
let map = L.map('macau-map').setView([22.17, 113.55], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

let allMarkers = [];
let currentTab = "tempCurrent";
let pointDataList = [];

// Tab Switch
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentTab = btn.dataset.type;
        updateMapMarkers();
        updateLegendPanel(currentTab);
    });
});

// Extract XML value
const extractNodeValue = (selector, parent) => {
    const el = parent.querySelector(selector);
    if (!el) return '';
    const val = el.querySelector("dValue")?.textContent || el.querySelector("Value")?.textContent || '';
    return val.trim();
};

// Clear all markers
function clearMarkers() {
    allMarkers.forEach(marker => map.removeLayer(marker));
    allMarkers = [];
}

// Convert wind direction text to rotation degrees (keep function for compatibility)
function windDirToRotation(dirText) {
    const dirToDeg = {
        "N": 0, "NNE": 22.5, "NE": 45, "ENE": 67.5,
        "E": 90, "ESE": 112.5, "SE": 135, "SSE": 157.5,
        "S": 180, "SSW": 202.5, "SW": 225, "WSW": 247.5,
        "W": 270, "WNW": 292.5, "NW": 315, "NNW": 337.5
    };
    return dirToDeg[dirText] || 0;
}

// Update map markers
function updateMapMarkers() {
    clearMarkers();
    pointDataList.forEach(point => {
        const name = point.name;
        const info = allPoints[name];
        if (!info) return;

        let showVal = "";
        let bgColor = "#3498db";
        let markerIconHtml = "";

        switch (currentTab) {
            case "tempCurrent":
                showVal = point.temp;
                bgColor = getTempColor(showVal);
                markerIconHtml = `<div style="background:${bgColor};color:#fff;border-radius:50%;width:50px;height:50px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:bold;">${showVal}</div>`;
                break;
            case "tempMax":
                showVal = point.tempMax;
                bgColor = getTempColor(showVal);
                markerIconHtml = `<div style="background:${bgColor};color:#fff;border-radius:50%;width:50px;height:50px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:bold;">${showVal}</div>`;
                break;
            case "tempMin":
                showVal = point.tempMin;
                bgColor = getTempColor(showVal);
                markerIconHtml = `<div style="background:${bgColor};color:#fff;border-radius:50%;width:50px;height:50px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:bold;">${showVal}</div>`;
                break;
            case "humidity":
                showVal = point.humidity;
                bgColor = getHumidityColor(showVal);
                markerIconHtml = `<div style="background:${bgColor};color:#fff;border-radius:50%;width:50px;height:50px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:bold;">${showVal}</div>`;
                break;
            case "windDir":
                // Circle with wind direction text inside
                showVal = point.windDir || "--";
                markerIconHtml = `<div style="background:#9b59b6;color:#fff;border-radius:50%;width:50px;height:50px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:bold;">${showVal}</div>`;
                break;
            case "windSpeed":
                showVal = point.windSpeed;
                bgColor = getWindColor(showVal);
                markerIconHtml = `<div style="background:${bgColor};color:#fff;border-radius:50%;width:50px;height:50px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:bold;">${showVal}</div>`;
                break;
            case "windGust":
                showVal = point.windGust;
                bgColor = getWindColor(showVal);
                markerIconHtml = `<div style="background:${bgColor};color:#fff;border-radius:50%;width:50px;height:50px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:bold;">${showVal}</div>`;
                break;
            case "rain1m":
                showVal = point.rain1m;
                bgColor = getRain1mColor(showVal);
                markerIconHtml = `<div style="background:${bgColor};color:#fff;border-radius:50%;width:50px;height:50px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:bold;">${showVal}</div>`;
                break;
            case "rain1h":
                showVal = point.rain1h;
                bgColor = getRain1hColor(showVal);
                markerIconHtml = `<div style="background:${bgColor};color:#fff;border-radius:50%;width:50px;height:50px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:bold;">${showVal}</div>`;
                break;
            case "rainTotal":
                showVal = point.rainTotal;
                bgColor = getRainTotalColor(showVal);
                markerIconHtml = `<div style="background:${bgColor};color:#fff;border-radius:50%;width:50px;height:50px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:bold;">${showVal}</div>`;
                break;
            case "pressSea":
                showVal = point.pressSea;
                bgColor = getPressSeaColor(showVal);
                markerIconHtml = `<div style="background:${bgColor};color:#fff;border-radius:50%;width:50px;height:50px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:bold;">${showVal}</div>`;
                break;
            case "pressStation":
                showVal = point.pressStation;
                bgColor = getPressStationColor(showVal);
                markerIconHtml = `<div style="background:${bgColor};color:#fff;border-radius:50%;width:50px;height:50px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:bold;">${showVal}</div>`;
                break;
        }

        if (showVal === '' || showVal === '--') return;

        let iconSize = [50, 50];
        let iconAnchor = [25, 25];

        const icon = L.divIcon({
            html: markerIconHtml,
            className: "",
            iconSize: iconSize,
            iconAnchor: iconAnchor
        });

        const marker = L.marker([info.lat, info.lng], { icon: icon }).addTo(map);
        marker.bindPopup(`<strong>${name} (${info.code})</strong>`);
        allMarkers.push(marker);
    });
}

// Fetch XML Data
function fetchGridData() {
    const cacheBuster = Date.now();
    const url = `https://corsproxy.io/?https://xml.smg.gov.mo/c_actualweather.xml?t=${cacheBuster}`;

    fetch(url, { cache: "no-store" })
        .then(res => {
            if (!res.ok) throw new Error("Request fail");
            return res.text();
        })
        .then(xmlStr => {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlStr, "text/xml");

            const pubTime = xmlDoc.querySelector("SysPubdate")?.textContent || "未知";
            document.getElementById("pub-date").textContent = pubTime;
            document.getElementById("time-stamp").textContent = pubTime;

            const stations = xmlDoc.querySelectorAll("WeatherReport station");
            const gridContainer = document.getElementById("grid-container");
            gridContainer.innerHTML = "";
            pointDataList = [];

            stations.forEach(station => {
                const code = station.getAttribute("code") || "";
                const name = station.querySelector("stationname")?.textContent || "";
                const fullName = `${name} (${code})`;

                const temp = extractNodeValue("Temperature", station);
                const tempMax = extractNodeValue("Temperature_daily_max", station);
                const tempMin = extractNodeValue("Temperature_daily_min", station);
                const humidity = extractNodeValue("Humidity", station);
                const windSpeed = extractNodeValue("WindSpeed", station);
                const windGust = extractNodeValue("WindGust", station);
                const pressSea = extractNodeValue("MeanSeaLevelPressure", station);
                const pressStation = extractNodeValue("StationPressure", station);

                const windDirNode = station.querySelector("WindDirection");
                const windDir = windDirNode?.querySelector("dValue")?.textContent || "";

                let rain1m = "", rain1h = "", rainTotal = "";
                station.querySelectorAll("Rainfall").forEach(r => {
                    const type = r.querySelector("Type")?.textContent;
                    const val = r.querySelector("dValue")?.textContent || "";
                    if (type === "3") rain1m = val;
                    if (type === "4") rain1h = val;
                    if (type === "5") rainTotal = val;
                });

                pointDataList.push({
                    name, temp, tempMax, tempMin, humidity,
                    windDir, windSpeed, windGust,
                    rain1m, rain1h, rainTotal,
                    pressSea, pressStation
                });

                const rain1mClass = parseFloat(rain1m) > 0 ? "rain-active" : "";
                const rain1hClass = parseFloat(rain1h) > 0 ? "rain-active" : "";
                const rainTotalClass = parseFloat(rainTotal) > 0 ? "rain-active" : "";

                const card = `
                <div class="station-card">
                    <div class="station-name">${fullName}</div>
                    <div class="temp-row">
                        <div class="current-temp">${temp}°C</div>
                        <div class="temp-range">
                            <div>最高: <span class="high-temp">${tempMax}°C</span></div>
                            <div>最低: <span class="low-temp">${tempMin}°C</span></div>
                        </div>
                    </div>
                    <div class="metrics-grid">
                        <div class="metric col-half"><span>相對濕度(%)</span><strong>${humidity || '--'}%</strong></div>
                        <div class="metric col-half"><span>風向</span><strong>${windDir || '--'}</strong></div>
                        <div class="metric col-half"><span>風速(km/h)</span><strong>${windSpeed || '--'} ${windSpeed?'<small>km/h</small>':''}</strong></div>
                        <div class="metric col-half"><span>陣風(km/h)</span><strong>${windGust || '--'} ${windGust?'<small>km/h</small>':''}</strong></div>
                        <div class="metric col-half"><span>海平面氣壓(hPa)</span><strong>${pressSea || '--'} ${pressSea?'<small>hPa</small>':''}</strong></div>
                        <div class="metric col-half"><span>站點氣壓(hPa)</span><strong>${pressStation || '--'} ${pressStation?'<small>hPa</small>':''}</strong></div>
                        <div class="metric col-third ${rain1mClass}"><span>一分鐘雨量</span><strong>${rain1m || '--'} ${rain1m?'<small>mm</small>':''}</strong></div>
                        <div class="metric col-third ${rain1hClass}"><span>一小時雨量</span><strong>${rain1h || '--'} ${rain1h?'<small>mm</small>':''}</strong></div>
                        <div class="metric col-third ${rainTotalClass}"><span>日累計雨量</span><strong>${rainTotal || '--'} ${rainTotal?'<small>mm</small>':''}</strong></div>
                    </div>
                </div>`;
                gridContainer.innerHTML += card;
            });

            updateMapMarkers();
            updateLegendPanel(currentTab);
        })
        .catch(err => {
            console.error(err);
            document.getElementById("grid-container").innerHTML = `
                <div class="loading" style="color:#e74c3c;">載入失敗，請檢查網絡</div>
            `;
        });
}

fetchGridData();
setInterval(fetchGridData, 60000);
</script>
