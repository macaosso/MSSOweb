<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>澳門實時水位監測系統</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f7fa;
            color: #2c3e50;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            background: linear-gradient(135deg, #2980b9, #2c3e50);
            color: white;
            padding: 25px 30px;
            border-radius: 12px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 4px 15px rgba(41, 128, 185, 0.2);
        }
        header h1 {
            font-size: 1.6rem;
            font-weight: 600;
        }
        .meta-info {
            text-align: right;
            font-size: 0.9rem;
            opacity: 0.95;
        }
        .station-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .station-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.03);
            padding: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            border-top: 5px solid #3498db;
            position: relative;
            overflow: hidden;
        }
        .station-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }
        .station-name {
            font-size: 1.15rem;
            font-weight: bold;
            color: #34495e;
            margin-bottom: 15px;
            border-bottom: 1px solid #ecf0f1;
            padding-bottom: 8px;
        }
        .water-level-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px 0;
            background: #fdfefe;
            border-radius: 8px;
            border: 1px solid #eef2f5;
        }
        .water-level-label {
            font-size: 0.8rem;
            color: #7f8c8d;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }
        .water-level-value {
            font-size: 2.8rem;
            font-weight: 800;
            color: #2c3e50;
        }
        .water-level-unit {
            font-size: 1.2rem;
            font-weight: 500;
            color: #7f8c8d;
            margin-left: 3px;
        }
        /* Active Flood Alert Warning States (Triggers if depth > 0.00) */
        .flood-active {
            border-top-color: #e67e22;
            background: #fff9f4;
        }
        .flood-active .station-name {
            color: #d35400;
        }
        .flood-active .water-level-container {
            background: #fdf2e9;
            border-color: #fadbd8;
        }
        .flood-active .water-level-value {
            color: #e67e22;
        }
        .loading {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>澳門低窪地區即時水位監測</h1>
            <small style="color: #3498db; background: rgba(255,255,255,0.9); padding: 2px 8px; border-radius: 4px; margin-top: 5px; display: inline-block;">
                ● 水位高度 (米) 獨立網格
            </small>
        </div>
        <div class="meta-info">
            <div>數據更新時間：<span id="pub-date">載入中...</span></div>
            <div>每5分鐘自動刷新</div>
        </div>
    </header>

    <div id="grid-container" class="station-grid">
        <div class="loading">正在擷取區域實時水位數據...</div>
    </div>
</div>

<script>
function fetchWaterLevelData() {
    const cacheBuster = Date.now();
    const freshUrl = `https://corsproxy.io/?https://xml.smg.gov.mo/c_ftgms.xml?t=${cacheBuster}`;

    fetch(freshUrl, { cache: "no-store" })
        .then(response => {
            if (!response.ok) throw new Error('Network error parsing telemetry matrix.');
            return response.text();
        })
        .then(xmlString => {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlString, "text/xml");

            // Extract Publishing Time Stamp
            const pubDateNode = xmlDoc.querySelector("SysPubdate");
            if (pubDateNode) {
                document.getElementById('pub-date').textContent = pubDateNode.textContent;
            }

            // Targets explicit water level report entries inside the FTGMS XML ecosystem
            const stations = xmlDoc.querySelectorAll("WLReport station") || xmlDoc.querySelectorAll("station");
            const gridContainer = document.getElementById('grid-container');
            gridContainer.innerHTML = ''; 

            if (stations.length === 0) {
                gridContainer.innerHTML = `<div class="loading">暫無即時低窪地區水位數據。</div>`;
                return;
            }

            stations.forEach(station => {
                const name = station.querySelector("stationname")?.textContent || "未知監測點";
                const code = station.getAttribute("code") || station.querySelector("stationcode")?.textContent || "";
                const nameDisplay = code ? `${name} (${code})` : name;
                
                // Extracting Water Level metrics
                let waterLevel = "--";
                const wlNode = station.querySelector("WaterLevel") || station.querySelector("Value") || station.querySelector("dValue");
                
                if (wlNode) {
                    waterLevel = wlNode.textContent.trim();
                } else {
                    // Fallback to plain node context if element is direct-mapped text
                    waterLevel = station.textContent.trim();
                }

                // Format missing values safely
                if (!waterLevel || waterLevel === "") {
                    waterLevel = "--";
                }

                // Trigger contextual flash warning parameters if values clear 0.00m
                const parseWl = parseFloat(waterLevel);
                const isFlooding = !isNaN(parseWl) && parseWl > 0;
                const alertClass = isFlooding ? 'flood-active' : '';

                const cardHtml = `
                    <div class="station-card ${alertClass}">
                        <div class="station-name">${nameDisplay}</div>
                        <div class="water-level-container">
                            <span class="water-level-label">實時水位高度</span>
                            <div class="water-level-value">
                                ${waterLevel}<span class="water-level-unit">${waterLevel !== '--' ? '米' : ''}</span>
                            </div>
                        </div>
                    </div>
                `;
                gridContainer.innerHTML += cardHtml;
            });
        })
        .catch(err => {
            console.error("Water level processing system failure:", err);
            document.getElementById('grid-container').innerHTML = `
                <div class="loading" style="color: #e74c3c;">
                    未能載入微細尺度水位監測數據。
                </div>`;
        });
}

// Deploy runtime logic loops immediately
fetchWaterLevelData();

// Poll server every 5 minutes (300000ms)
setInterval(fetchWaterLevelData, 30000);
</script>

</body>
</html>
