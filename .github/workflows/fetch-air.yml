name: Fetch Air Quality Data
run-name: Auto fetch latest air data

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

# 明確給予倉庫寫入權限（關鍵！）
permissions:
  contents: write

jobs:
  get-air-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # 關鍵：checkout 時就帶上 token，避免後續 push 權限問題
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download SMG latestAirConcentration.json
        run: |
          node << 'EOF'
          const https = require('https');
          const fs = require('fs');

          const targetUrl = "https://www.smg.gov.mo/smg/airQuality/latestAirConcentration.json";
          const savePath = "./data.json";

          function getFollowRedirect(url, maxRedirects = 5) {
            return new Promise((resolve, reject) => {
              if (maxRedirects <= 0) return reject(new Error("Too many redirects"));
              https.get(url, (res) => {
                if (res.statusCode >= 300 && res.statusCode < 400 && res.headers.location) {
                  return resolve(getFollowRedirect(res.headers.location, maxRedirects - 1));
                }
                if (res.statusCode !== 200) {
                  return reject(new Error("HTTP " + res.statusCode));
                }
                let body = "";
                res.on("data", chunk => body += chunk);
                res.on("end", () => resolve(body));
              }).on("error", reject);
            });
          }

          getFollowRedirect(targetUrl)
            .then(raw => {
              try {
                JSON.parse(raw);
                fs.writeFileSync(savePath, raw, "utf8");
                console.log("✅ data.json saved");
              } catch (e) {
                throw new Error("❌ Not valid JSON (got HTML?)");
              }
            })
            .catch(err => {
              console.error(err.message);
              process.exit(1);
            });
          EOF

      - name: Force commit & push (no skip)
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          
          # 強制 add 並 commit，即使 diff 判斷異常也會提交
          git add data.json
          
          # 不管有沒有變化，都提交（後續可以改回條件提交）
          git commit -m "Auto update air quality data at $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          
          # 明確指定 push 到 main 分支
          git push origin HEAD:main
