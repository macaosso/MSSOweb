name: Fetch Macao Weather XML
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/5 * * * *'  # every 5 minutes
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download XML
        run: |
          curl -L -o c_actualweather.xml https://xml.smg.gov.mo/c_actualweather.xml
      - name: Commit & Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add c_actualweather.xml
          git commit -m "Auto-update weather data $(date)" || echo "No changes"
          git push
