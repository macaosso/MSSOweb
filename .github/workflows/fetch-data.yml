name: Fetch Air Quality Data
run-name: Auto fetch latest air data

# Run every 5 minutes
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write # Critical: allow push commits

jobs:
  get-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch SMG API and write data.json
        run: |
          node << 'EOF'
          const https = require('https');
          const fs = require('fs');
          const url = "https://www.smg.gov.mo/smg/airQuality/latestAirConcentration.json";
          
          https.get(url, (res) => {
            let raw = "";
            res.on("data", d => raw += d);
            res.on("end", () => {
              fs.writeFileSync("data.json", raw, "utf8");
              console.log("Data saved to data.json");
            });
          }).on("error", e => {
            console.error("API fetch error:", e);
          });
          EOF

      - name: Commit & Push data
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "bot@github.com"
          git add data.json
          git commit -m "Update air quality data" || echo "No new data"
          git push