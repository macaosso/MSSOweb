name: Update Radar Image

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  update-radar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4   # ✅ updated

      - name: Set up Python
        uses: actions/setup-python@v5   # ✅ updated
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install matplotlib requests pandas xarray cartopy

      - name: Run radar script
        run: python radar.py

      - name: Commit and push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add radar.png
          git commit -m "Update radar image" || echo "No changes"
          git push
