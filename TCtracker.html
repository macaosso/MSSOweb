<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>澳門熱帶氣旋追蹤｜實時風雨氣壓監測</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f3f7;
            color: #2c3e50;
            padding: 20px;
            font-size: 14px;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        header {
            background: linear-gradient(135deg, #0f3460, #16537e);
            color: white;
            padding: 20px 30px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        header h1 {
            font-size: 1.6rem;
            font-weight: 600;
        }
        .meta-info {
            text-align: right;
            font-size: 0.9rem;
            opacity: 0.9;
        }

        /* 警告卡片統一樣式 */
        .alert-box {
            background: #fff;
            border-left:6px solid #d62828;
            padding:14px 20px;
            border-radius:8px;
            margin-bottom:12px;
            box-shadow:0 2px 8px rgba(0,0,0,0.08);
        }
        .alert-box h3 {
            color:#c1121f;
            margin-bottom:6px;
            font-size:1.05rem;
        }
        .alert-content {
            font-size:0.95rem;
            color:#333;
        }

        /* 視圖切換 */
        .view-switch {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }
        .view-switch button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            background: #e8edf2;
            cursor: pointer;
            font-size: 0.95rem;
        }
        .view-switch button.active {
            background: #16537e;
            color: #fff;
        }

        /* 分類按鈕 */
        .tab-wrapper {
            background: #fff;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }
        .tab-group {
            margin-bottom: 10px;
        }
        .group-title {
            font-size: 1rem;
            font-weight: 600;
            color: #2c3e50;
            margin: 0 0 8px 0;
            padding: 4px 0;
        }
        .group-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding-left: 10px;
        }
        .tab-btn {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            background: #e8edf2;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: #16537e;
            color: #fff;
        }
        .tab-btn:hover:not(.active) {
            background: #d0d9e2;
        }

        /* 地圖卡片 */
        .map-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            padding: 15px;
            position: relative;
        }
        /* 地圖高度拉長 */
        #macau-map {
            width: 100%;
            height: 800px;
            border-radius: 8px;
        }

        /* 圖例 */
        .map-legend {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background: rgba(255,255,255,0.95);
            padding: 8px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            z-index: 1000;
            min-width: 120px;
        }
        .map-legend h4 {
            margin: 0 0 5px 0;
            font-size: 0.8rem;
            text-align: center;
            border-bottom: 1px solid #eee;
            padding-bottom: 3px;
        }
        .legend-items {
            max-height: 180px;
            overflow-y: auto;
        }
        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 3px;
        }
        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 5px;
        }

        /* 時間戳 */
        .time-stamp {
            position: absolute;
            top: 25px;
            right: 25px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.9rem;
            z-index: 1000;
        }
        .time-stamp-indicator {
            position: absolute;
            top: 60px;
            right: 25px;
            background: rgba(22, 83, 126, 0.9);
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.9rem;
            z-index: 1000;
        }

        /* 表格 */
        .table-container {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 0.85rem;
        }
        .data-table th, .data-table td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }
        .data-table th {
            background: #f1f5f9;
            font-weight: 600;
        }
        .data-table tr:hover {
            background: #f8fafc;
        }
        .sort-buttons button {
            padding: 4px 10px;
            margin-left: 6px;
            border: none;
            border-radius: 4px;
            background: #e8edf2;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .sort-buttons button:hover {
            background: #d0d9e2;
        }

        .hide { display: none !important; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div>
            <h1>澳門熱帶氣旋追蹤網｜實時風雨氣壓監測</h1>
            <small style="color: #90ee90;">● 地圖標記實時數值｜自動載入全測站資料</small>
        </div>
        <div class="meta-info">
            <div>更新時間：<span id="pub-date">載入中...</span></div>
            <div>每5分鐘自動刷新</div>
        </div>
    </header>

    <!-- 熱帶氣旋警告 -->
    <div class="alert-box">
        <h3>現時熱帶氣旋警告</h3>
        <div class="alert-content" id="typhoon-info">載入氣旋資訊中……</div>
    </div>

    <!-- 風暴潮警告（新增） -->
    <div class="alert-box">
        <h3>現時風暴潮警告</h3>
        <div class="alert-content" id="stormsurge-info">載入風暴潮資訊中……</div>
    </div>

    <div class="view-switch">
        <button id="btn-map" class="active">地圖視圖</button>
        <button id="btn-table">數據表格</button>
    </div>

    <div class="tab-wrapper">
        <div class="tab-group">
            <h3 class="group-title">風力數據</h3>
            <div class="group-buttons">
                <button class="tab-btn active" data-type="windDir">風向</button>
                <button class="tab-btn" data-type="windSpeed">風速 (km/h)</button>
                <button class="tab-btn" data-type="windGust">陣風 (km/h)</button>
            </div>
        </div>
        <div class="tab-group">
            <h3 class="group-title">雨量數據</h3>
            <div class="group-buttons">
                <button class="tab-btn" data-type="rain1m">一分鐘雨量(mm)</button>
                <button class="tab-btn" data-type="rain1h">一小時雨量(mm)</button>
                <button class="tab-btn" data-type="rainTotal">日累積雨量(mm)</button>
            </div>
        </div>
        <div class="tab-group">
            <h3 class="group-title">氣壓數據</h3>
            <div class="group-buttons">
                <button class="tab-btn" data-type="pressSea">海平面氣壓 (hPa)</button>
                <button class="tab-btn" data-type="pressStation">站氣壓 (hPa)</button>
            </div>
        </div>
        <div class="tab-group">
            <h3 class="group-title">水位數據</h3>
            <div class="group-buttons">
                <button class="tab-btn" data-type="waterLevel">實時水位 (m)</button>
            </div>
        </div>
    </div>

    <div id="map-view">
        <div class="map-card">
            <div id="macau-map"></div>
            <div id="time-stamp" class="time-stamp"></div>
            <div id="current-indicator" class="time-stamp-indicator"></div>
            <div id="map-legend" class="map-legend">
                <h4>圖例</h4>
                <div id="legend-content" class="legend-items"></div>
            </div>
        </div>
    </div>

    <div id="table-view" class="hide">
        <div class="table-container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom:10px;">
                <div id="table-title" style="font-size:1.1rem;font-weight:bold;">數據表格</div>
                <div class="sort-buttons">
                    <button class="sort-btn" data-sort="default">預設</button>
                    <button class="sort-btn" data-sort="desc">高至低</button>
                    <button class="sort-btn" data-sort="asc">低至高</button>
                </div>
            </div>
            <table class="data-table" id="data-table">
                <thead><tr><th>測站名稱</th><th>站代碼</th><th>數值</th></tr></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
// 測站座標
const weatherPoints = {
    "紀念孫中山市政公園": { code: "DP", lat: 22.215322, lng: 113.543490 },
    "黑沙環": { code: "EM", lat: 22.207129, lng: 113.559971 },
    "大炮台": { code: "FM", lat: 22.197066, lng: 113.542261 },
    "外港": { code: "PE", lat: 22.196556, lng: 113.558333 },
    "媽閣": { code: "MM", lat: 22.185863, lng: 113.530675 },
    "大潭山": { code: "TG", lat: 22.159102, lng: 113.568947 },
    "東亞運大馬路": { code: "JA", lat: 22.155396, lng: 113.542412 },
    "九澳": { code: "KV", lat: 22.134686, lng: 113.580143 },
    "澳門大學": { code: "UM", lat: 22.131808, lng: 113.546970 },
    "路環市區": { code: "DC", lat: 22.117091, lng: 113.551041 },
    "西灣大橋": { code: "PV", lat: 22.173240, lng: 113.535416 },
    "友誼大橋北": { code: "PN", lat: 22.191167, lng: 113.563219 },
    "友誼大橋南": { code: "PS", lat: 22.180189, lng: 113.563299 },
    "嘉樂庇總督大橋": { code: "PG", lat: 22.180057, lng: 113.545435 },
    "澳門大橋北": { code: "MN", lat: 22.186985, lng: 113.573231 },
    "澳門大橋南": { code: "MS", lat: 22.173484, lng: 113.573047 },
    "蓮花大橋": { code: "LH", lat: 22.139934, lng: 113.549094 }
};
const floodPoints = {
    "青洲河邊馬路": { lat: 22.212097, lng: 113.535243 },
    "花地瑪教會街": { lat: 22.211374, lng: 113.546674 },
    "紅街市": { lat: 22.205155, lng: 113.544597 },
    "光復街": { lat: 22.202498, lng: 113.544916 },
    "永樂戲院": { lat: 22.202574, lng: 113.542885 },
    "內港北": { lat: 22.199984, lng: 113.536861 },
    "內港": { lat: 22.198031, lng: 113.536426 },
    "康公廟": { lat: 22.197330, lng: 113.537858 },
    "司打口": { lat: 22.193228, lng: 113.536822 },
    "內港南": { lat: 22.190755, lng: 113.532853 },
    "下環街": { lat: 22.189418, lng: 113.534413 },
    "菜園路": { lat: 22.159073, lng: 113.558961 },
    "沙維斯街": { lat: 22.157666, lng: 113.550649 },
    "柯維納馬路": { lat: 22.157473, lng: 113.548550 },
    "益隆": { lat: 22.156058, lng: 113.559474 },
    "松樹尾": { lat: 22.154766, lng: 113.557309 },
    "黑橋街": { lat: 22.154409, lng: 113.556284 },
    "石排灣": { lat: 22.131648, lng: 113.562820 },
    "聖方濟各堂": { lat: 22.117434, lng: 113.551004 }
};

const fieldMap = {
    windDir: {field:'windDir', label:'風向', unit:''},
    windSpeed: {field:'windSpeed', label:'風速', unit:'km/h'},
    windGust: {field:'windGust', label:'陣風', unit:'km/h'},
    rain1m:{field:'rain1m',label:'一分鐘雨量',unit:'mm'},
    rain1h:{field:'rain1h',label:'一小時雨量',unit:'mm'},
    rainTotal:{field:'rainTotal',label:'日累積雨量',unit:'mm'},
    pressSea: {field:'pressSea', label:'海平面氣壓', unit:'hPa'},
    pressStation: {field:'pressStation', label:'站氣壓', unit:'hPa'},
    waterLevel: {field:'waterLevel', label:'實時水位', unit:'m'}
};

// 配色
function getWindColor(windStr) {
    const wind = parseFloat(windStr);
    if (isNaN(wind)) return "#3498db";
    if (wind >= 117.5) return "#6a0606";
    if (wind >= 87.5)  return "#b1510d";
    if (wind >= 62.5)  return "#7f710b";
    if (wind >= 40.5)  return "#154c83";
    return "#11750a";
}
function getRain1mColor(v){v=parseFloat(v);if(isNaN(v))return"#3498db";if(v>=1.8)return"#6a0c7a";if(v>=1.4)return"#000";if(v>=0.8)return"#921818";if(v>=0.4)return"#878e14";if(v>=0.2)return"#227192";return"#636363";}
function getRain1hColor(v){v=parseFloat(v);if(isNaN(v))return"#3498db";if(v>=100)return"#6a0c7a";if(v>=80)return"#000";if(v>=50)return"#921818";if(v>=20)return"#878e14";if(v>=10)return"#149f37";if(v>=0.1)return"#227192";return"#636363";}
function getRainTotalColor(v){v=parseFloat(v);if(isNaN(v))return"#3498db";if(v>=350)return"#000";if(v>=200)return"#921818";if(v>=100)return"#a04413";if(v>=50)return"#878e14";if(v>=0.1)return"#227192";return"#636363";}
function getPressSeaColor(p){p=parseFloat(p);if(isNaN(p))return"#3498db";if(p<980)return"#571b7a";if(p<990)return"#791919";if(p<1000)return"#757012";return"#2b7c42";}
function getPressStationColor(p){p=parseFloat(p);if(isNaN(p))return"#3498db";if(p<965)return"#571b7a";if(p<975)return"#791919";if(p<985)return"#757012";return"#2b7c42";}
function getWaterLevelColor(w){w=parseFloat(w);if(isNaN(w))return"#3498db";if(w>=2.5)return"#000";if(w>=1.49)return"#71180b";if(w>=1)return"#9e551a";if(w>=0.5)return"#778015";if(w>=0.01)return"#1a6080";return"#1b6009";}

// 圖例
function updateLegendPanel(t){
    const e=document.getElementById("legend-content");let h="";
    switch(t){
        case"windSpeed":case"windGust":h=`
<div class="legend-item"><div class="legend-color" style="background:#6a0606"></div>颶風</div>
<div class="legend-item"><div class="legend-color" style="background:#b1510d"></div>暴風</div>
<div class="legend-item"><div class="legend-color" style="background:#7f710b"></div>烈風</div>
<div class="legend-item"><div class="legend-color" style="background:#154c83"></div>強風≥41</div>
<div class="legend-item"><div class="legend-color" style="background:#11750a"></div>一般</div>`;break;
        case"rain1m":h=`<div class="legend-item"><div class="legend-color" style="background:#6a0c7a"></div>大雨</div><div class="legend-item"><div class="legend-color" style="background:#921818"></div>中雨</div>`;break;
        case"rain1h":h=`<div class="legend-item"><div class="legend-color" style="background:#6a0c7a"></div>暴雨</div><div class="legend-item"><div class="legend-color" style="background:#921818"></div>大雨</div>`;break;
        case"rainTotal":h=`<div class="legend-item"><div class="legend-color" style="background:#000"></div>特大暴雨</div><div class="legend-item"><div class="legend-color" style="background:#921818"></div>暴雨</div>`;break;
        case"pressSea":case"pressStation":h=`<div class="legend-item"><div class="legend-color" style="background:#571b7a"></div>低壓</div><div class="legend-item"><div class="legend-color" style="background:#791919"></div>中低壓</div>`;break;
        case"waterLevel":h=`<div class="legend-item"><div class="legend-color" style="background:#000"></div>高水位</div><div class="legend-item"><div class="legend-color" style="background:#71180b"></div>警戒</div>`;break;
        default:h=`<div class="legend-item">無色標</div>`;
    }e.innerHTML=h;
}

// 地圖初始化（拉近縮放）
let map = L.map('macau-map').setView([22.17, 113.55], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'&copy; OSM'}).addTo(map);

let allMarkers = [];
let currentTab = "windSpeed";
document.getElementById('current-indicator').textContent = fieldMap[currentTab].label;
let pointDataList = [], floodDataList = [];

// 標籤切換
document.querySelectorAll('.tab-btn').forEach(b=>{
    b.addEventListener('click',()=>{
        document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
        b.classList.add('active');
        currentTab = b.dataset.type;
        document.getElementById('current-indicator').textContent = fieldMap[currentTab].label;
        updateMapMarkers();
        updateLegendPanel(currentTab);
        renderDataTable(currentTab);
    });
});

// 視圖切換
document.getElementById('btn-map').onclick=()=>{
    document.getElementById('btn-map').classList.add('active');
    document.getElementById('btn-table').classList.remove('active');
    document.getElementById('map-view').classList.remove('hide');
    document.getElementById('table-view').classList.add('hide');
};
document.getElementById('btn-table').onclick=()=>{
    document.getElementById('btn-table').classList.add('active');
    document.getElementById('btn-map').classList.remove('active');
    document.getElementById('map-view').classList.add('hide');
    document.getElementById('table-view').classList.remove('hide');
    renderDataTable(currentTab);
};

function extractNodeValue(s,p){const e=p.querySelector(s);if(!e)return"";return(e.querySelector("dValue")||e.querySelector("Value"))?.textContent?.trim()||"";}
function clearMarkers(){allMarkers.forEach(m=>map.removeLayer(m));allMarkers=[];}

// 更新地圖標記
function updateMapMarkers(){
    clearMarkers();
    let list, coords;
    if(currentTab==="waterLevel"){list=floodDataList;coords=floodPoints;}
    else{list=pointDataList;coords=weatherPoints;}
    list.forEach(item=>{
        const name=item.name;
        const c=coords[name];if(!c)return;
        let v="--",color="#3498db",skip=0;
        switch(currentTab){
            case"windDir":v=item.windDir||"--";color="#9b59b6";break;
            case"windSpeed":v=item.windSpeed;color=getWindColor(v);break;
            case"windGust":v=item.windGust;color=getWindColor(v);break;
            case"rain1m":v=item.rain1m;color=getRain1mColor(v);break;
            case"rain1h":v=item.rain1h;color=getRain1hColor(v);break;
            case"rainTotal":v=item.rainTotal;color=getRainTotalColor(v);break;
            case"pressSea":v=item.pressSea;color=getPressSeaColor(v);break;
            case"pressStation":v=item.pressStation;color=getPressStationColor(v);break;
            case"waterLevel":v=item.waterLevel;if(v=="--")skip=1;color=getWaterLevelColor(v);break;
        }
        if(skip||v=="--")return;
        const icon=L.divIcon({html:`<div style="background:${color};color:#fff;border-radius:50%;width:50px;height:50px;display:flex;align-items:center;justify-content:center;font-weight:bold;">${v}</div>`,className:"",iconSize:[50,50],iconAnchor:[25,25]});
        const m=L.marker([c.lat,c.lng],{icon}).addTo(map);
        m.bindPopup(`<b>${name}</b>`);
        allMarkers.push(m);
    });
}

// 表格
let lastSort="default";
function renderDataTable(t,sort=lastSort){
    const cfg=fieldMap[t];
    const f=cfg.field;
    document.getElementById('table-title').textContent=cfg.label+"表格";
    const b=document.getElementById('table-body');b.innerHTML="";
    let list= t==="waterLevel"?floodDataList:pointDataList;
    let valid=list.filter(x=>x[f]&&x[f]!=="--");
    if(sort==="desc")valid.sort((a,b)=>parseFloat(b[f])-parseFloat(a[f]));
    if(sort==="asc")valid.sort((a,b)=>parseFloat(a[f])-parseFloat(b[f]));
    lastSort=sort;
    valid.forEach(x=>{
        const name=x.name;
        const code= t==="waterLevel"?x.code:(weatherPoints[name]?.code||"");
        const val=x[f]+" "+cfg.unit;
        b.innerHTML+=`<tr><td>${name}</td><td>${code}</td><td>${val}</td></tr>`;
    });
}
document.querySelectorAll('.sort-btn').forEach(b=>{
    b.addEventListener('click',()=>{renderDataTable(currentTab,b.dataset.sort);});
});

// ============== 1. 抓取氣象數據 ==============
function fetchWeather(){
    const t=Date.now();
    return fetch(`https://corsproxy.io/?https://xml.smg.gov.mo/c_actualweather.xml?t=${t}`)
    .then(r=>r.text()).then(x=>{
        const doc=new DOMParser().parseFromString(x,"text/xml");
        document.getElementById('pub-date').textContent=doc.querySelector("SysPubdate")?.textContent||"";
        document.getElementById('time-stamp').textContent=doc.querySelector("SysPubdate")?.textContent||"";
        pointDataList=[];
        doc.querySelectorAll("WeatherReport station").forEach(s=>{
            const name=s.querySelector("stationname")?.textContent||"";
            const wd=extractNodeValue("WindDirection",s)||"--";
            const ws=extractNodeValue("WindSpeed",s)||"--";
            const wg=extractNodeValue("WindGust",s)||"--";
            let r1m="--",r1h="--",rt="--";
            s.querySelectorAll("Rainfall").forEach(r=>{
                const ty=r.querySelector("Type")?.textContent;
                const v=extractNodeValue("Rainfall",r);
                if(ty==="3")r1m=v;if(ty==="4")r1h=v;if(ty==="5")rt=v;
            });
            const ps=extractNodeValue("MeanSeaLevelPressure",s)||"--";
            const pst=extractNodeValue("StationPressure",s)||"--";
            pointDataList.push({name,windDir:wd,windSpeed:ws,windGust:wg,rain1m:r1m,rain1h:r1h,rainTotal:rt,pressSea:ps,pressStation:pst,waterLevel:"--"});
        });
    });
}

// ============== 2. 抓取水位 ==============
function fetchFlood(){
    const t=Date.now();
    return fetch(`https://corsproxy.io/?https://xml.smg.gov.mo/c_ftgms.xml?t=${t}`)
    .then(r=>r.text()).then(x=>{
        const doc=new DOMParser().parseFromString(x,"text/xml");
        floodDataList=[];
        doc.querySelectorAll("WLReport station").forEach(s=>{
            const code=s.getAttribute("code")||"";
            const name=s.querySelector("stationname")?.textContent?.trim()||"";
            const wl=s.querySelector("Waterlevel > Value")?.textContent?.trim()||"--";
            floodDataList.push({name,code,waterLevel:wl});
        });
    });
}

// ============== 3. 抓取熱帶氣旋 ==============
function fetchTyphoon(){
    const t=Date.now();
    return fetch(`https://corsproxy.io/?https://xml.smg.gov.mo/c_typhoon.xml?t=${t}`)
    .then(r=>r.text()).then(x=>{
        const txt=x.trim();
        document.getElementById("typhoon-info").innerText=txt.includes("沒有熱帶氣旋")?"現時並沒有熱帶氣旋信號。":txt;
    });
}

// ============== 4. 抓取風暴潮（新增） ==============
function fetchStormSurge(){
    const t=Date.now();
    return fetch(`https://corsproxy.io/?https://xml.smg.gov.mo/c_stormsurge.xml?t=${t}`)
    .then(r=>r.text()).then(x=>{
        const doc=new DOMParser().parseFromString(x,"text/xml");
        const desc=doc.querySelector("Description")?.textContent||"現時沒有風暴潮警告。";
        document.getElementById("stormsurge-info").innerText=desc;
    });
}

// ============== 5. 強風彈窗（風速≥41 km/h） ==============
function showStrongWindPopup(){
    const strong=pointDataList.filter(s=>{
        const ws=parseFloat(s.windSpeed);
        return !isNaN(ws)&&ws>=21;
    });
    if(strong.length===0)return;
    let html=`<div style='padding:8px;min-width:260px;'><h4>強風｜風速 ≥41 km/h</h4><ul style='padding-left:20px;margin:8px 0;'>`;
    strong.forEach(s=>{
        const code=weatherPoints[s.name]?.code||"";
        html+=`<li>${s.name} (${code})｜風速：${s.windSpeed} km/h</li>`;
    });
    html+="</ul></div>";
    L.popup().setLatLng([22.17,113.55]).setContent(html).openOn(map);
}

// ============== 載入全部 ==============
function loadAll(){
    Promise.all([fetchWeather(),fetchFlood(),fetchTyphoon(),fetchStormSurge()])
    .then(()=>{
        updateMapMarkers();
        updateLegendPanel(currentTab);
        renderDataTable(currentTab);
        showStrongWindPopup();
    });
}

window.addEventListener('DOMContentLoaded',loadAll);
setInterval(loadAll,300000);
</script>
